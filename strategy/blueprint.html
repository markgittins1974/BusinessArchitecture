d or removed"}, {"text": "Business Process Pack outlines how historical ownership errors spanning multiple years are identified and corrected"}, {"text": "Business Process Pack outlines how party records for companies and corporate trustees are created and maintained"}]}]}, "pain": {"synopsis": "22 pains: opacity, trays, crashes, misclassification", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-036", "text": "Once an amendment request is submitted there is no confirmation it has been received and no visibility of progress. The only indicator is an in-progress status in My Land Tax that never changes until the work is complete, leaving customers to call for updates."}, {"id": "PP-037", "text": "§H107§ Payment deadlines and interest continue to apply while requests are being processed. Customers who assume their obligation is paused can accrue unnecessary interest through no fault of their own, a risk communicated verbally but not proactively at the point of submission."}, {"id": "PP-038", "text": "Trust and super fund amendment requests do not meet automation conditions and are diverted to manual processing. Customers in these structures wait significantly longer for outcomes simply because of their ownership type, not the complexity of their request."}, {"id": "PP-039", "text": "Staff cannot predict which amendments automate; 'try it …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-040", "text": "§H108§ When a straightforward amendment automates, neither staff nor customer receives confirmation it completed. Staff must manually check eSys and customers see no status change, creating uncertainty on both sides and driving unnecessary follow-up."}, {"id": "PP-041", "text": "Rather than searching through an extensive list to find the most accurate match, staff default to general work item types because it is faster. This means the classification system that should support allocation and reporting is undermined by its own complexity. Staff use and update spreadsheets for work items to track them more easily Text files received via email Annual Reval valuation data matching 99% of properties automatically match in eSys against existing property."}, {"id": "PP-042", "text": "Work items allocated to trays that are not regularly monitored can sit unactioned for weeks or months. Without visibility of what is in each tray and how long it has been there, there is no reliable way to identify items that have been missed until a customer calls to follow up or a deadline is breached."}, {"id": "PP-043", "text": "Work items that are misclassified or allocated to unavailable staff can sit in trays for extended periods with no automatic escalation or reassignment. By the time the delay is identified the customer may have already called multiple times or missed a deadline."}, {"id": "PP-044", "text": "Customer receives outcome of their amendment or exemption request in writing and proceeds to pay the confirmed liability or awaits refund processing Where an amendment is in progress customers may see a notional liability figure in My Land Tax that does not match their most recent assessment or correspondence. Without any explanation of why the figure looks different, customers call to query what they owe, not knowing that the discrepancy is expected and temporary."}, {"id": "PP-045", "text": "Staff keep a Microsoft Notepad window open as a workaround, copying notes into the action item at the end. Notes held locally create risk if a session crashes or a staff member forgets to transfer them before closing."}, {"id": "PP-046", "text": "§Q117§ eSys crashes approximately once per week, locking action items for hours under the message §Q118§ Once an action item is closed there is no recently completed view in eSys. If a follow-up is needed staff must search for the customer from scratch, creating inefficiency and risk when multiple cases are being worked simultaneously."}, {"id": "PP-047", "text": "§Q117§ eSys crashes approximately once per week, locking action items for hours under the message §Q118§ Once an action item is closed there is no recently completed view in eSys."}, {"id": "PP-048", "text": "Staff Staff check status across multiple systems with no single centralised view of a customer's history There are no clear rules for when to create a follow-up work item versus recording general correspondence"}, {"id": "PP-049", "text": "Section 61 PPR requests (covering construction period before occupancy) require staff to verify build dates, contract of sale, and builder contract - these do not automate and require manual processing For separation cases staff verify who remained in the property and apply the PPR exemption to that person only - the person who left may see their assessment increase as they become the sole taxpayer on the joint ownership"}, {"id": "PP-050", "text": "Customers going through separation may not understand that the person who leaves a jointly owned property can see their land tax liability increase rather than decrease as the property is now treated as investment property §Q38§ Email correspondence in separation cases risks being sent to an ex-partner's address if contact details have not been updated - staff must manually verify before sending Trust Form 13 and deceased estate processes are not well known by customers or their families §H77§ (AVCC) Agent Verified"}, {"id": "PP-051", "text": "Customers going through separation may not understand that the person who leaves a jointly owned property can see their land tax liability increase rather than decrease as the property is now treated as investment property §Q38§ Email correspondence in separation cases risks being sent to an ex-partner's address if contact details have not been updated - staff must manually verify before sending Trust Form 13 and deceased estate processes are not well known by customers or their families §H77§ (AVCC) Agent Verified"}, {"id": "PP-052", "text": "Family and domestic violence customers are flagged individually in eSys but there is no centralised way to manage them as a cohort. Staff maintain a separate spreadsheet that is not integrated, not visible to other teams, and dependent on individuals remembering to update it, creating risk that a vulnerable customer's circumstances are missed."}, {"id": "PP-053", "text": "Customers managing multiple entities must navigate a separate exemption process for each with no ability to link or coordinate requests across ownership structures."}, {"id": "PP-054", "text": "Customers transferring property to a trust or super fund may find the ownership is still recorded under their personal name if the conveyancer did not record the correct category at lodgement §Q114§ §H104§ Change of contact detail forms processed including authority requests and address updates"}, {"id": "PP-055", "text": "BTO letters saved to CM10 must be remembered and …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-056", "text": "Business Process Map outlines how bulk amendments are managed where a systemic data error has affected multiple customers simultaneously VRLT liability is not automatically recalculated when a Land Tax amendment adds or changes a property §Q115§ §Q116§ Correspondence-based requests can run to hundreds of unstructured pages, making them significantly more time-consuming to process than structured My Land Tax submissions. Trust and super fund amendment requests do not meet automation conditions and are diverted to manual processing."}, {"id": "PP-057", "text": "AOS not clearly surfaced in eSys; easy for staff to miss …", "note": "Register wording (merged model) — canvas narrative match pending validation."}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "My Land Tax does not support attachments, forcing staff to switch to Outlook for any correspondence requiring documentation. This fragments the experience for both staff and customers and breaks the correspondence trail."}, {"text": "Customers who submit exemption requests receive no proactive updates. With strict deadlines and interest accruing, customers must call to check status and request extensions - placing the burden of managing the process on the customer rather than the SRO."}, {"text": "When correspondence is misclassified by keyword matching the work item lands in the wrong tray. By the time the error is identified the customer has been waiting longer than necessary and staff time has been spent on work that needed rerouting before it could begin."}, {"text": "Customers going through separation who apply for a PPR exemption can see their assessment increase rather than decrease, the person who leaves becomes the sole taxpayer on the jointly owned property. This comes as a shock and is rarely explained upfront."}]}]}, "opp": {"synopsis": "Transparency, work management and tooling HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-037", "text": "How Might We confirm to customers that their request has been received and give them visibility of its progress, so that uncertainty never drives an avoidable call to the SRO?"}, {"id": "HMW-038", "text": "How Might We ensure customers are not financially penalised for a process gap that is within the SRO's control to resolve?"}, {"id": "HMW-040", "text": "How Might We reduce the manual processing for trusts and super fund amendment requests so that customers can receive faster outcomes?"}, {"id": "HMW-041", "text": "How Might We make the outcome of automated processing immediately visible to both customers and staff, so that a completed action is always confirmed without anyone needing to check?"}, {"id": "HMW-043", "text": "How Might We make it straightforward for staff to classify work accurately, so that the classification system reflects what is actually happening rather than what is easiest to select?"}, {"id": "HMW-044", "text": "How Might We ensure that misclassified work items are identified and rerouted before they cause delays, so that a classification error never becomes a customer service failure?"}, {"id": "HMW-045", "text": "How Might We design a work management approach that ensures every request reaches resolution within a predictable timeframe, so that customers are never delayed by how work is allocated internally?"}, {"id": "HMW-046", "text": "How Might We give staff and team leaders a clear view of what is waiting and for how long, so that nothing falls through the gaps?"}, {"id": "HMW-047", "text": "How Might We give staff a way to capture notes and observations in real time while working on a case, so that workarounds outside the system are never the only way to keep a reliable record?"}, {"id": "HMW-048", "text": "How Might We provide staff with a stable system so that technical failures never become the reason a customer waits longer than they should?"}, {"id": "HMW-049", "text": "How Might We give staff easy access to their recently completed work, so that closing an action item never means losing the ability to quickly find it again?"}, {"id": "HMW-050", "text": "How Might We give staff clear rules for when to create a work item versus record general correspondence, so that important work is never missed?"}, {"id": "HMW-051", "text": "How Might We keep customers informed at every meaningful stage, so that they never need to call just to find out if their request is being worked on?"}, {"id": "HMW-052", "text": "How Might We keep customers informed of the progress of their exemption request and any upcoming deadlines, so that they are never at risk of accruing interest due to a lack of information?"}, {"id": "HMW-053", "text": "How Might We ensure customers always have a clear and accurate view of what they owe at any point in the cycle, so that a discrepancy between My Land Tax and their most recent correspondence never drives an avoidable call?"}, {"id": "HMW-054", "text": "How Might We prepare customers going through separation for the full range of possible land tax outcomes so that the result does not come as an unexpected shock?"}, {"id": "HMW-055", "text": "How might we ensure sensitive customer communications are always sent to the correct recipient, so that privacy is protected and trust in the system is maintained—especially during life events like separation?"}, {"id": "HMW-056", "text": "How Might We centralise family and domestic violence case management, so that a vulnerable customer's circumstances are always visible regardless of which team or channel they interact with?"}, {"id": "HMW-057", "text": "How Might We simplify the exemption request process for customers managing multiple entities so that they do not have to navigate the same process separately for each?"}, {"id": "HMW-058", "text": "How might we identify and communicate incorrect trust recording earlier in the process so that customers are not faced with unexpected transfer costs and delays when applying for an exemption?"}, {"id": "HMW-059", "text": "How might we ensure staff are consistently prompted to check AOS at the relevant point in the assessment process so that it is never missed?"}, {"id": "HMW-060", "text": "How Might We reduce reliance on unstructured correspondence by making structured digital channels the natural first choice for customers, so that requests arrive in a form that staff can act on immediately?"}, {"id": "HMW-061", "text": "How Might We enable documents to be exchanged through a single channel, so that neither staff nor customers need to switch platforms to complete a request?"}]}]}, "quotes": {"synopsis": "Lost items, crashes, chasing updates", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "“A lot of customers just see an automated message. They don't bother to actually look in their (My Land Tax) inbox. We'd give them our personal email to say, respond to me by this date. That can be a problem because it comes from obviously a no reply email address. But customers still do respond to the no reply email address.\" P2 Staff"}, {"text": "\"I had to ring them to get progress updates. I had to keep it in my calendar to call for progression before the end of the deadline.\" \"Maybe a heads up - it's been read or it's in the process, whatever. I did get that information, but I had to ring them to get it.\" P4 Customer"}, {"text": "\"We get work items that get lost in the mix - things allocated incorrectly. Trays that don't get looked at. Sometimes things sitting in there for 3 months rather than 6 weeks.\" P2 Staff"}, {"text": "\"They can sit in trays that don't necessarily get looked at regularly. Things like that can then obviously become urgent because they're time sensitive, and we haven't realized that something's been sitting there for three months that really should have been dealt with in six weeks.\" P2 Staff"}, {"text": "\"They were strict in deadline if I didn't ring back and I would have had to pay interest.\" P4 Customer"}, {"text": "“If it doesn’t automate so it doesn’t close it off, then they have to go into eSys… In those cases, that’s when it’s double handling… But you don’t know if it’s going to automate or not.” P3 Staff"}, {"text": "\"If everything in our system aligns and it's a fairly basic to middle of the run sort of request, it should go through and it won't need any intervention from us at all. With trusts and super funds, it's generally manual.” P5 Staff"}, {"text": "\"It involved a few phone calls, sending information through. Not getting a response so there were follow up calls. So it all got resolved and in line with what I expected, but yeah, it was probably just a bit of a process in getting it done.\" P10 Customer"}, {"text": "“Maybe a heads up - it’s been read or it’s in the process, whatever. I did get that information, but I had to ring them to get it.” P4 Customer"}, {"text": "\"We don't really have clear cut rules of, when can you create another action item? When can you create a general correspondence to account for your time and what's fair to account for your time?” P2 Staff"}, {"text": "\"I use my personal outlook to send them correspondence. It's jarring for them to get an automated response.\" P2 Staff"}, {"text": "\"When it's in a correspondence form and you get a whole contract of sale, you get all the contracts with the builder. It can be in any order and it can be a couple of 100 pages. To pull the same data from a correspondence based item can be a bit more laborious.\" P5 Staff"}, {"text": "\"We tend to escalate a little bit to either technical advice, legal advice, policy, depending on what nature the question is. We do run a forum - a monthly catch up with TARB - and we can discuss things and put it as an agenda item for the next one.\" P5 Staff"}, {"text": "“The work item types and the way they’re identified is general. A work item type may have lots of different types of work and determination that sits underneath it, so it’s difficult to identify how it can get distributed and allocated to who can do it.” P1 Staff"}, {"text": "\"I cannot filter out authority from address changes and that is frustrating. Authority requests are more complex and often more urgent than ordinary contact detail changes.\" P9 Staff"}, {"text": "\"You can't add notes into eSys. I use microsoft notepad next to eSys. We run 3 screens typically.\" P5 Staff"}, {"text": "“When it's in a correspondence form and you get a whole contract of sale, you get all the contracts with the builder. It can be in any order and it can be a couple of 100 pages. To pull the same data from a correspondence based item can be a bit more laborious.” P5 Staff"}, {"text": "\"Our family and domestic violence customers, we keep a separate spreadsheet because eSys does not provide a centralised way to manage these cases. While we can flag individual customers, there is no dedicated tray or place to view and track them together.\" P2 Staff"}, {"text": "\"action item being used by another user.\" Work in progress is lost or delayed and customers waiting on outcomes are affected without knowing why. \"Sometimes eSys crashes when I have multiple sessions open. I can lose my work, and the system may lock me out of the action item for hours or even until the next day.\" P2 Staff"}, {"text": "“When they go through the portal on my land tax … all the answers to those questions and additional information that they provided will come up. It's brilliant because you're used to looking at it in that format and you know where to look.\" P5 Staff"}, {"text": "\"Have a timeline or an estimated timeline, so that they can see and not have to call to clarify things.” P7 Staff"}]}]}, "capability": {"synopsis": "13 capabilities · heaviest: Platform Reliability & Workplace Tooling", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-EN", "text": "Platform Reliability & Workplace Tooling", "note": "Proposed · 4 PP / 4 HMW · no process linkage"}, {"id": "LTX-VS-10", "text": "Request Status & Progress Transparency", "note": "Proposed · 2 PP / 4 HMW · T7"}, {"id": "LTX-VS-10", "text": "Digital Self-Service Management", "note": "Proposed · 4 PP / 2 HMW · P12.2"}, {"id": "LTX-VS-10", "text": "Vulnerable Customer & Life Event Management", "note": "Proposed · 3 PP / 3 HMW · P13.1, P13.2"}, {"id": "LTX-VS-10", "text": "Work Allocation & Workflow Management", "note": "Proposed · 2 PP / 3 HMW · P12.3"}, {"id": "LTX-VS-08", "text": "Interest Management", "note": "Existing · 1 PP / 1 HMW · P14.2"}, {"id": "LTX-VS-10", "text": "Enquiry & Service Request Management", "note": "Proposed · 1 PP / 1 HMW · P12.1"}, {"id": "LTX-VS-10", "text": "Knowledge Management", "note": "Proposed · 1 PP / 1 HMW · no process linkage"}, {"id": "LTX-VS-03", "text": "Exemption Application Management", "note": "Existing · 1 PP / 1 HMW · P5.2, P6.2"}, {"id": "LTX-VS-01", "text": "Ownership Transfer & Change Processing", "note": "Proposed · 1 PP / 1 HMW · P3.1, P13.3"}, {"id": "LTX-VS-10", "text": "Correspondence & Document Exchange", "note": "Proposed · 1 PP / 1 HMW · P12.4"}, {"id": "LTX-VS-04", "text": "Liability/Entitlement Calculation Management", "note": "Existing · 1 PP / 0 HMW · P3.2, P5.1"}, {"id": "LTX-VS-00", "text": "Channel Management", "note": "Proposed · 0 PP / 1 HMW · no process linkage"}]}]}, "process": {"synopsis": "14 processes · T7, P12.2 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "T7", "text": "Request Progress Notification", "note": "2 PP / 4 HMW · via 1 capability"}, {"id": "P12.2", "text": "Amendment Request Processing", "note": "4 PP / 2 HMW · via 1 capability"}, {"id": "P13.1", "text": "Family & Domestic Violence Case", "note": "3 PP / 3 HMW · via 1 capability"}, {"id": "P13.2", "text": "Family & Domestic Violence Case", "note": "3 PP / 3 HMW · via 1 capability"}, {"id": "P12.3", "text": "Work Item Triage, Allocation &", "note": "2 PP / 3 HMW · via 1 capability"}, {"id": "P14.2", "text": "Remission & Waiver Request", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P12.1", "text": "Enquiry Handling & First-Contact", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P5.2", "text": "Primary Production Land (PPL); Tax", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P6.2", "text": "Primary Production Land (PPL); Tax", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P3.1", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P13.3", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P12.4", "text": "Correspondence & Document", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P3.2", "text": "Land Grouping Registration", "note": "1 PP / 0 HMW · via 1 capability"}, {"id": "P5.1", "text": "Land Grouping Registration", "note": "1 PP / 0 HMW · via 1 capability"}]}]}}, "s5": {"customer": {"synopsis": "Weighing objection odds; two-month window", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer believes their property has been incorrectly valued"}, {"text": "Customer decides to pursue an objection"}, {"text": "Customer weighs up whether lodging a formal valuation objection is worth the time and effort based on their expectation of the likely outcome"}, {"text": "Customer researches comparable property sales to build a case for their valuation objection and submits their findings to the SRO or VGV"}, {"text": "Customer seeks a second opinion from a real estate agent or sworn valuer about whether the objection is worth pursuing"}, {"text": "Customer lodges a formal objection via the website within two months of receiving their assessment (Gen Form 4)"}, {"text": "Customer attempts to lodge a formal objection outside the two month allowable timeframe"}, {"text": "Customer is informed that they are outside of the objection window and the objection is refused"}, {"text": "Customer engages a 3rd party to lodge an objection on their behalf"}, {"text": "Customer calls local council first before realising valuation objections go to SRO"}, {"text": "Customer does not pay their assessment while objection is being considered. Note Notional tax applies during the objection period. Mitigation planned for 2027"}, {"text": "Customer is advised to pay their assessment while objection is being considered"}, {"text": "Customer decides not to lodge an objection despite noticing a valuation discrepancy because they are concerned the lower value may be corrected upward"}, {"text": "Customer receives correspondence from VGV - approved or disallowance"}, {"text": "Customer receives a call from the valuer and mistakes them for SRO"}, {"text": "Customer makes contact to question outcome of objection"}, {"text": "Customer accepts the outcome and decides not to pursue further after being told it is unlikely to change significantly"}, {"text": "Customer receives outcome letter and provides refund details"}]}]}, "front": {"synopsis": "Explaining objection vs assessment distinction", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer service staff explain the distinction between objecting to a valuation and querying an assessment calculation"}, {"text": "Customer service staff direct customers to the online objection portal or explain written submission process"}, {"text": "Where the assessment is not fully paid, SRO contacts the customer to advise of the disallowance outcome"}, {"text": "Where the assessment is fully paid or significant time has elapsed since the valuer issued the disallowance notice, SRO may elect not to contact the customer separately"}, {"text": "Customer is notified of the outcome in writing and requests bank details for refund"}]}]}, "back": {"synopsis": "Validating and reconciling VGV outcomes; refunds", "groups": [{"title": "Canvas cards", "cards": [{"text": "Valuation objections team receives and checks validity"}, {"text": "Liability is recalculated based on the new value; Amended assessment is issued or prior assessment is withdrawn"}, {"text": "Refund is calculated where customer has overpaid; Refund approval process is initiated"}, {"text": "Staff receives TARB outcome and manually processes the required action in eSys"}, {"text": "Staff cross-reference the VGV outcome file against SRO records to identify disallowances that have not been proactively communicated"}, {"text": "At the end of each objection cycle, SRO reconciles the consolidated VGV outcome file against internal records to identify any disallowances not previously communicated, and creates a work item in eSys"}, {"text": "eSys updated once TARB has reviewed and passed to assessing team"}]}]}, "systems": {"synopsis": "Portal lodgement; VGV outcome files into eSys", "groups": [{"title": "Canvas cards", "cards": [{"text": "Online objection portal on SRO website used for lodgement"}, {"text": "SRO sends objection details to VGV"}, {"text": "For approved objections VGV notifies the SRO of the updated valuation and the outcome is loaded into eSys for processing"}, {"text": "At the end of each objection cycle VGV sends a consolidated Excel file listing all determined objections across the period"}, {"text": "Valuation Objection Decision work item created in eSys"}, {"text": "Original assessment stands and remains payable"}, {"text": "eSys used to record and approve objections and load VGV outcomes; CM10/TRIM holds objection forms submitted by customers"}, {"text": "Gen Form 4 is the specific form used for formal objections"}, {"text": "A non-issue flag may be applied in eSys to prevent a new assessment issuing while the objection is under review"}, {"text": "Objection forwarded via VGV via a council-connected system"}]}]}, "support": {"synopsis": "VGV decides; TARB–VCAT escalation", "groups": [{"title": "Canvas cards", "cards": [{"text": "VGV receives the objection details"}, {"text": "VGV makes a decision on the value; Disallowed objections are not proactively sent until the end of the objection cycle; Valuer contacts the customer directly by phone to discuss the property and their review"}, {"text": "When customers escalate with legal representation, cases must be referred to TARB"}, {"text": "BTO or website sends formal objections to TARB; Land revenue sends complex cases to Technical Advice and Review Branch (TARB)"}, {"text": "Once TARB completes their process they notify the BTO of what needs to happen (e.g. withdraw assessment, issue refund)"}, {"text": "TARB may be consulted where objections involve legal complexity"}, {"text": "Business Process Pack outlines the formal dispute pathway beyond TARB including VCAT and Supreme Court processes"}, {"text": "Business Process Pack outlines how customers are notified of objection outcomes and how correspondence is managed following a TARB decision"}, {"text": "Valuation of Land Act and the Land Tax Act referenced when corresponding with customers"}, {"text": "\"We are currently working with VGV to get access to VM online directly which will enable us to run much more frequent queries on disallowed objections and check aged VOs we never got an outcome for.\" SME feedback"}]}]}, "pain": {"synopsis": "Uncommunicated disallowances; outmatched evidence", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-058", "text": "Objection complexity sustains a consultant market at 20% …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-059", "text": "Obtaining specialist documentation can cost more than the tax in dispute, leaving customers who may have legitimate grounds unable to afford to pursue them. Staff cannot take EFT details over the phone, meaning refunds default to cheque when customers are unwilling to provide bank details by email. With cheques being phased out this leaves a gap with no clear resolution for either party."}, {"id": "PP-060", "text": "Legal representation triggers TARB/legal/policy escalation …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-061", "text": "TARB the assessing team has no visibility of progress or timeframe. Staff asked for an update cannot provide one, and customers can wait for extended periods without any indication their matter is being worked on. Pro-rata valuation objections require significant staff time clarifying exactly what the customer is objecting to before assessment can begin."}, {"id": "PP-062", "text": "Customers who attempt to object outside the two month window believe they have legitimate grounds but are told they are out of time. The timeframe and its consequences are not prominently communicated at the point the assessment is issued."}, {"id": "PP-063", "text": "Customers who lodge a valuation objection commonly assume their payment obligation is paused while the objection is being considered. This is not the case, payment remains due regardless of the outcome. Customers who do not pay while waiting can accrue interest and penalties."}, {"id": "PP-064", "text": "Customers who believe something is wrong with their assessment do not always understand the distinction between objecting to the land valuation and disputing the assessment calculation. These are two separate processes handled by different parts of the organisation, but the difference is not explained on the assessment itself."}, {"id": "PP-065", "text": "VGV disallows a valuation objection the outcome is not proactively sent to the SRO. Disallowances only surface when staff periodically contact VGV with a list of outstanding objections. In the interim customers are not informed of a decision that has already been made."}, {"id": "PP-066", "text": "Pro-rata valuation objections require significant staff time clarifying exactly what the customer is objecting to before assessment can begin. Customers frequently do not understand why the figure on their certificate differs from what they expected to pay. Customers who have been through a valuation objection, or who have heard about others' experiences, often conclude the process is unlikely to yield a meaningful result."}, {"id": "PP-067", "text": "Customers who have been through a valuation objection, or who have heard about others' experiences, often conclude the process is unlikely to yield a meaningful result. This perception discourages customers from pursuing objections they may have legitimate grounds for, and erodes confidence in the fairness and value of the process overall."}, {"id": "PP-068", "text": "Customers who research comparable sales to support an objection are at a significant disadvantage against professional valuers with detailed technical data. A well-prepared customer is still unlikely to succeed without specialist advice, making a meaningful objection inaccessible to most."}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "The periodic, file-based disallowance process requires manual reconciliation by SRO staff, creating risk of delays and gaps in customer communication where outcomes have not been proactively flagged."}]}]}, "opp": {"synopsis": "Objection transparency and fairness HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-063", "text": "How Might We make it clear to customers how to challenge a valuation and who to contact, so that the path to lodging an objection never starts with being redirected from the wrong place?"}, {"id": "HMW-064", "text": "How Might We make the distinction between a valuation objection and an assessment query clear to customers at the point they decide to challenge something, so that they are directed to the right process first time?"}, {"id": "HMW-065", "text": "How Might We ensure customers understand the objection window and its consequences, so that time never becomes the reason a legitimate concern cannot be heard?"}, {"id": "HMW-066", "text": "How Might We ensure that customers genuinely understand their payment obligations during an objection, so that the information provided at lodgement translates into action rather than being overlooked?"}, {"id": "HMW-067", "text": "How Might We give customers a clearer understanding of what evidence is needed, so that they can make an informed decision about whether their objection has merit before investing time and money?"}, {"id": "HMW-068", "text": "How Might We make the pathway for challenging a decision transparent, so that customers can make an informed choice without being deterred by hidden costs and complexity?"}, {"id": "HMW-069", "text": "How Might We give customers a realistic and transparent picture of what a valuation objection can achieve, so that they can make an informed decision about whether to pursue one rather than being deterred by low expectations?"}, {"id": "HMW-070", "text": "How Might We give customers and staff a shared understanding of how pro-rata valuations are calculated, so that objections can be lodged and assessed without a lengthy clarification process?"}, {"id": "HMW-071", "text": "How might we automate the identification and communication of disallowance outcomes so that SRO staff are not reliant on manual reconciliation of periodic files?"}, {"id": "HMW-072", "text": "How Might We ensure disallowance decisions are automatically communicated to the SRO, so that customers are informed promptly rather than waiting for a periodic reconciliation?"}, {"id": "HMW-073", "text": "How Might We ensure that legally complex objection disputes are escalated and resolved within a predictable timeframe, so that customers who have engaged legal representation are not left waiting indefinitely for an outcome?"}, {"id": "HMW-074", "text": "How Might We give assessing staff visibility of the progress of matters referred to TARB, so that they can keep customers informed and are not left without an answer when a customer calls to follow up?"}]}]}, "quotes": {"synopsis": "Consultant fees and opaque valuations", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "\"Once tarb have gone through their process, they've done all the formal objection outcome, they'll basically notify us of what needs to happen and we apply those changes. So it might be withdrawing assessments, issuing refunds, that kind of thing.\" P2 Staff"}, {"text": "\"It's self-explanatory. They get the valuation off the rates notice. I would have gone to the council for the valuation if I wanted to challenge it.\" P5 Customer"}, {"text": "\"I called the council and was directed to the SRO. I sent in a letter of objection. SRO called to tell me the estimate was valid. Needing advice, I researched what properties were sold for around the year and asked for it in writing.\" P1 Customer"}, {"text": "\"There's not much transparency on the value. Never sure how close it is to real market valuations. It's all over the shop one property vs another. The ltx values are different given the properties are next to each other. P2 Customer Customer picks up the error when they receive a reminder notice showing outstanding liability “We know customers first tend to ring the local council.\" P6 Staff"}, {"text": "\"They wanted us to give them full plans and things like that. We'd have to pay to get those documents which is probably going to be more than the $5,000 that we have to give.” P4 Customer"}, {"text": "“When we want to find out which objections have been disallowed, they don't send us the files of disallowances. We then send a report of all of our active pending objections to the VGB.” P8 Staff"}, {"text": "“We submitted an objection, an external consultant did it. There's consultants, that are experts in lodging objections, and they’ll take 20% of the saving.” P10 Customer"}, {"text": "\"Customers have two months from when they receive their assessment to lodge an objection. If they've objected out of time we would close the work item and send them an email telling them that thank you for your objection but it's out of time.\" P7 Staff"}, {"text": "“And the reason I don't contest the valuation is what if they bump it up to match the other one?” P2 Customer"}, {"text": "“They put us on a payment plan. So we didn’t have to pay the full $5,500 on that property until a decision was made. I had to at least pay the first instalment to avoid the interest on the full amount\" P4 Customer"}, {"text": "\"People get lawyers involved, and then you've got to, as best that we can, with our limited legal expertise, explain things to customers and where the sort of rules stand. And then there's consultation that happens with policy or TARB.\" P7 Staff"}]}]}, "capability": {"synopsis": "3 capabilities · heaviest: Assessment Objection Management", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-07", "text": "Assessment Objection Management", "note": "Existing · 5 PP / 6 HMW · P7.1"}, {"id": "LTX-VS-07", "text": "Valuation Objection Coordination", "note": "Proposed · 4 PP / 4 HMW · P4.2"}, {"id": "LTX-VS-07", "text": "Dispute Resolution Management", "note": "Existing · 2 PP / 2 HMW · P7.2"}]}]}, "process": {"synopsis": "3 processes · P7.1, P4.2 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P7.1", "text": "Objection & Appeal Routing", "note": "5 PP / 6 HMW · via 1 capability"}, {"id": "P4.2", "text": "Valuation Objection Coordination &", "note": "4 PP / 4 HMW · via 1 capability"}, {"id": "P7.2", "text": "TARB Referral & Outcome", "note": "2 PP / 2 HMW · via 1 capability"}]}]}}, "s6": {"customer": {"synopsis": "Six payment channels; brittle exceptions", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer considers payment method and channel"}, {"text": "Customer pays in full via BPAY (Phone or internet banking)"}, {"text": "Customer pays in full by direct EFT using the assessment reference"}, {"text": "Customer pays in full by credit card over the phone (via automated phone payment system)"}, {"text": "Customer pays in full at Australia Post in person, subject to payment limit"}, {"text": "Customer pays in full by Cheque (currently being phased out)"}, {"text": "Customer sets up monthly instalments via Autopay portal selecting bank account or credit card"}, {"text": "Customer completes instalment payments"}, {"text": "Customer receives email or SMS (in pilot) reminder before each instalment is debited and checks account balance"}, {"text": "Customer receives instalment reminder that does not specify which property or entity the payment relates to"}, {"text": "Customer is given the option to pay the missed instalment by phone or BPAY, reset the instalment plan, or pay out the remaining balance in full by credit card"}, {"text": "Customer wants to change from direct debit to credit card or vice versa, must cancel and re-establish the plan which can trigger interest"}, {"text": "Customer misses an instalment due to failed payment or expired card - the AutoPay plan is cancelled automatically and customer must call the SRO to resolve"}, {"text": "Customer pays against the wrong account or revenue line, resulting in an incorrect payment allocation"}, {"text": "Customer needs to pay two separate bills, one in personal name and one in company or trust name, from different bank accounts or cards"}, {"text": "Customer pays two separate bills - one in personal name and one in company or trust name - from different bank accounts or cards"}, {"text": "Customer moves money between bank accounts to facilitate BPAY payment and incurs lost interest as a result"}, {"text": "Customer creates their own Excel spreadsheet to allocate the total land tax bill across individual properties for tax return purposes"}, {"text": "Customer calls to confirm their payment has been received and correctly allocated"}, {"text": "Customer contacts SRO after a failed instalment payment to understand their options"}, {"text": "Customer pays; Customer fails to pay"}]}]}, "front": {"synopsis": "AutoPay guidance; card transfers to Westpac", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff assist customers with AutoPay setup by guiding them through the portal"}, {"text": "Staff transfer customers wanting to pay by card to the Quick Voice Westpac automated phone payment system"}, {"text": "Staff explain why card payments cannot be taken directly"}, {"text": "Staff assist customers who need help navigating online or phone payment options"}, {"text": "Staff cannot take credit card payments directly"}]}]}, "back": {"synopsis": "Value-routed refund approvals", "groups": [{"title": "Canvas cards", "cards": [{"text": "Refund approval process initiated, approved or rejected"}, {"text": "SRO checks account details saved in eSys and CM10; Where no EFT details are available refund defaults to cheque"}, {"text": "Refund approval routed based on value: auto approval, team leader tray or branch manager tray"}, {"text": "Staff have limited ability to recover money once it has been incorrectly refunded"}]}]}, "systems": {"synopsis": "eSys allocation and suspense handling", "groups": [{"title": "Canvas cards", "cards": [{"text": "Payments applied and allocated in eSys"}, {"text": "Auto-pay portal used for instalment plan setup; BPAY and phone banking available as payment channels"}, {"text": "Card payments handled via Quick Voice Westpac automated system"}, {"text": "eSys used to locate and allocate payments including suspense items"}, {"text": "AutoPay reminder emails include the reference number and amount but do not identify which property or entity the payment relates to"}, {"text": "Automated correspondence is sent by post and email following the due date"}, {"text": "The instalment reminder correspondence gap is expected to be partially mitigated (in pilot)"}]}]}, "support": {"synopsis": "Debt Management handoff; payment BPMs", "groups": [{"title": "Canvas cards", "cards": [{"text": "Where an assessment remains unpaid after the due date the case is transferred to Debt Management for recovery - note: debt recovery is out of scope for this blueprint"}, {"text": "Where a customer has outstanding liability that has not been paid, Debt Services may make first contact with the customer; Notification type varies, digital service of notice, post notification"}, {"text": "See Debt Management Service Blueprint for further details on this journey"}, {"text": "See Debt Management Blueprint"}, {"text": "Business Process Map outlines how payments are routed to the correct revenue line when a customer holds multiple liabilities across Land Tax, VRLT and AOS"}, {"text": "Business Process Map outlines how interest is calculated, applied and reversed including the rules and thresholds that govern each"}, {"text": "Business Process Map outlines how penalties and interest are calculated, applied and reversed including the rules that trigger each"}, {"text": "Business Process Map outlines how write-offs are assessed, approved and recorded"}]}]}, "pain": {"synopsis": "17 pains: AutoPay cancels, channel gaps", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-069", "text": "Instalment plan is cancelled automatically when a payment fails rather than adjusting the remaining schedule. Customers cannot resume a cancelled instalment plan immediately - must wait a period before resetting. AutoPay plan cancels when a card expires and customer risks paying interest if the due date has passed."}, {"id": "PP-070", "text": "Customers cannot resume a cancelled instalment plan immediately - must wait a period before resetting I had that happen once or twice and so I have to go and set it up again, but it doesn't allow you to do it immediately. I think it asks you for 24, 48 hours time lag between setting up a new one.” P2"}, {"id": "PP-071", "text": "Customer The instalment window is shorter than 12 months - by the time the bill arrives and is set up instalments must be completed by October §Q27§ No discount or incentive for paying in full upfront - some customers feel this is unfair compared to other obligations like ATO overpayments that attract interest Land tax bill covers multiple properties in one total figure - customers must create their own spreadsheet to allocate costs per property for tax purposes Spreadsheet"}, {"id": "PP-072", "text": "Customer The instalment window is shorter than 12 months - by the time the bill arrives and is set up instalments must be completed by October §Q27§ No discount or incentive for paying in full upfront - some customers feel this is unfair compared to other obligations like ATO overpayments that attract interest Land tax bill covers multiple properties in one total figure - customers must create their own spreadsheet to allocate costs per property for tax purposes Spreadsheet"}, {"id": "PP-073", "text": "Customer The instalment window is shorter than 12 months - by the time the bill arrives and is set up instalments must be completed by October §Q27§ No discount or incentive for paying in full upfront - some customers feel this is unfair compared to other obligations like ATO overpayments that attract interest Land tax bill covers multiple properties in one total figure - customers must create their own spreadsheet to allocate costs per property for tax purposes Spreadsheet"}, {"id": "PP-074", "text": "To change payment method a customer must cancel and re-establish the plan which can trigger interest."}, {"id": "PP-075", "text": "Customers with multiple assessments must set up auto-pay individually for each one."}, {"id": "PP-076", "text": "Instalment reminder email does not identify which property or entity the payment relates to making it difficult for customers with multiple bills No payment acknowledgement is sent by"}, {"id": "PP-077", "text": "Instalment reminder email does not identify which property or entity the payment relates to making it difficult for customers with multiple bills No payment acknowledgement is sent by"}, {"id": "PP-078", "text": "Australia Post payment limit prevents customer from paying the full amount […] BPAY or online payment methods they are less comfortable with."}, {"id": "PP-079", "text": "Staff cannot take EFT details over the phone, meaning refunds default to cheque when customers are unwilling to provide bank details by email. With cheques being phased out and no replacement in place, this gap has been raised across both Land Tax and Debt Management as a priority to resolve."}, {"id": "PP-080", "text": "Staff cannot take credit card payments directly. Customers who do not trust online or automated phone payment have no alternative and are transferred to a system they are unwilling to use."}, {"id": "PP-081", "text": "Phone banking is confusing for some customers - entering 200 can result in a payment of 2.00."}, {"id": "PP-082", "text": "Payments occasionally applied to the wrong revenue line or account particularly where customers manage multiple properties. Customer pays against the wrong account or revenue line, resulting in an incorrect payment allocation."}, {"id": "PP-083", "text": "Staff cannot take EFT details over the phone, meaning refunds default to cheque when customers are unwilling to provide bank details by email."}, {"id": "PP-084", "text": "BPAY forces inter-account fund transfers; customers lose …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-085", "text": "Certificate vs assessment payment references confused …", "note": "Register wording (merged model) — canvas narrative match pending validation."}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "The SRO does not send any acknowledgement when a customer makes a payment. Customers rely on their own bank receipts or manually noted reference numbers as proof of payment, creating uncertainty about whether the payment has been received."}, {"text": "AutoPay reminder emails include the reference number and amount but do not identify which property or entity the payment relates to."}]}]}, "opp": {"synopsis": "Resilient instalments and confirmation HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-075", "text": "How Might We respond to a failed instalment in a way that keeps the customer on track, so that a single missed payment never results in the entire arrangement being undone?"}, {"id": "HMW-076", "text": "How Might We remove unnecessary delays in the process of reinstating a payment arrangement, so that a customer who is ready to resume paying is never made to wait by a system restriction?"}, {"id": "HMW-077", "text": "How Might We allow customers to manage payment arrangements across multiple assessments from a single setup, so that the number of properties a customer owns never multiplies their administrative burden?"}, {"id": "HMW-078", "text": "How Might We allow customers to update their payment method without disrupting their existing arrangement, so that a simple preference change never puts them at risk of accruing interest?"}, {"id": "HMW-079", "text": "How Might We give customers a longer and more flexible window to spread their payments, so that the timing of the bill never constrains their ability to pay in a way that suits their circumstances?"}, {"id": "HMW-080", "text": "How Might We anticipate and manage card expiry within the payment system, so that an administrative oversight never translates into an unexpected financial penalty for the customer?"}, {"id": "HMW-081", "text": "How Might We make reminders clearer to customers so that they can easily identify which property the reminder is for?"}, {"id": "HMW-082", "text": "How Might We close the loop with customers at the point of payment, so that they have a clear and reliable record that their obligation has been met?"}, {"id": "HMW-083", "text": "How Might We ensure customers can complete their payment obligation in a single transaction regardless of the channel they choose, so that a payment limit never sends a customer away without being able to pay?"}, {"id": "HMW-084", "text": "How Might We support customers through changes to available payment channels, so that removing an option never leaves a customer without a method they can confdently use?"}, {"id": "HMW-085", "text": "How Might We give customers a way to pay by card with confidence, so that distrust of automated systems is never the reason a payment cannot be completed?"}, {"id": "HMW-086", "text": "How Might We make phone banking instructions clear enough that customers cannot accidentally pay the wrong amount, so that a formatting convention never results in an underpayment or failed obligation?"}, {"id": "HMW-087", "text": "How Might We ensure every customer has at least one payment and refund channel they feel safe using, so that the removal of cheque never leaves a cohort without a workable option?"}, {"id": "HMW-088", "text": "How Might We give customers a secure way to provide refund details, so that cheques are never the default when other channels are unavailable?"}, {"id": "HMW-089", "text": "How Might We reduce the chances of customers paying incorrect revenue line?"}, {"id": "HMW-090", "text": "How Might We make it clear to customers which payment reference applies to which obligation, so that confusion between assessment and certificate payments never results in an incorrect allocation?"}, {"id": "HMW-091", "text": "How might we recognise and reward customers who consistently pay on time, so that they feel valued and motivated to continue compliant behaviour?"}, {"id": "HMW-092", "text": "How Might We provide customers with a per-property breakdown of their land tax liability, so that the information they need for tax purposes is available without them having to build their own system to find it?"}, {"id": "HMW-093", "text": "How might we help customers managing properties across multiple ownership structures see a consolidated view of their land tax, so that they can easily understand and manage their total obligations?"}, {"id": "HMW-125", "text": "How Might We acknowledge and recognise customers who pay in full upfront, so that choosing to pay early feels like a reasonable and valued decision rather than a disadvantage?"}]}]}, "quotes": {"synopsis": "Receipts, breakdowns and channel gaps", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "\"I just want one clear receipt with one payment. make it easier.\" P1 Customer"}, {"text": "\"when I pay, I jot the reference down on the bill.\" P1 Customer"}, {"text": "\"That would be nice to get some acknowledgement back from the State Revenue Office, preferably in writing. Yes, thank you. We received it.\" P1 Customer"}, {"text": "\"6 instalments remaining - one pyt fails. I had the option to pay the installment or pay in full. Auto installments stops and doesn't trigger next month. I had to reset the installment or pay in full.\" P6 Customer"}, {"text": "\"The post office couldn't accept my payment because the amount was too much.\" P1 Customer"}, {"text": "\"Phone banking is confusing for them. eg, 200. They need to enter 200.00 on the phone, so some pay 2.00.\" P7 Staff"}, {"text": "\"Cheques are no longer feasible. I then had to Bpay. Inconvenient as I had to transfer funds across to another bank account and lost interest.\" P1 Customer"}, {"text": "“It just gives you an amount and doesn't tell you which of them they relate to … it doesn't say which of the bill.” P2 Customer"}, {"text": "\"What I end up doing is around May-ish, you set up that monthly installment, but I think you have to pay it before October.\" P6 Customer"}, {"text": "\"Autopay resets due to no funds - I didn't like that experience. Just ask us to pay the missed installment. Don't reset.\" P6 Customer"}, {"text": "\"Now that 'contact us' has gone - some don't feel safe providing bank details by email. They can provide a cheque but now they're going to remove cheque. I don't know what we're going to do for those people who refuse to give it by email.” P7 Staff"}, {"text": "\"Some people are scared and refuse to give payment details by email. What happens when cheques are no longer available?\" P7 Staff"}, {"text": "\"Lots of people call to pay by card, but we can't take card details. We transfer them through to the automated phone system.\" P5 Staff"}, {"text": "\"Payments can get made against the wrong revenue line inadvertently, because they are managing multiple revenue lines, be the professional representative or themselves. It definitely happens where people can inadvertently pay against the wrong account, and it can sit in suspense until they get sometimes a reminder notice saying you haven't paid this. And they call us and say, I have paid and we're going to find it.\" P1 Staff"}, {"text": "\"A discount for paying upfront would be good. Eg. 3-5% instead of paying in instalments. ATO do it, why can't SRO?\" P1 Customer"}, {"text": "\"The only way you can change from direct debit to credit card or vice versa is by cancelling the payment arrangement and resetting it up. If it's after the due date of the assessment, then they risk having to pay interest just to change payment methods.\" P3 Staff"}, {"text": "\"The only concern is when you set up a payment, I think the payment is set up only for that particular instance. So every year, let's say SRO comes up with the new bill, you have to set up that using the same bill.\" P6 Customer"}, {"text": "\"I paid via my banking app. I don't think I got anything. I just wrote the reference number on my notice from the app when I paid.\" P7 Customer"}, {"text": "\"The $10,000 is not one property. It’s spread over maybe 10 properties. I have to then create my own little Excel spreadsheet and then do the divisions and then plot it under each property expense sheet.” P2 Customer"}]}]}, "capability": {"synopsis": "8 capabilities · heaviest: Instalment Management", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-06", "text": "Instalment Management", "note": "Existing · 6 PP / 7 HMW · P14.1"}, {"id": "LTX-VS-00", "text": "Channel Management", "note": "Proposed · 5 PP / 4 HMW · no process linkage"}, {"id": "LTX-VS-06", "text": "Payment Matchmaking & Allocation Management", "note": "Existing · 2 PP / 2 HMW · P8.1"}, {"id": "LTX-VS-06", "text": "Payment Management", "note": "Existing · 2 PP / 1 HMW · T9"}, {"id": "LTX-VS-06", "text": "Refund Data Management", "note": "Existing · 1 PP / 2 HMW · P8.1"}, {"id": "LTX-VS-04", "text": "Generate Land Tax Assessments", "note": "Existing · 1 PP / 1 HMW · P11.1"}, {"id": "LTX-VS-00", "text": "Proactive Customer Engagement", "note": "Proposed · 0 PP / 1 HMW · P10.1, P10.2"}, {"id": "LTX-VS-01", "text": "Customer Account Linking & Consolidated View", "note": "Proposed · 0 PP / 1 HMW · P12.6"}]}]}, "process": {"synopsis": "7 processes · P14.1, P8.1 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P14.1", "text": "Payment Arrangement Lifecycle", "note": "6 PP / 7 HMW · via 1 capability"}, {"id": "P8.1", "text": "Payment Suspense & Refund", "note": "3 PP / 4 HMW · via 2 capabilities"}, {"id": "T9", "text": "Payment Acknowledgement", "note": "2 PP / 1 HMW · via 1 capability"}, {"id": "P11.1", "text": "Assessment Issue Cycle Execution", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P10.1", "text": "New-Liability Customer Onboarding", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "P10.2", "text": "New-Liability Customer Onboarding", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "P12.6", "text": "Account Linking Request Handling", "note": "0 PP / 1 HMW · via 1 capability"}]}]}}, "s7": {"customer": {"synopsis": "Life events the SRO never hears about", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer puts the property up for sale"}, {"text": "Customer considers or proceeds with selling an investment property and navigates the land tax implications"}, {"text": "Customer considers selling investment properties due to rising land tax costs but is deterred by capital gains tax implications"}, {"text": "Customer is aware that selling triggers capital gains tax and feels locked in, both keeping and selling have significant costs"}, {"text": "Customer considers what happens to land tax liability when a property is sold mid-year and whether the buyer or seller is responsible"}, {"text": "Customer changes their address or contact details"}, {"text": "Customer is unaware they need to notify the SRO of changes to their circumstances"}, {"text": "Customer contacts SRO to notify of a change in circumstances such as a change of address, ownership change or relationship separation"}, {"text": "Customer changes their circumstances and needs to notify the SRO of ownership or contact detail updates"}, {"text": "Customer separates from a partner and one party remains in the jointly owned property while the other leaves"}, {"text": "Customer separates from a partner and contacts the SRO to update ownership or exemption status"}, {"text": "Customer contacts SRO to update ownership or exemption status following a relationship breakdown"}, {"text": "Customer or estate executor notifies SRO of a death via Trust Form 13"}, {"text": "Customer or executor manages a deceased estate and notifies the SRO through the relevant Trust Form process"}, {"text": "Deceased estate winds up and executor or representative notifies the SRO via Trust Form 14"}, {"text": "Customer transfers a property into a super fund or trust and expects SRO records to update automatically"}, {"text": "Customer who is overseas continues to manage land tax remotely with no change to process required"}, {"text": "Customer plans, tracks and manages their land tax records throughout the year"}, {"text": "Customer plans for the next year's land tax by setting aside money in a separate account or envelope system throughout the year"}, {"text": "Customer keeps all land tax bills and receipts in a physical file for tax return purposes"}, {"text": "Customer provides records to an accountant or financially literate family member at tax time"}, {"text": "Customer receives SRO emails about upcoming seminars and webinars and forwards relevant ones to their accountant or family advisor"}, {"text": "Customer proactively seeks information about land tax changes through SRO seminars, webinars or the website"}]}]}, "front": {"synopsis": "Update guidance and Trust Form 13", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff advise customers on how to update contact details or notify of ownership changes"}, {"text": "Customer is directed to My Land Tax"}, {"text": "Staff explain process for deceased estates and Trust Form 13"}]}]}, "back": {"synopsis": "Manual non-PEXA ownership handling", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff manually process NOA items that cannot be automatically matched"}, {"text": "Staff create new customer records in eSys for new owners or deceased estate trusts"}, {"text": "Staff verify trust or super fund transfers by checking whether the conveyancer recorded the correct acquisition category at lodgement"}, {"text": "Staff run periodic report to check for PEXA files that were not received and follow up with duties team"}, {"text": "Some ownership changes not automatically received (e.g. survivorship, deceased estates) and require manual handling"}]}]}, "systems": {"synopsis": "Weekday NOA feeds through LOAN", "groups": [{"title": "Canvas cards", "cards": [{"text": "PEXA sends NOA files to SRO each weekday, triggered by property sales and transfers"}, {"text": "LOAN team receives NOA data from PEXA each weekday and runs automated matching"}, {"text": "LOAN system automates matching and transfer of ownership records into eSys"}, {"text": "eSys uses the ownership record to determine whether the new owner meets the threshold for land tax liability"}, {"text": "Conveyancer records the transfer type at lodgement in PEXA - accuracy here directly determines whether liability is assessed correctly"}, {"text": "eSys updated with new ownership records"}, {"text": "Change of contact details submitted via Smart Form on SRO website"}, {"text": "My Land Tax contact detail updates create action items in eSys but do not always automate"}, {"text": "Address updates made through My Land Tax nearly always automate and are applied to the core customer record"}, {"text": "Contact detail updates in My Land Tax do not consistently flow through to eSys requiring manual action items"}]}]}, "support": {"synopsis": "PEXA, Duties, Titles Office Serv", "groups": [{"title": "Canvas cards", "cards": [{"text": "PEXA as the electronic lodgement network facilitating property transfers"}, {"text": "Duties team liaises with PEXA when files are missed"}, {"text": "Titles Office provides survivorship and other non-PEXA transfer data via Serv"}, {"text": "Business Process Map outlines how a NOA received for a property with an open action item or active debt is identified and routed into the assessment process"}]}]}, "pain": {"synopsis": "Unknown obligations; separation PPR shocks", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-086", "text": "Customers largely unaware of the obligation to notify the …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-087", "text": "Customers going through separation may not understand that the person who leaves a jointly owned property can see their land tax liability increase rather than decrease as the property is now treated as investment property §Q38§ Email correspondence in separation cases risks being sent to an ex-partner's address if contact details have not been updated - staff must manually verify before sending Trust Form 13 and deceased estate processes are not well known by customers or their families §H77§ (AVCC) Agent Verified"}, {"id": "PP-088", "text": "Customers can only access five years of assessment history in"}, {"id": "PP-090", "text": "PEXA No incentive or acknowledgement provided for customers who have consistently paid on time over many years"}, {"id": "PP-093", "text": "Customers feel financially trapped - land tax rises make keeping properties unsustainable but capital gains tax makes selling costly §Q112§ §H102§ §H103§ §Q113§ Change of contact detail forms cannot be filtered by type so authority requests and address changes are mixed together - Note - This is to be updated in July with the introduction of the LTX-Form-09 which will make authority requests identifiable"}, {"id": "PP-094", "text": "My Land Tax nearly always automate and are applied to the core customer record Address updates are not applied to joint ownerships where the customer is not the lead member"}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "Many customers do not know they need to notify the SRO when their circumstances change."}, {"text": "Customers who believe a property is held in trust may be wrong because the conveyancer did not record it correctly at lodgement - the property must be physically transferred again which creates delay."}]}]}, "opp": {"synopsis": "Life-event and data-flow HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-095", "text": "How Might We proactively inform customers of their obligation to notify the SRO when their circumstances change, so that a gap in awareness never results in an incorrect assessment or an unexpected liability?"}, {"id": "HMW-097", "text": "How might we explain the impact of selling a property mid-year on land tax obligations, so that customers can plan and make informed financial decisions?"}, {"id": "HMW-098", "text": "How might we better support customers facing rising land tax and selling costs, so that they can make informed property decisions without feeling financially trapped?"}, {"id": "HMW-099", "text": "How might we better explain Trust Form 13 and deceased estate processes, so that customers and families can navigate them with more confidence?"}, {"id": "HMW-100", "text": "How might we help customers going through separation understand how land tax liability may change, so that they can anticipate increases and plan accordingly?"}, {"id": "HMW-101", "text": "How might we ensure property ownership is correctly recorded when customers transfer property to a trust or super fund, so that assessments and obligations are assigned to the right entity?"}, {"id": "HMW-102", "text": "How might we ensure customer information flows seamlessly across systems (inc. eSys), so that data is always accurate, up to date, and does not require manual intervention?"}, {"id": "HMW-103", "text": "How might we clearly categorise and filter customer update requests, so that staff can efficiently process the right action with minimal confusion or manual effort?"}, {"id": "HMW-104", "text": "How might we remove limitations on accessing historical assessment data, so that customers can independently retrieve the records they need at any time?"}]}]}, "quotes": {"synopsis": "Separation surprises; stale data", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "\"We separated and started living in different properties we already owned, but now we're paying land tax on both - which came as a surprise.\" P7 Customer"}, {"text": "\"Trust form 13s used for notifying us that people have passed away. Not many people are aware they need to tell us.\" P9 Staff"}, {"text": "“If there was a reliable way that we could find out when people pass away, that would probably at least let us know, hey, potentially this needs to be looked into.” P9 Staff"}, {"text": "\"My advice - don't bother with investment properties. 8/10 friends have put it up for sale because of expenses - taxes, tenancy laws. They've made it too hard now. Then I'll be hit with CGT when I sell. You always a cop a bill.\" P5 Customer"}, {"text": "\"People move and haven't updated us with the changes. Land tax is an annual tax. It's not something that sits front of mind where you might get a monthly power bill - I've got to change that address.\" P6 Staff"}]}]}, "capability": {"synopsis": "8 capabilities · heaviest: Customer Education & Guidance Content Management", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-00", "text": "Customer Education & Guidance Content Management", "note": "Proposed · 1 PP / 3 HMW · no process linkage"}, {"id": "LTX-VS-00", "text": "Proactive Customer Engagement", "note": "Proposed · 2 PP / 1 HMW · P10.1, P10.2"}, {"id": "LTX-VS-10", "text": "Digital Self-Service Management", "note": "Proposed · 1 PP / 1 HMW · P12.2"}, {"id": "LTX-VS-10", "text": "Enquiry & Service Request Management", "note": "Proposed · 1 PP / 1 HMW · P12.1"}, {"id": "LTX-VS-01", "text": "Address Validation Management", "note": "Existing · 1 PP / 0 HMW · P1.2"}, {"id": "LTX-VS-10", "text": "Vulnerable Customer & Life Event Management", "note": "Proposed · 0 PP / 1 HMW · P13.1, P13.2"}, {"id": "LTX-VS-01", "text": "Ownership Transfer & Change Processing", "note": "Proposed · 0 PP / 1 HMW · P3.1, P13.3"}, {"id": "LTX-EN", "text": "Systems Integration & Data Synchronisation", "note": "Proposed · 0 PP / 1 HMW · T8"}]}]}, "process": {"synopsis": "10 processes · P10.1, P10.2 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P10.1", "text": "New-Liability Customer Onboarding", "note": "2 PP / 1 HMW · via 1 capability"}, {"id": "P10.2", "text": "New-Liability Customer Onboarding", "note": "2 PP / 1 HMW · via 1 capability"}, {"id": "P12.2", "text": "Amendment Request Processing", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P12.1", "text": "Enquiry Handling & First-Contact", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P1.2", "text": "Customer Detail & Address", "note": "1 PP / 0 HMW · via 1 capability"}, {"id": "P13.1", "text": "Family & Domestic Violence Case", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "P13.2", "text": "Family & Domestic Violence Case", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "P3.1", "text": "Land Ownership Transfer", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "P13.3", "text": "Land Ownership Transfer", "note": "0 PP / 1 HMW · via 1 capability"}, {"id": "T8", "text": "Cross-System Change", "note": "0 PP / 1 HMW · via 1 capability"}]}]}}, "s8": {"customer": {"synopsis": "Apply online, wait, query discrepancies", "groups": [{"title": "Canvas cards", "cards": [{"text": "Property is sold and a land tax clearance certificate may be needed"}, {"text": "Clearance certificate needed for property sale, refinancing, or mortgagee request"}, {"text": "Customer or representative needs to confirm what taxes are owing or not owing to protect the purchaser"}, {"text": "Apply for Property Clearance Certificate via SRO website by individual applicant or third-party agent"}, {"text": "Applicant enters required property and party details: vendor, purchaser, title references, address; Payment method selected"}, {"text": "Applicant waits for certificate to be issued"}, {"text": "Applicant may call to query why certificate has not been issued"}, {"text": "Applicant receives certificate PDF via email"}, {"text": "Applicant reviews certificate to confirm it reflects correct tax position"}, {"text": "Applicant queries outcome or identifies discrepancies in the certificate"}, {"text": "Applicant sends through additional information and staff review and confirm or reject"}]}]}, "front": {"synopsis": "s105 inbox and applicant queries", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff answer calls from applicants asking if they can apply over the phone and direct them to the website"}, {"text": "Staff respond to applicant queries about why a certificate has not yet been issued"}, {"text": "Staff manage s105 inbox and track outstanding certificates"}, {"text": "Staff handle post-issue queries from applicants or their representatives"}]}]}, "back": {"synopsis": "Manual investigation when automation fails", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff open action item and investigate why automation failed using eSys, COI, LASSI, LandData and probate records; Cause identified from: data mismatch, outdated data, incorrect application, unlinked vendor, unrated property, large taxpayer or DV flagging, subdivision"}, {"text": "Where a property involves a subdivision staff manually input the relevant data into eSys to enable the system to calculate the pro-rata land tax liability, as the system cannot do this automatically from existing records"}, {"text": "Where CIPT data or complex formatting is involved staff manually edit the PDF using Adobe Acrobat"}, {"text": "Complex cases escalated to TARB, legal advice, or policy depending on nature of the issue"}, {"text": "eSys used to investigate and resolve post-issue discrepancies"}, {"text": "If an updated certificate is requested the entire process starts again from scratch"}]}]}, "systems": {"synopsis": "75% straight-through; Salesforce WGT dependency", "groups": [{"title": "Canvas cards", "cards": [{"text": "Application received and work item created in eSys; System attempts to automatically match: property, ownership, and taxpayer records; System checks applicable tax types: Land Tax, VRLT, WGT, CIPT"}, {"text": "Around 75% of certificates are processed automatically end-to-end; s105 inbox used as shared team inbox for all certificate-related correspondence"}, {"text": "Certificate issued automatically to applicant email address within approximately one hour"}, {"text": "Where no response after 10 days action item is cancelled as a dead case"}, {"text": "eSys runs final calculations and confirmation step"}, {"text": "Tax calculations finalised in eSys and certificate reflects Land Tax, VRLT, WGT, CIPT and SIP where applicable; eBusiness application creates PDF of the certificate; Title references consolidated - first two rows appear automatically, additional references added manually in comments"}, {"text": "Where property is in a WGT area a case is created in Salesforce and must be completed before the certificate can proceed"}, {"text": "Salesforce used for WGT case completion before certificate can proceed"}, {"text": "WGT team in Salesforce must complete their case before the certificate is released"}, {"text": "eBusiness generates and distributes PDF certificate"}, {"text": "Adobe Acrobat used for manual PDF editing where CIPT or formatting issues arise"}, {"text": "LASSI used for spatial investigation of boundaries and subdivisions; eSys used for matching, processing, and recording notes; COI used for property and ownership searches"}, {"text": "LandData used for title and plan information; Template emails stored in Microsoft Word document - clicking template loads a pre-addressed email; Probate records from Supreme Court of Victoria used to confirm executor details"}, {"text": "Ownership data created or updated in LOAN system following NOA receipt from PEXA; NOA data compared against Duties Online information; Gaps or aged data may exist including old addresses, missing executors, or outdated titles"}]}]}, "support": {"synopsis": "TARB forum; bulk request BPM", "groups": [{"title": "Canvas cards", "cards": [{"text": "TARB used to discuss recurring or unresolved certificate issues"}, {"text": "Business Process Map outlines how bulk or portfolio certificate requests from large conveyancing firms are managed"}]}]}, "pain": {"synopsis": "15 pains: kick-outs, manual PDFs, settlement surprises", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-096", "text": "Certificate has grown from a two-page document to a minimum six pages as additional revenue lines have been added"}, {"id": "PP-097", "text": "CIPT data does not always render correctly on the certificate requiring manual PDF editing PDF field formatting is inconsistent across pages and sometimes fips when saved requiring staff to check every page"}, {"id": "PP-098", "text": "PDF field formatting flips on save; staff must recheck every …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-099", "text": "Certificate only shows the first two title reference rows automatically - additional references must be added manually in comments"}, {"id": "PP-100", "text": "Manual PDF editing for a complex certificate with many properties can take up to four hours If an updated certificate is requested the entire manual editing process must be repeated §H81§ §Q62§ §Q63§ §Q64§ §Q65§ §Q66§ The certificate has grown over the last few years. It started off just land tax. It now includes VRLT, windfall gains tax and CIPT."}, {"id": "PP-101", "text": "eSys cannot calculate pro-rata liabilities for subdivided properties without staff first manually inputting the relevant data, adding time and creating a dependency on staff availability the automated pathway does not have."}, {"id": "PP-102", "text": "Dependency on WGT Salesforce case completion creates a bottleneck as errors between"}, {"id": "PP-103", "text": "Staff confirm and submit certificate in eSsys once all checks are complete Sometimes a certificate is auto-processed when it should have been stopped due to an open action item or non-issue Large taxpayer flag also applies to domestic violence cases stopping certificates that are otherwise valid eSys cannot calculate pro-rata liabilities for subdivided properties without staff first manually inputting the relevant data, adding time and creating a dependency on staff availability the automated pathway does not have."}, {"id": "PP-104", "text": "Staff confirm and submit certificate in eSsys once all checks are complete Sometimes a certificate is auto-processed when it should have been stopped due to an open action item or non-issue Large taxpayer flag also applies to domestic violence cases stopping certificates that are otherwise valid"}, {"id": "PP-105", "text": "Staff are often unsure why a certificate was 'kicked out' of …", "note": "Register wording (merged model) — canvas narrative match pending validation."
