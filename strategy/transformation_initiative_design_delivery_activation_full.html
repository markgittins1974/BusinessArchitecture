<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOM – Design to Value | SRO LXT</title>
<style>
:root {
  --lane-w: 200px;
  --phase-w: 260px;
  --card-h: 200px;
  --gap: 6px;
  --tb-h: 108px;
  --ink: #0f1c2e;
  --ink2: #3a4a5c;
  --ink3: #6b7a8d;
  --surface: #f0f3f7;
  --border: #d0d8e4;
  --white: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.12);
  --shadow-md: 0 4px 12px rgba(0,0,0,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:13px;
  background:#e2e8f0;
  color:var(--ink);
  overflow:hidden;
}

/* ── Toolbar ─────────────────────────────────────── */
.toolbar{
  position:sticky;top:0;z-index:200;
  display:flex;flex-wrap:nowrap;align-items:flex-end;
  gap:8px;padding:12px 16px 10px;
  background:linear-gradient(180deg,#0a1628 0%,#101e35 100%);
  color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  overflow-x:auto;
  min-height:80px;
}
.brand{flex-shrink:0;display:flex;flex-direction:column;gap:2px;min-width:250px;margin-right:8px;align-self:center}
.brand-super{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.brand-title{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.brand-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.tb-control{flex-shrink:0;display:flex;flex-direction:column;gap:3px;min-width:110px}
.tb-control label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.tb-control select,.tb-control input{
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  border-radius:4px;padding:4px 7px;
  font-size:11px;height:28px;width:100%;
  appearance:none;-webkit-appearance:none;outline:none;
}
.tb-control select:focus,.tb-control input:focus{border-color:rgba(255,255,255,.4)}
.tb-control input::placeholder{color:rgba(255,255,255,.3)}
.tb-btn-group{flex-shrink:0;display:flex;flex-direction:column;gap:4px;min-width:110px;align-self:flex-end}
.tb-btn{
  display:flex;align-items:center;justify-content:center;
  height:28px;padding:0 10px;
  border-radius:4px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);
  font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.tb-btn:hover{background:rgba(255,255,255,.18)}
.tb-btn.danger{border-color:rgba(239,68,68,.45);color:#fca5a5}
.tb-btn.danger:hover{background:rgba(239,68,68,.15)}
.tb-btn.export{border-color:rgba(74,222,128,.35);color:#86efac}
.tb-btn.export:hover{background:rgba(74,222,128,.12)}

/* ── Canvas & Board ───────────────────────────────── */
.canvas{
  overflow:auto;
  height:calc(100vh - var(--tb-h));
  padding:12px 16px 40px;
  background:#e2e8f0;
}
.board{
  display:grid;
  /* col 1 = lane label; cols 2-9 = 8 phases */
  grid-template-columns:var(--lane-w) repeat(8,var(--phase-w));
  /* row 1 = zone band; row 2 = phase headers; row 3 = overlay; rows 4-13 = lanes */
  grid-template-rows:48px 80px 40px repeat(10,var(--card-h));
  gap:var(--gap);
  width:max-content;
  min-width:100%;
  padding-bottom:24px;
}

/* ── Zone row (row 1) ─────────────────────────────── */
.zone-corner{
  grid-row:1;grid-column:1;
  position:sticky;left:0;top:0;z-index:151;
  background:#0a1628;border-radius:4px;
}
.zone{
  grid-row:1;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.9);border-radius:4px;padding:0 8px;
}
.zone-strategy{grid-column:2/5;background:linear-gradient(135deg,#1e3a8a,#1e40af)}
.zone-gate{grid-column:5/7;background:#166534;font-size:11px;letter-spacing:.06em}
.zone-delivery{grid-column:7/10;background:linear-gradient(135deg,#312e81,#4c1d95)}

/* ── Phase header row (row 2) ─────────────────────── */
.phase-corner{
  grid-row:2;grid-column:1;
  position:sticky;left:0;top:48px;z-index:152;
  background:#0a1628;border-radius:4px;
}
.phase-hdr{
  grid-row:2;
  position:sticky;top:48px;z-index:99;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-radius:4px;padding:6px 8px;text-align:center;
  box-shadow:var(--shadow-sm);
}
.ph-num{font-size:9px;font-weight:700;letter-spacing:.1em;opacity:.6;text-transform:uppercase;color:#fff}
.ph-name{font-size:11px;font-weight:700;color:#fff}
.ph-desc{font-size:9px;color:rgba(255,255,255,.55);line-height:1.3}
.ph-strategy{background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
.ph-gate{background:linear-gradient(135deg,#14532d,#15803d)}
.ph-delivery{background:linear-gradient(135deg,#312e81,#5b21b6)}
.ph-value{background:linear-gradient(135deg,#7c2d12,#c2410c)}

/* ── Overlay row (row 3) ──────────────────────────── */
.overlay-corner{
  grid-row:3;grid-column:1;
  position:sticky;left:0;top:128px;z-index:153;
  background:#0a1628;border-radius:4px;
}
.overlay{
  grid-row:3;
  position:sticky;top:128px;z-index:98;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  border-radius:4px;padding:0 10px;text-align:center;
}
.ov-strategy{grid-column:2/5;background:rgba(30,58,138,.12);border:1px solid rgba(30,58,138,.25);color:#1e3a8a}
.ov-gate{grid-column:5/7;background:#16a34a;color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;border:none}
.ov-delivery{grid-column:7/10;background:rgba(49,46,129,.1);border:1px solid rgba(49,46,129,.22);color:#312e81}

/* ── Lane label column (col 1) ───────────────────── */
.lane-lbl{
  grid-column:1;
  position:sticky;left:0;z-index:97;
  background:linear-gradient(135deg,#1a2840,#0f1c2e);
  display:flex;flex-direction:column;justify-content:center;
  padding:8px 10px;border-radius:4px;
  box-shadow:3px 0 8px rgba(0,0,0,.25);
  border-right:2px solid rgba(255,255,255,.06);
}
.ll-num{font-size:8px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.28);text-transform:uppercase}
.ll-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.25;margin-top:2px}
.ll-role{font-size:9px;color:rgba(255,255,255,.38);margin-top:2px}

/* ── Cells ─────────────────────────────────────────── */
.cell{
  border-radius:7px;
  min-height:var(--card-h);
  overflow:hidden;
  transition:opacity .2s,transform .15s;
}
.cell-placeholder{
  border:1px dashed rgba(160,175,195,.4);
  background:rgba(200,210,225,.07);
  border-radius:7px;
}
.cell-dimmed{opacity:.18;pointer-events:none}
.cell-up .card-inner{outline:2px solid #1d4ed8;outline-offset:-2px}
.cell-down .card-inner{outline:2px solid #15803d;outline-offset:-2px}
.cell-selected .card-inner{
  outline:2px solid #f59e0b;outline-offset:-2px;
  box-shadow:0 0 0 5px rgba(245,158,11,.18);
}

/* ── Cards ─────────────────────────────────────────── */
.card-inner{
  height:100%;
  background:var(--white);
  border-radius:7px;
  padding:9px 10px 8px;
  display:flex;flex-direction:column;gap:4px;
  cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s,transform .1s;
  border-top:3px solid var(--lane-color,#3b82f6);
  overflow:hidden;
}
.card-inner:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.c-meta{font-size:8px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3)}
.c-state{font-size:8px;font-weight:600;padding:1px 5px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.s-active{background:#dcfce7;color:#15803d}
.s-planned{background:#dbeafe;color:#1d4ed8}
.s-review{background:#fef9c3;color:#a16207}
.s-complete{background:#f3f4f6;color:#374151}
.c-title{font-size:11px;font-weight:700;color:var(--ink);line-height:1.3}
.c-desc{font-size:10px;color:var(--ink2);line-height:1.45;flex:1}
.c-body{
  font-size:9px;color:var(--ink3);line-height:1.4;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;
}
.c-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.chip{
  font-size:8px;font-weight:600;padding:1px 5px;
  border-radius:99px;background:var(--surface);
  color:var(--ink2);border:1px solid var(--border);
}

/* View modes */
.view-exec .c-body{display:none}
.view-dense{--card-h:138px}
.view-dense .c-body{display:none}
.view-dense .c-desc{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.view-dense .card-inner{gap:3px;padding:7px 8px}

/* ── Drawer ─────────────────────────────────────────── */
.drw-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.38);
  z-index:300;
  display:none;
  backdrop-filter:blur(2px);
}
.drw-backdrop.open{display:block}
.drawer{
  position:fixed;top:0;right:-490px;
  width:470px;height:100vh;
  background:var(--white);
  z-index:400;
  overflow-y:auto;
  transition:right .25s ease;
  box-shadow:-8px 0 32px rgba(0,0,0,.22);
  display:flex;flex-direction:column;
}
.drw-backdrop.open .drawer{right:0}
.drw-head{
  padding:18px 20px 14px;
  background:linear-gradient(135deg,#0f1c2e,#1a2840);
  color:#fff;flex-shrink:0;position:relative;
}
.drw-phase{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.drw-title{font-size:16px;font-weight:700;margin-top:4px;line-height:1.25}
.drw-meta{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.drw-close{
  position:absolute;top:14px;right:14px;
  width:28px;height:28px;
  background:rgba(255,255,255,.12);border:none;border-radius:50%;
  color:#fff;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.drw-close:hover{background:rgba(255,255,255,.22)}
.drw-body{padding:18px 20px;flex:1}
.drw-section-head{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);margin:14px 0 6px;
  padding-bottom:4px;border-bottom:1px solid var(--border);
}
.drw-field{margin-bottom:10px}
.drw-label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:3px}
.drw-field p{font-size:12px;color:var(--ink);line-height:1.5}
.drw-field code{font-size:10px;background:var(--surface);color:var(--ink2);padding:2px 5px;border-radius:3px;font-family:monospace}
.drw-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.drw-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--surface);color:var(--ink2);border:1px solid var(--border)}

/* ── Legend ─────────────────────────────────────────── */
.legend{
  position:fixed;bottom:12px;left:16px;z-index:180;
  background:rgba(15,28,46,.9);border-radius:7px;
  padding:7px 12px;display:flex;gap:12px;align-items:center;
  backdrop-filter:blur(6px);box-shadow:var(--shadow-md);
}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(255,255,255,.7);font-weight:600}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Validation banner ──────────────────────────────── */
.val-banner{
  position:fixed;top:10px;right:10px;z-index:999;
  background:#991b1b;color:#fff;
  padding:8px 12px;border-radius:7px;
  font-size:11px;max-width:320px;display:none;
}

/* ── Print ──────────────────────────────────────────── */
@media print{
  html,body{background:#fff;overflow:visible}
  .toolbar,.drw-backdrop,.legend,.val-banner{display:none!important}
  .canvas{overflow:visible;max-width:none;height:auto;padding:0}
  .board{width:max-content;page-break-inside:auto}
  .zone,.phase-hdr,.overlay,.lane-lbl{position:static;box-shadow:none}
  .cell,.card-inner{height:auto;overflow:visible}
  .c-body{overflow:visible;-webkit-line-clamp:unset;display:block}
  @page{size:A3 landscape;margin:10mm}
}
</style>
</head>
<body>
<div class="val-banner" id="valBanner"></div>
<div class="toolbar" id="toolbar">
  <div class="brand">
    <div class="brand-super">State Revenue Office Victoria — Land Tax Transformation</div>
    <div class="brand-title">Target Operating Model – Design to Value</div>
    <div class="brand-sub">Business Architecture Practice &nbsp;·&nbsp; LXT Program</div>
  </div>
  <div class="tb-control">
    <label>Phase</label>
    <select id="filterPhase"><option value="">All Phases</option></select>
  </div>
  <div class="tb-control">
    <label>Lane</label>
    <select id="filterLane"><option value="">All Lanes</option></select>
  </div>
  <div class="tb-control">
    <label>Level</label>
    <select id="filterLevel"><option value="">All Levels</option></select>
  </div>
  <div class="tb-control">
    <label>State</label>
    <select id="filterState"><option value="">All States</option></select>
  </div>
  <div class="tb-control">
    <label>Search</label>
    <input type="text" id="filterSearch" placeholder="Title, lead, chip…">
  </div>
  <div class="tb-control">
    <label>View</label>
    <select id="viewMode">
      <option value="detail">Detail</option>
      <option value="exec">Exec</option>
      <option value="dense">Dense</option>
    </select>
  </div>
  <div class="tb-btn-group">
    <button class="tb-btn danger" id="clearFlow">✕ Clear Flow</button>
    <button class="tb-btn export" id="exportCSV">⬇ Export CSV</button>
    <button class="tb-btn" id="printPDF">🖨 Print / PDF</button>
  </div>
</div>
<div class="canvas" id="canvas">
  <div class="board" id="board"></div>
</div>
<div class="drw-backdrop" id="drwBackdrop">
  <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drwTitle">
    <div class="drw-head">
      <div class="drw-phase" id="drwPhase"></div>
      <div class="drw-title" id="drwTitle"></div>
      <div class="drw-meta" id="drwMeta"></div>
      <button class="drw-close" id="drwClose" aria-label="Close">✕</button>
    </div>
    <div class="drw-body" id="drwBody"></div>
  </div>
</div>
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#f59e0b"></div>Selected</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1d4ed8"></div>Upstream</div>
  <div class="leg-item"><div class="leg-dot" style="background:#15803d"></div>Downstream</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(160,175,195,.45);border:1px dashed #aaa"></div>Placeholder</div>
</div>
<script>
const modelData = {
  lanes: [
    {name:"Lifecycle Readiness",role:"Program / Product",num:"01"},

    {name:"P2 Context",num:"P2",desc:"Current state & constraints",cls:"ph-strategy"},
    {name:"P3 Current State",num:"P3",desc:"Process & capability baseline",cls:"ph-strategy"},
    {name:"P4 Target Design",num:"P4",desc:"To-be process, platform & design",cls:"ph-design"},
