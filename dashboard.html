<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Land Tax Dashboard v1.8</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--td:#1a2332;--tl:#6b7a8d;--tm:#94a3b8;--sf:#f4f6f9;--cd:#fff;--bd:#e2e8f0;--ac:#4a6fa5;
--hb:#dff0e0;--ht:#2a7a3b;--mb:#fff5d6;--mt:#8a6500;--lb:#fde8e8;--lt:#b53030}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--sf);color:var(--td);line-height:1.5}
.shell{max-width:1280px;margin:0 auto;padding:40px 32px}
.eye{font-family:'Roboto Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ac);margin-bottom:8px}
h1{font-size:28px;font-weight:700;margin-bottom:6px}
.sub{font-size:14px;color:var(--tl);margin-bottom:24px}
.nt{background:#fffbec;border:1px solid #e8d87a;border-radius:8px;padding:12px 16px;font-size:12px;color:#8a6500;margin-bottom:28px}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.sc{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:20px}
.sc b{display:block;font-family:'Roboto Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--tl);margin-bottom:10px}
.sc .v{font-size:36px;font-weight:700;line-height:1.1}
.sc .d{font-size:12px;color:var(--tm);margin-top:6px}
.p{display:inline-block;font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px}
.ph{background:var(--hb);color:var(--ht)}.pm{background:var(--mb);color:var(--mt)}.pl{background:var(--lb);color:var(--lt)}
.gr{display:grid;gap:20px;margin-bottom:20px}
.gw{grid-template-columns:2fr 1fr}.gh{grid-template-columns:1fr 1fr}.gf{grid-template-columns:1fr}
.pn{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:24px}
.pt{font-family:'Roboto Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);margin-bottom:16px}
.br{margin-bottom:14px}
.bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bn{font-size:13px;font-weight:600}
.bt{display:flex;height:20px;border-radius:4px;overflow:hidden}
.bs{min-width:2px}
.bH{background:var(--hb)}.bM{background:var(--mb)}.bL{background:var(--lb)}
.dw{display:flex;align-items:center;gap:24px}
.dl{list-style:none}
.dl li{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.dsw{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.cl{font-size:11px;color:var(--tm);width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.ct{flex:1;height:14px;background:var(--sf);border-radius:3px;overflow:hidden}
.cf{height:100%;background:var(--ac);border-radius:3px}
.cc{font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.si{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--sf)}
.ssw{width:32px;height:18px;border-radius:4px;flex-shrink:0}
.sl{font-size:12px;font-weight:600;min-width:70px}
.ssc{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.sd{font-size:12px;color:var(--tl);flex:1}
table{width:100%;border-collapse:collapse}
th{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--tm);text-align:left;padding:8px 10px;border-bottom:2px solid var(--bd)}
td{font-size:12px;padding:10px;border-bottom:1px solid var(--sf);vertical-align:middle}
.mb{display:flex;width:120px;height:8px;border-radius:3px;gap:1px;overflow:hidden}
.ms{min-width:1px}
.bg{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;text-transform:uppercase}
#err{color:red;padding:12px;font-size:14px;white-space:pre-wrap}
@media(max-width:900px){.sr{grid-template-columns:repeat(2,1fr)}.gw,.gh{grid-template-columns:1fr}}
</style>
</head><body>
<div class="shell">
<div class="eye">SRO Transformation Architecture</div>
<h1>Land Tax &#8212; Capability Dashboard</h1>
<p class="sub">Maturity and coverage statistics across the Land Tax capability map.</p>
<div id="nt" class="nt"></div>
<div id="err"></div>
<div class="sr" id="sc"></div>
<div class="gr gw"><div class="pn"><div class="pt">Maturity by Value Stage</div><div id="bars"></div></div><div class="pn"><div class="pt">Overall Maturity Distribution</div><div id="donut"></div></div></div>
<div class="gr gh"><div class="pn"><div class="pt">Capability Complexity by Stage</div><div id="cx"></div></div><div class="pn"><div class="pt">Maturity Scale Reference</div><div id="sref"></div></div></div>
<div class="gr gf"><div class="pn"><div class="pt">L1 Capability Group Summary</div><div id="tbl"></div></div></div>
</div>
<script>
window.onerror=function(m,s,l,c,e){document.getElementById("err").textContent="Error: "+m+" (line "+l+")";};
var DATA=[{"stage":"VS1 \u2013 Maintain Land & Ownership Records","shortStage":"Maintain Land & Ownership Records","l1":[{"name":"Property & Ownership Management","l2":[{"name":"Taxable Land Maintenance","maturity":"High"},{"name":"Subdivisions & Consolidations","maturity":"Low"},{"name":"Title to Property Relationship","maturity":"High"},{"name":"Ownership Maintenance","maturity":"High"},{"name":"Joint Ownership","maturity":"Low"},{"name":"Land Held on Trust","maturity":"Low"},{"name":"Unknown Customer","maturity":"High"}]}]},{"stage":"VS2 \u2013 Determine How Land Is Taxed","shortStage":"Determine How Land Is Taxed","l1":[{"name":"Property & Ownership Management","l2":[{"name":"Joint Ownership","maturity":"Low"},{"name":"Land Held on Trust","maturity":"Low"}]},{"name":"Land Tax Assessment & Determination","l2":[{"name":"Determine Land Tax Liability","maturity":"Low"}]},{"name":"Exemption Management","l2":[{"name":"Exemption Creation Management","maturity":"Low"},{"name":"Exemption Application Management","l3":[{"name":"Automated Exemption Application","maturity":"High"},{"name":"Manual Exemption Application","maturity":"Low"}]}]},{"name":"Concession Management","l2":[{"name":"Concession Application","maturity":"Low"}]},{"name":"Liability/Entitlement Management","l2":[{"name":"Tax/Entitlement Rate Management","maturity":"Low"},{"name":"Threshold Management","l3":[{"name":"Tax Free Threshold Management","maturity":"Low"}]}]},{"name":"Revenue Line Relationship Management","l2":[{"name":"Land Tax","l3":[{"name":"Absentee Owner Management","maturity":"Low"},{"name":"Build to Rent Management","maturity":"Low"}]}]},{"name":"Property Usage","l2":[{"name":"Usage Management","maturity":"Low"}]}]},{"stage":"VS3 \u2013 Assess & Issue Land Tax","shortStage":"Assess & Issue Land Tax","l1":[{"name":"Valuation Management (Land Tax)","l2":[{"name":"Valuations Maintenance","maturity":"Low"},{"name":"General Valuations","maturity":"Low"},{"name":"Supplementary Valuations","maturity":"Low"},{"name":"SRO Requested Valuations","maturity":"Low"},{"name":"Single Valuation for Multiple Properties","maturity":"Low"}]},{"name":"Land Tax Assessment & Determination","l2":[{"name":"Generate Land Tax Assessments","maturity":"Low"},{"name":"Issue Land Tax Assessments","maturity":"Low"}]},{"name":"Assessment Management","l2":[{"name":"Issue Cycle Management","l3":[{"name":"Issue Cycle Schedule Management","maturity":"Low"},{"name":"First Time Liability Management","maturity":"Low"}]}]},{"name":"Liability/Entitlement Management","l2":[{"name":"Liability/Entitlement Calculation Management","l3":[{"name":"Automated Liability/Entitlement Calculation","maturity":"High"},{"name":"Manual Liability/Entitlement Calculation","maturity":"Low"}]},{"name":"Deduction Management","l3":[{"name":"Trust Deduction Management","maturity":"Low"}]},{"name":"Threshold Management","l3":[{"name":"Minimum Liability Threshold Management","maturity":"Low"}]}]}]},{"stage":"VS4 \u2013 Manage Payments & Adjustments","shortStage":"Manage Payments & Adjustments","l1":[{"name":"Payments, Refunds & Financial Settlement","l2":[{"name":"Payment Management","maturity":"Low"},{"name":"Payment Allocation Management","maturity":"Low"},{"name":"Instalment Management","maturity":"Low"},{"name":"Refund Management","maturity":"Low"},{"name":"Adjustment Management","maturity":"Low"}]},{"name":"Payment Management","l2":[{"name":"Payment Allocation Management","l3":[{"name":"Property Liability Allocation","maturity":"Low"}]}]}]},{"stage":"VS5 \u2013 Resolve Issues & Enforce Compliance","shortStage":"Resolve Issues & Enforce Compliance","l1":[{"name":"Objections, Disputes & Compliance","l2":[{"name":"Objection Management","maturity":"Low"},{"name":"Valuation Objection Management","maturity":"Low"},{"name":"Dispute Resolution Management","maturity":"Low"},{"name":"Case Management","maturity":"Low"},{"name":"Compliance Management","maturity":"Low"},{"name":"Audit Management","maturity":"Low"},{"name":"Risk Management","maturity":"Low"},{"name":"Quality Assurance Management","maturity":"Low"}]},{"name":"Case Management","l2":[{"name":"Referral Management","l3":[{"name":"Private Ruling Management","maturity":"Low"}]}]}]},{"stage":"VS6 \u2013 Provide Certificates & Assurance","shortStage":"Provide Certificates & Assurance","l1":[{"name":"Certificates & Notifications (Land Tax)","l2":[{"name":"Issue Land Tax Certificates","maturity":"Low"},{"name":"Certificate Evidence & Record Management","maturity":"Low"}]}]}];
</script>
<script>

var CC=37,SC=72,CH=10,SH=10;
var MS={High:3,Medium:2,Low:1};
var MO=["High","Medium","Low"];
var MC={High:{b:"#dff0e0",t:"#2a7a3b"},Medium:{b:"#fff5d6",t:"#8a6500"},Low:{b:"#fde8e8",t:"#b53030"}};
var MD={High:"Right skills, documented processes, full system support.",Medium:"Skills with gaps; partially documented; some workarounds.",Low:"Significant gaps. Ad hoc, undocumented, key-person reliant."};

function gc(){
  var c=[];
  for(var i=0;i<DATA.length;i++){var s=DATA[i];
    for(var j=0;j<s.l1.length;j++){var l1=s.l1[j];
      for(var k=0;k<l1.l2.length;k++){var l2=l1.l2[k];
        if(l2.l3&&l2.l3.length){for(var x=0;x<l2.l3.length;x++)c.push({n:l2.l3[x].name,m:l2.l3[x].maturity||"Low",l:l1.name,s:s.shortStage});}
        else c.push({n:l2.name,m:l2.maturity||"Low",l:l1.name,s:s.shortStage});
  }}}return c;}

function av(c){if(!c.length)return 0;var s=0;for(var i=0;i<c.length;i++)s+=(MS[c[i].m]||1);return s/c.length;}
function cn(c){var r={High:0,Medium:0,Low:0};for(var i=0;i<c.length;i++)r[c[i].m]++;return r;}
function pc(a){return a>=2.5?"ph":a>=1.5?"pm":"pl";}
function el(id){return document.getElementById(id);}

function run(){
  var all=gc(),tot=all.length,a=av(all),mc=cn(all);

  var n=el("nt");
  if(mc.Low===tot)n.textContent="\u26a0\ufe0f Maturity data pending \u2014 all capabilities set to Low.";
  else if(mc.Low/tot>0.5)n.textContent="\u26a0\ufe0f "+mc.Low+" of "+tot+" LTX capabilities still at Low.";
  else n.style.display="none";

  var h="";
  h+="<div class='sc'><b>LTX Capabilities</b><div class='v'>"+tot+"</div><div class='d'>"+(mc.High||0)+" High \u00b7 "+(mc.Medium||0)+" Med \u00b7 "+(mc.Low||0)+" Low</div></div>";
  h+="<div class='sc'><b>Common Capabilities</b><div class='v'>"+CC+"</div><div class='d'>"+CH+" High \u00b7 "+(CC-CH)+" Low</div></div>";
  h+="<div class='sc'><b>Supporting Capabilities</b><div class='v'>"+SC+"</div><div class='d'>"+SH+" High \u00b7 "+(SC-SH)+" Low</div></div>";
  h+="<div class='sc'><b>Average Maturity</b><div class='v'>"+a.toFixed(1)+"</div><div class='d'><span class='p "+pc(a)+"'>"+a.toFixed(1)+" / 3.0</span></div></div>";
  h+="<div class='sc'><b>Low Maturity</b><div class='v'>"+Math.round(mc.Low/tot*100)+"%</div><div class='d'>"+mc.Low+" LTX capabilities</div></div>";
  h+="<div class='sc'><b>High Maturity</b><div class='v'>"+mc.High+"</div><div class='d'>"+Math.round((mc.High||0)/tot*100)+"% of LTX</div></div>";
  el("sc").innerHTML=h;

  var bh="";
  for(var i=0;i<DATA.length;i++){
    var s=DATA[i],caps=[];
    for(var j=0;j<s.l1.length;j++)for(var k=0;k<s.l1[j].l2.length;k++){
      var l2=s.l1[j].l2[k];
      if(l2.l3&&l2.l3.length){for(var x=0;x<l2.l3.length;x++)caps.push({m:l2.l3[x].maturity||"Low"});}
      else caps.push({m:l2.maturity||"Low"});
    }
    var sa=av(caps),sc2=cn(caps),ct=caps.length;
    bh+="<div class='br'><div class='bh'><span class='bn'>"+s.shortStage+"</span><span style='display:flex;align-items:center;gap:8px'><span class='p "+pc(sa)+"'>"+sa.toFixed(1)+" / 3.0</span><span style='font-family:Roboto Mono,monospace;font-size:11px;color:#94a3b8'>"+ct+" caps</span></span></div><div class='bt'>";
    for(var mi=0;mi<MO.length;mi++){var m=MO[mi];if(sc2[m]>0)bh+="<div class='bs b"+m.charAt(0)+"' style='width:"+(sc2[m]/ct*100)+"%' title='"+m+": "+sc2[m]+"'></div>";}
    bh+="</div></div>";
  }
  el("bars").innerHTML=bh;

  var cx2=65,cy=65,r=48,sw=18,circ=2*Math.PI*r;
  var arcs="",cum=0;
  for(var mi=0;mi<MO.length;mi++){var m=MO[mi];if(mc[m]>0){
    var pct=mc[m]/tot,dash=pct*circ,gap=circ-dash;
    arcs+="<circle cx='"+cx2+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='"+MC[m].b+"' stroke-width='"+sw+"' stroke-dasharray='"+dash+" "+gap+"' stroke-dashoffset='"+(-cum*circ)+"' transform='rotate(-90 "+cx2+" "+cy+")'/>";
    cum+=pct;
  }}
  var lg="";
  for(var mi=0;mi<MO.length;mi++){var m=MO[mi];lg+="<li><span class='dsw' style='background:"+MC[m].b+"'></span>"+m+" <strong>"+mc[m]+"</strong> <span style='color:#94a3b8;font-size:11px'>("+Math.round(mc[m]/tot*100)+"%)</span></li>";}
  el("donut").innerHTML="<div class='dw'><svg viewBox='0 0 130 130' width='140' height='140'><circle cx='"+cx2+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='#eef2f7' stroke-width='"+sw+"'/>"+arcs+"<text x='"+cx2+"' y='"+(cy-4)+"' text-anchor='middle' font-family='Inter' font-size='18' font-weight='700' fill='#1a2332'>"+tot+"</text><text x='"+cx2+"' y='"+(cy+10)+"' text-anchor='middle' font-family='Roboto Mono' font-size='9' fill='#94a3b8'>TOTAL</text></svg><ul class='dl'>"+lg+"</ul></div>";

  var stg=[];
  for(var i=0;i<DATA.length;i++){var s=DATA[i],ct3=0;
    for(var j=0;j<s.l1.length;j++)for(var k=0;k<s.l1[j].l2.length;k++){var l2=s.l1[j].l2[k];ct3+=(l2.l3&&l2.l3.length)?l2.l3.length:1;}
    stg.push({n:s.shortStage,c:ct3});}
  stg.sort(function(a,b){return b.c-a.c;});
  var mx=stg[0].c,ch2="";
  for(var i=0;i<stg.length;i++)ch2+="<div class='cr'><span class='cl'>"+stg[i].n+"</span><div class='ct'><div class='cf' style='width:"+(stg[i].c/mx*100)+"%'></div></div><span class='cc'>"+stg[i].c+"</span></div>";
  el("cx").innerHTML=ch2;

  var sh="";
  for(var mi=0;mi<MO.length;mi++){var m=MO[mi];sh+="<div class='si'><div class='ssw' style='background:"+MC[m].b+"'></div><span class='sl' style='color:"+MC[m].t+"'>"+m+"</span><span class='ssc'>"+MS[m]+"</span><span class='sd'>"+MD[m]+"</span></div>";}
  el("sref").innerHTML=sh;

  var groups=[];
  for(var i=0;i<DATA.length;i++){var s=DATA[i];
    for(var j=0;j<s.l1.length;j++){var l1=s.l1[j],caps2=[];
      for(var k=0;k<l1.l2.length;k++){var l2=l1.l2[k];
        if(l2.l3&&l2.l3.length){for(var x=0;x<l2.l3.length;x++)caps2.push({m:l2.l3[x].maturity||"Low"});}
        else caps2.push({m:l2.maturity||"Low"});}
      groups.push({n:l1.name,s:s.shortStage,c:caps2,ct:caps2.length,a:av(caps2),mc:cn(caps2)});}}
  groups.sort(function(a,b){return a.a-b.a;});
  var th="<table><thead><tr><th>L1 Capability</th><th>Value Stage</th><th>Count</th><th>Profile</th><th>Avg</th><th>Dominant</th></tr></thead><tbody>";
  for(var i=0;i<groups.length;i++){var g=groups[i];
    var dom="Low";for(var mi=0;mi<MO.length;mi++){if(g.mc[MO[mi]]>0){dom=MO[mi];break;}}
    var mb2="";for(var mi=0;mi<MO.length;mi++){var m=MO[mi];if(g.mc[m]>0)mb2+="<div class='ms b"+m.charAt(0)+"' style='width:"+(g.mc[m]/g.ct*100)+"%'></div>";}
    th+="<tr><td style='font-weight:600'>"+g.n+"</td><td style='font-size:11px;color:#6b7a8d'>"+g.s+"</td><td style='font-family:Roboto Mono,monospace;font-weight:700;text-align:center'>"+g.ct+"</td><td><div class='mb'>"+mb2+"</div></td><td><span class='p "+pc(g.a)+"'>"+g.a.toFixed(1)+"</span></td><td><span class='bg' style='background:"+MC[dom].b+";color:"+MC[dom].t+"'>"+dom+"</span></td></tr>";}
  th+="</tbody></table>";
  el("tbl").innerHTML=th;
}
run();

</script>
</body></html>
