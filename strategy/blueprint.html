<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.header-row{position:sticky;top:0;z-index:20;display:flex;background:#f8fafc;border-bottom:2px solid #0f2044}

.col-header{background:#163172;color:#fff;border-radius:6px;padding:8px;height:100px;font-size:14px;font-weight:700;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative}

.summaries-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;border:1.5px solid #163172;background:#163172;color:#fff;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.03em}
.summaries-btn:hover{background:#1e3a6e}
.topbar-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.topbar-btn:hover{background:rgba(255,255,255,.24)}
.menu-wrap{position:relative}
.menu-panel{display:none;position:absolute;top:calc(100% + 8px);left:0;z-index:300;background:#fff;border:1px solid #e0e4ed;border-radius:10px;box-shadow:0 12px 40px rgba(15,32,68,.25);min-width:220px;padding:6px;flex-direction:column}
.menu-panel.open{display:flex}
.menu-item{display:flex;align-items:center;text-align:left;width:100%;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:600;color:#26314a;cursor:pointer;border-radius:6px;font-family:inherit}

.menu-div{height:1px;background:#eef1f6;margin:5px 8px}

.flt-btn{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:8px;border:1.5px solid #e0e4ed;background:#fff;font-size:12px;font-weight:600;color:#374151;cursor:pointer}
.flt-btn:hover{border-color:#c3cbdd}
.flt-btn.active{border-color:#163172;color:#163172;background:#eef3fb}
.flt-btn .caret{font-size:9px;color:#9ca3af}
.flt-pop{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:250;background:#fff;border:1px solid #e0e4ed;border-radius:10px;box-shadow:0 12px 40px rgba(15,32,68,.22);min-width:250px;max-height:60vh;overflow-y:auto;padding:8px}
.flt-pop.open{display:block}

.flt-pop-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af}
.flt-mini{font-size:10px;color:#4a7fd4;cursor:pointer;background:none;border:none;padding:2px 6px;font-weight:600}
.flt-mini:hover{text-decoration:underline}
.flt-item{display:flex;align-items:center;gap:10px;width:100%;padding:7px 10px;border:none;background:none;font-size:13px;color:#26314a;cursor:pointer;border-radius:6px;text-align:left;font-family:inherit}
.flt-item:hover{background:#f4f7fc}
.flt-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #c3cbdd;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0}

.flt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.flt-reset{font-size:11px;color:#b91c1c;cursor:pointer;background:none;border:none;font-weight:600;padding:4px 8px;border-radius:6px}
.flt-reset:hover{background:#fee2e2}
.flt-notes{margin-left:auto}
.fb-label{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:.07em;text-transform:uppercase;margin-right:2px;flex-shrink:0}
.fb-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;border:1.5px solid #e0e4ed;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#6b7280;flex-shrink:0;user-select:none}
.fb-chip.on{border-color:#163172;background:#163172;color:#fff}
.fb-chip.lane-on{color:#fff}
.fb-mini{font-size:10px;color:#6b7280;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid #e0e4ed;background:#fff;flex-shrink:0}
.fb-mini:hover{background:#eef1f6}
.fb-sep{width:1px;height:20px;background:#e0e4ed;margin:0 4px;flex-shrink:0}
.grid-msg{padding:40px;font-size:14px;color:#9ca3af;text-align:center}
body.tv .col-header-cell,body.tv .cell-wrap{width:340px}
body.tv .cell-synopsis{font-size:19px;line-height:1.4;-webkit-line-clamp:4}
body.tv .col-header{font-size:18px;height:120px}
body.tv .col-header::after{border-top-width:60px;border-bottom-width:60px}
body.tv .col-code{font-size:13px}
body.tv .lane-name{font-size:15px}
body.tv .lane-label{width:180px}
body.tv .grid-corner{width:180px}
body.tv .card-count{font-size:14px;padding:3px 12px}
body.tv .lane-row{min-height:150px}
.cell-note-badge{position:absolute;top:6px;right:8px;font-size:12px;pointer-events:none}
.comment-box{width:100%;border:1.5px solid #e0e4ed;border-radius:8px;padding:10px 12px;font-size:14px;color:#374151;line-height:1.5;resize:vertical;min-height:80px;font-family:inherit;outline:none}
.comment-box:focus{border-color:#4a7fd4}
.comment-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.comment-saved{font-size:11px;color:#16a34a;opacity:0;transition:opacity .4s}
.comment-saved.show{opacity:1}
.comment-clear{font-size:11px;color:#ef4444;cursor:pointer;background:none;border:none;padding:2px 8px;border-radius:4px}
.comment-clear:hover{background:#fee2e2}
@media print{
 @page{size:A3 landscape;margin:10mm 8mm}
 .topbar,.filterbar,.modal-overlay,.lane-hide{display:none !important}
 html,body{height:auto !important;overflow:visible !important;background:#fff !important}
 .app{height:auto !important;overflow:visible !important}
 .grid-wrapper{overflow:visible !important}
 .grid-body{min-width:unset !important}
 .header-row,.lane-label{position:static !important}
 .col-header-cell,.cell-wrap{width:auto !important;flex:1 !important}
 .col-header{height:auto !important;font-size:9px !important;padding:6px !important}
 .col-header::after{display:none !important}
 .cell{box-shadow:none !important;transform:none !important;border:1px solid #d7dbe5 !important}
 .cell-synopsis{font-size:8.5px !important;line-height:1.35 !important}
 .card-count{font-size:8px !important;padding:1px 6px !important}
 .lane-row{break-inside:avoid;min-height:0 !important}

}
.sum-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}

.sum-section{border-top:2px solid #163172;padding-top:16px;margin-top:6px}

.sum-stage-title .sum-code{font-size:13px;font-weight:700;letter-spacing:.08em;color:#4a7fd4;display:block;margin-bottom:2px}
.sum-para{font-size:16.5px;line-height:1.65;color:#26314a;margin-bottom:12px}
.sum-para b{color:#0f2044}
.sum-note{font-size:12.5px;color:#9ca3af;font-style:italic;margin-bottom:8px}
.cell-wrap{width:250px;flex-shrink:0;padding:7px 8px 7px 0;display:flex}
.cell{border-radius:8px;border:2px solid #e8eaf0;cursor:pointer;position:relative;display:flex;flex-direction:column;gap:8px;background:#fff;flex:1;padding:12px 14px;transition:border-color .15s,box-shadow .15s,transform .1s}
.cell:hover{border-color:#4a7fd4;box-shadow:0 3px 12px rgba(74,127,212,.22);transform:translateY(-2px)}
.cell:focus-visible{outline:3px solid #2563eb;outline-offset:2px}
.cell-synopsis{font-size:13px;font-weight:500;line-height:1.45;color:#1a1a2e;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cell-footer{display:flex;align-items:center;gap:8px;margin-top:auto;flex-wrap:wrap}
.card-count{font-size:11px;font-weight:700;color:#fff;background:#163172;border-radius:10px;padding:2px 10px}
.cell-flag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.03em}
.cell-empty{border-style:dashed;cursor:default;align-items:center;justify-content:center}
.cell-empty:hover{border-color:#e8eaf0;box-shadow:none;transform:none}
.cell-empty span{font-size:12px;color:#c3c9d4;text-align:center;line-height:1.4}
.modal-overlay{position:fixed;inset:0;background:rgba(15,32,68,.72);display:none;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:#fff;width:min(1400px,94vw);height:92vh;margin:auto;border-radius:14px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.modal-header{padding:22px 32px 18px;border-bottom:2px solid #e8eaf0;flex-shrink:0;position:relative;background:#f8fafc}
.modal-badge{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 14px;border-radius:6px;margin-bottom:10px}
.modal-title{font-size:26px;font-weight:700;color:#0f2044;line-height:1.3;padding-right:60px}
.modal-sub{font-size:15px;color:#6b7280;margin-top:6px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.modal-close{position:absolute;top:20px;right:24px;background:#eef1f6;border:none;cursor:pointer;color:#374151;font-size:22px;width:44px;height:44px;border-radius:10px;line-height:1}
.modal-close:hover{background:#e0e4ed}
.modal-body{flex:1;overflow-y:auto;padding:26px 32px;display:flex;flex-direction:column;gap:22px}
.group-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af;border-bottom:1px solid #eef1f6;padding-bottom:6px;margin-bottom:4px}
.card-item{background:#f8fafc;border:1px solid #e8eaf0;border-left:5px solid var(--accent,#163172);border-radius:8px;padding:16px 20px;font-size:17px;line-height:1.6;color:#26314a}
.card-item .card-id{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--accent,#163172);border-radius:6px;padding:1px 9px;margin-bottom:8px;letter-spacing:.04em}
.card-item .card-note{display:block;font-size:12.5px;color:#9ca3af;margin-top:8px;font-style:italic}
.card-group{display:flex;flex-direction:column;gap:12px}
.provenance{font-size:13px;color:#6b7280;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;line-height:1.55}
.provenance.keyed{background:#f0fdf4;border-color:#bbf7d0}
@media (max-width:900px){.col-header-cell,.cell-wrap{width:210px}.modal-title{font-size:20px}.card-item{font-size:15px}}
</style>

 {id:'customer',bg:'#eff6ff',short:'Customer',label:'Customer / User Actions',desc:'Actions the customer performs while interacting with the service',color:'#2563eb',keyed:false},

];
const DATA={"s1": {"customer": {"synopsis": "Liability begins unseen — purchase, inheritance, revaluation triggers", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer is unaware they are becoming liable"}, {"text": "Customer has not previously interacted with the SRO"}, {"text": "Customer is aware of their upcoming liability"}, {"text": "Customer has previously interacted with the SRO (pays Land Tax)"}, {"text": "Customer has not previously interacted with the SRO but understands they will become liable"}, {"text": "Customer learns about Land Tax through friends, family, accountant, or research"}, {"text": "Customer calls SRO to ask about land tax liability before making a purchase decision"}, {"text": "Customer becomes liable for Land Tax on the property"}, {"text": "Customer may receive a cold call from SRO to verify details before assessment is issued"}, {"text": "Trigger: Customer buys an investment property in addition to PPR"}, {"text": "Trigger: Customer takes possession of a property via survivorship or joint ownership where one owner passes away"}, {"text": "Trigger: Customer inherits a property"}, {"text": "Trigger: Customer own an investment property where the re-evaluation pushes property over Land Tax threshold"}, {"text": "Trigger: Customer buys a property primarily as a holiday home rather than an income-generating investment"}, {"text": "Trigger: Customer invests in a home and land package and commences building"}, {"text": "Trigger: Customer is overseas or a permanent resident not yet living in Australia and buys a property in Victoria"}, {"text": "Trigger: Customer sets up a family trust and acquires a property under the trust name in addition to personal name properties"}, {"text": "Trigger: customer owns an investment property where the re-evaluation pushes property over Land Tax threshold or there is a legislative change to threshold or exemption type"}]}]}, "front": null, "back": {"synopsis": "Pre-issue FTL review; manual mismatch resolution", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff conduct data analysis and remediation on FTL assessments before they go out, checking data quality, PPR flags, address accuracy and whether the assessment should issue"}, {"text": "Staff cross-reference data sources including driver's licence records to validate FTL customer details before assessment is issued - outbound calls made in some cases where data cannot be confirmed"}, {"text": "Staff create or update ownership records in eSys for new owners or deceased estate trusts"}, {"text": "Local Government Administration team receives and formats annual Reval data from VGV into one file per municipality"}, {"text": "Missing value work items identified and resolved before issue cycle starts"}, {"text": "Staff resolve valuation mismatches using LASSI, COI and LandData"}, {"text": "Staff contact VGV directly when mismatches cannot be resolved internally"}, {"text": "Staff adjust the customers file based on discussions prior to the assessment being issued"}]}]}, "systems": {"synopsis": "Batch liability from VGV, PEXA and Titles feeds", "groups": [{"title": "Canvas cards", "cards": [{"text": "Batch job calculates liabilities for the coming year on 31 December"}, {"text": "First Time Liable (FTL) customers identified from the batch liability run - action items created for pre-issue review"}, {"text": "Valuations loaded into eSys triggering the issue cycle"}, {"text": "eSys runs batch job to generate liabilities once VGV valuations are loaded"}, {"text": "LOAN system (Land Ownerships and NOAs) automates matching and transfer of ownership data"}, {"text": "LandData used to download plans lodged overnight from Titles Office"}, {"text": "PEXA sends NOA files to SRO each weekday"}, {"text": "VGV sends valuation data via email as text files per municipality"}, {"text": "Text files received via email"}, {"text": "eSys attempts to match valuation data by MPN, address and title references"}, {"text": "Annual Reval valuation data matching 99% of properties automatically match in eSys against existing property"}, {"text": "LASSI used to investigate property boundaries and spatial data"}, {"text": "COI used for property and ownership searches including ATO records"}, {"text": "Plans of consolidation and subdivision received overnight from Titles Office are processed daily"}, {"text": "Land Information Management branch runs liability generation after valuations are loaded into eSys"}]}]}, "support": {"synopsis": "External data suppliers; Serv feed halted", "groups": [{"title": "Canvas cards", "cards": [{"text": "Titles Office sends nightly email of plans lodged"}, {"text": "Duties team liaises with PEXA when files are missed"}, {"text": "Titles Office provides survivorship and non-PEXA transfer data via Serv - NOTE this data transfer is currently halted and the SRO is working with Serv to restore it"}, {"text": "VGV provides supplementary valuations continuously throughout the year"}, {"text": "Business Process Pack outlines how supplementary valuation timing and mid-year valuation changes flow through to assessments"}]}]}, "pain": {"synopsis": "Manual matching burden; zero pre-purchase awareness", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-001", "text": "SRO is working with Serv to restore it The annual Reval covers every rated property in Victoria, meaning even a 1% mismatch rate generates a significant volume of manual investigation work. Each mismatch requires staff to search across multiple systems to identify the cause, with no formal procedure to follow because the reasons vary too widely to document consistently. Mismatch work has no formal procedure despite being a recurring and predictable part of the annual cycle."}, {"id": "PP-002", "text": "Each mismatch requires staff to search across multiple systems to identify the cause, with no formal procedure to follow because the reasons vary too widely to document consistently. Mismatch work has no formal procedure despite being a recurring and predictable part of the annual cycle. The reasons for mismatches are too varied to capture in a single process, meaning staff rely on experience and individual judgement to resolve them."}, {"id": "PP-003", "text": "The window between receiving valuation data and the issue cycle starting is tight, and any backlog of unresolved mismatches flows directly into incorrect assessments being sent to customers. Some rural council valuation data is so historic that the original context for a property reference has been lost entirely. Staff investigating mismatches for these properties have no reliable source to check against, making resolution difficult or impossible without direct contact with the relevant council or valuer."}, {"id": "PP-004", "text": "Some rural council valuation data is so historic that the original context for a property reference has been lost entirely. Staff investigating mismatches for these properties have no reliable source to check against, making resolution difficult or impossible without direct contact with the relevant council or valuer. Certain ownership changes, including survivorship and deceased estates, do not flow through PEXA and are not automatically received by the SRO."}, {"id": "PP-005", "text": "Certain ownership changes, including survivorship and deceased estates, do not flow through PEXA and are not automatically received by the SRO. These changes require manual identification and investigation, meaning there is no reliable trigger to prompt the work. Ownership records can remain incorrect for extended periods, with downstream consequences for assessments issued to the wrong party."}, {"id": "PP-006", "text": "Supplementary valuations, which capture mid-year property changes such as subdivisions and boundary changes, produce a mismatch rate of around 40% when loaded into eSys - far higher than the annual Reval. The nature of the change is often the reason the data cannot be automatically matched, generating significant manual investigation work with every load."}, {"id": "PP-007", "text": "§Q19§ §Q20§ PEXA NOA files are occasionally not received by the SRO. Despite an Operating Agreement governing this transfer, missing files are identified through SRO's own periodic checks rather than PEXA being held to account. The SRO has enforceable rights under the agreement that are not consistently being activated."}, {"id": "PP-008", "text": "The SRO, VGV and DTP each use different property identifiers, volume and folio, Municipal Property Numbers, and lot and plan references respectively. The SRO, VGV and DTP each use different property identifiers, volume and folio, Municipal Property Numbers, and lot and plan references respectively. These do not consistently align, requiring manual reconciliation across agencies every time an automatic match fails."}, {"id": "PP-009", "text": "Customers have no awareness of land tax obligations until their first assessment arrives. There is no proactive communication, no projected figure and no prior context, leaving first-time liable customers shocked and unprepared. The SRO's practice of making outbound calls from a private number to verify customer details before issuing assessments is at odds with the current environment around phone scams."}, {"id": "PP-010", "text": "Cross-state property investors face different land tax rules and thresholds in each jurisdiction with no consolidated guidance available. Several customers described moving investment out of Victoria in response to rising costs, making cross-state comparisons without SRO input at the point those decisions are made."}, {"id": "PP-011", "text": "The SRO's practice of making outbound calls from a private number to verify customer details before issuing assessments is at odds with the current environment around phone scams. Customers who receive unexpected calls from an unknown number claiming to be the SRO have no way to verify the caller's legitimacy, making this channel ineffective and potentially damaging to trust."}, {"id": "PP-012", "text": "Titles Office provides survivorship and non-PEXA transfer data via Serv - NOTE this data transfer is currently halted and the SRO is working with Serv to restore it."}]}]}, "opp": {"synopsis": "Awareness, matching and data-reliability HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-001", "text": "How Might We ensure that buyers understand their potential land tax obligations before they become liable, so that the first bill is never the first time they have heard of it?"}, {"id": "HMW-002", "text": "How Might We establish a relationship with new land tax customers before their first assessment arrives, so that their first interaction with the SRO is one of clarity rather than shock?"}, {"id": "HMW-003", "text": "How Might We use existing SRO seminars, peak body relationships and the website to reach customers at the point they acquire a property, so that understanding land tax obligations is part of becoming a property owner rather than a surprise that arrives with the first bill?"}, {"id": "HMW-004", "text": "How Might We reduce the volume of manual investigation work generated by Reval mismatches, so that staff effort is focused on genuinely complex cases rather than routine matching errors?"}, {"id": "HMW-005", "text": "How Might We reduce the manual investigation burden created by supplementary valuation loads, so that mid-year property changes are matched and processed without requiring staff intervention for the majority of cases?"}, {"id": "HMW-006", "text": "How Might We ensure missing or mismatched value work is completed before the issue cycle so customers don't receive an incorrect assessment due to mismatched or missing data?"}, {"id": "HMW-007", "text": "How Might We improve the reliability and currency of rural council valuation data, so that historic references do not create dead ends in the matching process?"}, {"id": "HMW-008", "text": "How Might We capture and share the knowledge staff use to resolve mismatch work, so that experience is never the only thing standing between a resolved and an unresolved mismatch?"}, {"id": "HMW-009", "text": "How Might We verify customer details before issuing assessments in a way that customers recognise as legitimate, so that the process builds rather than erodes trust?"}, {"id": "HMW-010", "text": "How Might We enable reliable data matching across government agencies that use different property identifiers, so that staff are not required to manually reconcile the same property across multiple systems every time a change occurs?"}, {"id": "HMW-011", "text": "How might we strengthen validation and monitoring of PEXA file transfers, so that missed files are proactively flagged and resolved quickly?"}, {"id": "HMW-012", "text": "How Might We ensure the SRO actively enforces its Operating Agreement with PEXA for NOA data delivery, so that missing files are identified and remedied by PEXA rather than discovered through SRO's own periodic checks?"}, {"id": "HMW-013", "text": "How Might We ensure that all ownership changes are captured and reflected in SRO records promptly, regardless of how or where the change occurs, so that assessments are always issued to the correct party?"}, {"id": "HMW-014", "text": "How Might We ensure customers who are comparing land tax obligations across states have access to clear and accurate information about their Victorian obligations, so that investment decisions are made on an informed basis rather than on incomplete cross-jurisdictional comparisons?"}]}, {"title": "Explicit opportunity cards", "cards": [{"text": "Opportunity: Customers are proactively calling the SRO before purchasing investment properties to understand their obligations. This demand is currently met informally through inbound calls. There is an opportunity to meet customers at this decision-making moment with accessible self-service guidance."}]}]}, "quotes": {"synopsis": "Manual matching toil; bills with no warning", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "\"Sometimes they're cold calling customers to say, 'We're calling from the State Revenue Office, do you still live in this property and that sort of stuff, which is sometimes the only option we have.\" P1 Staff"}, {"text": "\"No, sadly, nobody told me about land tax. I knew about stamp duty because that's upfront at the time of purchase but not land tax.\" P2 Customer"}, {"text": "\"I called SRO about what's involved and how much it would cost. I was advised I will receive a letter. I knew I couldn't avoid it, but you can negative gear it.\" P3 Customer"}, {"text": "\"We don't even have a formal procedure for the mismatch work. We asked for it but the work is just too vague. It could be a million different reasons why something's changed.\" P8 Staff"}, {"text": "“The timing of when land tax is assessed and assessment cycles, is a pretty tight window. It’s not huge amount of time to action some of those things.” P1 Staff"}, {"text": "\"There are times we cant work it out and we go to the valuers. Metro good but rural councils, the titles are so historic. We get lost in translation. We email them and they're good at getting back. Otherwise we call them.\" P8 Staff"}, {"text": "\"...with some of the rural councils, the titles they're talking about are so historic that a lot of it's got lost in translation as to what the actual thing they're referencing is.” P7 Staff"}, {"text": "“If there was some kind of touchpoint before they buy, even just to say, ‘based on this purchase, your land tax is estimated to be this, and your bill will come in August’, that would be really good.” P9 Staff"}, {"text": "\"It is preferred rather than me contacting them, they could give me in writing - 'this is your projected tax.' I'd like them to be pro-active...budget for this amount.\" P1 Customer"}, {"text": "“So just to get a bill out of the blue on a property that we've fully paid off and we own was a bit random. I hadn't heard anything coming through any of the media or the press.” P7 Customer"}, {"text": "\"There’s a lot of investors I know like myself who are actually moving out of Victoria to invest in other states.” P2 Customer"}, {"text": "\"99% will match but 1% eSys will require manual intervention - it's a lot of work.\" P8 Staff"}, {"text": "\"We have had some issues in the last 12 months or so of not receiving PEXA files. So we get a list that tells us, ‘You're missing these ones.'” P9 Staff"}, {"text": "“When we do the supplementary loads, we get a lot more work items because that’s typically why they are giving us that data — because something’s changed on the property. So that normally… might be around like 60% of it matches.” P8 Staff"}, {"text": "\"We searched by lot and plan, which isn't as accurate as volume folio. The other way we try to do it is via the MPN, which the councils and VGV give us. But half the municipalities use a different number for the MPN than we get - they send us the municipal property number, which is correct for 30 odd councils, but the other 30 odd use the assessment number.\" P6 Staff"}, {"text": "\"A lot of the time, I think outbound calls are a private number, so you don't always get a lot of hits on people hitting answer. They'll think you're a scam or something. Even once you say from the State Revenue Office, they don't always believe you straight away.\" P5 Staff"}, {"text": "\"We have had some issues in the last 12 months or so of not receiving PEXA files. “The fact that we’re usually the ones saying, ‘hey, something’s gone wrong’ is not great.” P9 Staff"}, {"text": "\"Historical titles - ancient. Hasn't been updated since the 1800's.\" P9 Staff"}]}]}, "capability": {"synopsis": "7 capabilities · heaviest: Inter-Agency Data Exchange & Identifier Reconciliation", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-01", "text": "Inter-Agency Data Exchange & Identifier Reconciliation", "note": "Proposed · 4 PP / 4 HMW · P2.2, P4.5"}, {"id": "LTX-VS-02", "text": "Valuation Data Management", "note": "Existing · 3 PP / 3 HMW · P4.1, P4.3"}, {"id": "LTX-VS-00", "text": "Proactive Customer Engagement", "note": "Proposed · 1 PP / 3 HMW · P10.1, P10.2"}, {"id": "LTX-VS-10", "text": "Knowledge Management", "note": "Proposed · 1 PP / 1 HMW · no process linkage"}, {"id": "LTX-VS-01", "text": "Ownership Transfer & Change Processing", "note": "Proposed · 1 PP / 1 HMW · P3.1, P13.3"}, {"id": "LTX-VS-00", "text": "Customer Education & Guidance Content Management", "note": "Proposed · 1 PP / 1 HMW · no process linkage"}, {"id": "LTX-VS-01", "text": "Customer Identification Management", "note": "Existing · 1 PP / 1 HMW · P1.1"}]}]}, "process": {"synopsis": "9 processes · P2.2, P4.5 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P2.2", "text": "Inter-Agency Feed Monitoring &", "note": "4 PP / 4 HMW · via 1 capability"}, {"id": "P4.5", "text": "Inter-Agency Feed Monitoring &", "note": "4 PP / 4 HMW · via 1 capability"}, {"id": "P4.1", "text": "Annual Valuation Batch Load", "note": "3 PP / 3 HMW · via 1 capability"}, {"id": "P4.3", "text": "Annual Valuation Batch Load", "note": "3 PP / 3 HMW · via 1 capability"}, {"id": "P10.1", "text": "New-Liability Customer Onboarding", "note": "1 PP / 3 HMW · via 1 capability"}, {"id": "P10.2", "text": "New-Liability Customer Onboarding", "note": "1 PP / 3 HMW · via 1 capability"}, {"id": "P3.1", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P13.3", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P1.1", "text": "Duplicate Customer Resolution", "note": "1 PP / 1 HMW · via 1 capability"}]}]}}, "s2": {"customer": {"synopsis": "Assessment arrives — shock, arrears, wrong addresses", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer registered for My Land Tax receives a notification on the assessment issue date, this serves as Proof of Record Ownership (PORO) confirming the assessment has been officially served"}, {"text": "Customer attempts to log in to My Land Tax to access assessment"}, {"text": "Customer who has forgotten password cannot log-in as they do not have their assessment number"}, {"text": "Existing customer receives assessment by post"}, {"text": "Existing customer receives assessment digitally via My Land Tax"}, {"text": "FTL customer receives assessment with no prior warning or contact"}, {"text": "Customer is shocked or surprised - has not budgeted for it"}, {"text": "Customer reads the assessment and finds it self-explanatory, particularly if they have a financial background"}, {"text": "Customer reads the assessment and does not understand how the land value has been calculated or what it is based on"}, {"text": "Customer is surprised and shocked to first learn of multiple years of liability"}, {"text": "Customer may receive bills in arrears covering multiple prior years when liability was applied retrospectively"}, {"text": "Customer does not receive their assessment because it has been issued to an incorrect address and is returned to the SRO"}, {"text": "Customer discovers an assessment at a different address (e.g. family member's address or old postal address) rather than their own because address has not been updated"}, {"text": "Customer receives assessment for primary place of residence due to a system error"}, {"text": "Customer chooses to receive assessments digitally via My Land Tax inbox rather than by post"}, {"text": "Customer receives email notification that a new document is in their My Land Tax inbox and must log in to view and download it, the notification itself constitutes official service of the assessment"}, {"text": "Customer requests hard copy assessments by post and keeps physical records in a file"}, {"text": "Customer owns properties in both personal name and family trust and receives separate assessments for each entity"}, {"text": "Customer calls SRO to set up an online account as they cannot proceed without an assessment number they have misplaced"}, {"text": "Customer calls about a reminder notice having already made payment"}, {"text": "Customer reviews assessment, finds it correct and proceeds to payment"}, {"text": "Customer may be contacted by staff once a correct address is found and advised that their assessment will be reissued"}]}]}, "front": {"synopsis": "Resends, walkthroughs and the PDF workaround", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff open Assisted Digital to view copies of assessment and property details"}, {"text": "Staff handhold elderly or non-digital customers through website navigation and payment options"}, {"text": "Staff walk customers through assessment structure including joint ownership calculations across multiple screens"}, {"text": "Staff handle inbound calls from customers who have received unexpected arrears bills covering multiple years"}, {"text": "Customer calls SRO to request a copy of their assessment staff can provide via email (at their discretion) or direct to My Land Tax depending on customer preference and registration status"}, {"text": "Staff answer inbound calls and emails about assessments"}, {"text": "Staff verify customer identity using account details in Assisted Digital"}, {"text": "Staff send copy of assessment via email or guide customer through My Land Tax login"}, {"text": "SRO can resend assessment via My Land Tax workaround by selecting unregistered to add PDF attachment"}, {"text": "Staff send a copy of the assessment via email or guide the customer through My Land Tax"}, {"text": "Where the customer cannot access their account staff use a My Land Tax workaround selecting unregistered to add and send the assessment as a PDF attachment"}, {"text": "Staff may contact customer to advise assessment has been reissued where contact details allow"}]}]}, "back": {"synopsis": "RTU tracing and address remediation", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff investigate correct address using driver's licence database, ATO, ASIC and municipal returns"}, {"text": "Where a correct address is found and the current year assessment needs to be reissued it is reissued"}, {"text": "Records updated in eSys with the correct address"}, {"text": "RTU action item created in eSys and allocated to LOAN team for investigation"}, {"text": "Assessment is returned to sender and an RTU action item is created for investigation and reissue"}, {"text": "A batch job proactively updates addresses in eSys using COI driver's licence data, but is dependent on DLS data availability and timing"}, {"text": "Where data is not current, customers may still receive assessments at an old address without realising until a bill is overdue"}]}]}, "systems": {"synopsis": "Bulk issue via eSys; My Land Tax digital service", "groups": [{"title": "Canvas cards", "cards": [{"text": "eSys generates and issues assessments"}, {"text": "My Land Tax displays the live eSys net liability at all times, giving customers a notional view of what they owe"}, {"text": "Where a customer is registered for My Land Tax, a notification is triggered on the assessment issue date advising that their assessment is available for download"}, {"text": "Where a customer is not registered for My Land Tax, assessment is sent by post to the address held in eSys"}, {"text": "Where a customer has no current postal address on file, the assessment is issued to the last known address"}, {"text": "My Land Tax and Assisted Digital are the primary customer-facing and staff-facing portals"}, {"text": "My Land Tax and Assisted Digital updated once reissue is processed"}, {"text": "Non-issue flag applied in eSys to prevent new assessment issuing while amendment is in progress"}]}]}, "support": {"synopsis": "COI, ATO, ASIC address sources; grouping BPMs", "groups": [{"title": "Canvas cards", "cards": [{"text": "COI used to access Drivers licence database used to search for current address"}, {"text": "COI used to access ATO records accessed to cross-reference customer address details; ASIC data accessed to identify address for company-related customers; Municipal returns database used as a secondary source"}, {"text": "COI used for property and ownership searches"}, {"text": "COI DLS data subject to data availability and timing of updates"}, {"text": "COI driver's licence data used as the primary data source for address validation and update"}, {"text": "Business Process Map outlines how joint assessment logic is applied where multiple owners receive separate assessments for the same property"}, {"text": "Business Process Map outlines how tax rates are applied to aggregated land values across ownership structures including grouping rules and when a customer is only liable for part of the year"}, {"text": "Business Process Map outlines how grouping rules are applied across related entities and ownership structures to determine assessment groupings"}]}]}, "pain": {"synopsis": "Delivery failures and comprehension gaps", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-013", "text": "Digital delivery sends a notification to log in to My Land Tax rather than the document directly. While this serves as official notice, customers who expected an email attachment find the additional login step unexpected - particularly given annual infrequency makes portal access difficult. Genesis Cloud used by team leaders to monitor call volumes and staff performance My Land Tax links some related accounts but not unrelated types such as individual and company by default."}, {"id": "PP-014", "text": "Assessments provide no explanation of how the land value was calculated or what methodology was used, leaving customers unable to evaluate whether the figure is correct or worth challenging. Digital delivery sends a notification to log in to My Land Tax rather than the document directly. While this serves as official notice, customers who expected an email attachment find the additional login step unexpected - particularly given annual infrequency makes portal access difficult."}, {"id": "PP-015", "text": "My Land Tax requires an assessment number to register or reset a password. For customers who interact with land tax once a year this number is rarely at hand, creating a barrier to self-service at the exact moment they need access most."}, {"id": "PP-016", "text": "Customer is directed to My Land Tax Deceased estate triggered Return to sender loops can take multiple cycles to resolve and customers can remain unaware of their liability for extended periods if a correct address cannot be identified §H99§"}, {"id": "PP-017", "text": "SRO terminology Requests for a copy of assessment are the most common inbound call type, including from customers who are already registered for My Land Tax. Once a request is submitted there is no visibility of who is handling it or what stage it is at."}, {"id": "PP-018", "text": "Where liability is identified across multiple prior years, customers receive several years of assessments simultaneously, often with the same due date. With no explanation of how the liability accumulated and no staged approach, the financial impact can be overwhelming."}, {"id": "PP-019", "text": "One account per email address; individual and company …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-020", "text": "Account linking excludes unrelated entity types; no …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-021", "text": "Staff are not always sure why a certificate has been §Q73§ §Q74§ §Q75§ §Q76§ §Q77§ §Q78§ §Q79§ §Q80§ DLS data availability and timing of updates determines whether the LUV batch job can update an address before correspondence is issued LUV batch job automates address updates using"}, {"id": "PP-022", "text": "Staff open Assisted Digital to view copies of assessment and property details Joint ownership assessments are generated separately for each owner rather than as a single combined assessment §H46§ Assessments generated and issued by"}, {"id": "PP-023", "text": "Staff have developed a workaround to send assessments as PDF attachments by selecting the unregistered option in My Land Tax. This workaround compensates for a system limitation but was not designed for this purpose, it adds handling time, is dependent on staff knowing the workaround exists, and is not a consistent or reliable channel."}, {"id": "PP-024", "text": "Staff field calls from customers who have received an unexpected or incorrect assessment including PPR assessments issued in error. Customers occasionally receive assessments for their principal place of residence due to system errors, data recording gaps or FTL timing issues. Customers unaware of their exemption may pay an incorrect bill, while those who know must invest time having it corrected."}, {"id": "PP-025", "text": "Business Process Map outlines how bulk or portfolio certificate requests from large conveyancing firms are managed §H80§ Overdue notices include a case ID but not a customer number, requiring staff to run an additional search before a call can begin, adding handling time and frustrating customers who expect staff to have their details at hand."}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "Customers who have opted for digital delivery receive an email prompting them to log in to My Land Tax rather than the document itself. At a time when they are already likely to have forgotten their password, this extra step creates friction at the exact moment they are trying to act, and drives avoidable calls to the SRO."}, {"text": "When an assessment is returned to sender the investigation and reissue process can take multiple cycles to resolve. Where a correct address cannot be found, the customer may remain unaware of their liability for several assessment years."}, {"text": "Customers outside the linking rules must manage separate accounts with no consolidated view of their obligations."}]}]}, "opp": {"synopsis": "Access, clarity and address-accuracy HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-015", "text": "How Might We design a self-service experience that works for customers who only interact with land tax once a year, so that infrequency is never a barrier to access?"}, {"id": "HMW-016", "text": "How Might We ensure customers always have their assessment when they need it, so that calling the SRO to request a copy is never necessary?"}, {"id": "HMW-017", "text": "How Might We design correspondence that gives customers everything they need to act on their obligations, so that contacting the SRO is a choice rather than a necessity?"}, {"id": "HMW-018", "text": "How Might We deliver correspondence directly to customers in a format they can immediately access and act on, so that receiving a land tax assessment never requires an extra step?"}, {"id": "HMW-019", "text": "How Might We support customers who want their assessment delivered directly to their inbox, so that opting in to digital delivery means receiving the document not a prompt to retrieve it?"}, {"id": "HMW-020", "text": "How Might We ensure address accuracy before correspondence is issued, so that return to sender loops never become the way an address problem is discovered?"}, {"id": "HMW-021", "text": "How Might We ensure address updates are applied before correspondence is issued, so that a customer never receives mail at an address the SRO already knows is incorrect?"}, {"id": "HMW-022", "text": "How Might We ensure that customers who have not received their assessment are identified and contacted through an alternative channel, so that undeliverable mail never results in a customer being unaware of their liability?"}, {"id": "HMW-023", "text": "How Might We reduce the occurrence of incorrect assessments and make errors easy to identify and resolve, so that customers can trust that what they receive is accurate?"}, {"id": "HMW-024", "text": "How Might We support customers identified as liable across multiple prior years, so that receiving historic assessments is manageable rather than overwhelming?"}, {"id": "HMW-026", "text": "How Might We give customers a complete view of all their land tax obligations regardless of ownership structure, so that the limits of account linking never prevent a customer from seeing their full position in one place?"}, {"id": "HMW-027", "text": "How Might We make proactive outbound contact from the SRO verifiable and trustworthy, so that customers feel confident engaging rather than ignoring it?"}, {"id": "HMW-126", "text": "How Might We remove the need for staff to use workarounds to deliver assessments to customers, so that a system limitation never determines whether a customer receives their correspondence?"}]}]}, "quotes": {"synopsis": "Login circularity and arrears shock", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "“I don’t know how that is calculated and what’s the basis of the calculation.” P2 Customer"}, {"text": "\"A customer’s name was updated in eSys, but My Land Tax still showed the old middle name.\" P6 Staff"}, {"text": "\"Staff check whether the email address on file belongs to an ex-partner before sending correspondence in separation or domestic violence cases.\" P2 Staff"}, {"text": "“For the first time when you use My Ltx, you have to use that assessment number. It was quite hard for me to get that assessment number in order to enable my login for my land tax.” P6 Customer"}, {"text": "“If they just received an email copy of their assessment, rather than a notification to log in, it could avoid a lot of ‘can I have a copy of this?' calls. They can just go back through the emails if they’ve misplaced it.” P3 Staff"}, {"text": "“You'd open up something and there'd be 6 RTUs that all received it within the last 18 months. So the assessment would go out, get an RTU back, but before the RTU got back, the first reminder would go out. Every time an RTU came back, it would create an action item. It wouldn't progress at all.” P9 Staff"}, {"text": "\"If they’ve gone to an incorrect address, they never get it.” P7 Staff"}, {"text": "“As it currently stands, you can only register one account to one email address, which is a big frustration for customers.” The big one we see is, an individual who is the director of a company with two completely separate accounts. They can't register them under the same email address, and they have no ability for us to link those two accounts for them.\" P2 Staff"}, {"text": "\"They think it's solely in their name and they fully outright own the property. Then they suddenly get 5 years worth of trust assessments.\" P9 Staff"}, {"text": "\"I knew that something was coming. I never knew that it was going to come as arrears for a few years because I think it got applied retrospectively sometime back.\" P6 Customer"}, {"text": "\" P1 Customer \"If I can do it over the phone, I prefer to do it because I cannot go back and remember the passwords.” P4 Customer"}, {"text": "“I receive an email saying you have new mail in your mailbox. It doesn't tell me anything about the assessment, so I have to go and log on to my land tax. If I have already provided my email address, what's the harm in sending the same assessment via email?” P6 Staff"}, {"text": "\"When we check COI for drivers licence for PPR, that info is not always up to date at that time. Vic roads informs us every 3 yrs.\" P7 Staff"}, {"text": "“It also only comes with the case ID, not a customer number. When they call, we search by the case ID in eSys, but that can't be done in my land tax. We search the recovery case ID, get the customer number, then put that in my land tax, and then start the call from there.” P3 Staff"}, {"text": "“The most common type of call is a copy of assessment, even for the customers who already have my land tax…” P3 Staff"}, {"text": "“I’ve always seen it for a year, Jan to December assessment, but without clear explanation that if I’m not the owner beyond, say, June, am I eligible or am I liable only to pay half of that or how does it work?” P6 Customer"}]}]}, "capability": {"synopsis": "11 capabilities · heaviest: Assessment Communication Management", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-05", "text": "Assessment Communication Management", "note": "Existing · 2 PP / 3 HMW · P11.1, T6"}, {"id": "LTX-VS-04", "text": "Generate Land Tax Assessments", "note": "Existing · 2 PP / 1 HMW · P11.1"}, {"id": "LTX-VS-05", "text": "Service of Notice Management", "note": "Existing · 2 PP / 1 HMW · P11.2"}, {"id": "LTX-VS-01", "text": "Customer Account Linking & Consolidated View", "note": "Proposed · 2 PP / 1 HMW · P12.6"}, {"id": "LTX-VS-10", "text": "Digital Self-Service Management", "note": "Proposed · 1 PP / 1 HMW · P12.2"}, {"id": "LTX-VS-06", "text": "Adjustment Management", "note": "Existing · 1 PP / 1 HMW · P12.2"}, {"id": "LTX-VS-04", "text": "First-Time Liability Management", "note": "Proposed · 1 PP / 1 HMW · P5.3"}, {"id": "LTX-VS-01", "text": "Address Validation Management", "note": "Existing · 0 PP / 2 HMW · P1.2"}, {"id": "LTX-VS-01", "text": "Inter-Agency Data Exchange & Identifier Reconciliation", "note": "Proposed · 1 PP / 0 HMW · P2.2, P4.5"}, {"id": "LTX-VS-10", "text": "Correspondence & Document Exchange", "note": "Proposed · 1 PP / 0 HMW · P12.4"}, {"id": "LTX-VS-01", "text": "Customer Identification Management", "note": "Existing · 0 PP / 1 HMW · P1.1"}]}]}, "process": {"synopsis": "11 processes · P11.1, T6 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P11.1", "text": "Assessment Issue Cycle Execution", "note": "4 PP / 4 HMW · via 2 capabilities"}, {"id": "T6", "text": "Assessment Issue Cycle Execution", "note": "2 PP / 3 HMW · via 1 capability"}, {"id": "P12.2", "text": "Amendment Request Processing", "note": "2 PP / 2 HMW · via 2 capabilities"}, {"id": "P11.2", "text": "Return-to-Sender Investigation &", "note": "2 PP / 1 HMW · via 1 capability"}, {"id": "P12.6", "text": "Account Linking Request Handling", "note": "2 PP / 1 HMW · via 1 capability"}, {"id": "P5.3", "text": "First-Time Liability Pre-Issue", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P1.2", "text": "Customer Detail & Address", "note": "0 PP / 2 HMW · via 1 capability"}, {"id": "P2.2", "text": "Inter-Agency Feed Monitoring &", "note": "1 PP / 0 HMW · via 1 capability"}, {"id": "P4.5", "text": "Inter-Agency Feed Monitoring &", "note": "1 PP / 0 HMW · via 1 capability"}, {"id": "P12.4", "text": "Correspondence & Document", "note": "1 PP / 0 HMW · via 1 capability"}, {"id": "P1.1", "text": "Duplicate Customer Resolution", "note": "0 PP / 1 HMW · via 1 capability"}]}]}}, "s3": {"customer": {"synopsis": "Plain-language queries; council contacted first", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer reviews assessment and identifies something they believe is incorrect"}, {"text": "Customer does not understand why a trust property does not qualify for a full exemption"}, {"text": "Customer queries a primary production land exemption that has fallen off after a title change"}, {"text": "Customer submits correspondence using their own language and terminology"}, {"text": "Customer calls SRO to understand why their land value has changed significantly between assessment years"}, {"text": "Customer notices two adjacent properties with similar characteristics have different land values on the same assessment"}, {"text": "Customer queries why their property is not appearing on an assessment after purchase"}, {"text": "Customer identifies properties incorrectly listed under wrong ownership category (personal vs trust vs company) and calls to correct"}, {"text": "Customer calls local council first before realising land tax queries should go to SRO"}, {"text": "Customer queries assessment calculation or content; Customer queries property inclusion or exclusion"}, {"text": "Customer queries potential exemption eligibility"}, {"text": "Customer calls or emails the SRO or submits a query through My Land Tax or email"}, {"text": "Customer queries why they have received two assessments with their properties split across them, may indicate a duplicate customer record in eSys"}, {"text": "Customer does not understand the difference between a joint ownership assessment and an individual assessment"}, {"text": "Customer accepts explanation and proceeds to payment"}, {"text": "Customer accepts correction and proceeds to payment"}, {"text": "Customer is advised their request cannot be resolved today and will be processed by the assessing team"}, {"text": "Customer calls SRO to ask about government co-ownership schemes and whether they are eligible"}, {"text": "Customer calls to question assessment and is directed to make an objection via the website"}]}]}, "front": {"synopsis": "First-call resolution in Assisted Digital", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff answer inbound calls and emails about land tax"}, {"text": "Staff receive inbound call or email"}, {"text": "Staff verify customer identity and open Assisted Digital to view account"}, {"text": "Staff triage contact and attempt first call resolution where customer has available information"}, {"text": "Contact centre is unable to resolve query at first contact and creates an action item to send to the assessing team for further processing"}, {"text": "If no response is received the action item is closed and the assessment stands"}, {"text": "Where the matter can be resolved at first contact, staff either correct the error or process the exemption request in Assisted Digital during the call"}, {"text": "Staff address error where PPR was incorrectly assessed and reverse the charge"}, {"text": "Staff explain the eligibility criteria to the customer in plain language"}, {"text": "Staff explain assessment structure and calculations including joint ownership splits"}, {"text": "Where no amendment is required customer is advised assessment stands and directed to payment"}, {"text": "Where ownership error is corrected and no further action is required customer is directed to payment"}, {"text": "If customer cannot provide info or SRO needs additional info in writing the contact is forwarded to assessing; Call is completed and outcome is explained to the customer"}, {"text": "Staff use website to guide customer through self-service options"}, {"text": "Flagged as complex and team leader allocates to BTOs directly"}, {"text": "Contact centre is now largely self-sufficient and no longer requires back-office staff to take calls"}]}]}, "back": {"synopsis": "Translating requests into legislative terms", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff must interpret and translate every request before they can act, adding time and increasing the risk of misclassification"}, {"text": "Staff check the customer's account and property details in Assisted Digital to understand their circumstances"}, {"text": "Staff consult TaxNet or internal knowledge resources to confirm eligibility rules"}, {"text": "Staff check COI, LandData, and ATO records to verify customer claims and confirm ownership"}, {"text": "Staff review request and align to legislative framework - customer language is often misaligned to it"}, {"text": "Where eligibility is unclear or complex staff escalate to BTO for further assessment; BTO is allocated action item"}]}]}, "systems": {"synopsis": "Review in eSys; multi-system corrections", "groups": [{"title": "Canvas cards", "cards": [{"text": "Assessment review completed and outcome determined in eSys"}, {"text": "If further information is needed staff contact customer by email or phone (My Land Tax inbox if no attachment is required)"}, {"text": "Correcting an ownership error requires verification across multiple systems and several steps that cannot always be completed in a single interaction"}]}]}, "support": {"synopsis": "Valuation explanation BPMs", "groups": [{"title": "Canvas cards", "cards": [{"text": "Business Process Map outlines how staff explain the distinction between site value, capital improved value and net annual value to customers querying their valuation"}, {"text": "Business Process Map outlines how valuation data is explained to customers including the distinction between site value, capital improved value and net annual value"}]}]}, "pain": {"synopsis": "Keyword misrouting and translation burden", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-026", "text": "Inbound customer correspondence is auto-classified based on keyword matching rather than intent. A customer asking for a refund who uses the word trust generates a trust work item requiring specialist knowledge that was never needed, delaying resolution and creating frustration for both the customer and the staff member who receives it. Customers describe their situation in plain language that does not map to SRO terminology."}, {"id": "PP-027", "text": "Customers describe their situation in plain language that does not map to […] Staff must interpret and translate every request before they can act, adding time and increasing the risk of misclassification."}, {"id": "PP-028", "text": "Customers who want to query their land tax assessment frequently contact their local council first, not knowing that land tax is administered by the SRO. Customers who notice valuation inconsistencies between neighbouring properties face a dilemma, querying the lower value risks having it corrected upward. This leads customers to choose silence over transparency, undermining confidence in the valuation process."}, {"id": "PP-029", "text": "Customers who notice valuation inconsistencies between neighbouring properties face a dilemma, querying the lower value risks having it corrected upward. This leads customers to choose silence over transparency, undermining confidence in the valuation process. Correcting an ownership error requires verification across multiple systems and several steps that cannot always be completed in a single interaction."}, {"id": "PP-030", "text": "§H54§ §H55§ §H56§ §H57§ §H58§ §H59§ §H60§ The SRO and councils use different valuation date rules, meaning the land value on a council rates notice can differ from a land tax assessment. Customers who notice this believe their assessment is wrong, requiring staff to explain a legislative distinction that is difficult to communicate and erodes confidence."}, {"id": "PP-031", "text": "Ownership error correction requires multi-system …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-032", "text": "Address changes made in My Land Tax do not consistently flow through to eSys. Customers have no way of knowing the change has not taken effect, and staff may be acting on outdated information without realising it. My Land Tax correspondence comes from a no-reply address."}, {"id": "PP-033", "text": "MLT correspondence comes from a no-reply address …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-034", "text": "The removal of the Contact Us portal from the SRO website has left customers with no clear or accessible channel for general enquiries and notifications outside of My Land Tax."}, {"id": "PP-035", "text": "Correspondence submitted outside My Land Tax arrives unstructured in any format and volume. Correspondence submitted outside My Land Tax arrives unstructured in any format and volume. Staff must read everything and identify the request before processing can begin - significantly slower than structured My Land Tax submissions."}]}]}, "opp": {"synopsis": "Routing and explanation HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-028", "text": "How Might We make it clear to customers who administers land tax and how to contact them, so that customers can get to the right place without being redirected?"}, {"id": "HMW-029", "text": "How Might We ensure inbound correspondence is routed based on what a customer is actually asking for, so that the right person receives it first time?"}, {"id": "HMW-030", "text": "How Might We reduce the gap between how customers describe their needs and how the SRO processes them, so that staff spend less time interpreting and more time resolving?"}, {"id": "HMW-031", "text": "How Might We ensure customer-initiated changes in My Land Tax are immediately reflected across all systems, so that updating details once is enough?"}, {"id": "HMW-032", "text": "How Might We ensure customers always have a clear and reliable way to respond to SRO correspondence, so that a reply never disappears into a void?"}, {"id": "HMW-033", "text": "How Might We give customers a simple and accessible way to notify the SRO of changes to their circumstances, so that general enquiries and updates do not require a phone call?"}, {"id": "HMW-034", "text": "How Might We give customers a way to raise valuation concerns without fear of an adverse outcome, so that inconsistencies can be identified and resolved in a way that feels fair to everyone?"}, {"id": "HMW-035", "text": "How Might We help customers understand why their land tax valuation may differ from their council rates notice, so that a legitimate legislative difference is never mistaken for an error?"}, {"id": "HMW-036", "text": "How Might We enable ownership errors to be resolved in a single interaction, so that customers are not drawn into prolonged back and forth?"}]}]}, "quotes": {"synopsis": "Decoding customers; council confusion", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "“Things can get created as incorrect action items that relies on keywords. They might have used the word 'trust', so it got created as a trust work item but it's just asking for a refund. It could have been created as a refund item, and it would have been dealt with a lot quicker.” P2 Staff"}, {"text": "\"It used to be through the Contact Us page and now it's gone. So now it's email or just through phone calls.\" P7 Staff"}, {"text": "\" P5 Staff Customer notices that the assessment is for a property they do not own. \"If it had been classified correctly from the start, it could have been handled much faster and would not have needed the specialist knowledge required.\" P2 Staff"}, {"text": "\"This value that you've got on my assessment is not the right value, and they're technically right. The council rates notice is showing them something different, but that's because they don't have these rules around dates that we have for land tax. So then there's kind of complicated situations that come out of that.\" P7 Staff"}, {"text": "\"We open work items, then try to work out what the customer is actually asking. Customers usually write in using their own language, so staff have to decode the customer’s language into SRO language. That can mean action items get created incorrectly.” P2 Staff"}, {"text": "“A customer receives an assessment and responds - 'that’s not quite right. I don’t own that property anymore or that property is now in my super fund or in a trust' and it’s not registered yet.” P5 Staff"}, {"text": "\"There's actually a link broken in My Land Tax when they update it themselves in their details page - it doesn't flow through to eSys all of the time, some of the time, but not all of the time. And I can't tell you which times it works and which time it doesn't.\" P3 Staff"}, {"text": "\" P3 Staff “When customers submit a correspondence, it is automatically flagged... It could have been created as a refund item and been dealt with a lot quicker because it didn't need necessarily the specialised knowledge that a trust item does.” P2 Staff"}]}]}, "capability": {"synopsis": "7 capabilities · heaviest: Enquiry & Service Request Management", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-10", "text": "Enquiry & Service Request Management", "note": "Proposed · 3 PP / 2 HMW · P12.1"}, {"id": "LTX-VS-00", "text": "Customer Education & Guidance Content Management", "note": "Proposed · 2 PP / 2 HMW · no process linkage"}, {"id": "LTX-VS-07", "text": "Valuation Objection Coordination", "note": "Proposed · 1 PP / 1 HMW · P4.2"}, {"id": "LTX-VS-01", "text": "Ownership Transfer & Change Processing", "note": "Proposed · 1 PP / 1 HMW · P3.1, P13.3"}, {"id": "LTX-EN", "text": "Systems Integration & Data Synchronisation", "note": "Proposed · 1 PP / 1 HMW · T8"}, {"id": "LTX-VS-10", "text": "Correspondence & Document Exchange", "note": "Proposed · 1 PP / 1 HMW · P12.4"}, {"id": "LTX-VS-00", "text": "Channel Management", "note": "Proposed · 1 PP / 1 HMW · no process linkage"}]}]}, "process": {"synopsis": "6 processes · P12.1, P4.2 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P12.1", "text": "Enquiry Handling & First-Contact", "note": "3 PP / 2 HMW · via 1 capability"}, {"id": "P4.2", "text": "Valuation Objection Coordination &", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P3.1", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P13.3", "text": "Land Ownership Transfer", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "T8", "text": "Cross-System Change", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P12.4", "text": "Correspondence & Document", "note": "1 PP / 1 HMW · via 1 capability"}]}]}}, "s4": {"customer": {"synopsis": "Lodge, wait, chase — no visibility", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer calls and submits amendment or exemption request via phone contact with SRO"}, {"text": "Customer submits a letter or email requesting an amendment or exemption for a property"}, {"text": "Customer requests a 30-day extension of payment while waiting for an exemption outcome"}, {"text": "Customer manages their instalments while exemption request is still being assessed"}, {"text": "Customer receives an outcome that is not in their favour and writes a second letter with additional supporting information"}, {"text": "Customer receives a decision they disagree with but does not pursue further due to cost and complexity of obtaining required documentation"}, {"text": "Customer waits for amendment outcome with no clear timeline"}, {"text": "Customer calls to find out the progress or outcome"}, {"text": "Customer calls to check on progress of request"}, {"text": "Customer chases progress (no update received)"}, {"text": "Customer calls to follow up confusing correspondance or outcome"}, {"text": "Customer receives request for additional information"}, {"text": "Customer sends through additional information requested by staff"}, {"text": "Customer seeks advice from a family member or informal advisor to understand what additional evidence to provide"}, {"text": "Customer check progress status in My Submissions 3 times post submission and in advertently escalating the item"}, {"text": "Customer calls multiple times or is instant \"pushy\" when calling resulting in item being flagged as urgent"}, {"text": "Customer calls back before extension deadline to request a second extension when no decision has been received. Mitigation planned with introduction of notional tax figures in 2027"}, {"text": "Customer calls back multiple times because their matter has not progressed"}, {"text": "Customer contacts SRO to resolve confusion caused by lack of visibility into their case"}]}]}, "front": {"synopsis": "90-day advice and tray-status updates", "groups": [{"title": "Canvas cards", "cards": [{"text": "SRO receive request for amendment or exemption via phone or email"}, {"text": "SRO receive request for amendment or exemption via phone and processes the request via Assisted Digital"}, {"text": "Some staff advise customers that there is a 90 day timeframe for requests to be resolved and recommends they wait for this time to elapse before following up again"}, {"text": "Staff request additional information"}, {"text": "Staff receive call from customer following up on their amendment or exemption request"}, {"text": "Staff take call and check eSys to find which tray an item is in and provide customer an update"}, {"text": "Staff check progress and provide update"}, {"text": "Staff guide the customer to set up AutoPay while their exemption request is being reviewed"}, {"text": "Staff guide customer to set up AutoPay to avoid interest accruing while awaiting an exemption outcome"}, {"text": "Staff check whether exemption correspondence has been read before granting a second extension"}, {"text": "Staff review customer-provided information and undertake additional checks only if something appears incorrect"}, {"text": "Where a customer disagrees and makes repeat contact, staff advise them to lodge a formal objection"}, {"text": "Staff escalate items where customer has time-sensitive circumstances such as an upcoming settlement"}]}]}, "back": {"synopsis": "BTO trays, workarounds, TARB referrals", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff receive call or email regarding additional information requested; Correspondence from customer arrives after action item has been completed"}, {"text": "Staff opens item, identifies request type and works through assessment; Action item set to completed and leaves tray"}, {"text": "BTOs handle escalations and complex cases; BTO required to remember to print any letters from CM10 which must be manually printed"}, {"text": "Where refund is triggered staff create refund action item and request EFT details from customer"}, {"text": "Refund approval routed based on value: auto approval, team leader tray, or branch manager tray; Amendments removing PPR may require staff to process retroactively over multiple years"}, {"text": "Staff locate relevant action item in eSys and confirm current status"}, {"text": "Staff navigate action items, correspondence, account details and notes across separate systems with no integrated view"}, {"text": "Staff make a judgement call on how to record the interaction with no consistent rule to guide them"}, {"text": "Staff manually manage correspondence channel switching with no system support for relationship continuity"}, {"text": "Staff use and update spreadsheets for work items to track them more easily"}, {"text": "Staff use TaxNet to check current procedures when working on infrequent amendment types"}, {"text": "Staff update property and customer records in eSys; Staff check RTBA residential tenancy data to identify whether a property has been tenanted - if tenanted, PPR exemption may not apply or may apply only as a percentage"}, {"text": "Staff use satellite imagery to verify whether a property was occupied or vacant at the claimed date of residency"}, {"text": "Staff check driver's licence records, land title information, RTBA tenancy data and satellite imagery to verify customer's claimed PPR or ownership dates"}, {"text": "Staff finalise the outcome, re-issuing or withdrawing the assessment, updating the account in eSys, and advising the customer of the decision"}, {"text": "Team leader reviews and allocates the item to a BTO; Where BTO cannot resolve or the matter carries legal or legislative risk, BTO refers to TARB"}, {"text": "Staff identifies that a query or objection exceeds their authority or knowledge and flags it for BTO review"}, {"text": "Where a decision is made with BTO input staff record the BTO's staff number and date of advice against the action item"}, {"text": "Where dates or information appear inconsistent but do not prevent completion staff complete the item and raise an internal issue"}, {"text": "Staff identify the correct party to receive the PPR exemption following a separation based on who remained in the property"}, {"text": "Staff check family court orders where applicable to determine liability for outgoings on jointly held properties post-separation"}]}]}, "systems": {"synopsis": "eSys work items across CM10, Outlook, TaxNet", "groups": [{"title": "Canvas cards", "cards": [{"text": "eSys processes automated amendments and sends correspondence without staff involvement"}, {"text": "Incorrect action item type identified and rerouted in eSys; Urgent flag applied - either automatically aged, family and domestic violence flag, or manually highlighted"}, {"text": "Work item received: PPR exemption, duplicate customer, automatic data error, standard amendment, complex correspondence"}, {"text": "Completed action item in Assisted Digital for straightforward PPR or land ownership changes; Diverted to manual processing if business rules do not match known outcomes"}, {"text": "Items that fall outside the system's automation rules (e.g. dates beyond the retrospective period, trust structures) generate a manual action item rather than auto-completing"}, {"text": "eSys tray holds items until allocated and actioned; Non-issue flag applied in eSys to prevent new assessment issuing while amendment is in progress"}, {"text": "The volume of work item types in eSys makes accurate classification impractical in day to day work"}, {"text": "Inbound correspondence from customers submitted by post or email is received and scanned by mail room before appearing as an action item in eSys"}, {"text": "Request logged via Kofax, action item created and placed in general land tax work tray"}, {"text": "My Land Tax track requests function shows amendment status as in progress but with no timeline; Escalation path: CSO to BTO to TARB"}, {"text": "My Land Tax shows amendment status to customer as in progress until complete; Escalates automatically in eSys if customer clicks track requests three times in My Land Tax"}, {"text": "Land Tax updates visible in My Land Tax after processing"}, {"text": "Assisted Digital PPR questionnaire structures the customer's request by section of the Land Tax Act making it faster for staff to identify what is being requested and what evidence is needed"}, {"text": "My Land Tax correspondence inbox used to send further information requests where no attachment is needed; Outlook used where attachments are required or where staff judge it more likely to get a response; TaxNet used by staff for internal process guidance"}, {"text": "eSys used for all action item processing - staff must exit and re-enter the action item to make changes as notes cannot be added live alongside the screen"}, {"text": "CM10 used to store and retrieve customer correspondence and documents"}, {"text": "OneNote; Tax Net (Knowledge Management); MsTeams chat for information sharing; H drive; Sharepoint page"}, {"text": "Staff verify customer identity via chat bot (new release 2026)"}, {"text": "Customer Chat - After capturing the verified identity of customer, allows the agent to now provide tailored customer specific support and send links, assessment details etc"}, {"text": "Genesis Cloud used by team leaders to monitor call volumes and staff performance"}, {"text": "eSys contains a customisable work item distribution profile which may be used to manage how items are allocated across the team"}, {"text": "Staff use My Land Tax, eSys, CM10 and Outlook to check and update case status"}, {"text": "Staff check My Land Tax, eSys, CM10 and Outlook to piece together a complete picture of the customer's history"}, {"text": "Staff determine whether the contact requires an actionable work item, a general correspondence record in eSys, or no record at all"}, {"text": "Non-issue flag applied to prevent new assessment issuing while amendment is in progress; Items requiring information from customer are put in progress and may remain open for weeks or months before a response"}, {"text": "May be directed to create a My Land Tax account and apply for a PPR exemption online once they have access to supporting information such as building permit numbers"}]}]}, "support": {"synopsis": "DV team, TARB, QA, Investigations", "groups": [{"title": "Canvas cards", "cards": [{"text": "Specialist domestic violence team handles all cases flagged with family and domestic violence indicators"}, {"text": "TARB, legal advice and policy teams consulted on complex or legally ambiguous post-issue issues; QA process selects a sample of completed action items each month for review"}, {"text": "TARB consulted on technically complex or legally ambiguous cases; Deceased estates dealt with by assessors"}, {"text": "Investigations team receives internal reports (IRs) raised by staff where data is inconsistent or suspicious"}, {"text": "See Investigations Service Blueprint for further details on this journey"}, {"text": "Business Process Map outlines how concessions applicable to Land Tax are determined and applied"}, {"text": "Business Process Map outlines how amended assessments are reissued including the steps involved in clearing the non-issue flag and the two-week reissue cycle"}, {"text": "Business Process Map outlines how retrospective amendments covering multiple prior years are processed as a complete discrete process"}, {"text": "Business Process Map outlines how liability is recalculated mid-year following an amendment such as a PPR exemption being applie
