  h.innerText = stage.stage;

  const track = document.createElement("div");
  track.className = "track";

  stage.capabilities.forEach(cap => {
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.innerHTML = `<strong>${cap.title}</strong><div class="hint">Click for full detail</div>`;
    card.onclick = () => openPanel(stage.stage, cap);
    card.onkeypress = (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openPanel(stage.stage, cap);
      }
    };
    track.appendChild(card);
  });

  col.appendChild(h);
  col.appendChild(track);
  map.appendChild(col);
});

function openPanel(stageName, item){
  overlay.classList.add("open");
  panel.classList.add("open");
  titleEl.innerText = item.title;
  stageLabel.innerText = stageName;
  descEl.innerText = item.desc;

  painEl.innerHTML = "";
  if (item.pain && item.pain.length) {
    item.pain.forEach(x => {
      const li = document.createElement("li");
      li.innerText = x;
      painEl.appendChild(li);
    });
  } else {
    const li = document.createElement("li");
    li.innerText = "No pain points loaded.";
    painEl.appendChild(li);
  }

  evidenceEl.innerHTML = "";
  if (item.evidence && item.evidence.length) {
    item.evidence.forEach(x => {
      const li = document.createElement("li");
      li.innerText = x;
      evidenceEl.appendChild(li);
    });
  } else {
    const li = document.createElement("li");
    li.innerText = "No evidence loaded.";
    evidenceEl.appendChild(li);
  }
}

function closePanel(){
  overlay.classList.remove("open");
  panel.classList.remove("open");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePanel();
});

function exportCSV(){
  let rows = [];
  rows.push(["Stage", "Capability", "Description", "Pain Points", "Evidence"]);

  data.forEach(stage => {
    stage.capabilities.forEach(cap => {
      rows.push([
        stage.stage,
        cap.title,
        cap.desc,
        (cap.pain || []).join(" | "),
        (cap.evidence || []).join(" | ")
      ]);
    });
  });

  const csvContent = rows.map(row =>
    row.map(field => `"${String(field).replace(/"/g, '""')}"`).join(",")
  ).join("\\n");

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "investigation_capability_model.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function scrollToStart(){
  document.querySelector(".container").scrollTo({ left: 0, behavior: "smooth" });
}

function expandAll(){
  const firstAvailable = data
    .map(stage => ({ stage: stage.stage, cap: stage.capabilities[0] }))
    .filter(x => x.cap)[0];

  if (firstAvailable) {
    openPanel(firstAvailable.stage, firstAvailable.cap);
  }
}
</script>
