


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Insolvency Decision Wizard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { --blue:#1e3a8a; --blue-light:#dbeafe; --blue-mid:#3b82f6; --green:#16a34a; --green-light:#dcfce7; --red:#dc2626; --red-light:#fee2e2; --amber:#d97706; --amber-light:#fef3c7; --purple:#7c3aed; --purple-light:#ede9fe; --gray:#6b7280; --gray-light:#f3f4f6; --text:#0f172a; --text-mid:#475569; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Segoe UI,Arial,sans-serif; background:#f8fafc; color:var(--text); }
    header { background:linear-gradient(135deg,#0f2347,var(--blue)); padding:24px 32px; color:white; }
    header h1 { font-size:24px; font-weight:800; }
    header p { font-size:13px; opacity:0.8; margin-top:4px; }
    .container { max-width:700px; margin:0 auto; padding:24px 16px; }
    .progress { display:flex; gap:4px; margin-bottom:24px; }
    .progress-step { flex:1; height:6px; border-radius:3px; background:#e2e8f0; }
    .progress-step.done { background:var(--green); }
    .progress-step.now { background:var(--blue-mid); }
    .card { background:white; border-radius:12px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:16px; display:none; }
    .card.show { display:block; }
    .qlabel { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--blue-mid); margin-bottom:8px; }
    .qtitle { font-size:20px; font-weight:800; margin-bottom:16px; line-height:1.3; }
    .qcontext { font-size:14px; color:var(--text-mid); margin-bottom:20px; line-height:1.6; }
    .warn { background:var(--red-light); border-left:5px solid var(--red); padding:14px 18px; border-radius:0 8px 8px 0; margin-bottom:16px; font-size:13px; font-weight:600; color:#991b1b; }
    .opts { display:flex; flex-direction:column; gap:10px; }
    .opt { display:block; width:100%; padding:16px 18px; border:2px solid #e2e8f0; border-radius:10px; background:white; cursor:pointer; font-family:inherit; font-size:15px; font-weight:600; color:var(--text); text-align:left; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    .opt:active { border-color:var(--blue-mid); background:var(--blue-light); }
    .opt-sub { font-size:12px; color:var(--text-mid); font-weight:400; margin-top:4px; display:block; }
    .navrow { display:flex; gap:12px; margin-top:20px; }
    .nbtn { padding:14px 24px; border-radius:8px; border:none; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    .nbtn-back { background:var(--gray-light); color:var(--text-mid); }
    .nbtn-go { background:var(--blue); color:white; }
    .nbtn-restart { background:var(--green); color:white; }
    .out { padding:20px; border-radius:10px; margin-bottom:16px; }
    .out-green { background:var(--green-light); border-left:5px solid var(--green); }
    .out-amber { background:var(--amber-light); border-left:5px solid var(--amber); }
    .out-red { background:var(--red-light); border-left:5px solid var(--red); }
    .out-blue { background:var(--blue-light); border-left:5px solid var(--blue); }
    .out-purple { background:var(--purple-light); border-left:5px solid var(--purple); }
    .out h3 { font-size:16px; margin-bottom:8px; }
    .out p,.out li { font-size:13px; line-height:1.6; color:var(--text-mid); }
    .out ul { margin-left:18px; margin-top:6px; }
    .chk { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; background:var(--gray-light); border-radius:8px; font-size:13px; line-height:1.5; margin-bottom:8px; }
    .chk input { margin-top:3px; width:18px; height:18px; }
    .tracker { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:16px; display:none; }
    .tracker.show { display:block; }
    .tracker h3 { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--blue); }
    .trow { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
    .trow:last-child { border-bottom:none; }
    .exit-icon { font-size:48px; text-align:center; margin-bottom:16px; }
    .exit-title { font-size:20px; font-weight:800; margin-bottom:12px; text-align:center; }
    .exit-desc { font-size:14px; color:var(--text-mid); line-height:1.6; margin-bottom:20px; text-align:center; }
  </style>
</head>
<body>

<header>
  <h1>Insolvency Decision Wizard</h1>
  <p>Land Tax Insolvency Procedure - Step by step guided assessment | v3.0</p>
</header>

<div class="container">
  <div class="progress" id="prog"></div>
  <div id="wizard"></div>
  <div class="tracker" id="tracker"><h3>Case Summary</h3><div id="tdata"></div></div>
</div>

<script>
(function(){
  var S = {};
  var nav = [];
  var currentScreen = '';
  var STEPS = 7;

  // Build progress bar
  var progHtml = '';
  for(var i=0;i<STEPS;i++) progHtml += '<div class="progress-step" id="p'+i+'"></div>';
  document.getElementById('prog').innerHTML = progHtml;

  var screens = {

    q1: function(){
      return screen('Q1 - IP Correspondence','What revenue line does this IP request relate to?',
        'Check the IP correspondence. If documentation is older than 6 months, verify insolvency status via ASIC/VEDA before proceeding.',null,[
        btn('Land Tax only','Proceed with this wizard','q1_ltx'),
        btn('Payroll Tax only','Refer to PTX procedures','q1_ptx'),
        btn('Both LTX and PTX','Complete LTX here, then email ptx.capture@sro.vic.gov.au','q1_both'),
        btn('Not current or relevant','Correspondence is outdated or not related','q1_invalid')
      ],null);
    },

    q2: function(){
      return screen('Q2 - Customer Registration','Is the customer registered in e-Sys?',
        'Search using identifiers from IP correspondence. If not found: check IP correspondence for correct entity, ABN Lookup, ASIC search, then Equifax/VEDA search.',null,[
        btn('Yes - found in e-Sys','Customer record located','q2_yes'),
        btn('No - not found after all searches','ABN, ASIC, and Equifax/VEDA all checked','q2_no')
      ],'back');
    },

    q3a: function(){
      return screen('Q3 - Customer Status','Is the customer still insolvent?',
        'Check ASIC / VEDA. If customer is no longer bankrupt, in administration etc, they may no longer be insolvent.',null,[
        btn('Yes - still insolvent','Confirmed via system checks','q3a_yes'),
        btn('No - no longer insolvent','Cessation path required','q3a_no')
      ],'back');
    },

    q3b: function(){
      return screen('Q3 - Land Ownership','Does the customer currently own land?',
        'Check the Land Owner node (MC322). For trustees: check if the trust owns properties. Use ASIC/COI/LTO to verify.',
        'PRIVACY: Only release information directly related to the IP request. If IP-provided details conflict with e-Sys, send only relevant correspondence.',[
        btn('Yes - currently owns land','Property listed in MC322','q3b_yes'),
        btn('Was a landowner - no longer owns','Previously owned but land sold','q3b_was'),
        btn('Never a landowner','No property records found','q3b_never')
      ],'back');
    },

    q3c: function(){
      return screen('Q3 - Outstanding Debt','Does the customer have outstanding land tax debt?',
        'Check liabilities under Land Taxpayer node. Scroll to Net Liability column in the Assessment Year Liability Summary.',null,[
        btn('Yes - outstanding debt exists','Liability amounts showing in e-Sys','q3c_yes'),
        btn('No - no outstanding debt','All liabilities are zero or paid','q3c_no')
      ],'back');
    },

    q4: function(){
      return screen('Q4 - Appointment Type','What type of insolvency appointment applies?',
        'Check IP correspondence for appointment type. Verify against (IP) Managed Customer Node in e-Sys.',null,[
        btn('Receiver and Manager','Controls company undertaking/property','q4_receiver'),
        btn('Controller','Controls particular property for charge','q4_controller'),
        btn('Administrator','Manages business, restructures','q4_admin'),
        btn('Liquidator','Winds up company, distributes assets','q4_liquidator'),
        btn('Deed Administrator','Deed of Company Arrangement','q4_deed'),
        btn('Bankruptcy','Trustee manages bankrupt estate','q4_bankruptcy'),
        btn('Mortgagee of Possession','NOT an insolvency - property info only','q4_mortgagee')
      ],'back');
    },

    q5: function(){
      return screen('Q5 - Debt Timing','Is the debt pre-appointment, post-appointment, or both?',
        'Pre-appointment: liabilities payable as at midnight 31 December before appointment date (full year, not apportioned). Post-appointment: assessments on or after 31 December after appointment date.',
        'Ensure all assessments for pre and post-appointment debt have been issued before sending correspondence.',[
        btn('Pre-appointment debt only','','q5_pre'),
        btn('Post-appointment debt only','','q5_post'),
        btn('Both pre and post-appointment debt','','q5_both')
      ],'back');
    },

    q6: function(){
      var r = getCorrespondence();
      var h = '<div class="qlabel">Q6 - Correspondence Required</div>';
      h += '<div class="qtitle">'+r.title+'</div>';
      h += '<div class="out out-blue"><h3>Template: '+r.template+'</h3></div>';
      if(r.warnings.length){ r.warnings.forEach(function(w){ h+='<div class="warn">'+w+'</div>'; }); }
      h += '<div class="out out-amber"><h3>Actions Required</h3><ul>';
      r.actions.forEach(function(a){ h+='<li>'+a+'</li>'; });
      h += '</ul></div>';
      h += '<div class="out out-purple"><h3>Debt Classification</h3><ul>';
      if(S.debtTiming==='pre'||S.debtTiming==='both') h+='<li><strong>Pre-appointment:</strong> Liabilities payable as at 31 Dec before appointment. Full year, not apportioned. POD matches this amount.</li>';
      if(S.debtTiming==='post'||S.debtTiming==='both') h+='<li><strong>Post-appointment:</strong> Assessments on or after 31 Dec after appointment date.</li>';
      h += '</ul></div>';
      h += '<div class="navrow"><button class="nbtn nbtn-back" data-action="back">Back</button><button class="nbtn nbtn-go" data-action="goto_q7">Proceed to Checklist</button></div>';
      return h;
    },

    q7: function(){
      var checks = ['Name and Type of IP recorded','IP appointment and effective date recorded','Landowner / Debt status recorded','Pre/Post appointment debt breakdown noted','Refund details recorded (if any)','POD issued and attached (if applicable)','Assessments issued / reissued noted','LTX Charge Review created (if applicable)','Correspondence type sent recorded','Mailing protocols updated','Correspondence saved to TRIM/CM10','Enquiry tab date updated','Status set to COMPLETED'];
      var h = '<div class="qlabel">Q7 - Finalise Action Item</div>';
      h += '<div class="qtitle">Completion Checklist</div>';
      h += '<div class="qcontext">Edit the action item and record the following in the Reference tab before setting status to COMPLETED.</div>';
      checks.forEach(function(c){ h += '<label class="chk"><input type="checkbox"> '+c+'</label>'; });
      h += '<div class="navrow"><button class="nbtn nbtn-back" data-action="back">Back</button><button class="nbtn nbtn-restart" data-action="restart">Start New Case</button></div>';
      return h;
    },

    exitPTX: function(){
      return exitScreen('&#8594;','Refer to Payroll Tax Procedures','This IP request relates to Payroll Tax only. Refer to Initial Checks - Payroll Tax Node Instructions.');
    },

    exitInvalid: function(){
      return exitScreen('&#10006;','Correspondence Not Current or Relevant','Update and complete the action item. If IP documentation is older than 6 months, confirm insolvency status via ASIC/VEDA.');
    },

    exitNotReg: function(){
      var h = exitScreen('&#9993;','Issue Clearance Correspondence','Customer not found after all searches (e-Sys, ABN, ASIC, Equifax/VEDA).');
      h += '<div class="out out-blue"><h3>Template: LTX - NOT REGISTERED IN E-SYS - CLEARANCE CORRESPONDENCE</h3><ul><li>Customer is not registered in E-Sys</li><li>Customer does not own land</li><li>Customer has no LTX liability/debt</li><li>Covers LTX and PTX clearance information</li></ul><p style="margin-top:8px;">Save to CM10 folder VF/24/41 using naming convention.</p></div>';
      h += '<div class="navrow" style="justify-content:center"><button class="nbtn nbtn-restart" data-action="restart">Start Over</button></div>';
      return h;
    },

    exitNotInsolvent: function(){
      var h = exitScreen('&#8635;','Customer No Longer Insolvent','Complete the following cessation steps:');
      h += '<div class="out out-amber"><h3>Cessation Actions</h3><ul><li>Add Cessation Date to IP appointment</li><li>Remove IP names from Customer name (e.g. Bankrupt Estate)</li><li>Revert mailing protocols to original address/contacts</li><li>Check ASIC for most recent address</li><li>Complete action item advising of outcome</li><li>Send correspondence to IP if relevant</li></ul></div>';
      h += '<div class="navrow" style="justify-content:center"><button class="nbtn nbtn-restart" data-action="restart">Start Over</button></div>';
      return h;
    },

    exitMortgagee: function(){
      var h = exitScreen('&#9888;','Mortgagee of Possession - Not an Insolvency','IP is acting on behalf of the Mortgagee. Do NOT add IP to customer. Only release information about the specific property referenced. Do not release broader customer information.');
      h += '<div class="navrow" style="justify-content:center"><button class="nbtn nbtn-restart" data-action="restart">Start Over</button></div>';
      return h;
    },

    exitNoLandNoDebt: function(){
      var tmpl = S.ownsLand==='was' ? 'WAS A LANDOWNER / HAS NO DEBT' : 'LANDOWNER / NO DEBT';
      var h = exitScreen('&#9993;','Clearance - No Land Ownership, No Debt','');
      h += '<div class="out out-green"><h3>Template: CUSTOMER REGISTERED - '+tmpl+'</h3><ul><li>Customer is registered in E-Sys</li><li>Customer '+(S.ownsLand==='was'?'no longer owns':'does not own')+' land</li><li>Customer has no LTX liability/debt</li></ul></div>';
      h += '<div class="navrow"><button class="nbtn nbtn-back" data-action="back">Back</button><button class="nbtn nbtn-go" data-action="goto_q7">Proceed to Checklist</button></div>';
      return h;
    },

    exitLandNoDebt: function(){
      var h = exitScreen('&#9993;','Clearance - Landowner, No Debt','');
      h += '<div class="out out-green"><h3>Template: CUSTOMER REGISTERED - LANDOWNER / NO DEBT</h3><ul><li>Customer is registered in E-Sys</li><li>Customer does own land</li><li>Customer has no LTX liability/debt</li></ul></div>';
      h += '<div class="out out-amber"><h3>Also check: LTX Charge</h3><p>Check Recovery Node PropChg box. If not ticked, create LTX CHARGE REVIEW REQUIRED action item.</p></div>';
      h += '<div class="navrow"><button class="nbtn nbtn-back" data-action="back">Back</button><button class="nbtn nbtn-go" data-action="goto_q7">Proceed to Checklist</button></div>';
      return h;
    }
  };

  function btn(label,sub,action){
    var subHtml = sub ? '<span class="opt-sub">'+sub+'</span>' : '';
    return '<button class="opt" data-action="'+action+'">'+label+subHtml+'</button>';
  }

  function screen(qlabel,title,context,warning,buttons,navType){
    var h = '<div class="qlabel">'+qlabel+'</div>';
    h += '<div class="qtitle">'+title+'</div>';
    if(context) h += '<div class="qcontext">'+context+'</div>';
    if(warning) h += '<div class="warn">'+warning+'</div>';
    h += '<div class="opts">'+buttons.join('')+'</div>';
    if(navType==='back') h += '<div class="navrow"><button class="nbtn nbtn-back" data-action="back">Back</button></div>';
    return h;
  }

  function exitScreen(icon,title,desc){
    return '<div class="exit-icon">'+icon+'</div><div class="exit-title">'+title+'</div>'+(desc?'<div class="exit-desc">'+desc+'</div>':'');
  }

  function getCorrespondence(){
    var ownsLand = S.ownsLand==='yes';
    var wasOwner = S.ownsLand==='was';
    var isBankrupt = S.isBankrupt;
    var timing = S.debtTiming;
    var r = {title:'',template:'',actions:[],warnings:[]};

    if(ownsLand && !isBankrupt){
      if(timing==='pre') r.template='CUSTOMER REGISTERED - LANDOWNER WITH PRE-APPOINTMENT DEBT ONLY';
      else if(timing==='post') r.template='CUSTOMER REGISTERED - LANDOWNER WITH POST-APPOINTMENT DEBT ONLY';
      else r.template='CUSTOMER REGISTERED - LANDOWNER WITH POST-APPOINTMENT AND PRE-APPOINTMENT DEBT';
      r.title='Issue Debt Letter (SRO is Secured Creditor)';
      r.actions.push('Issue debt letter advising of liability at appointment date');
      r.actions.push('Advise IP to request clearance certificate via LTX Express');
      r.actions.push('Create LTX Charge on Title');
      r.actions.push('Check Recovery Node PropChg box - if not ticked, create LTX CHARGE REVIEW REQUIRED action item');
      r.warnings.push('Do NOT issue Proof of Debt - SRO is a secured creditor while land is owned');
    } else if(ownsLand && isBankrupt){
      r.template='CUSTOMER REGISTERED - BANKRUPT ESTATE - LANDOWNER / HAS DEBT - PROOF OF DEBT';
      r.title='Bankrupt Estate - Landowner with Debt';
      r.actions.push('Create LTX Charge action item');
      r.actions.push('Create Proof of Debt (Bankruptcy Estate POD - Individual)');
      r.actions.push('Attach POD to correspondence');
      r.actions.push('Check Recovery Node PropChg box');
      r.actions.push('Update customer name with (Bankrupt Estate) beside surname');
    } else if(wasOwner && !isBankrupt){
      r.template='CUSTOMER REGISTERED - NO LONGER OWNS LAND / BUT HAS DEBT - PROOF OF DEBT';
      r.title='Issue Proof of Debt (Land Sold, Debt Outstanding)';
      r.actions.push('Create Proof of Debt - General POD (Company/Trusts) or as appropriate');
      r.actions.push('Attach POD to correspondence');
      r.actions.push('For joint ownership: POD issued under joint owner showing all owners');
      r.actions.push('If bankrupt person also has individual account debt, complete additional POD');
    } else if(wasOwner && isBankrupt){
      r.template='CUSTOMER REGISTERED - BANKRUPT ESTATE - WAS A LANDOWNER / HAS DEBT - PROOF OF DEBT';
      r.title='Bankrupt Estate - Was Landowner, Has Debt';
      r.actions.push('Create Proof of Debt (Bankruptcy Estate POD - Individual)');
      r.actions.push('Attach POD to correspondence');
      r.actions.push('Update customer name with (Bankrupt Estate) beside surname');
    } else {
      r.template='CUSTOMER REGISTERED - NO LONGER OWNS LAND / BUT HAS DEBT - PROOF OF DEBT';
      r.title='Issue Proof of Debt';
      r.actions.push('Create Proof of Debt');
      r.actions.push('Attach POD to correspondence');
    }
    r.actions.push('Update mailing protocols (Line 1: Entity + Appointment, Line 2: C/- IP Name, Line 3: ATTN: IP person)');
    r.actions.push('Save correspondence to TRIM/CM10');
    return r;
  }

  function show(id){
    nav.push(currentScreen);
    currentScreen = id;
    var wiz = document.getElementById('wizard');
    wiz.innerHTML = '<div class="card show">'+screens[id]()+'</div>';
    updateProg(id);
    updateTracker();
    window.scrollTo(0,0);
  }

  function goBack(){
    if(nav.length){
      var prev = nav.pop();
      currentScreen = prev;
      var wiz = document.getElementById('wizard');
      wiz.innerHTML = '<div class="card show">'+screens[prev]()+'</div>';
      updateProg(prev);
      updateTracker();
      window.scrollTo(0,0);
    }
  }

  function updateProg(id){
    var map = {q1:0,q2:1,q3a:2,q3b:2,q3c:2,q4:3,q5:4,q6:5,q7:6};
    var step = map[id];
    if(step===undefined) step = -1;
    for(var i=0;i<STEPS;i++){
      var el = document.getElementById('p'+i);
      el.className = 'progress-step';
      if(i<step) el.className += ' done';
      else if(i===step) el.className += ' now';
    }
  }

  function updateTracker(){
    var t = document.getElementById('tracker');
    var d = document.getElementById('tdata');
    var h = '';
    var any = false;
    function row(l,v){ h+='<div class="trow"><span>'+l+'</span><strong>'+v+'</strong></div>'; any=true; }
    if(S.revenue) row('Revenue',{ltx:'Land Tax',ptx:'Payroll Tax',both:'LTX + PTX',invalid:'Not current'}[S.revenue]);
    if(S.registered) row('Registered',S.registered==='yes'?'Yes':'No');
    if(S.insolvent) row('Still insolvent',S.insolvent==='yes'?'Yes':'No');
    if(S.ownsLand) row('Owns land',{yes:'Yes - current',was:'Was owner',never:'Never'}[S.ownsLand]);
    if(S.hasDebt) row('Has debt',S.hasDebt==='yes'?'Yes':'No');
    if(S.appointType) row('Appointment',{receiver:'Receiver/Manager',controller:'Controller',admin:'Administrator',liquidator:'Liquidator',deed:'Deed Admin',bankruptcy:'Bankruptcy',mortgagee:'Mortgagee'}[S.appointType]);
    if(S.isBankrupt!==undefined) row('Bankrupt estate',S.isBankrupt?'Yes':'No');
    if(S.debtTiming) row('Debt timing',{pre:'Pre-appointment',post:'Post-appointment',both:'Pre + Post'}[S.debtTiming]);
    d.innerHTML = h;
    t.className = any ? 'tracker show' : 'tracker';
  }

  // Single event listener - handles all clicks
  document.addEventListener('click', function(e){
    var target = e.target.closest('[data-action]');
    if(!target) return;
    var action = target.getAttribute('data-action');

    if(action==='back') return goBack();
    if(action==='restart'){ S={}; nav=[]; currentScreen=''; show('q1'); return; }
    if(action.indexOf('goto_')===0){ show(action.replace('goto_','')); return; }

    // Q1
    if(action==='q1_ltx'){ S.revenue='ltx'; show('q2'); }
    else if(action==='q1_ptx'){ S.revenue='ptx'; show('exitPTX'); }
    else if(action==='q1_both'){ S.revenue='both'; show('q2'); }
    else if(action==='q1_invalid'){ S.revenue='invalid'; show('exitInvalid'); }
    // Q2
    else if(action==='q2_yes'){ S.registered='yes'; show('q3a'); }
    else if(action==='q2_no'){ S.registered='no'; show('exitNotReg'); }
    // Q3a
    else if(action==='q3a_yes'){ S.insolvent='yes'; show('q3b'); }
    else if(action==='q3a_no'){ S.insolvent='no'; show('exitNotInsolvent'); }
    // Q3b
    else if(action==='q3b_yes'){ S.ownsLand='yes'; show('q3c'); }
    else if(action==='q3b_was'){ S.ownsLand='was'; show('q3c'); }
    else if(action==='q3b_never'){ S.ownsLand='never'; show('q3c'); }
    // Q3c
    else if(action==='q3c_yes'){
      S.hasDebt='yes';
      show('q4');
    }
    else if(action==='q3c_no'){
      S.hasDebt='no';
      if(S.ownsLand==='yes') show('exitLandNoDebt');
      else show('exitNoLandNoDebt');
    }
    // Q4
    else if(action==='q4_mortgagee'){ S.appointType='mortgagee'; show('exitMortgagee'); }
    else if(action==='q4_bankruptcy'){ S.appointType='bankruptcy'; S.isBankrupt=true; show('q5'); }
    else if(action.indexOf('q4_')===0){ S.appointType=action.replace('q4_',''); S.isBankrupt=false; show('q5'); }
    // Q5
    else if(action==='q5_pre'){ S.debtTiming='pre'; show('q6'); }
    else if(action==='q5_post'){ S.debtTiming='post'; show('q6'); }
    else if(action==='q5_both'){ S.debtTiming='both'; show('q6'); }
  });

  // Start
  show('q1');

})();
</script>

</body>
</html>
