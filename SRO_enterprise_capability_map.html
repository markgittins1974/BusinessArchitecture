<title>SRO One Page Capability View</title>

<style>
body { margin:0; font-family:Arial; background:#f7f9fc; }

/* ✅ HEADER */
.header{
  background:#0c2d63;
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.header-left h1{
  margin:0 0 6px 0;
  font-size:26px;
}

.header-meta{
  font-size:13px;
  line-height:1.5;
  opacity:0.9;
}

.header-buttons{
  display:flex;
  flex-direction:column;
  gap:10px;


}

.btn{
  background:#ffffff;
  color:#0c2d63;
  border:none;
  padding:12px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  width:auto;
  text-align:left;
  min-width:180px;
}

.btn.secondary{
  background:#dde6f6;
}

/* GRID */


.container{
  display:grid;
  grid-template-columns:repeat(5, minmax(0, 1fr));
  gap:16px;
  padding:16px;
  align-items:start;
  grid-auto-rows:min-content;  /* ✅ THIS IS THE KEY FIX */
  min-width:1200px;
}



/* CARD */


.card{
  background:#f3f6fb;
  border:1px solid #d6dbe6;
  border-radius:12px;

  padding:14px;

  display:flex;
  flex-direction:column;

  align-items:stretch;       /* ✅ ensures children fill properly */
  

  box-shadow:0 2px 5px rgba(0,0,0,0.04);
}





.card h2{
  font-size:14px;
  font-weight:700;
  margin-bottom:10px;

  border-bottom:1px solid #e6eaf0;
  padding-bottom:6px;
}



/* MULTI COLUMN */




.l2-list{ 
 display:grid; 
 grid-template-columns:repeat(2, minmax(0, 1fr));  /* ✅ fix */
 gap:10px;
 align-content:start;   /* ✅ prevents stretch/overflow */
}





.l2-column{
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
}

/* TILE */

.l2{
  background:#ffffff;
  border:1px solid #d6dbe6;
  border-radius:10px;
  width:100%;  
  min-width:0;                /* ✅ CRITICAL FIX */
  max-width:none;
  padding:12px;
  justify-content:start;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  box-sizing:border-box; /* ✅ prevents overflow */
  min-height:60px;
  word-break:break-word;      /* ✅ prevents text overflow */

  transition:all 0.15s ease;
}




.l2:hover{
  border-color:#2f6cc9;
  background:#f4f8ff;
  transform:translateY(-2px);
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}


/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.overlay.active{ display:flex; }

.panel{
  background:#fff;
  padding:20px;
  width:900px;
  max-height:80vh;
  overflow:auto;
  border-radius:10px;
}

/* ✅ PRINT MODE - capability map */
.print-mode .container{
  display:grid;
  grid-template-columns:repeat(8, 1fr);
  gap:12px;
}

.print-mode .card{
  background:#ffffff;
  border:1px solid #bbb;
  box-shadow:none;
  padding:8px;
}

.print-mode .card h2{
  font-size:12px;
  margin-bottom:6px;
}

.print-mode .l2-list{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:6px;
}


.print-mode .l2{
  font-size:10px;
  padding:8px 10px;
  min-height:50px;
}


/* ✅ hide popup */
.print-mode .overlay{
  display:none !important;
}

/* ✅ PRINT EXPORT CLEAN */
@media print {

  .header, .btn {
    display:none !important;
  }

  body{
    background:#fff;
  }

  .container{
    padding:0;
  }
}


@media print {

  @page {
    size: A3 landscape;
    margin: 8mm;
  }

  body{
    zoom: 1; /* ✅ prevent browser shrink */
    background:#fff;
  }

  .header, .btn{
    display:none !important;
  }

  
.container{
  display:flex;
  gap:16px;
  padding:16px;
  flex:1;
}


  .card{
    border:1px solid #bbb;
    box-shadow:none;
    padding:10px;
    break-inside:avoid;
    overflow:hidden;   /* ✅ prevents visual bleed */
  }

  .card h2{
    font-size:13px;
    margin-bottom:4px;
  }

  .l2-list{
    display:grid;
    grid-template-columns:repeat(2, 1fr); /* ✅ wider tiles */
    gap:8px;
  }

  .l2{
    font-size:10px;
    padding:8px;
    min-height:45px;
  }

}


@media print {
  .card {
    page-break-inside: avoid;
    break-inside: avoid;
  }
}
/* ✅ L1 ONLY MODE */
.l1-only .l2-list{
  display:none;
}

.l1-only .card{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:120px;

.l1-only .card h2{

/* ✅ L2 ICON STRUCTURE */
.l2-header{
  display:flex;
  align-items:flex-start;
  gap:6px;
  margin-bottom:6px;
}

.l2-icon{

  margin-top:2px;
}

.l2-title{

  line-height:1.2;
}

.l2-meta{
  font-size:10px;
  color:#6b7280;
}

.button-bar{
  display:flex;               /* ✅ horizontal */
  gap:12px;                  /* spacing between buttons */
  padding:12px 16px;
  background:#eef2f8;        /* subtle contrast row */
  border-bottom:1px solid #d6dbe6;
}

</style>

/* ✅ EXPORT CSV */
function exportCSV(){
  let rows = [["L1","L2","L3","Description"]];

  model.forEach(g=>{
    g.l2.forEach(cap=>{
      (cap.l3 || []).forEach(x=>{
        rows.push([g.l1, cap.name, x.name, x.description]);
      });
    });
  });

  let csv = rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");

  let blob = new Blob([csv], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "Capability_Model.csv";
  a.click();
}

/* ✅ RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  model.forEach(group => {
    const card = document.createElement("div");
    card.className = "card";

    const h = document.createElement("h2");
    h.innerText = group.l1;
    card.appendChild(h);

    const wrapper = document.createElement("div");
    wrapper.className = "l2-list";

    // ✅ CORRECT LOOP
    group.l2.forEach(cap => {
      const btn = document.createElement("div");
      btn.className = "l2";

      btn.innerHTML = ` 
        <div class="l2-header"> 
          <span class="l2-icon">📦</span> 
          <span class="l2-title">${cap.name}</span> 
        </div> 
        <div class="l2-meta"> 
          ${(cap.l3?.length || 0)} capabilities 
        </div> 
      `;

      btn.onclick = () => openPanel(group.l1, cap);

      wrapper.appendChild(btn);  // ✅ direct into grid
    });

    // ✅ THESE MUST BE AFTER THE LOOP
    card.appendChild(wrapper);
    grid.appendChild(card);
  });
}

/* ✅ PANEL */
function openPanel(l1, cap){
  document.getElementById("overlay").classList.add("active");
  document.getElementById("title").innerText = l1 + " > " + cap.name;

  const wrap = document.getElementById("l3");
  wrap.innerHTML="";

cap.l3.forEach(x=>{
  const d = document.createElement("div");

  d.style.marginBottom = "18px";
  d.style.padding = "10px";
  d.style.background = "#f9fbff";
  d.style.border = "1px solid #e3e8f2";
  d.style.borderRadius = "8px";

  d.innerHTML = `
    <div style="font-weight:700;margin-bottom:4px;">
      ${x.name}
    </div>
    <div style="font-size:13px;color:#374151;">
      ${x.description}
    </div>
  `;

  wrap.appendChild(d);
});
}

function closePanel(){
  document.getElementById("overlay").classList.remove("active");
}
