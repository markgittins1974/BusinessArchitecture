<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Tax Value Stream Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        body.fullscreen {
            padding: 0;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        body.fullscreen .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .header {
            margin-bottom: 40px;
            border-bottom: 2px solid #4a90e2;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.fullscreen .header {
            margin-bottom: 20px;
            padding: 20px;
            padding-bottom: 15px;
        }

        .header-content {
            flex: 1;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: #ffffff;
        }

        body.fullscreen .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .fullscreen-btn {
            padding: 8px 16px;
            background: #4a90e2;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #5aa0ff;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
        }

        .map-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            background: #0f1220;
            border: 1px solid #2a3550;
            border-radius: 4px;
            padding: 20px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            height: auto;
            min-height: 240px;
        }

        body.fullscreen .map-wrapper {
            flex: 1;
            margin: 0 20px;
            border-radius: 0;
            box-shadow: none;
            padding: 20px 16px;
        }

        .value-stream {
            display: flex;
            gap: 12px;
            min-width: min-content;
            position: relative;
            align-items: flex-start;
        }

        .stage {
            flex: 1;
            min-width: 0;
            background: linear-gradient(135deg, #1a2340 0%, #0f1628 100%);
            border: 1px solid #3a5a9f;
            border-radius: 4px;
            padding: 12px;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        .stage:hover {
            background: linear-gradient(135deg, #243050 0%, #1a2333 100%);
            border-color: #5a8fff;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.2);
        }

        .stage-header {
            margin-bottom: 12px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .stage-header-content {
            flex: 1;
        }

        .stage-id {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a90e2;
            margin-bottom: 6px;
        }

        .stage-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            word-break: break-word;
            line-height: 1.3;
        }

        .capabilities-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .capability-card {
            background: linear-gradient(135deg, #162850 0%, #0d1a30 100%);
            border: 1px solid #2a4570;
            border-radius: 3px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
            color: #e0e0e0;
            position: relative;
            flex-shrink: 0;
        }

        .capability-card:hover {
            background: linear-gradient(135deg, #1a3060 0%, #132140 100%);
            border-color: #4a90e2;
            box-shadow: 0 0 12px rgba(74, 144, 226, 0.2);
        }

        .capability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .capability-name {
            flex: 1;
            word-break: break-word;
            line-height: 1.3;
        }

        .capability-toggle {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            background: #2a4570;
            border: 1px solid #4a90e2;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a90e2;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .capability-card:hover .capability-toggle {
            background: #3a5a9f;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.3);
        }

        /* Detail Panel */
        .detail-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 350px;
            height: 100vh;
            background: linear-gradient(135deg, #1a2340 0%, #0f1628 100%);
            border-left: 2px solid #4a90e2;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .detail-panel.open {
            display: flex;
            transform: translateX(0);
        }

        .panel-header {
            padding: 24px 20px;
            border-bottom: 2px solid #4a90e2;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .panel-header-content {
            flex: 1;
        }

        .panel-stage-id {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a90e2;
            margin-bottom: 6px;
        }

        .panel-capability-name {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            word-break: break-word;
            line-height: 1.3;
        }

        .panel-close-btn {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            background: #2a3550;
            border: 1px solid #4a90e2;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a90e2;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .panel-close-btn:hover {
            background: #3a5a9f;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a90e2;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .panel-section-content {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.6;
            word-break: break-word;
        }

        .panel-metadata {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 12px;
        }

        .panel-meta-item {
            background: #0f1628;
            border: 1px solid #2a4570;
            border-radius: 3px;
            padding: 10px;
        }

        .panel-meta-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a9a;
            margin-bottom: 4px;
        }

        .panel-meta-value {
            color: #e0e0e0;
            font-weight: 500;
        }

        /* Stage colors */
        .stage:nth-child(1) .stage-id { color: #e24a4a; }
        .stage:nth-child(2) .stage-id { color: #e2a04a; }
        .stage:nth-child(3) .stage-id { color: #c4e24a; }
        .stage:nth-child(4) .stage-id { color: #4ae290; }
        .stage:nth-child(5) .stage-id { color: #4ae2d2; }
        .stage:nth-child(6) .stage-id { color: #4a9ae2; }
        .stage:nth-child(7) .stage-id { color: #704ae2; }
        .stage:nth-child(8) .stage-id { color: #d24ae2; }
        .stage:nth-child(9) .stage-id { color: #e24ab6; }

        .controls {
            margin-top: 30px;
            padding: 20px;
            background: #0f1220;
            border: 1px solid #2a3550;
            border-radius: 4px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        body.fullscreen .controls {
            margin: 20px 20px 20px 20px;
            border-radius: 0;
        }

        .controls button {
            padding: 8px 20px;
            background: #4a90e2;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .controls button:hover {
            background: #5aa0ff;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
        }

        .controls span {
            color: #6a7a9a;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .stage {
                flex: 0 0 160px;
                padding: 16px;
                min-height: 280px;
            }

            .stage-name {
                font-size: 14px;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>LAND TAX VALUE STREAM MAP</h1>
                <p>Value Streams Mapped to Capabilities</p>
            </div>
            <div class="header-controls">
                <button class="fullscreen-btn" onclick="toggleFullscreen()">Maximize</button>
            </div>
        </div>

        <div class="map-wrapper">
            <div class="value-stream" id="valueStream">
                <!-- Stages will be populated here -->
            </div>
        </div>

        <div class="controls">
            <button onclick="loadCSVData()">Load CSV</button>
            <span>File: land-tax-map.csv (auto-detects GitHub or Azure)</span>
        </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="panel-header">
            <div class="panel-header-content">
                <div class="panel-stage-id" id="panelStageId"></div>
                <div class="panel-capability-name" id="panelCapabilityName"></div>
            </div>
            <div class="panel-close-btn" onclick="closeDetailPanel()">×</div>
        </div>
        <div class="panel-content" id="panelContent">
            <!-- Content populated on click -->
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            const body = document.body;
            const btn = document.querySelector('.fullscreen-btn');
            body.classList.toggle('fullscreen');
            btn.textContent = body.classList.contains('fullscreen') ? 'Exit' : 'Maximize';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadCSVData() {
            const currentHost = window.location.hostname;
            let csvUrl;

            if (currentHost.endsWith('github.io')) {
                csvUrl = 'https://raw.githubusercontent.com/markgittins1974/BusinessArchitecture/main/land-tax-map.csv';
            } else if (currentHost.includes('azure') || currentHost.includes('z13.web.core.windows.net')) {
                csvUrl = '/land-tax-map.csv';
            } else {
                csvUrl = '/land-tax-map.csv';
            }

            console.log(`Loading CSV from: ${csvUrl}`);

            fetch(csvUrl)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}: CSV not found`);
                    return r.text();
                })
                .then(csv => {
                    const records = parseCSV(csv);
                    
                    if (records.length === 0) {
                        alert('No data found in CSV');
                        return;
                    }

                    // Group capabilities by value stream
                    const stagesMap = {};
                    records.forEach(rec => {
                        const stageId = rec.value_stream_id;
                        
                        if (!stagesMap[stageId]) {
                            stagesMap[stageId] = {
                                id: stageId,
                                name: rec.value_stream_name,
                                capabilities: []
                            };
                        }
                        
                        stagesMap[stageId].capabilities.push({
                            id: rec.capability_id,
                            name: rec.capability_name,
                            description: rec.capability_description || '',
                            maturityLevel: rec.maturity_level || 'TBD',
                            owner: rec.owner || 'TBD',
                            priority: rec.priority || 'Medium'
                        });
                    });

                    const stages = Object.values(stagesMap);
                    console.log(`Loaded ${stages.length} value streams with ${records.length} total capabilities`);
                    renderStages(stages);
                })
                .catch(error => {
                    console.error('Error loading CSV:', error);
                    alert(`Failed to load CSV: ${error.message}`);
                });
        }

        function parseCSV(csv) {
            const lines = csv.trim().split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];

            const headers = parseCSVLine(lines[0]).map(h => h.trim());
            const records = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const record = {};
                
                headers.forEach((h, idx) => {
                    record[h] = (values[idx] ?? '').trim();
                });
                
                records.push(record);
            }

            return records;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }

            result.push(current);
            return result;
        }

        function renderStages(stages) {
            const container = document.getElementById('valueStream');
            container.innerHTML = '';

            stages.forEach((stage, idx) => {
                const stageDiv = document.createElement('div');
                stageDiv.className = 'stage';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'stage-header';
                headerDiv.innerHTML = `
                    <div class="stage-header-content">
                        <div class="stage-id">${escapeHtml(stage.id)}</div>
                        <div class="stage-name">${escapeHtml(stage.name)}</div>
                    </div>
                `;
                stageDiv.appendChild(headerDiv);

                const capContainer = document.createElement('div');
                capContainer.className = 'capabilities-container';

                stage.capabilities.forEach(cap => {
                    const capCard = document.createElement('div');
                    capCard.className = 'capability-card';
                    capCard.innerHTML = `
                        <div class="capability-header">
                            <div class="capability-name">${escapeHtml(cap.name)}</div>
                            <div class="capability-toggle">+</div>
                        </div>
                    `;

                    capCard.addEventListener('click', () => {
                        openDetailPanel(stage, cap);
                    });

                    capContainer.appendChild(capCard);
                });

                stageDiv.appendChild(capContainer);
                container.appendChild(stageDiv);
            });
        }

        function openDetailPanel(stage, capability) {
            document.getElementById('panelStageId').textContent = escapeHtml(stage.id);
            document.getElementById('panelCapabilityName').textContent = escapeHtml(capability.name);

            const panelContent = document.getElementById('panelContent');
            let html = `
                <div class="panel-section">
                    <div class="panel-section-title">Description</div>
                    <div class="panel-section-content">${escapeHtml(capability.description)}</div>
                </div>
                
                <div class="panel-section">
                    <div class="panel-section-title">Details</div>
                    <div class="panel-metadata">
                        <div class="panel-meta-item">
                            <div class="panel-meta-label">Maturity Level</div>
                            <div class="panel-meta-value">${escapeHtml(capability.maturityLevel)}</div>
                        </div>
                        <div class="panel-meta-item">
                            <div class="panel-meta-label">Owner</div>
                            <div class="panel-meta-value">${escapeHtml(capability.owner)}</div>
                        </div>
                        <div class="panel-meta-item">
                            <div class="panel-meta-label">Priority</div>
                            <div class="panel-meta-value">${escapeHtml(capability.priority)}</div>
                        </div>
                        <div class="panel-meta-item">
                            <div class="panel-meta-label">Capability ID</div>
                            <div class="panel-meta-value">${escapeHtml(capability.id)}</div>
                        </div>
                    </div>
                </div>
            `;

            panelContent.innerHTML = html;
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetailPanel() {
            document.getElementById('detailPanel').classList.remove('open');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetailPanel();
        });

        // Auto-load on page load
        document.addEventListener('DOMContentLoaded', loadCSVData);
    </script>
</body>
</html>
