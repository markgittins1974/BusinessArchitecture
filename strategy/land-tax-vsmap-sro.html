<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Tax Value Stream Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'IBM Plex Mono','Courier New',monospace;
    background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);
    color:#e0e0e0;
    padding:40px 20px;
    min-height:100vh
}
body.fullscreen{padding:0}
.container{max-width:100%;margin:0 auto}
body.fullscreen .container{height:100vh;display:flex;flex-direction:column}
.header{
    margin-bottom:40px;
    border-bottom:2px solid #4a90e2;
    padding-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center
}
body.fullscreen .header{margin-bottom:20px;padding:20px;padding-bottom:15px}
.header h1{font-size:28px;color:#fff;margin-bottom:8px}
.header p{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#a0a0a0
}
.fullscreen-btn{
    padding:8px 16px;
    background:#4a90e2;
    color:#fff;
    border:none;
    border-radius:3px;
    cursor:pointer;
    font-family:inherit;
    font-size:12px
}
.map-wrapper{
    background:#0f1220;
    border:1px solid #2a3550;
    border-radius:4px;
    padding:20px 16px;
    overflow-x:auto;
    min-height:240px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4)
}
body.fullscreen .map-wrapper{flex:1;margin:0 20px;border-radius:0;box-shadow:none}
.value-stream{display:flex;gap:12px;min-width:min-content}
.stage{
    background:linear-gradient(135deg,#1a2340,#0f1628);
    border:1px solid #3a5a9f;
    border-radius:4px;
    padding:8px;
    min-width:140px;
    max-width:140px;
    display:flex;
    flex-direction:column;
    cursor:default;
    transition:all 0.3s ease;
    font-size:11px
}
.stage:hover{
    background:linear-gradient(135deg,#243050,#1a2333);
    border-color:#5a8fff;
    box-shadow:0 0 20px rgba(74,144,226,0.2)
}
.stage-id{
    font-size:8px;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin-bottom:4px;
    color:#4a90e2
}
.stage-name{font-size:11px;font-weight:600;color:#fff;line-height:1.2;word-break:break-word}
.capabilities-container{display:flex;flex-direction:column;gap:4px;margin-top:6px;flex:1}
.capability-card{
    background:linear-gradient(135deg,#162850,#0d1a30);
    border:1px solid #2a4570;
    border-radius:3px;
    padding:6px;
    cursor:pointer;
    font-size:10px;
    transition:all 0.3s ease;
    flex-shrink:0
}
.capability-card:hover{
    background:linear-gradient(135deg,#1a3060,#132140);
    border-color:#4a90e2;
    box-shadow:0 0 12px rgba(74,144,226,0.2)
}
.capability-header{display:flex;justify-content:space-between;gap:4px;align-items:flex-start}
.capability-name{flex:1;line-height:1.2;word-break:break-word;font-size:9px}
.capability-toggle{
    width:14px;height:14px;
    border:1px solid #4a90e2;
    color:#4a90e2;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:9px;
    flex-shrink:0
}
.detail-panel{
    position:fixed;right:0;top:0;
    width:360px;height:100vh;
    background:linear-gradient(135deg,#1a2340,#0f1628);
    border-left:2px solid #4a90e2;
    display:none;
    flex-direction:column;
    overflow-y:auto;
    transform:translateX(100%);
    transition:transform 0.3s ease;
    z-index:1000
}
.detail-panel.open{display:flex;transform:translateX(0)}
.panel-header{
    padding:20px;
    border-bottom:2px solid #4a90e2;
    display:flex;
    justify-content:space-between;
    flex-shrink:0
}
.panel-stage-id{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#4a90e2;margin-bottom:6px}
.panel-capability-name{font-size:18px;font-weight:600;color:#fff;line-height:1.3}
.panel-close-btn{cursor:pointer;font-size:20px;color:#4a90e2;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.panel-content{padding:20px;overflow-y:auto;flex:1}
.panel-section{margin-bottom:24px}
.panel-title{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#4a90e2;margin-bottom:8px;font-weight:600}
.panel-text{font-size:13px;color:#b0b0b0;line-height:1.6}
.panel-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.panel-meta-item{background:#0f1628;border:1px solid #2a4570;border-radius:3px;padding:10px}
.panel-meta-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#6a7a9a;margin-bottom:4px}
.panel-meta-value{color:#e0e0e0;font-weight:500;font-size:12px}

.stage:nth-child(1) .stage-id{color:#e24a4a}
.stage:nth-child(2) .stage-id{color:#e2a04a}
.stage:nth-child(3) .stage-id{color:#c4e24a}
.stage:nth-child(4) .stage-id{color:#4ae290}
.stage:nth-child(5) .stage-id{color:#4ae2d2}
.stage:nth-child(6) .stage-id{color:#4a9ae2}
.stage:nth-child(7) .stage-id{color:#704ae2}
.stage:nth-child(8) .stage-id{color:#d24ae2}
.stage:nth-child(9) .stage-id{color:#e24ab6}

@media(max-width:768px){
    .detail-panel{width:100%}
    .stage{min-width:160px;padding:16px}
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>LAND TAX VALUE STREAM MAP</h1>
            <p>SRO Capabilities mapped to 9 value streams</p>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">Maximize</button>
    </div>
    <div class="map-wrapper">
        <div class="value-stream" id="valueStream"></div>
    </div>
</div>

<div class="detail-panel" id="detailPanel">

        <div>

        </div>
        <div class="panel-close-btn" onclick="closeDetailPanel()">×</div>
    </div>
    <div class="panel-content" id="panelContent"></div>
</div>

function toggleFullscreen(){
    document.body.classList.toggle('fullscreen');
    document.querySelector('.fullscreen-btn').textContent=document.body.classList.contains('fullscreen')?'Exit':'Maximize';
}

function getCapabilityType(id){
    if(id.startsWith('VS'))return 'LTX';
    if(id.startsWith('COM'))return 'COMMON';
    return 'SUPPORTING';
}

function render(){
    const map={};
    DATA.forEach(r=>{
        if(!map[r.ValueStageID]){
            map[r.ValueStageID]={id:r.ValueStageID,name:r.ValueStageName,caps:[]};
        }
        const type=getCapabilityType(r.CapabilityID);
        map[r.ValueStageID].caps.push({...r,type});
    });
    
    const stages=Object.values(map).sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
    const el=document.getElementById('valueStream');
    el.innerHTML='';
    
    stages.forEach(s=>{
        const d=document.createElement('div');
        d.className='stage';
        d.innerHTML=`
            <div class="stage-id">${s.id}</div>
            <div class="stage-name">${s.name}</div>
            <div class="capabilities-container"></div>`;
        
        const c=d.querySelector('.capabilities-container');
        s.caps.forEach(cap=>{
            const cc=document.createElement('div');
            cc.className='capability-card';
            const typeBadge=cap.type==='LTX'?'<span style="font-size:9px;color:#4ae290;margin-left:4px">[LTX]</span>':cap.type==='COMMON'?'<span style="font-size:9px;color:#e2a04a;margin-left:4px">[COM]</span>':'';
            cc.innerHTML=`
                <div class="capability-header">
                    <div class="capability-name" style="flex:1">${cap.CapabilityName}${typeBadge}</div>
                    <div class="capability-toggle">+</div>
                </div>`;
            cc.onclick=()=>openDetail(s,cap);
            c.appendChild(cc);
        });
        el.appendChild(d);
    });
}

function openDetail(stage,cap){
    document.getElementById('panelStageId').textContent=stage.id;
    document.getElementById('panelCapabilityName').textContent=cap.CapabilityName;
    document.getElementById('panelContent').innerHTML=`
        <div class="panel-section">
            <div class="panel-title">Capability ID</div>
            <div class="panel-text">${cap.CapabilityID}</div>
        </div>
        <div class="panel-section">
            <div class="panel-title">Description</div>
            <div class="panel-text">${cap.CapabilityDescription||'—'}</div>
        </div>
        <div class="panel-section">
            <div class="panel-title">Details</div>
            <div class="panel-meta">
                <div class="panel-meta-item">
                    <div class="panel-meta-label">Maturity Level</div>
                    <div class="panel-meta-value">${cap.CapabilityMaturityLevel||'—'}</div>
                </div>
                <div class="panel-meta-item">
                    <div class="panel-meta-label">Value Stream</div>
                    <div class="panel-meta-value">${stage.id}</div>
                </div>
            </div>
        </div>`;
    document.getElementById('detailPanel').classList.add('open');
}

function closeDetailPanel(){
    document.getElementById('detailPanel').classList.remove('open');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetailPanel()});
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
