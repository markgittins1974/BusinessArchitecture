
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Tax – Service Blueprint</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── KEY CHANGE: page now scrolls vertically ─────────────────────────── */
html, body { width: 100%; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; }
#root { width: 100%; }

.app { display: flex; flex-direction: column; width: 100vw; }

/* Blueprint section — fixed viewport height, scrolls internally */
.blueprint-section {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 44px; flex-shrink: 0;
  background: #0f2044; color: white;
}
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
.topbar-meta { font-size: 11px; color: rgba(255,255,255,0.45); }

/* Filter bar */
.filterbar {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  background: white; border-bottom: 1px solid #e0e4ed; flex-shrink: 0;
  flex-wrap: nowrap; overflow-x: auto;
}
.filterbar-label { font-size: 10px; font-weight: 700; color: #9ca3af; letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; margin-right: 2px; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px; border: 1.5px solid #e0e4ed;
  font-size: 10px; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all 0.15s; background: white; color: #6b7280;
  user-select: none;
}
.filter-chip.active { border-color: currentColor; }
.filter-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.filter-sep { width: 1px; height: 18px; background: #e0e4ed; margin: 0 2px; flex-shrink: 0; }
.filter-clear { font-size: 10px; color: #9ca3af; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.filter-clear:hover { color: #374151; background: #f1f5f9; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Blueprint area */
.blueprint { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Grid wrapper — single scroll container */
.grid-wrapper { flex: 1; overflow: auto; }
.grid-body { min-width: max-content; }

/* Sticky header row */
.header-row {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: stretch;
  background: #f8fafc; border-bottom: 1px solid #e0e4ed;
}
.grid-corner {
  position: sticky; left: 0; z-index: 30;
  width: 100px; flex-shrink: 0;
  background: #f8fafc; border-right: 1px solid #e0e4ed;
}
.col-header-cell {
  width: 155px; flex-shrink: 0; padding: 5px 5px 5px 0;
}
.col-header {
  background: #163172; color: white;
  border-radius: 5px; padding: 5px 6px; height: 52px;
  font-size: 9px; font-weight: 700; text-align: center; line-height: 1.3;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  position: relative;
}
.col-header::after {
  content: ''; position: absolute; right: -7px; top: 0; bottom: 0;
  border-top: 26px solid transparent; border-bottom: 26px solid transparent;
  border-left: 7px solid #163172; z-index: 2;
}
.col-header:last-child::after { display: none; }
.col-code { font-size: 7.5px; opacity: 0.55; font-weight: 500; letter-spacing: 0.05em; }

/* Lane rows */
.lane-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid #edf0f5;
  min-height: 54px;
  transition: min-height 0.2s ease;
}
.lane-row.expanded { min-height: 140px; }

/* Lane label (sticky left) */
.lane-label-btn {
  position: sticky; left: 0; z-index: 10;
  width: 100px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  background: #f8fafc; cursor: pointer;
  border: none; outline: none;
  border-right: 1px solid #e0e4ed;
  padding: 6px 4px; transition: background 0.15s;
  user-select: none;
}
.lane-label-btn:hover { background: #f1f5f9; }
.lane-label-btn.expanded { background: white; }
.lane-icon { display: flex; align-items: center; justify-content: center; }
.lane-name { font-size: 8px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; text-align: center; line-height: 1.2; }
.lane-expand-indicator { font-size: 9px; color: #9ca3af; transition: transform 0.2s; }
.lane-label-btn.expanded .lane-expand-indicator { transform: rotate(180deg); }

/* Cell wrapper */
.cell-wrap {
  width: 155px; flex-shrink: 0;
  padding: 4px 5px 4px 0;
  display: flex; flex-direction: column;
}

/* Comment badge on cells */
.cell-comment-badge {
  position: absolute; top: 3px; right: 3px;
  font-size: 9px; line-height: 1; pointer-events: none;
}

/* Comment textarea in panel */
.comment-box {
  width: 100%; border: 1.5px solid #e0e4ed; border-radius: 6px;
  padding: 8px 10px; font-size: 12px; color: #374151; line-height: 1.5;
  resize: vertical; min-height: 90px; font-family: inherit;
  transition: border-color 0.15s; outline: none;
}
.comment-box:focus { border-color: #4a7fd4; }
.comment-save-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
.comment-saved-msg { font-size: 10px; color: #16a34a; opacity: 0; transition: opacity 0.4s; }
.comment-saved-msg.show { opacity: 1; }
.comment-clear { font-size: 10px; color: #ef4444; cursor: pointer; background: none; border: none; padding: 2px 6px; border-radius: 3px; }
.comment-clear:hover { background: #fee2e2; }

/* Topbar actions */
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1); color: white; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
}
.topbar-btn:hover { background: rgba(255,255,255,0.22); }

/* Process view link pill */
.process-link {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 5px;
  padding: 2px 8px 2px 6px; border-radius: 20px;
  background: #ede9fe; color: #6d28d9;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.03em;
  text-decoration: none; border: 1px solid #c4b5fd;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap; cursor: pointer;
  user-select: none;
}
.process-link:hover { background: #6d28d9; color: white; border-color: #6d28d9; }
.process-link-icon { font-size: 9px; }

/* Cells */
.cell {
  border-radius: 5px; border: 1.5px solid #e8eaf0;
  cursor: pointer; overflow: hidden; position: relative;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  display: flex; flex-direction: column;
  background: white; flex: 1;
}
.cell:hover { border-color: #4a7fd4; box-shadow: 0 2px 8px rgba(74,127,212,0.18); transform: translateY(-1px); }
.cell.selected { border-color: #2563eb; box-shadow: 0 0 0 2.5px rgba(37,99,235,0.18); }

/* Collapsed cell */
.cell-collapsed { padding: 5px 7px; display: flex; align-items: flex-start; gap: 5px; flex: 1; }
.cell-col-icon { display: flex; align-items: flex-start; flex-shrink: 0; margin-top: 2px; }
.cell-col-text { font-size: 9.5px; font-weight: 500; color: #1a1a2e; line-height: 1.35; }

/* Expanded cell */
.cell-expanded { padding: 8px 9px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.cell-exp-title { font-size: 10px; font-weight: 700; color: #0f2044; line-height: 1.35; }
.cell-exp-desc { font-size: 9px; color: #4b5563; line-height: 1.5; }
.cell-exp-footer { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
.cell-tag { font-size: 8px; padding: 1px 6px; border-radius: 3px; background: #f1f5f9; color: #475569; font-weight: 500; }
.cell-status { font-size: 8px; padding: 1px 7px; border-radius: 8px; font-weight: 600; }
.status-current { background: #dbeafe; color: #1d4ed8; }
.status-future  { background: #dcfce7; color: #15803d; }
.status-gap     { background: #fef3c7; color: #b45309; }
.status-risk    { background: #fee2e2; color: #b91c1c; }

/* Side panel */
.side-panel {
  width: 0; overflow: hidden; transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; background: white;
  border-left: 1px solid #e0e4ed; flex-shrink: 0;
}
.side-panel.open { width: 320px; }
.panel-inner { width: 320px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.panel-header { padding: 14px 16px 12px; border-bottom: 1px solid #e8eaf0; flex-shrink: 0; position: relative; }
.panel-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; margin-bottom: 8px; }
.panel-title { font-size: 14px; font-weight: 700; color: #0f2044; line-height: 1.35; padding-right: 24px; }
.panel-phase { font-size: 10px; color: #6b7280; margin-top: 4px; }
.panel-close { position: absolute; top: 14px; right: 12px; background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 16px; padding: 2px 4px; border-radius: 3px; line-height: 1; }
.panel-close:hover { color: #374151; background: #f1f5f9; }
.panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
.panel-section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; margin-bottom: 5px; }
.panel-section-body { font-size: 12px; color: #374151; line-height: 1.6; }
.panel-divider { height: 1px; background: #f1f5f9; }
.panel-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.panel-tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: #f1f5f9; color: #475569; font-weight: 500; }
.panel-links { display: flex; flex-direction: column; gap: 4px; }
.panel-link { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4b5563; padding: 4px 8px; background: #f8fafc; border-radius: 4px; border: 1px solid #e8eaf0; }
.panel-status-badge { font-size: 10px; padding: 3px 10px; border-radius: 12px; font-weight: 600; display: inline-block; }

/* Tweaks */
.tweaks-float { position: fixed; bottom: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.tweaks-btn { background: #0f2044; color: white; border: none; cursor: pointer; width: 34px; height: 34px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: background 0.15s; }
.tweaks-btn:hover { background: #1e3a6e; }
.tweaks-panel { background: white; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); width: 200px; padding: 14px; border: 1px solid #e0e4ed; display: flex; flex-direction: column; gap: 12px; }
.tweaks-header { font-size: 11px; font-weight: 700; color: #0f2044; }
.tweak-row { display: flex; flex-direction: column; gap: 4px; }
.tweak-label { font-size: 10px; color: #6b7280; font-weight: 500; }
.tweak-toggle-row { display: flex; align-items: center; justify-content: space-between; }
.tweak-switch { width: 30px; height: 17px; background: #e0e4ed; border-radius: 9px; position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
.tweak-switch.on { background: #2563eb; }
.tweak-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; background: white; border-radius: 50%; transition: transform 0.2s; }
.tweak-switch.on::after { transform: translateX(13px); }

/* ── BPMN SECTION ─────────────────────────────────────────────────────── */
.bpmn-section {
  width: 100%;
  background: #f0f2f5;
  margin-top: 32px;
  border-top: 3px solid #163172;
}

.bpmn-section-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  height: 44px;
  background: #0f2044;
}

.bpmn-header-accent {
  width: 4px;
  height: 22px;
  background: #4a7fd4;
  border-radius: 2px;
  flex-shrink: 0;
}

.bpmn-header-text { flex: 1; }

.bpmn-header-title {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.02em;
  line-height: 1;
}

.bpmn-toggle-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px; border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1); color: white;
  font-size: 11px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
  flex-shrink: 0;
}
.bpmn-toggle-btn:hover { background: rgba(255,255,255,0.22); }

.bpmn-image-collapsible {
  overflow: hidden;
  max-height: 9999px;
  opacity: 1;
  transition: max-height 0.35s ease, opacity 0.25s ease;
}
.bpmn-image-collapsible.hidden {
  max-height: 0;
  opacity: 0;
}

.bpmn-image-wrapper {
  width: 100%;
  padding: 0;
  background: #ffffff;
  border-top: 1px solid #e0e4ed;
}

.bpmn-image-wrapper img {
  display: block;
  width: 100%;
  height: auto;
  max-width: 100%;
}

/* ── PRINT ────────────────────────────────────────────────────────────── */
@media print {
  .print-only-expanded { display: flex !important; flex-direction: column; gap: 4px; padding: 5px 6px; flex: 1; }
  .cell-collapsed { display: none !important; }
  .cell-expanded.print-show-expanded { display: flex !important; }
  @page { size: A3 landscape; margin: 10mm 8mm; }
  html, body, #root { overflow: visible !important; height: auto !important; width: auto !important; background: white !important; }
  .app { height: auto !important; overflow: visible !important; }
  .topbar, .filterbar, .tweaks-float, .side-panel, .panel-close, .bpmn-section { display: none !important; }
  .print-header { display: block !important; }
  .blueprint { flex: 1; overflow: visible !important; }
  .main { overflow: visible !important; }
  .grid-wrapper { overflow: visible !important; height: auto !important; }
  .grid-body { min-width: unset !important; }
  .lane-row { min-height: 90px !important; border-bottom: 1px solid #e0e4ed !important; break-inside: avoid; }
  .lane-label-btn { position: static !important; border-right: 1px solid #e0e4ed !important; background: #f8fafc !important; }
  .header-row { position: static !important; border-bottom: 2px solid #0f2044 !important; }
  .grid-corner { position: static !important; }
  .cell-collapsed { display: none !important; }
  .cell-expanded-print { display: flex !important; }
  .cell-wrap { width: auto !important; flex: 1 !important; }
  .cell { border: 1px solid #e0e4ed !important; box-shadow: none !important; transform: none !important; }
  .cell-expanded { display: flex !important; flex: 1 !important; padding: 5px 6px !important; gap: 4px !important; min-height: 80px !important; }
  .cell-exp-title { font-size: 8px !important; }
  .cell-exp-desc { font-size: 7px !important; }
  .cell-exp-footer { flex-wrap: wrap !important; gap: 2px !important; }
  .cell-status, .cell-tag { font-size: 6.5px !important; padding: 1px 4px !important; }
  .col-header { height: 40px !important; font-size: 7.5px !important; }
  .col-header::after { display: none !important; }
  .col-header-cell { width: auto !important; flex: 1 !important; padding: 3px 3px 3px 0 !important; }
  .lane-icon svg { width: 12px !important; height: 12px !important; }
  .lane-name { font-size: 7px !important; }
  .lane-expand-indicator { display: none !important; }
  .lane-label-btn { width: 72px !important; padding: 4px 3px !important; }
  .process-link { display: none !important; }
  .cell-comment-badge { display: none !important; }
}

.print-header { display: none; padding: 8px 0 6px; border-bottom: 2px solid #0f2044; margin-bottom: 6px; }
.print-header-title { font-size: 16px; font-weight: 700; color: #0f2044; }
.print-header-meta { font-size: 10px; color: #6b7280; margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- ── BPMN section lives outside React — rendered directly in HTML ──── -->
<section class="bpmn-section" id="bpmn-overview">
  <div class="bpmn-section-header">
    <div class="bpmn-header-accent"></div>
    <div class="bpmn-header-text">
      <div class="bpmn-header-title">Business Process Model — Administer Land Tax</div>
    </div>
    <button class="bpmn-toggle-btn" id="bpmn-toggle-btn" onclick="toggleBpmn()">▼ Hide</button>
  </div>
  <div class="bpmn-image-collapsible" id="bpmn-collapsible">
    <div class="bpmn-image-wrapper">
      <img
        src="https://markgittins1974.github.io/BusinessArchitecture/process/administer-land-tax.png"
        alt="Administer Land Tax – Business Process Overview (BPMN 2.0)"
      />
    </div>
  </div>
</section>
<script>
function toggleBpmn() {
  var el = document.getElementById('bpmn-collapsible');
  var btn = document.getElementById('bpmn-toggle-btn');
  var hidden = el.classList.toggle('hidden');
  btn.textContent = hidden ? '▶ Show' : '▼ Hide';
}
</script>

<script type="text/babel">

const PHASES = [
  { id: 'p1', label: 'Accurate Land & Ownership Information Maintained', code: 'VS-01' },

    capability:  { text: 'Land data management', detail: 'Core capability to maintain, update, and govern land parcel and ownership records including data quality controls.', tags: ['Data Governance', 'Master Data'], status: 'current', links: ['Data Quality Framework'] },

function App() {
  const [expandedLane, setExpandedLane] = React.useState(null);
  const [visibleLanes, setVisibleLanes] = React.useState(() => new Set(LANES.map(l => l.id)));
  const [selected, setSelected] = React.useState(null);
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [colorRows, setColorRows] = React.useState(true);
  const [multiExpand, setMultiExpand] = React.useState(false);
  const [expandedLanes, setExpandedLanes] = React.useState(new Set());

  const [comments, setComments] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('blueprint-comments') || '{}'); }
    catch { return {}; }
  });
  const [savedMsg, setSavedMsg] = React.useState(false);
  const saveTimer = React.useRef(null);
  const [filterNotes, setFilterNotes] = React.useState(false);

  const commentKey = (phaseId, laneId) => `${phaseId}::${laneId}`;

  const handleCommentChange = (phaseId, laneId, value) => {
    const key = commentKey(phaseId, laneId);
    const next = { ...comments };
    if (value.trim()) { next[key] = { value, phaseId, laneId, updatedAt: new Date().toISOString() }; }
    else { delete next[key]; }
    setComments(next);
    localStorage.setItem('blueprint-comments', JSON.stringify(next));
    clearTimeout(saveTimer.current);
    setSavedMsg(true);
    saveTimer.current = setTimeout(() => setSavedMsg(false), 1800);
  };

  const clearComment = (phaseId, laneId) => handleCommentChange(phaseId, laneId, '');

  const exportComments = () => {
    const rows = Object.values(comments).map(c => ({
      valueStream: PHASES.find(p => p.id === c.phaseId)?.label,
      swimLane: LANES.find(l => l.id === c.laneId)?.label,
      comment: c.value,
      updatedAt: c.updatedAt,
    }));
    const blob = new Blob([JSON.stringify(rows, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'blueprint-comments.json';
    a.click();
  };

  const toggleLaneVisible = (laneId) => {
    setVisibleLanes(prev => {
      const next = new Set(prev);
      if (next.has(laneId)) { next.delete(laneId); } else { next.add(laneId); }
      return next;
    });
  };

  const toggleExpand = (laneId) => {
    if (multiExpand) {
      setExpandedLanes(prev => {
        const next = new Set(prev);
        if (next.has(laneId)) next.delete(laneId); else next.add(laneId);
        return next;
      });
    } else {
      setExpandedLane(prev => prev === laneId ? null : laneId);
    }
  };

  const isExpanded = (laneId) => multiExpand ? expandedLanes.has(laneId) : expandedLane === laneId;

  const handleCellClick = (phaseId, laneId, e) => {
    e.stopPropagation();
    const cell = DATA[phaseId]?.[laneId];
    if (!cell) return;
    if (selected?.phaseId === phaseId && selected?.laneId === laneId) {
      setSelected(null);
    } else {
      setSelected({ phaseId, laneId, cell });
    }
  };

  const selectedLane = selected ? LANES.find(l => l.id === selected.laneId) : null;
  const selectedPhase = selected ? PHASES.find(p => p.id === selected.phaseId) : null;

  return (
    <div className="app">
      {/* Blueprint section — fixed-height viewport block */}
      <div className="blueprint-section">
        {/* Top bar */}
        <div className="topbar">
          <span className="topbar-title">Land Tax – Service Blueprint</span>
          <span className="topbar-meta">{PHASES.length} Value Streams · {LANES.length} Swim Lanes · {Object.keys(comments).length} comment{Object.keys(comments).length !== 1 ? 's' : ''}</span>
          <div className="topbar-actions">
            <button className="topbar-btn" onClick={exportComments}>⬇ Export comments</button>
            <button className="topbar-btn" onClick={() => window.print()}>🖨 Print view</button>
          </div>
        </div>

        {/* Filter bar */}
        <div className="filterbar">
          <span className="filterbar-label">Lanes</span>
          {LANES.map(lane => {
            const active = visibleLanes.has(lane.id);
            return (
              <div
                key={lane.id}
                className={`filter-chip ${active ? 'active' : ''}`}
                style={active ? { color: lane.color, borderColor: lane.color, background: lane.bg } : {}}
                onClick={() => toggleLaneVisible(lane.id)}
              >
                <span className="filter-chip-dot" style={{ background: active ? lane.color : '#d1d5db' }}></span>
                {lane.label}
              </div>
            );
          })}
          <div className="filter-sep" />
          <div
            className={`filter-chip ${filterNotes ? 'active' : ''}`}
            style={filterNotes ? { color: '#7c3aed', borderColor: '#7c3aed', background: '#faf5ff' } : {}}
            onClick={() => setFilterNotes(v => !v)}
            title="Show only cells with notes"
          >
            <span className="filter-chip-dot" style={{ background: filterNotes ? '#7c3aed' : '#d1d5db' }}></span>
            💬 Has notes {filterNotes && Object.keys(comments).length > 0 ? `(${Object.keys(comments).length})` : ''}
          </div>
          <div className="filter-sep" />
          <div className="filter-clear" onClick={() => setVisibleLanes(new Set())}>Hide all</div>
        </div>

        <div className="main">
          <div className="blueprint">
            <div className="print-header">
              <div className="print-header-title">Land Tax – Service Blueprint</div>
              <div className="print-header-meta">Printed {new Date().toLocaleDateString('en-AU', {day:'numeric',month:'long',year:'numeric'})} · {PHASES.length} Value Streams · {LANES.length} Swim Lanes</div>
            </div>
            <div className="grid-wrapper">
              <div className="grid-body">
                {/* Sticky header row */}
                <div className="header-row">
                  <div className="grid-corner" />
                  {PHASES.map(p => (
                    <div key={p.id} className="col-header-cell">
                      <div className="col-header">
                        <span className="col-code">{p.code}</span>
                        {p.label}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Lane rows */}
                {LANES.map(lane => {
                  if (!visibleLanes.has(lane.id)) return null;
                  const expanded = isExpanded(lane.id);
                  return (
                    <div key={lane.id} className={`lane-row ${expanded ? 'expanded' : ''}`}>
                      <div
                        role="button"
                        tabIndex={0}
                        className={`lane-label-btn ${expanded ? 'expanded' : ''}`}
                        style={expanded ? { borderLeft: `3px solid ${lane.color}`, background: lane.bg } : {}}
                        onClick={(e) => { e.stopPropagation(); toggleExpand(lane.id); }}
                        onKeyDown={(e) => e.key === 'Enter' && toggleExpand(lane.id)}
                        title={`${expanded ? 'Collapse' : 'Expand'} ${lane.label} row`}
                      >
                        <span className="lane-icon"><LaneIcon id={lane.id} size={16}/></span>
                        <span className="lane-name" style={expanded ? { color: lane.color } : {}}>{lane.label}</span>
                        <span className="lane-expand-indicator" style={{ fontSize: '8px', color: expanded ? lane.color : '#9ca3af' }}>▼</span>
                      </div>

                      {PHASES.map(phase => {
                        const cell = DATA[phase.id]?.[lane.id];
                        const isSel = selected?.phaseId === phase.id && selected?.laneId === lane.id;
                        const hasNote = !!comments[commentKey(phase.id, lane.id)];
                        const dimmed = filterNotes && !hasNote;
                        return (
                          <div key={phase.id} className="cell-wrap">
                            <div
                              className={`cell ${isSel ? 'selected' : ''}`}
                              style={{ background: colorRows ? lane.bg : 'white', opacity: dimmed ? 0.2 : 1, transition: 'opacity 0.2s', pointerEvents: dimmed ? 'none' : 'auto' }}
                              onClick={(e) => { e.stopPropagation(); cell && handleCellClick(phase.id, lane.id, e); }}
                            >
                              {comments[commentKey(phase.id, lane.id)] && (
                                <div className="cell-comment-badge" title="Has comment">💬</div>
                              )}
                              {cell ? (
                                expanded ? (
                                  <div className="cell-expanded print-show-expanded">
                                    <div className="cell-exp-title">{cell.text}</div>
                                    <div className="cell-exp-desc">{cell.detail}</div>
                                    <div className="cell-exp-footer">
                                      <span className={`cell-status ${STATUS_CONFIG[cell.status]?.cls}`}>
                                        {STATUS_CONFIG[cell.status]?.label}
                                      </span>
                                      {cell.tags.slice(0,2).map(t => <span key={t} className="cell-tag">{t}</span>)}
                                    </div>
                                    {lane.id === 'process' && cell.processUrl && (
                                      <a className="process-link" href={cell.processUrl} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}>
                                        <span className="process-link-icon">⟶</span>View process
                                      </a>
                                    )}
                                  </div>
                                ) : (
                                  <>
                                    <div className="cell-collapsed">
                                      <span className="cell-col-icon"><LaneIcon id={lane.id} size={13}/></span>
                                      <div style={{display:'flex',flexDirection:'column',gap:'3px',flex:1}}>
                                        <span className="cell-col-text">{cell.text}</span>
                                        {lane.id === 'process' && cell.processUrl && (
                                          <a className="process-link" href={cell.processUrl} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}>
                                            <span className="process-link-icon">⟶</span>View process
                                          </a>
                                        )}
                                      </div>
                                    </div>
                                    <div className="cell-expanded print-only-expanded" style={{display:'none'}}>
                                      <div className="cell-exp-title">{cell.text}</div>
                                      <div className="cell-exp-desc">{cell.detail}</div>
                                      <div className="cell-exp-footer">
                                        <span className={`cell-status ${STATUS_CONFIG[cell.status]?.cls}`}>{STATUS_CONFIG[cell.status]?.label}</span>
                                      </div>
                                    </div>
                                  </>
                                )
                              ) : (
                                <div className="cell-collapsed">
                                  <span style={{ fontSize: '9px', color: '#d1d5db' }}>—</span>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Side panel */}
          <div className={`side-panel ${selected ? 'open' : ''}`}>
            {selected && (
              <div className="panel-inner">
                <div className="panel-header">
                  <div className="panel-badge" style={{ background: selectedLane.badge, color: selectedLane.color }}>
                    <LaneIcon id={selectedLane.id} size={11}/>
                    <span>{selectedLane.label}</span>
                  </div>
                  <div className="panel-title">{selected.cell.text}</div>
                  <div className="panel-phase">{selectedPhase.label}</div>
                  <button className="panel-close" onClick={() => setSelected(null)}>✕</button>
                </div>
                <div className="panel-body">
                  <div>
                    <div className="panel-section-title">Description</div>
                    <div className="panel-section-body">{selected.cell.detail}</div>
                  </div>
                  <div className="panel-divider" />
                  <div>
                    <div className="panel-section-title">💬 Comment</div>
                    <textarea
                      className="comment-box"
                      placeholder="Add a note about this cell…"
                      value={comments[commentKey(selected.phaseId, selected.laneId)]?.value || ''}
                      onChange={e => handleCommentChange(selected.phaseId, selected.laneId, e.target.value)}
                    />
                    <div className="comment-save-row">
                      <span className={`comment-saved-msg ${savedMsg ? 'show' : ''}`}>✓ Saved</span>
                      {comments[commentKey(selected.phaseId, selected.laneId)] && (
                        <button className="comment-clear" onClick={() => clearComment(selected.phaseId, selected.laneId)}>Clear</button>
                      )}
                    </div>
                  </div>
                  <div className="panel-divider" />
                  <div>
                    <div className="panel-section-title">State</div>
                    <span className={`panel-status-badge ${STATUS_CONFIG[selected.cell.status]?.cls}`}>
                      {STATUS_CONFIG[selected.cell.status]?.label}
                    </span>
                  </div>
                  <div className="panel-divider" />
                  <div>
                    <div className="panel-section-title">Tags</div>
                    <div className="panel-tags">
                      {selected.cell.tags.map(t => <span key={t} className="panel-tag">{t}</span>)}
                    </div>
                  </div>
                  {selected.cell.links?.length > 0 && (
                    <>
                      <div className="panel-divider" />
                      <div>
                        <div className="panel-section-title">Linked Systems & Assets</div>
                        <div className="panel-links">
                          {selected.cell.links.map(l => (
                            <div key={l} className="panel-link">🔗 {l}</div>
                          ))}
                        </div>
                      </div>
                    </>
                  )}
                  <div className="panel-divider" />
                  <div>
                    <div className="panel-section-title">Value Stream</div>
                    <div className="panel-section-body" style={{ color: '#1d4ed8', fontWeight: 600, fontSize: '11px' }}>{selectedPhase.code} — {selectedPhase.label}</div>
                  </div>
                  {selected.laneId === 'process' && selected.cell.processUrl && (
                    <>
                      <div className="panel-divider" />
                      <div>
                        <div className="panel-section-title">Process View</div>
                        <a
                          className="process-link"
                          style={{ fontSize: '11px', padding: '5px 12px' }}
                          href={selected.cell.processUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                        >
                          <span className="process-link-icon">⟶</span>
                          Open process view
                        </a>
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
      {/* END blueprint-section — BPMN section follows in plain HTML above */}

      {/* Tweaks */}
      <div className="tweaks-float">
        {showTweaks && (
          <div className="tweaks-panel">
            <div className="tweaks-header">Tweaks</div>
            <div className="tweak-row">
              <div className="tweak-toggle-row">
                <span className="tweak-label">Color rows</span>
                <button className={`tweak-switch ${colorRows ? 'on' : ''}`} onClick={() => setColorRows(v => !v)} />
              </div>
            </div>
            <div className="tweak-row">
              <div className="tweak-toggle-row">
                <span className="tweak-label">Expand multiple rows</span>
                <button className={`tweak-switch ${multiExpand ? 'on' : ''}`} onClick={() => { setMultiExpand(v => !v); setExpandedLane(null); setExpandedLanes(new Set()); }} />
              </div>
            </div>
          </div>
        )}
        <button className="tweaks-btn" onClick={() => setShowTweaks(v => !v)}>
          {showTweaks ? '✕' : '⚙'}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
