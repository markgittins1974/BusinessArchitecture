<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Tax — Capability Dashboard v1.6</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --text-dark: #1a2332;
  --text-light: #6b7a8d;
  --text-muted: #94a3b8;
  --surface: #f4f6f9;
  --surface-card: #ffffff;
  --border: #e2e8f0;
  --accent: #4a6fa5;
  --high-bg: #dff0e0; --high-text: #2a7a3b;
  --medium-bg: #fff5d6; --medium-text: #8a6500;
  --low-bg: #fde8e8; --low-text: #b53030;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--surface); color: var(--text-dark); line-height: 1.5; }
.shell { max-width: 1280px; margin: 0 auto; padding: 40px 32px; }
.page-header { margin-bottom: 24px; }
.page-header__eyebrow { font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.page-header__title { font-size: 28px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
.page-header__sub { font-size: 14px; color: var(--text-light); }
.data-notice { background: #fffbec; border: 1px solid #e8d87a; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #8a6500; margin-bottom: 28px; }

.scorecard-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 28px; }
.scorecard { background: var(–surface-card); border: 1px solid var(–border); border-radius: 10px; padding: 20px; }
.scorecard__label { font-family: ‘Roboto Mono’, monospace; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(–text-light); margin-bottom: 10px; }
.scorecard__value { font-size: 36px; font-weight: 700; color: var(–text-dark); line-height: 1.1; }
.scorecard__detail { font-size: 12px; color: var(–text-muted); margin-top: 6px; }

.score-pill { display: inline-block; font-family: ‘Roboto Mono’, monospace; font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
.score-pill–high { background: var(–high-bg); color: var(–high-text); }
.score-pill–mid { background: var(–medium-bg); color: var(–medium-text); }
.score-pill–low { background: var(–low-bg); color: var(–low-text); }

.dash-row { display: grid; gap: 20px; margin-bottom: 20px; }
.dash-row–wide { grid-template-columns: 2fr 1fr; }
.dash-row–half { grid-template-columns: 1fr 1fr; }
.dash-row–full { grid-template-columns: 1fr; }
.panel { background: var(–surface-card); border: 1px solid var(–border); border-radius: 10px; padding: 24px; }
.panel__title { font-family: ‘Roboto Mono’, monospace; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(–accent); margin-bottom: 16px; }

.mat-bar-row { margin-bottom: 14px; }
.mat-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mat-bar-header__name { font-size: 13px; font-weight: 600; color: var(–text-dark); }
.mat-bar-header__right { display: flex; align-items: center; gap: 8px; }
.mat-bar-header__count { font-family: ‘Roboto Mono’, monospace; font-size: 11px; color: var(–text-muted); }
.mat-bar-track { display: flex; height: 20px; border-radius: 4px; overflow: hidden; }
.mat-bar-segment { min-width: 2px; }
.mat-bar-segment–high { background: var(–high-bg); }
.mat-bar-segment–medium { background: var(–medium-bg); }
.mat-bar-segment–low { background: var(–low-bg); }

.donut-container { display: flex; align-items: center; gap: 24px; }
.donut-legend { list-style: none; }
.donut-legend li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(–text-dark); margin-bottom: 6px; }
.donut-legend__swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.donut-legend__count { font-family: ‘Roboto Mono’, monospace; font-weight: 500; }
.donut-legend__pct { color: var(–text-muted); font-size: 11px; }

.complexity-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.complexity-row__label { font-size: 11px; color: var(–text-muted); width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.complexity-track { flex: 1; height: 14px; background: var(–surface); border-radius: 3px; overflow: hidden; }
.complexity-fill { height: 100%; background: var(–accent); border-radius: 3px; }
.complexity-row__count { font-family: ‘Roboto Mono’, monospace; font-size: 11px; font-weight: 700; width: 24px; text-align: right; flex-shrink: 0; }

.scale-ref { display: flex; flex-direction: column; gap: 10px; }
.scale-ref__item { display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(–surface); }
.scale-ref__swatch { width: 32px; height: 18px; border-radius: 4px; flex-shrink: 0; }
.scale-ref__label { font-size: 12px; font-weight: 600; min-width: 70px; }
.scale-ref__score { font-family: ‘Roboto Mono’, monospace; font-size: 13px; font-weight: 700; color: var(–text-dark); width: 18px; text-align: center; flex-shrink: 0; }
.scale-ref__desc { font-size: 12px; color: var(–text-light); flex: 1; }

.l1-table { width: 100%; border-collapse: collapse; }
.l1-table th { font-family: ‘Roboto Mono’, monospace; font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(–text-muted); text-align: left; padding: 8px 10px; border-bottom: 2px solid var(–border); }
.l1-table td { font-size: 12px; padding: 10px; border-bottom: 1px solid var(–surface); vertical-align: middle; }
.l1-table td:nth-child(1) { font-weight: 600; color: var(–text-dark); }
.l1-table td:nth-child(2) { font-size: 11px; color: var(–text-light); }
.l1-table td:nth-child(3) { font-family: ‘Roboto Mono’, monospace; font-size: 11px; font-weight: 700; text-align: center; }
.mini-bar { display: flex; width: 120px; height: 8px; border-radius: 3px; gap: 1px; overflow: hidden; }
.mini-bar__seg { min-width: 1px; }
.badge { font-family: ‘Roboto Mono’, monospace; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>

</head>

<div class="shell">
  <div class="page-header">
    <div class="page-header__eyebrow">SRO Transformation Architecture</div>
    <h1 class="page-header__title">Land Tax — Capability Dashboard</h1>
    <p class="page-header__sub">Maturity and coverage statistics across the Land Tax capability map.</p>

  <div id="dataNotice" class="data-notice"></div>
  <div class="scorecard-row" id="scorecards"></div>

    <div class="panel"><div class="panel__title">Overall Maturity Distribution</div><div id="donut"></div></div>
  </div>
  <div class="dash-row dash-row--half">
    <div class="panel"><div class="panel__title">Capability Complexity by Stage</div><div id="complexity"></div></div>
    <div class="panel"><div class="panel__title">Maturity Scale Reference</div><div id="scaleRef"></div></div>
  </div>
  <div class="dash-row dash-row--full">
    <div class="panel"><div class="panel__title">L1 Capability Group Summary</div><div id="l1Table"></div></div>
  </div>
</div>

se", "Matter", "Investigation"], "policy": "Taxation Administration Act 1997 — s72–73, s101", "process": "Manage Land Tax Case", "maturity": "Low", "processRef": "", "subProcess": ""}, {"name": "Compliance Management", "description": "Monitor and address non-compliance with Land Tax obligations, including proactive and reactive activities.", "synonyms": ["Compliance", "Non-Compliance", "Land Tax Compliance"], "policy": "Taxation Administration Act 1997 — s45", "process": "Monitor & Enforce Compliance", "maturity": "Low", "processRef": "", "subProcess": ""}, {"name": "Audit Management", "description": "Conduct audit activities to validate correctness and compliance with land tax obligations.", "synonyms": ["Audit", "Compliance Audit", "Land Tax Audit"], "policy": "Taxation Administration Act 1997 — Part 9", "process": "Conduct Land Tax Audit", "maturity": "Low", "processRef": "", "subProcess": ""}, {"name": "Risk Management", "description": "Identify and manage risks associated with Land Tax administration.", "synonyms": ["Risk", "Land Tax Risk", "Risk Register", "Risk Assessment"], "policy": "Taxation Administration Act 1997 — s63", "process": "Identify & Manage Compliance Risk", "maturity": "Low", "processRef": "", "subProcess": ""}, {"name": "Quality Assurance Management", "description": "Ensure accuracy and consistency of Land Tax decisions through sampling and review activities.", "synonyms": ["QA", "Quality Check", "Decision Review", "Accuracy"], "policy": "Taxation Administration Act 1997 — s127–128", "process": "Perform Quality Assurance Review", "maturity": "Low", "processRef": "", "subProcess": ""}]}, {"name": "Case Management", "l2": [{"name": "Referral Management", "l3": [{"name": "Private Ruling Management", "description": "Managing applications for private rulings on land tax obligations.", "synonyms": ["Private Ruling", "Ruling Application", "Advance Opinion"], "policy": "", "process": "Process Private Ruling Application", "maturity": "Low", "processRef": "", "subProcess": ""}]}]}]}, {"stage": "VS6 – Provide Certificates & Assurance", "shortStage": "Provide Certificates & Assurance", "description": "Provide trusted evidence of Land Tax status relied on by customers and third parties.", "invokes": ["Assessment Management", "Customer Communication Management"], "l1": [{"name": "Certificates & Notifications (Land Tax)", "l2": [{"name": "Issue Land Tax Certificates", "description": "Issue certificates confirming Land Tax status for land, used in property settlement and conveyancing.", "synonyms": ["Land Tax Certificate", "Clearance Certificate", "Settlement Certificate"], "policy": "Taxation Administration Act 1997 — s128", "process": "Issue Land Tax Certificate", "maturity": "Low", "processRef": "", "subProcess": ""}, {"name": "Certificate Evidence & Record Management", "description": "Maintain records and evidence supporting issued certificates, including liability outstanding at issue.", "synonyms": ["Certificate Record", "Evidence", "Certificate History"], "policy": "Taxation Administration Act 1997 — s128–129", "process": "Maintain Certificate Evidence & Records", "maturity": "Low", "processRef": "", "subProcess": ""}]}]}];

const COMMON_COUNT = 37;
const SG_COUNT = 72;
const COMMON_HIGH = 10;
const SG_HIGH = 10;

const MATURITY_SCORE = {High:3, Medium:2, Low:1};
const MATURITY_ORDER = [‘High’,‘Medium’,‘Low’];
const MAT_COLORS = {
High:{bg:’#dff0e0’,text:’#2a7a3b’},
Medium:{bg:’#fff5d6’,text:’#8a6500’},
Low:{bg:’#fde8e8’,text:’#b53030’}
};
const MATURITY_DESC = {
High:‘The right skills, documented processes, and full system support are in place.’,
Medium:‘Skills exist with gaps; processes partially documented; some manual workarounds needed.’,
Low:‘Significant gaps in skills, process, or technology. Ad hoc, undocumented, or heavily reliant on key individuals.’
};

function getAllCaps(){
const caps=[];
DATA.forEach(s=>{
s.l1.forEach(l1=>{
l1.l2.forEach(l2=>{
if(l2.l3&&l2.l3.length){
l2.l3.forEach(l3=>caps.push({name:l3.name,maturity:l3.maturity||‘Low’,l1:l1.name,stage:s.shortStage}));
} else {
caps.push({name:l2.name,maturity:l2.maturity||‘Low’,l1:l1.name,stage:s.shortStage});
}
});
});
});
return caps;
}

function avgScore(caps){
if(!caps.length)return 0;
return caps.reduce((s,c)=>s+(MATURITY_SCORE[c.maturity]||1),0)/caps.length;
}

function countByMaturity(caps){
const c={High:0,Medium:0,Low:0};
caps.forEach(x=>c[x.maturity]=(c[x.maturity]||0)+1);
return c;
}

function pillClass(avg){return avg>=2.5?‘score-pill–high’:avg>=1.5?‘score-pill–mid’:‘score-pill–low’;}

function render(){
const allCaps=getAllCaps();
const total=allCaps.length;
const avg=avgScore(allCaps);
const matCount=countByMaturity(allCaps);

// Data notice
const notice=document.getElementById(‘dataNotice’);
if(matCount.Low===total){
notice.innerHTML=‘⚠️ Maturity data pending — all capabilities currently set to Low.’;
} else if(matCount.Low/total>0.5){
notice.innerHTML=‘⚠️ Maturity partially assessed — ‘+matCount.Low+’ of ‘+total+’ LTX capabilities still at Low.’;
} else {
notice.style.display=‘none’;
}

// Scorecards
document.getElementById(‘scorecards’).innerHTML=`<div class="scorecard"><div class="scorecard__label">LTX Capabilities</div><div class="scorecard__value">${total}</div><div class="scorecard__detail">${matCount.High||0} High · ${matCount.Medium||0} Medium · ${matCount.Low||0} Low</div></div> <div class="scorecard"><div class="scorecard__label">Common Capabilities</div><div class="scorecard__value">${COMMON_COUNT}</div><div class="scorecard__detail">${COMMON_HIGH} High · ${COMMON_COUNT - COMMON_HIGH} Low</div></div> <div class="scorecard"><div class="scorecard__label">Supporting Capabilities</div><div class="scorecard__value">${SG_COUNT}</div><div class="scorecard__detail">${SG_HIGH} High · ${SG_COUNT - SG_HIGH} Low</div></div> <div class="scorecard"><div class="scorecard__label">Average Maturity Score</div><div class="scorecard__value">${avg.toFixed(1)}</div><div class="scorecard__detail"><span class="score-pill ${pillClass(avg)}">${avg.toFixed(1)} / 3.0</span><br>out of 3.0</div></div> <div class="scorecard"><div class="scorecard__label">Low Maturity</div><div class="scorecard__value">${Math.round((matCount.Low/total)*100)}%</div><div class="scorecard__detail">${matCount.Low} LTX capabilities at Low</div></div> <div class="scorecard"><div class="scorecard__label">High Maturity</div><div class="scorecard__value">${matCount.High}</div><div class="scorecard__detail">${matCount.High?Math.round((matCount.High/total)*100)+'% of LTX capabilities':'None assessed High'}</div></div>`;

// Maturity by stage bars
let barsHTML=’’;
DATA.forEach(s=>{
const caps=[];
s.l1.forEach(l1=>l1.l2.forEach(l2=>{
if(l2.l3&&l2.l3.length) l2.l3.forEach(l3=>caps.push({maturity:l3.maturity||‘Low’}));
else caps.push({maturity:l2.maturity||‘Low’});
}));
const sAvg=avgScore(caps);
const sCount=countByMaturity(caps);
const ct=caps.length;
barsHTML+=`<div class="mat-bar-row"><div class="mat-bar-header"><span class="mat-bar-header__name">${s.shortStage}</span><span class="mat-bar-header__right"><span class="score-pill ${pillClass(sAvg)}">${sAvg.toFixed(1)} / 3.0</span><span class="mat-bar-header__count">${ct} caps</span></span></div><div class="mat-bar-track">`;
MATURITY_ORDER.forEach(m=>{
if(sCount[m]>0){
const w=(sCount[m]/ct)*100;
barsHTML+=`<div class="mat-bar-segment mat-bar-segment--${m.toLowerCase()}" style="width:${w}%" title="${m}: ${sCount[m]}"></div>`;
}
});
barsHTML+=`</div></div>`;
});
document.getElementById(‘matBars’).innerHTML=barsHTML;

// Donut SVG
const cx=65,cy=65,r=48,sw=18;
const circ=2*Math.PI*r;
let donutArcs=’’;
let cumOffset=0;
MATURITY_ORDER.forEach(m=>{
if(matCount[m]>0){
const pct=matCount[m]/total;
const dash=pct*circ;
const gap=circ-dash;
donutArcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${MAT_COLORS[m].bg}" stroke-width="${sw}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-cumOffset*circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
cumOffset+=pct;
}
});
const legendItems=MATURITY_ORDER.map(m=>`<li><span class="donut-legend__swatch" style="background:${MAT_COLORS[m].bg}"></span>${m} <span class="donut-legend__count">${matCount[m]}</span> <span class="donut-legend__pct">(${Math.round(matCount[m]/total*100)}%)</span></li>`).join(’’);
document.getElementById(‘donut’).innerHTML=`<div class="donut-container"><svg viewBox="0 0 130 130" width="140" height="140"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef2f7" stroke-width="${sw}"/>${donutArcs}<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#1a2332">${total}</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="Roboto Mono" font-size="9" fill="#94a3b8">TOTAL</text></svg><ul class="donut-legend">${legendItems}</ul></div>`;

// Complexity chart
const stageCounts=DATA.map(s=>{
let ct=0;
s.l1.forEach(l1=>l1.l2.forEach(l2=>{if(l2.l3&&l2.l3.length)ct+=l2.l3.length;else ct++;}));
return {name:s.shortStage,count:ct};
}).sort((a,b)=>b.count-a.count);
const maxCount=Math.max(…stageCounts.map(s=>s.count));
document.getElementById(‘complexity’).innerHTML=stageCounts.map(s=>`<div class="complexity-row"><span class="complexity-row__label">${s.name}</span><div class="complexity-track"><div class="complexity-fill" style="width:${(s.count/maxCount)*100}%"></div></div><span class="complexity-row__count">${s.count}</span></div>`).join(’’);

// Scale reference
document.getElementById(‘scaleRef’).innerHTML=`<div class="scale-ref">${MATURITY_ORDER.map(m=>`<div class="scale-ref__item"><div class="scale-ref__swatch" style="background:${MAT_COLORS[m].bg}"></div><span class="scale-ref__label" style="color:${MAT_COLORS[m].text}">${m}</span><span class="scale-ref__score">${MATURITY_SCORE[m]}</span><span class="scale-ref__desc">${MATURITY_DESC[m]}</span></div>`).join('')}</div>`;

// L1 group table
const l1Groups=[];
DATA.forEach(s=>{
s.l1.forEach(l1=>{
const caps=[];
l1.l2.forEach(l2=>{if(l2.l3&&l2.l3.length)l2.l3.forEach(l3=>caps.push({maturity:l3.maturity||‘Low’}));else caps.push({maturity:l2.maturity||‘Low’});});
l1Groups.push({name:l1.name,stage:s.shortStage,caps,count:caps.length,avg:avgScore(caps),matCount:countByMaturity(caps)});
});
});
l1Groups.sort((a,b)=>a.avg-b.avg);
const dominant=mc=>MATURITY_ORDER.find(m=>mc[m]>0)||‘Low’;
let tableHTML=’<table class="l1-table"><thead><tr><th>L1 Capability</th><th>Value Stage</th><th>Count</th><th>Maturity Profile</th><th>Avg Score</th><th>Dominant</th></tr></thead><tbody>’;
l1Groups.forEach(g=>{
const dom=dominant(g.matCount);
const miniBar=MATURITY_ORDER.map(m=>g.matCount[m]>0?`<div class="mini-bar__seg mat-bar-segment--${m.toLowerCase()}" style="width:${(g.matCount[m]/g.count)*100}%"></div>`:’’).join(’’);
tableHTML+=`<tr><td>${g.name}</td><td>${g.stage}</td><td>${g.count}</td><td><div class="mini-bar">${miniBar}</div></td><td><span class="score-pill ${pillClass(g.avg)}">${g.avg.toFixed(1)} / 3.0</span></td><td><span class="badge" style="background:${MAT_COLORS[dom].bg};color:${MAT_COLORS[dom].text}">${dom}</span></td></tr>`;
});
tableHTML+=’</tbody></table>’;
document.getElementById(‘l1Table’).innerHTML=tableHTML;
}
render();
</script>

</body>
</html>
