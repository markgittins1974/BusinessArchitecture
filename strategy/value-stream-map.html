<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Tax Value Stream Map</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        body.fullscreen { padding: 0; }

        .container { max-width: 100%; margin: 0 auto; }

        body.fullscreen .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 40px;
            border-bottom: 2px solid #4a90e2;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.fullscreen .header { margin-bottom: 20px; padding: 20px; }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #a0a0a0;
        }

        .fullscreen-btn {
            padding: 8px 16px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .map-wrapper {
            background: #0f1220;
            border: 1px solid #2a3550;
            border-radius: 4px;
            padding: 20px 16px;
            overflow-x: auto;
        }

        .value-stream {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .stage {
            background: linear-gradient(135deg, #1a2340, #0f1628);
            border: 1px solid #3a5a9f;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-width: 220px;
        }

        .stage-header { margin-bottom: 10px; }

        .stage-id {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stage-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .capabilities-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .capability-card {
            background: linear-gradient(135deg, #162850, #0d1a30);
            border: 1px solid #2a4570;
            border-radius: 3px;
            padding: 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .capability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capability-toggle {
            width: 18px;
            height: 18px;
            border: 1px solid #4a90e2;
            color: #4a90e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border-radius: 2px;
        }

        .detail-panel {
            position: fixed;
            right: 0; top: 0;
            width: 360px;
            height: 100vh;
            background: linear-gradient(135deg, #1a2340, #0f1628);
            border-left: 2px solid #4a90e2;
            display: none;
            flex-direction: column;
        }

        .detail-panel.open { display: flex; }

        .panel-header {
            padding: 20px;
            border-bottom: 2px solid #4a90e2;
            display: flex;
            justify-content: space-between;
        }

        .panel-close-btn {
            cursor: pointer;
            font-size: 20px;
            color: #4a90e2;
        }

        .panel-content { padding: 20px; overflow-y: auto; }

        .stage:nth-child(1) .stage-id { color:#e24a4a; }
        .stage:nth-child(2) .stage-id { color:#e2a04a; }
        .stage:nth-child(3) .stage-id { color:#c4e24a; }
        .stage:nth-child(4) .stage-id { color:#4ae290; }
        .stage:nth-child(5) .stage-id { color:#4ae2d2; }
        .stage:nth-child(6) .stage-id { color:#4a9ae2; }
        .stage:nth-child(7) .stage-id { color:#8a4ae2; }
        .stage:nth-child(8) .stage-id { color:#e24abf; }
        .stage:nth-child(9) .stage-id { color:#e26a4a; }
    </style>
</head>

<body>
<div class="container">

<div class="header">
    <div>
        <h1>LAND TAX VALUE STREAM MAP</h1>
        <p>Execution Capabilities mapped to 9 Value Stages</p>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Maximise</button>
</div>

<div class="map-wrapper">
    <div class="value-stream" id="valueStream"></div>
</div>

</div>

<div class="detail-panel" id="detailPanel">
    <div class="panel-header">
        <div>
            <div class="stage-id" id="panelStageId"></div>
            <div id="panelCapabilityName"></div>
        </div>
        <div class="panel-close-btn" onclick="closeDetailPanel()">×</div>
    </div>
    <div class="panel-content" id="panelContent"></div>
</div>

<script>
/* GOVERNANCE NOTE
 * This view is structurally immutable.
 * Data is ingested from a governed CSV (SharePoint list export).
 */

async function loadCSV(url) {
    const res = await fetch(url);
    const text = await res.text();
    const [header, ...rows] = text.trim().split('\n');
    const keys = header.split(',');

    return rows.map(r => {
        const vals = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const o = {};
        keys.forEach((k,i)=>o[k.trim()] = vals[i]?.replace(/^"|"$/g,'').trim());
        return o;
    });
}

function renderStages(data) {
    const stages = {};

    data.forEach(r => {
        if (!stages[r.ValueStageID]) {
            stages[r.ValueStageID] = {
                id: r.ValueStageID,
                name: r.ValueStageName,
                desc: r.ValueStageDescription,
                caps: []
            };
        }
        stages[r.ValueStageID].caps.push({
            id: r.CapabilityID,
            name: r.CapabilityName,
            desc: r.CapabilityDescription,
            maturity: r.CapabilityMaturityLevel,
            priority: r.Priority || '—'
        });
    });

    const container = document.getElementById('valueStream');
    container.innerHTML = '';

    Object.values(stages).forEach(stage => {
        const s = document.createElement('div');
        s.className = 'stage';

        s.innerHTML = `
            <div class="stage-header">
                <div class="stage-id">${stage.id}</div>
                <div class="stage-name">${stage.name}</div>
            </div>
            <div class="capabilities-container"></div>
        `;

        const c = s.querySelector('.capabilities-container');

        stage.caps.forEach(cap => {
            const card = document.createElement('div');
            card.className = 'capability-card';
            card.innerHTML = `
                <div class="capability-header">
                    <div>${cap.name}</div>
                    <div class="capability-toggle">+</div>
                </div>
            `;
            card.onclick = () => openDetailPanel(stage, cap);
            c.appendChild(card);
        });

        container.appendChild(s);
    });
}

function openDetailPanel(stage, cap) {
    document.getElementById('panelStageId').textContent = stage.id;
    document.getElementById('panelCapabilityName').textContent = cap.name;
    document.getElementById('panelContent').innerHTML = `
        <p>${cap.desc}</p><br>
        <p><strong>Maturity:</strong> ${cap.maturity}</p>
        <p><strong>Priority:</strong> ${cap.priority}</p>
        <p><strong>Capability ID:</strong> ${cap.id}</p>
    `;
    document.getElementById('detailPanel').classList.add('open');
}

function closeDetailPanel() {
    document.getElementById('detailPanel').classList.remove('open');
}

function toggleFullscreen() {
    document.body.classList.toggle('fullscreen');
}

document.addEventListener('DOMContentLoaded', async () => {
    const data = await loadCSV('./SharePoint_List_ValueStage_Capability_Import.csv');
    renderStages(data);
});
</script>
</body>
</html>
``
