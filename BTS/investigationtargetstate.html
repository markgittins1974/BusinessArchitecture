<!DOCTYPE html>

<html lang="en">
<head>

<title>SRO Investigations – Target State Service Blueprint</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; }
body { overflow: hidden; }

.app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

.topbar {
display: flex; align-items: center; justify-content: space-between;
padding: 0 16px; height: 64px;
background: linear-gradient(90deg, #15803d 0%, #059669 100%); color: white; flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-meta { font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.3; }

.legend {
display: flex; align-items: center; gap: 16px; padding: 10px 16px;
background: white; border-bottom: 1px solid #e0e4ed; flex-shrink: 0;
font-size: 9px; font-weight: 600; overflow-x: auto;
}
.legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

.main-content { display: flex; flex: 1; overflow: hidden; }
.grid-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.grid-wrapper { flex: 1; overflow: auto; }

.grid {
display: grid;
grid-template-columns: 100px repeat(6, 160px);
gap: 0;
width: max-content;
min-width: 100%;
}

.header-cell {
position: sticky; top: 0; z-index: 20;
padding: 0;
background: #f8fafc; border-bottom: 2px solid #059669;
display: flex; align-items: stretch;
min-height: 85px;
}

.header-corner { width: 100px; border-right: 1px solid #e0e4ed; }

.header-stage {
width: 160px; padding: 6px 4px;
display: flex; align-items: center; justify-content: center;
text-align: center; flex-direction: column; gap: 2px;
background: #059669; color: white; border-right: 1px solid #047857;
font-size: 8px; font-weight: 700; line-height: 1.15;
cursor: pointer; transition: background 0.15s;
}
.header-stage:hover { background: #047857; }
.header-stage.selected { background: #0d6b47; }

.stage-code { font-size: 9px; font-weight: 700; }
.stage-gate { font-size: 7px; opacity: 0.75; margin-top: 2px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 2px; }

.lane-header {
position: sticky; left: 0; z-index: 10;
width: 100px; padding: 8px 4px;
background: #f8fafc; border-bottom: 1px solid #edf0f5; border-right: 1px solid #e0e4ed;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
cursor: pointer; transition: background 0.15s;
user-select: none; font-size: 8px; font-weight: 700; text-transform: uppercase; text-align: center;
line-height: 1;
}
.lane-header:hover { background: #f1f5f9; }
.lane-icon { font-size: 13px; }

.cell {
padding: 6px; border-bottom: 1px solid #edf0f5; border-right: 1px solid #e0e4ed;
min-height: 85px; display: flex; flex-direction: column; gap: 3px;
cursor: pointer; transition: background 0.15s, border-color 0.15s;
font-size: 8px; line-height: 1.3; color: #1a1a2e; word-wrap: break-word;
}
.cell:hover { border-color: #059669; box-shadow: inset 0 0 8px rgba(5,150,105,0.1); }
.cell.selected { border: 2px solid #059669; background: #f0fdf4; }

.cell-main { flex: 1; font-weight: 600; color: #0f172a; }

.badge {
display: inline-flex; align-items: center; gap: 2px;
padding: 1px 4px; border-radius: 2px; font-size: 7px; font-weight: 600;
width: fit-content;
}
.badge.gate { background: #fee2e2; color: #991b1b; }
.badge.sla { background: #fef3c7; color: #92400e; }
.badge.sync { background: #dbeafe; color: #0c4a6e; }

.badges { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; }

.side-panel {
width: 0; overflow: hidden; transition: width 0.25s ease;
background: white; border-left: 1px solid #e0e4ed; flex-shrink: 0;
display: flex; flex-direction: column;
}
.side-panel.open { width: 420px; }

.panel-header {
padding: 14px 16px 12px; border-bottom: 1px solid #e8eaf0; flex-shrink: 0;
position: relative;
}
.panel-badge {
display: inline-flex; align-items: center; gap: 4px;
font-size: 8px; font-weight: 700; text-transform: uppercase;
padding: 2px 6px; border-radius: 2px; margin-bottom: 6px;
}
.panel-title { font-size: 14px; font-weight: 700; color: #059669; margin-bottom: 3px; }
.panel-stage { font-size: 10px; color: #6b7280; }
.panel-close {
position: absolute; top: 12px; right: 12px;
background: none; border: none; cursor: pointer; font-size: 18px;
color: #9ca3af; transition: color 0.15s;
}
.panel-close:hover { color: #374151; }

.panel-body {
flex: 1; overflow-y: auto; padding: 14px 16px;
display: flex; flex-direction: column; gap: 12px;
}

.section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #059669; margin-bottom: 4px; }
.section-body { font-size: 10px; color: #374151; line-height: 1.5; }

.bullet-list { font-size: 9px; color: #374151; line-height: 1.6; white-space: pre-wrap; font-family: Segoe UI, sans-serif; }

.detail-box {
background: #f1f5f9; border-left: 2px solid #059669; padding: 8px;
border-radius: 2px; font-size: 9px; line-height: 1.4;
}

.divider { height: 1px; background: #f1f5f9; }

.tag { display: inline-block; padding: 2px 6px; background: #dcfce7; color: #166534; border-radius: 2px; font-size: 8px; font-weight: 500; margin-right: 3px; margin-bottom: 2px; }
</style>

</head>

    process: { text: 'S6 Complete', purpose: 'Archive gate: all prerequisites complete. Workflow finished. Case immutable.', detail: ['GATE: Investigation workflow complete when:', '• Case archived (read-only status)', '• Closure Report generated & stored', '• Objection window tracked (if applicable, 60d from notice)', '• All Investigation_Action logged (31+ activities)', '• eSys sync confirmed (Assessment finalized / IC closed)', 'Compliance file ready for audit', 'Retention: Case archived >7 years (per SRO compliance)'], gates: ['All gates passed'], sla: 'Continuous', sync: 'eSys sync', tags: ['Complete'] }
  }
};

let selected = null;
let selectedStage = null;

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  const headerCorner = document.createElement('div');
  headerCorner.className = 'header-cell header-corner';
  grid.appendChild(headerCorner);
  
  STAGES.forEach(stage => {
    const headerCell = document.createElement('div');
    headerCell.className = 'header-cell header-stage';
    if (selectedStage === stage.id) headerCell.classList.add('selected');
    headerCell.innerHTML = `<div class="stage-code">${stage.code}</div><div>${stage.name}</div><div class="stage-gate">${stage.gate}</div>`;
    headerCell.onclick = () => {
      selectedStage = selectedStage === stage.id ? null : stage.id;
      selected = null;
      render();
      renderPanel();
    };
    grid.appendChild(headerCell);
  });

  LANES.forEach(lane => {
    const laneHeader = document.createElement('div');
    laneHeader.className = 'lane-header';
    laneHeader.innerHTML = `<span class="lane-icon">${lane.icon}</span><span>${lane.label}</span>`;
    grid.appendChild(laneHeader);

    STAGES.forEach(stage => {
      const cell = document.createElement('div');
      const data = DATA[stage.id]?.[lane.id];
      
      cell.className = 'cell';
      cell.style.background = lane.bg;
      
      if (data) {
        const activity = document.createElement('div');
        activity.className = 'cell-main';
        activity.textContent = data.text;
        cell.appendChild(activity);

        const badges = document.createElement('div');
        badges.className = 'badges';
        if (data.gates && data.gates.length > 0 && data.gates[0] !== '-') {
          const gateBadge = document.createElement('div');
          gateBadge.className = 'badge gate';
          gateBadge.textContent = '⚠ GATE';
          badges.appendChild(gateBadge);
        }
        if (data.sla !== '-') {
          const slaBadge = document.createElement('div');
          slaBadge.className = 'badge sla';
          slaBadge.textContent = '⏳ ' + data.sla;
          badges.appendChild(slaBadge);
        }
        if (data.sync !== '-') {
          const syncBadge = document.createElement('div');
          syncBadge.className = 'badge sync';
          syncBadge.textContent = '🔄 Sync';
          badges.appendChild(syncBadge);
        }
        cell.appendChild(badges);
        
        cell.onclick = () => {
          selected = { stage: stage.id, lane: lane.id, data, stageName: stage.name, laneName: lane.label };
          selectedStage = null;
          render();
          renderPanel();
        };
        cell.style.cursor = 'pointer';
      }
      
      if (selected?.stage === stage.id && selected?.lane === lane.id) {
        cell.classList.add('selected');
      }
      
      grid.appendChild(cell);
    });
  });
}

function renderPanel() {
  const panelDiv = document.getElementById('side-panel');
  const content = document.getElementById('panel-content');
  
  if (!selectedStage && !selected) {
    panelDiv.classList.remove('open');
    return;
  }

  if (selectedStage) {
    const stage = STAGES.find(s => s.id === selectedStage);
    const purposes = {
      s1: { purpose: 'Translate eSys PIC event into Salesforce case. Assign to investigator. 24h gate.', why: 'eSys detects compliance risk. Case must be created and assigned within 24 hours to prevent delays.', success: 'Case created in Salesforce within 4h of PIC. TL confirmed assignment. Investigator ready for S2.', gate: '24h hard stop. Intake form 100% complete AND TL approved assignment.' },
      s2: { purpose: 'Define investigation scope (revenue lines, period). Lock scope. Issue entry letter to taxpayer.', why: 'Scope is the boundary. Once locked, cannot be expanded (prevents scope creep). Entry letter is first taxpayer notification. Critical for audit defensibility.', success: 'Revenue_Line__c records created and locked. Entry letter issued. TL approved. First notification sent.', gate: '5+2 days. Scope locked + TL approved + letter sent + eSys sync confirmed.' },
      s3: { purpose: 'Collect evidence from taxpayer within T+10 deadline. Manage clarifications. Validate quality.', why: 'Evidence is foundation of investigation. Hard deadline prevents indefinite stalling. Quality validation ensures analysis is sound.', success: 'All critical evidence uploaded to TRIM + Salesforce by T+10 (or approved extension). Quality validated. Ready for analysis.', gate: 'T+10 hard stop. Evidence deadline passed + receipt confirmed + quality validated.' },
      s4: { purpose: 'Analyze evidence. Document findings (variances). Prepare recommendation. TL performs QA.', why: 'Analysis is the core. Findings must be documented in structured format (not free-text). QA by TL ensures correctness and defensibility. All calculations formula-driven (zero errors).', success: 'All discrepancies documented in Investigation_Discrepancy__c (locked). QA approved by TL (digital signature). High-risk cases escalated.', gate: '7+3 days. All discrepancies locked + QA approved (3-day SLA) + risk assessed.' },
      s5: { purpose: 'Finalize assessment (or closure). TL digital signature. Issue statutory notice. Sync to eSys.', why: 'Point of no return. Once TL approves, assessment is immutable and syncs to eSys. Requires legal sign-off. Statutory notice is second (final) taxpayer communication. Triggers payment processing.', success: 'Assessment approved by TL (or closure decided if No Finding). Statutory notice issued. eSys assessment created + synced. 60-day objection window (if applicable).', gate: '1+2 days. TL approved + eSys assessment created + notice issued.' },
      s6: { purpose: 'Close case. Generate metrics. Manage objection window. Archive.', why: 'Closure not instant. 60-day objection window is statutory right (if assessment issued). Captures lessons learned and metrics for continuous improvement. Case must be archived for compliance (>7 years).', success: 'Case marked Closed. Closure Report auto-generated. Lessons documented. Objection window tracked (if applicable). Case archived (read-only, >7y retention). Metrics updated on real-time dashboards.', gate: 'Continuous. Case archived + audit trail logged (31+ actions) + objection window managed.' }
    };
    const p = purposes[selectedStage];
    content.innerHTML = `
      <div class="panel-header">
        <button class="panel-close" onclick="selectedStage=null; render(); renderPanel();">✕</button>
        <div class="panel-badge" style="background: #f0fdf4; color: #059669;">${stage.code}</div>
        <div class="panel-title">${stage.name}</div>
        <div class="panel-stage">Stage Purpose Statement</div>
      </div>
      <div class="panel-body">
        <div><div class="section-title">🎯 Purpose</div><div class="detail-box" style="background: #f0fdf4; border-left-color: #059669;">${p.purpose}</div></div>
        <div class="divider"></div>
        <div><div class="section-title">❓ Why This Stage?</div><div class="section-body">${p.why}</div></div>
        <div class="divider"></div>
        <div><div class="section-title">✅ Success Criteria</div><div class="detail-box" style="background: #ecfdf5; border-left-color: #10b981;">${p.success}</div></div>
        <div class="divider"></div>
        <div><div class="section-title">🚫 Gate</div><div class="detail-box" style="background: #fee2e2; border-left-color: #dc2626; color: #991b1b;">${p.gate}</div></div>
      </div>
    `;
  } else if (selected) {
    const data = selected.data;
    const lane = LANES.find(l => l.id === selected.lane);
    
    content.innerHTML = `
      <div class="panel-header">
        <button class="panel-close" onclick="selected=null; render(); renderPanel();">✕</button>
        <div class="panel-badge" style="background: ${lane.bg}; color: ${lane.color};">${lane.icon} ${selected.laneName}</div>
        <div class="panel-title">${data.text}</div>
        <div class="panel-stage">${selected.stageName}</div>
      </div>
      <div class="panel-body">
        <div><div class="section-title">Purpose</div><div class="detail-box">${data.purpose}</div></div>
        <div class="divider"></div>
        <div><div class="section-title">Details</div><div class="bullet-list">${Array.isArray(data.detail) ? data.detail.map(d => '• ' + d).join('\n') : data.detail}</div></div>
        ${data.gates && data.gates.length > 0 && data.gates[0] !== '-' ? `<div class="divider"></div><div><div class="section-title">Gates</div><div class="detail-box">${data.gates.join(', ')}</div></div>` : ''}
        <div class="divider"></div>
        <div><div class="section-title">SLA</div><div class="detail-box">${data.sla}</div></div>
        ${data.sync && data.sync !== '-' ? `<div class="divider"></div><div><div class="section-title">eSys Sync</div><div class="detail-box">${data.sync}</div></div>` : ''}
        ${data.tags && data.tags.length > 0 ? `<div class="divider"></div><div><div class="section-title">Tags</div>${data.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
    `;
  }
  
  panelDiv.classList.add('open');
}

function exportToCSV() {
  const headers = ['Stage', 'Code', 'Lane', 'Role', 'Action', 'Purpose', 'Details', 'Gates', 'SLA', 'eSys Sync', 'Tags'];
  const rows = [];
  
  Object.keys(DATA).forEach(stageId => {
    const stage = STAGES.find(s => s.id === stageId);
    const stageData = DATA[stageId];
    
    LANES.forEach(lane => {
      const cellData = stageData[lane.id];
      if (cellData) {
        const detailsStr = Array.isArray(cellData.detail) 
          ? cellData.detail.join('; ')
          : cellData.detail;
        
        const gatesStr = cellData.gates && cellData.gates.length > 0 && cellData.gates[0] !== '-'
          ? cellData.gates.join('; ')
          : '';
        
        const tagsStr = cellData.tags && cellData.tags.length > 0
          ? cellData.tags.join('; ')
          : '';
        
        rows.push([
          stage.code,
          stage.code,
          lane.label,
          cellData.text,
          cellData.purpose,
          detailsStr,
          gatesStr,
          cellData.sla,
          cellData.sync,
          tagsStr
        ]);
      }
    });
  });
  
  function escapeCSV(val) {
    if (val === null || val === undefined) return '';
    const str = String(val);
    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }
  
  let csv = headers.map(escapeCSV).join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(escapeCSV).join(',') + '\n';
  });
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', 'sro_investigations_blueprint_' + new Date().toISOString().slice(0,10) + '.csv');
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

render();
</script>
