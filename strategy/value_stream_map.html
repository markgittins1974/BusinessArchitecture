    function renderStages(stages) {
        const container = document.getElementById('valueStream');
        container.innerHTML = '';

        stages.forEach((stage, index) => {
            const stageDiv = document.createElement('div');
            stageDiv.className = 'stage';
            
            // Create stage header
            const headerDiv = document.createElement('div');
            headerDiv.className = 'stage-header';
            headerDiv.innerHTML = `
                <div class="stage-header-content">
                    <div class="stage-id">${escapeHtml(stage.id)}</div>
                    <div class="stage-name">${escapeHtml(stage.name)}</div>
                </div>
            `;
            stageDiv.appendChild(headerDiv);

            // Create capabilities container
            const capContainer = document.createElement('div');
            capContainer.className = 'capabilities-container';

            // Add placeholder capabilities (3 per stage)
            const capabilities = [
                { name: `Capability 1.${index + 1}`, description: 'Description for capability 1' },
                { name: `Capability 2.${index + 1}`, description: 'Description for capability 2' },
                { name: `Capability 3.${index + 1}`, description: 'Description for capability 3' }
            ];

            capabilities.forEach(cap => {
                const capCard = document.createElement('div');
                capCard.className = 'capability-card';
                capCard.innerHTML = `
                    <div class="capability-header">
                        <div class="capability-name">${escapeHtml(cap.name)}</div>
                        <div class="capability-toggle">+</div>
                    </div>
                    <div class="capability-description">${escapeHtml(cap.description)}</div>
                `;

                capCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openDetailPanel(stage, cap);
                });

                capContainer.appendChild(capCard);
            });

            stageDiv.appendChild(capContainer);
            container.appendChild(stageDiv);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function loadCSVFromStorage() {
        // Detect environment and construct appropriate data URLs
        const currentHost = window.location.hostname;
        let vsCapUrl, processUrl;

        if (currentHost.includes('github.io') || currentHost.includes('githubusercontent.com')) {
            // GitHub Pages or GitHub raw content
            vsCapUrl = 'https://raw.githubusercontent.com/markgittins74/BusinessArchitecture/main/value-stream-capability.csv';
            processUrl = 'https://raw.githubusercontent.com/markgittins74/BusinessArchitecture/main/processes.csv';
        } else if (currentHost.includes('z13.web.core.windows.net') || currentHost.includes('azure')) {
            // Azure Static Website
            vsCapUrl = '/value-stream-capability.csv';
            processUrl = '/processes.csv';
        } else if (currentHost === 'localhost' || currentHost === '127.0.0.1') {
            // Local testing
            vsCapUrl = '/value-stream-capability.csv';
            processUrl = '/processes.csv';
        } else {
            // Default fallback
            vsCapUrl = '/value-stream-capability.csv';
            processUrl = '/processes.csv';
        }

        console.log(`Loading data from: ${vsCapUrl} and ${processUrl} (Host: ${currentHost})`);

        Promise.all([
            fetch(vsCapUrl).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}: Value Stream CSV not found`);
                return r.text();
            }),
            fetch(processUrl).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}: Processes CSV not found`);
                return r.text();
            })
        ])
        .then(([vsCapCSV, processCSV]) => {
            // Parse CSVs
            const capabilities = parseCSV(vsCapCSV);
            const processes = parseCSV(processCSV);
            
            // Build process map
            window.processMap = {};
            processes.forEach(proc => {
                window.processMap[proc.process_id] = proc;
            });
            
            // Build stages from capabilities CSV
            const stagesMap = {};
            
            capabilities.forEach(cap => {
                const stageId = cap.value_stream_id;
                
                if (!stagesMap[stageId]) {
                    stagesMap[stageId] = {
                        id: stageId,
                        name: cap.value_stream_name,
                        description: '',
                        capabilities: []
                    };
                }
                
                const processIds = cap.process_ids ? cap.process_ids.split('|').map(p => p.trim()) : [];
                
                stagesMap[stageId].capabilities.push({
                    id: cap.capability_id,
                    name: cap.capability_name,
                    description: cap.capability_description || '',
                    maturityLevel: cap.maturity_level || 'TBD',
                    owner: cap.owner || 'TBD',
                    priority: cap.priority || 'Medium',
                    processIds: processIds
                });
            });
            
            const stages = Object.values(stagesMap);
            
            if (stages.length === 0) {
                alert('No value streams found in CSV');
                return;
            }
            
            console.log(`Loaded ${stages.length} value streams with ${capabilities.length} capabilities and ${processes.length} processes`);
            renderStages(stages);
        })
        .catch(error => {
            console.error('Error loading data:', error);
            alert(`Failed to load data: ${error.message}`);
        });
    }

    function parseCSV(csv) {
        const lines = csv.trim().split('\n');
        const stages = [];

        // Skip header if present (detect by checking first line format)
        let startIndex = 0;
        if (lines[0].toLowerCase().includes('id') || lines[0].toLowerCase().includes('name')) {
            startIndex = 1;
        }

        for (let i = startIndex; i < lines.length; i++) {
            const parts = parseCSVLine(lines[i]);
            if (parts.length >= 3) {
                stages.push({
                    id: parts[0].trim(),
                    name: parts[1].trim(),
                    description: parts[2].trim()
                });
            }
        }

        return stages;
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let insideQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];

            if (char === '"') {
                if (insideQuotes && nextChar === '"') {
                    current += '"';
                    i++;
                } else {
                    insideQuotes = !insideQuotes;
                }
            } else if (char === ',' && !insideQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }

        result.push(current);
        return result;
    }

    // Auto-load data on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadCSVFromStorage();
    });

    }, 2000);

    function openDetailPanel(stage, capability) {
        document.getElementById('panelStageId').textContent = escapeHtml(stage.id);
        document.getElementById('panelCapabilityName').textContent = escapeHtml(capability.name);
        
        const panelContent = document.getElementById('panelContent');
        let html = `
            <div class="panel-section">

                <div class="panel-section-content">${escapeHtml(capability.description)}</div>
            </div>
            
            <div class="panel-section">

                <div class="panel-metadata">
                    <div class="panel-meta-item">
                        <div class="panel-meta-label">Maturity Level</div>

                    </div>
                    <div class="panel-meta-item">
                        <div class="panel-meta-label">Owner</div>
                        <div class="panel-meta-value">${capability.owner || 'TBD'}</div>
                    </div>
                    <div class="panel-meta-item">
                        <div class="panel-meta-label">Priority</div>
                        <div class="panel-meta-value">${capability.priority || 'Medium'}</div>
                    </div>
                </div>
            </div>
        `;
        
        // Add processes section if capability has processIds
        if (capability.processIds && capability.processIds.length > 0) {
            html += `
                <div class="panel-section">
                    <div class="panel-section-title">Linked Processes</div>
            `;
            
            capability.processIds.forEach(procId => {
                const process = window.processMap[procId];
                if (process) {
                    html += `
                        <div style="background: #0f1628; border: 1px solid #2a4570; border-radius: 3px; padding: 10px; margin-bottom: 8px;">
                            <div style="font-size: 12px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px;">${escapeHtml(process.process_name || process.name)}</div>
                            <div style="font-size: 11px; color: #b0b0b0; line-height: 1.5;">${escapeHtml(process.process_description || process.description || '')}</div>
                            ${process.owner ? `<div style="font-size: 10px; color: #6a7a9a; margin-top: 6px;">Owner: ${escapeHtml(process.owner)}</div>` : ''}
                            ${process.effort ? `<div style="font-size: 10px; color: #6a7a9a;">Effort: ${escapeHtml(process.effort)}</div>` : ''}
                        </div>
                    `;
                }
            });
            
            html += `</div>`;
        }
        
        panelContent.innerHTML = html;
        document.getElementById('detailPanel').classList.add('open');
    }

    function closeDetailPanel() {
        document.getElementById('detailPanel').classList.remove('open');
    }

    // Close panel when pressing Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeDetailPanel();
        }
    });
</script>
