<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Tax Value Stream Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'IBM Plex Mono','Courier New',monospace;
    background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);
    color:#e0e0e0;
    padding:40px 20px;
    min-height:100vh
}
body.fullscreen{padding:0}
.container{max-width:100%;margin:0 auto}
.header{
    margin-bottom:40px;
    border-bottom:2px solid #4a90e2;
    padding-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center
}
.header h1{font-size:28px;color:#fff}
.header p{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#a0a0a0
}
.fullscreen-btn{
    padding:8px 16px;
    background:#4a90e2;
    color:#fff;
    border:none;
    border-radius:3px;
    cursor:pointer
}
.map-wrapper{
    background:#0f1220;
    border:1px solid #2a3550;
    border-radius:4px;
    padding:20px 16px;
    overflow-x:auto
}
.value-stream{display:flex;gap:12px}
.stage{
    background:linear-gradient(135deg,#1a2340,#0f1628);
    border:1px solid #3a5a9f;
    border-radius:4px;
    padding:12px;
    min-width:240px;
    display:flex;
    flex-direction:column
}
.stage-id{
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin-bottom:6px;
    color:#4a90e2
}
.stage-name{font-size:14px;font-weight:600;color:#fff}
.capabilities-container{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.capability-card{
    background:linear-gradient(135deg,#162850,#0d1a30);
    border:1px solid #2a4570;
    border-radius:3px;
    padding:10px;
    cursor:pointer;
    font-size:12px
}
.capability-header{display:flex;justify-content:space-between}
.capability-toggle{
    width:18px;height:18px;
    border:1px solid #4a90e2;
    color:#4a90e2;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px
}
.detail-panel{
    position:fixed;right:0;top:0;
    width:360px;height:100vh;
    background:linear-gradient(135deg,#1a2340,#0f1628);
    border-left:2px solid #4a90e2;
    display:none;
    flex-direction:column
}
.detail-panel.open{display:flex}
.panel-header{
    padding:20px;
    border-bottom:2px solid #4a90e2;
    display:flex;
    justify-content:space-between
}
.panel-close-btn{cursor:pointer;font-size:20px;color:#4a90e2}
.panel-content{padding:20px;overflow-y:auto}

.stage:nth-child(1) .stage-id{color:#e24a4a}
.stage:nth-child(2) .stage-id{color:#e2a04a}
.stage:nth-child(3) .stage-id{color:#c4e24a}
.stage:nth-child(4) .stage-id{color:#4ae290}
.stage:nth-child(5) .stage-id{color:#4ae2d2}
.stage:nth-child(6) .stage-id{color:#4a9ae2}
.stage:nth-child(7) .stage-id{color:#8a4ae2}
.stage:nth-child(8) .stage-id{color:#e24abf}
.stage:nth-child(9) .stage-id{color:#e26a4a}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <div>
        <h1>LAND TAX VALUE STREAM MAP</h1>
        <p>Execution capabilities mapped to 9 value stages</p>
    </div>
    <button class="fullscreen-btn" onclick="document.body.classList.toggle('fullscreen')">Maximise</button>
</div>

<div class="map-wrapper">
    <div class="value-stream" id="valueStream"></div>
</div>

</div>

<div class="detail-panel" id="detailPanel">
    <div class="panel-header">
        <div>
            <div class="stage-id" id="panelStageId"></div>
            <div id="panelCapabilityName"></div>
        </div>
        <div class="panel-close-btn" onclick="closeDetailPanel()">×</div>
    </div>
    <div class="panel-content" id="panelContent"></div>
</div>

<script>
const CSV_URL = './SharePoint_List_ValueStage_Capability_Import.csv';

/* ---------- Robust CSV parser ---------- */
function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const rows=[],row=[];let cell='',q=false;
    for(let i=0;i<text.length;i++){
        const c=text[i],n=text[i+1];
        if(c==='"'){
            if(q && n==='"'){cell+='"';i++} else q=!q;
        }else if(c===','&&!q){row.push(cell);cell=''}
        else if((c==='\n'||c==='\r')&&!q){
            if(c==='\r'&&n==='\n')i++;
            row.push(cell);cell='';
            if(row.some(v=>v.trim()))rows.push(row.slice());
            row.length=0;
        }else cell+=c;
    }
    if(cell||row.length){row.push(cell);if(row.some(v=>v.trim()))rows.push(row)}
    return rows;
}

function val(rec,...keys){
    for(const k of keys){if(rec[k]&&rec[k].trim())return rec[k].trim()}
    return '';
}

async function loadData(){
    const res=await fetch(CSV_URL,{cache:'no-store'});
    const text=await res.text();
    const m=parseCSV(text);
    const headers=m[0];
    return m.slice(1).map(r=>{
        const o={};headers.forEach((h,i)=>o[h]=r[i]||'');
        return {
            stageId:val(o,'ValueStageID','Value Stage ID'),
            stageName:val(o,'ValueStageName','Value Stage Name'),
            stageDesc:val(o,'ValueStageDescription'),
            capId:val(o,'CapabilityID','L2CapabilityID'),
            capName:val(o,'CapabilityName','L2CapabilityName','Title'),
            capDesc:val(o,'CapabilityDescription'),
            maturity:val(o,'CapabilityMaturityLevel','Maturity Level'),
            priority:val(o,'Priority')||'—'
        };
    });
}

function render(data){
    const map={};
    data.forEach(r=>{
        if(!map[r.stageId]){
            map[r.stageId]={id:r.stageId,name:r.stageName,desc:r.stageDesc,caps:[]};
        }
        map[r.stageId].caps.push(r);
    });
    const stages=Object.values(map).sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
    const el=document.getElementById('valueStream');
    el.innerHTML='';
    stages.forEach(s=>{
        const d=document.createElement('div');
        d.className='stage';
        d.innerHTML=`
            <div class="stage-id">${s.id}</div>
            <div class="stage-name">${s.name}</div>
            <div class="capabilities-container"></div>`;
        const c=d.querySelector('.capabilities-container');
        s.caps.forEach(cap=>{
            const cc=document.createElement('div');
            cc.className='capability-card';
            cc.innerHTML=`
                <div class="capability-header">
                    <div>${cap.capName}</div>
                    <div class="capability-toggle">+</div>
                </div>`;
            cc.onclick=()=>openDetail(s,cap);
            c.appendChild(cc);
        });
        el.appendChild(d);
    });
}

function openDetail(stage,cap){
    document.getElementById('panelStageId').textContent=stage.id;
    document.getElementById('panelCapabilityName').textContent=cap.capName;
    document.getElementById('panelContent').innerHTML=`
        <p>${stage.stageDesc||''}</p><br>
        <p>${cap.capDesc}</p><br>
        <p><strong>Maturity:</strong> ${cap.maturity}</p>
        <p><strong>Priority:</strong> ${cap.priority}</p>
        <p><strong>Capability ID:</strong> ${cap.capId}</p>`;
    document.getElementById('detailPanel').classList.add('open');
}
function closeDetailPanel(){document.getElementById('detailPanel').classList.remove('open')}

document.addEventListener('DOMContentLoaded',async()=>{
    const data=await loadData();
    render(data);
});
</script>
</body>
</html>
``
