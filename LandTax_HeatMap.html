<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Land Tax — Heat Maps</title>
  <!-- Fonts (as specified) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef3f7;
      --surface: #f0f4f8;
      --surface-raised: #ffffff;
      --border-subtle: #dce6ef;
      --text-dark: #1e2d3d;
      --text-muted: #4a5f72;
      --accent: #2d7ff9;

      /* Heat map additions */
      --l1-header-bg: #1a3a5c;
      --l2-header-bg: #2d5a8e;

      /* Maturity colour pairs (bg + text) */
      --m-opt-bg: #d6f0f5; --m-opt-text: #1a6e7a;
      --m-def-bg: #dff0e0; --m-def-text: #2a7a3b;
      --m-man-bg: #fff5d6; --m-man-text: #8a6500;
      --m-pla-bg: #eae6f4; --m-pla-text: #5a3fa0;
      --m-ini-bg: #fde8e8; --m-ini-text: #b53030;
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-dark);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 22px 18px 26px; }

    .kicker {
      font-family: Inter, sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7A95AA;
      margin-bottom: 6px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 12px 0;
      color: #1a3a5c;
    }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin: 14px 0 14px; }
    .tab-btn {
      border: 1px solid var(--border-subtle);
      background: var(--surface-raised);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .tab-btn.is-active {
      color: var(--text-dark);
      border-color: rgba(45,127,249,0.35);
      box-shadow: 0 0 0 2px rgba(45,127,249,0.18);
    }

    /* Views */
    .hm-view { display: none; }
    .hm-view.is-active { display: block; }

    /* Filter row */
    .hm-filter {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin: 6px 0 12px;
    }
    .hm-filter__label {
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(74,95,114,0.85);
      margin-right: 4px;
    }
    .hm-filter__btn {
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      user-select: none;
    }
    .hm-filter__btn.is-inactive { opacity: 0.3; }

    .hm-filter__btn--all { background:#fff; border-color:#dce6ef; color:#4a5f72; }
    .hm-filter__btn--defined { background: var(--m-def-bg); border-color: var(--m-def-text); color: var(--m-def-text); }
    .hm-filter__btn--managed { background: var(--m-man-bg); border-color: var(--m-man-text); color: var(--m-man-text); }
    .hm-filter__btn--planned { background: var(--m-pla-bg); border-color: var(--m-pla-text); color: var(--m-pla-text); }
    .hm-filter__btn--initial { background: var(--m-ini-bg); border-color: var(--m-ini-text); color: var(--m-ini-text); }
    .hm-filter__btn--optimised { background: var(--m-opt-bg); border-color: var(--m-opt-text); color: var(--m-opt-text); }

    /* Grid layout */
    .hm-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      align-items: start;
    }

    /* Column header */
    .hm-col-header {
      background: var(--l1-header-bg);
      border-radius: 8px 8px 0 0;
      padding: 10px 10px 12px;
      text-align: center;
    }
    .hm-col-header__vs {
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }
    .hm-col-header__title {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
      color: #fff;
    }

    .hm-col-body {
      background: transparent;
      border-radius: 0 0 8px 8px;
      padding: 8px 0 0;
    }

    /* Capability cells */
    .hm-cell {
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 8px 10px;
      transition: opacity 0.2s ease;
      margin-bottom: 6px;
    }
    .hm-cell:last-child { margin-bottom: 0; }

    .hm-cell__name {
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 5px;
      color: var(--text-dark);
    }
    .hm-cell__badge {
      display: inline-block;
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .is-highlighted { box-shadow: 0 0 0 2px var(--accent); }
    .is-faded { opacity: 0.18; }

    /* Badge colours */
    .m-High { background: var(--m-opt-bg); color: var(--m-opt-text); border: 1px solid rgba(26,110,122,0.25); }
    .m-Medium { background: var(--m-def-bg); color: var(--m-def-text); border: 1px solid rgba(42,122,59,0.25); }
    .m-Low { background: var(--m-man-bg); color: var(--m-man-text); border: 1px solid rgba(138,101,0,0.25); }
    .m-Planned { background: var(--m-pla-bg); color: var(--m-pla-text); border: 1px solid rgba(90,63,160,0.25); }
    .m-Initial { background: var(--m-ini-bg); color: var(--m-ini-text); border: 1px solid rgba(181,48,48,0.25); }

    /* Process cards */
    .proc-card {
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .proc-card:last-child { margin-bottom: 0; }

    .proc-card__header {
      background: var(--l2-header-bg);
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
      color: #fff;
    }

    .proc-card__caps {
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .proc-cap {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 8px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 5px;
    }

    .proc-cap__name {
      font-size: 10px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text-dark);
      flex: 1;
    }

    .proc-cap__badge {
      flex-shrink: 0;
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(74,95,114,0.95);
    }
    .note code { font-family: 'Roboto Mono', monospace; font-size: 11px; }
  

/* === Corrected maturity colour semantics === */
:root {
  --m-high-bg: #dff0e0;   /* green */
  --m-high-text: #2a7a3b;

  --m-medium-bg: #e6f0ff; /* blue */
  --m-medium-text: #1f4fbf;

  --m-low-bg: #fff5d6;    /* yellow */
  --m-low-text: #8a6500;
}

.hm-cell.m-High { background: var(--m-high-bg); border-color: rgba(42,122,59,0.35); }
.hm-cell.m-Medium { background: var(--m-medium-bg); border-color: rgba(31,79,191,0.35); }
.hm-cell.m-Low { background: var(--m-low-bg); border-color: rgba(138,101,0,0.35); }

.hm-cell.m-High .hm-cell__badge { background: var(--m-high-bg); color: var(--m-high-text); }
.hm-cell.m-Medium .hm-cell__badge { background: var(--m-medium-bg); color: var(--m-medium-text); }
.hm-cell.m-Low .hm-cell__badge { background: var(--m-low-bg); color: var(--m-low-text); }

</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">SRO TRANSFORMATION ARCHITECTURE</div>
    <h1 class="title">Land Tax — Heat Maps</h1>

    <div class="tabs">
      <button id="tabCap" class="tab-btn is-active" onclick="switchTab('cap')">Capability Heat Map</button>
      <button id="tabProc" class="tab-btn" onclick="switchTab('proc')">Process Heat Map</button>
    </div>

    <div id="capView" class="hm-view is-active">
      <div class="hm-filter">
        <span class="hm-filter__label">Maturity</span>
        <button class="hm-filter__btn hm-filter__btn--all" data-level="all" onclick="setFilter('all')">All</button>
        <button class="hm-filter__btn hm-filter__btn--optimised is-inactive" data-level="High" onclick="setFilter('High')">High</button>
        <button class="hm-filter__btn hm-filter__btn--defined is-inactive" data-level="Medium" onclick="setFilter('Medium')">Medium</button>
        <button class="hm-filter__btn hm-filter__btn--managed is-inactive" data-level="Low" onclick="setFilter('Low')">Low</button>
        <button class="hm-filter__btn hm-filter__btn--planned is-inactive" data-level="Planned" onclick="setFilter('Planned')">Planned</button>
        <button class="hm-filter__btn hm-filter__btn--initial is-inactive" data-level="Initial" onclick="setFilter('Initial')">Initial</button>
      </div>

      <div id="capGrid" class="hm-grid"></div>
      <div class="note">
        <strong>Data note:</strong> Maturity values are taken from <code>Maturity Level</code> in the CSV. Any non‑spec values are displayed as <code>Planned</code> (default per spec) with the original value retained in the tooltip.
      </div>
    </div>

    <div id="procView" class="hm-view">
      <div id="procGrid" class="hm-grid"></div>
    </div>
  </div>

  <script>
    // Inline DATA array (value stages only)
    const DATA = [{"vs": "VS1", "title": "Maintain Land & Ownership Records", "l1": [{"name": "Maintain Land & Ownership Records", "l2": [{"name": "Taxable Land Maintenance", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}, {"name": "Subdivisions & Consolidations", "maturity": "Low", "process": "Process Subdivision & Consolidation"}, {"name": "Title to Property Relationship", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}, {"name": "Ownership Maintenance", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}, {"name": "Joint Ownership", "maturity": "Low", "process": "Register Joint Ownership"}, {"name": "Land Held on Trust", "maturity": "Low", "process": "Register Land Held on Trust"}, {"name": "Unknown Customer", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}]}]}, {"vs": "VS2", "title": "Determine How Land Is Taxed", "l1": [{"name": "Determine How Land Is Taxed", "l2": [{"name": "Joint Ownership", "maturity": "Low", "process": "Determine Joint Ownership Tax Treatment"}, {"name": "Land Held on Trust", "maturity": "Low", "process": "Determine Trust Tax Treatment"}, {"name": "Determine Land Tax Liability", "maturity": "Low", "process": "Determine Land Tax Liability"}, {"name": "Exemption Creation Management", "maturity": "Low", "process": "Configure Land Tax Exemption Types"}, {"name": "Exemption Application Management", "l3": [{"name": "Automated Exemption Application", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}, {"name": "Manual Exemption Application", "maturity": "Low", "process": "Process Exemption Application"}]}, {"name": "Concession Application", "maturity": "Low", "process": "Process Concession Application"}, {"name": "Tax/Entitlement Rate Management", "maturity": "Low", "process": "Manage Land Tax Rates"}, {"name": "Threshold Management", "l3": [{"name": "Tax Free Threshold Management", "maturity": "Low", "process": "Manage Tax Free Threshold"}]}, {"name": "Land Tax", "l3": [{"name": "Absentee Owner Management", "maturity": "Low", "process": "Manage Absentee Owner Surcharge"}, {"name": "Build to Rent Management", "maturity": "Low", "process": "Manage Build to Rent Registration"}]}, {"name": "Usage Management", "maturity": "Low", "process": "Record & Assess Property Usage"}]}]}, {"vs": "VS3", "title": "Assess & Issue Land Tax", "l1": [{"name": "Assess & Issue Land Tax", "l2": [{"name": "Valuations Maintenance", "maturity": "Low", "process": "Maintain Land Valuations"}, {"name": "General Valuations", "maturity": "Low", "process": "Apply General Valuation Cycle"}, {"name": "Supplementary Valuations", "maturity": "Low", "process": "Apply Supplementary Valuation"}, {"name": "SRO Requested Valuations", "maturity": "Low", "process": "Request & Apply SRO Valuation"}, {"name": "Single Valuation for Multiple Properties", "maturity": "Low", "process": "Apply Single Valuation Across Properties"}, {"name": "Generate Land Tax Assessments", "maturity": "Low", "process": "Generate Land Tax Assessments"}, {"name": "Issue Land Tax Assessments", "maturity": "Low", "process": "Issue Land Tax Assessment Notices"}, {"name": "Issue Cycle Management", "l3": [{"name": "Issue Cycle Schedule Management", "maturity": "Low", "process": "Schedule Annual Issue Cycle"}, {"name": "First Time Liability Management", "maturity": "Low", "process": "Identify & Assess First Time Liability"}]}, {"name": "Liability/Entitlement Calculation Management", "l3": [{"name": "Automated Liability/Entitlement Calculation", "maturity": "High", "process": "Administer Land Ownership and Notice of Acquisition"}, {"name": "Manual Liability/Entitlement Calculation", "maturity": "Low", "process": "Calculate Land Tax Liability (Manual)"}]}, {"name": "Deduction Management", "l3": [{"name": "Trust Deduction Management", "maturity": "Low", "process": "Apply Trust Deduction"}]}, {"name": "Threshold Management", "l3": [{"name": "Minimum Liability Threshold Management", "maturity": "Low", "process": "Apply Minimum Liability Threshold"}]}]}]}, {"vs": "VS4", "title": "Manage Payments & Adjustments", "l1": [{"name": "Manage Payments & Adjustments", "l2": [{"name": "Payment Management", "maturity": "Low", "process": "Receive & Record Payment"}, {"name": "Payment Allocation Management", "maturity": "Low", "process": "Allocate Payment to Liability", "l3": [{"name": "Property Liability Allocation", "maturity": "Low", "process": "Allocate Payment to Property Liability"}]}, {"name": "Instalment Management", "maturity": "Low", "process": "Manage Payment Instalment Arrangement"}, {"name": "Refund Management", "maturity": "Low", "process": "Process Land Tax Refund"}, {"name": "Adjustment Management", "maturity": "Low", "process": "Apply Financial Adjustment"}]}]}, {"vs": "VS5", "title": "Resolve Issues & Enforce Compliance", "l1": [{"name": "Resolve Issues & Enforce Compliance", "l2": [{"name": "Objection Management", "maturity": "Low", "process": "Manage Land Tax Objection"}, {"name": "Valuation Objection Management", "maturity": "Low", "process": "Manage Valuation Objection"}, {"name": "Dispute Resolution Management", "maturity": "Low", "process": "Resolve Land Tax Dispute"}, {"name": "Case Management", "maturity": "Low", "process": "Manage Land Tax Case"}, {"name": "Compliance Management", "maturity": "Low", "process": "Monitor & Enforce Compliance"}, {"name": "Audit Management", "maturity": "Low", "process": "Conduct Land Tax Audit"}, {"name": "Risk Management", "maturity": "Low", "process": "Identify & Manage Compliance Risk"}, {"name": "Quality Assurance Management", "maturity": "Low", "process": "Perform Quality Assurance Review"}, {"name": "Referral Management", "l3": [{"name": "Private Ruling Management", "maturity": "Low", "process": "Process Private Ruling Application"}]}]}]}, {"vs": "VS6", "title": "Provide Certificates & Assurance", "l1": [{"name": "Provide Certificates & Assurance", "l2": [{"name": "Issue Land Tax Certificates", "maturity": "Low", "process": "Issue Land Tax Certificate"}, {"name": "Certificate Evidence & Record Management", "maturity": "Low", "process": "Maintain Certificate Evidence & Records"}]}]}];

    let capBuilt = false;
    let procBuilt = false;

    function switchTab(tab) {
      const tabCap = document.getElementById('tabCap');
      const tabProc = document.getElementById('tabProc');
      const capView = document.getElementById('capView');
      const procView = document.getElementById('procView');

      if (tab === 'cap') {
        tabCap.classList.add('is-active');
        tabProc.classList.remove('is-active');
        capView.classList.add('is-active');
        procView.classList.remove('is-active');
        if (!capBuilt) buildCapHeatMap();
      } else {
        tabProc.classList.add('is-active');
        tabCap.classList.remove('is-active');
        procView.classList.add('is-active');
        capView.classList.remove('is-active');
        if (!procBuilt) buildProcHeatMap();
      }
    }

    function normaliseMaturity(m) {
      const levels = ['High','Medium','Low'];
      if (!m) return { level:'Low', note:null };
      const s = String(m).trim();
      const match = levels.find(x => x.toLowerCase() === s.toLowerCase());
      if (match) return { level:match, note:null };
      return { level:'Low', note:s };
    }

    // Returns flat array of {name, maturity, note} for all L3 capabilities in a stage
    function getL3s(stage) {
      const out = [];
      (stage.l1 || []).forEach(l1 => {
        (l1.l2 || []).forEach(l2 => {
          if (l2.l3 && l2.l3.length) {
            l2.l3.forEach(l3 => {
              const nm = normaliseMaturity(l3.maturity);
              out.push({ name: l3.name, maturity: nm.level, note: l3.maturityNote || nm.note });
            });
          } else {
            const nm = normaliseMaturity(l2.maturity);
            out.push({ name: l2.name, maturity: nm.level, note: l2.maturityNote || nm.note });
          }
        });
      });
      return out;
    }

    // Returns [{process, caps:[]}] grouped by process name
    function getProcGroups(stage) {
      const map = new Map();
      const order = [];

      function add(proc, cap) {
        const key = proc || 'TBA';
        if (!map.has(key)) { map.set(key, []); order.push(key); }
        map.get(key).push(cap);
      }

      (stage.l1 || []).forEach(l1 => {
        (l1.l2 || []).forEach(l2 => {
          if (l2.l3 && l2.l3.length) {
            l2.l3.forEach(l3 => {
              const nm = normaliseMaturity(l3.maturity);
              add(l3.process || 'TBA', { name: l3.name, maturity: nm.level, note: l3.maturityNote || nm.note });
            });
          } else {
            const nm = normaliseMaturity(l2.maturity);
            add(l2.process || 'TBA', { name: l2.name, maturity: nm.level, note: l2.maturityNote || nm.note });
          }
        });
      });

      return order.map(p => ({ process: p, caps: map.get(p) }));
    }

    function buildCapHeatMap() {
      const grid = document.getElementById('capGrid');
      grid.innerHTML = '';

      DATA.forEach(stage => {
        const col = document.createElement('div');

        const header = document.createElement('div');
        header.className = 'hm-col-header';
        header.innerHTML = `<div class="hm-col-header__vs">${stage.vs}</div><div class="hm-col-header__title">${stage.title}</div>`;

        const body = document.createElement('div');
        body.className = 'hm-col-body';

        const l3s = getL3s(stage);
        l3s.forEach(item => {
          const cell = document.createElement('div');
          cell.className = 'hm-cell m-' + item.maturity;
          cell.dataset.maturity = item.maturity;
          cell.title = item.note ? `CSV maturity: ${item.note}` : '';

          const badgeClass = `hm-cell__badge m-${item.maturity}`;
          cell.innerHTML = `<div class="hm-cell__name">${escapeHtml(item.name)}</div><span class="${badgeClass}">${item.maturity}</span>`;
          body.appendChild(cell);
        });

        col.appendChild(header);
        col.appendChild(body);
        grid.appendChild(col);
      });

      capBuilt = true;
      setFilter('all');
    }

    function buildProcHeatMap() {
      const grid = document.getElementById('procGrid');
      grid.innerHTML = '';

      DATA.forEach(stage => {
        const col = document.createElement('div');

        const header = document.createElement('div');
        header.className = 'hm-col-header';
        header.innerHTML = `<div class="hm-col-header__vs">${stage.vs}</div><div class="hm-col-header__title">${stage.title}</div>`;

        const body = document.createElement('div');
        body.className = 'hm-col-body';

        const groups = getProcGroups(stage);
        groups.forEach(g => {
          const card = document.createElement('div');
          card.className = 'proc-card';

          const h = document.createElement('div');
          h.className = 'proc-card__header';
          h.textContent = g.process;

          const caps = document.createElement('div');
          caps.className = 'proc-card__caps';

          g.caps.forEach(c => {
            const row = document.createElement('div');
            row.className = 'proc-cap';
            row.title = c.note ? `CSV maturity: ${c.note}` : '';
            row.innerHTML = `<div class="proc-cap__name">${escapeHtml(c.name)}</div><span class="proc-cap__badge m-${c.maturity}">${c.maturity}</span>`;
            caps.appendChild(row);
          });

          card.appendChild(h);
          card.appendChild(caps);
          body.appendChild(card);
        });

        col.appendChild(header);
        col.appendChild(body);
        grid.appendChild(col);
      });

      procBuilt = true;
    }

    // Maturity filter (Capability Heat Map only)
    function setFilter(level) {
      const cells = document.querySelectorAll('#capView .hm-cell');
      if (level === 'all') {
        cells.forEach(c => { c.classList.remove('is-faded'); c.classList.remove('is-highlighted'); });
      } else {
        cells.forEach(c => {
          if (c.dataset.maturity === level) {
            c.classList.remove('is-faded');
            c.classList.add('is-highlighted');
          } else {
            c.classList.remove('is-highlighted');
            c.classList.add('is-faded');
          }
        });
      }

      const btns = document.querySelectorAll('#capView .hm-filter__btn');
      btns.forEach(b => {
        const lv = b.getAttribute('data-level');
        if (level === 'all') {
          if (lv === 'all') b.classList.remove('is-inactive');
          else b.classList.add('is-inactive');
        } else {
          if (lv === level) b.classList.remove('is-inactive');
          else b.classList.add('is-inactive');
        }
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildCapHeatMap();
    });
  </script>
</body>
</html>
