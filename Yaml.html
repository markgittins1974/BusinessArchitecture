
<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LRA Procedure Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    body { margin:0; font-family:Segoe UI, Arial, sans-serif; background:#f5f7fa; color:#1f2937; }
    header { background:#003a8f; color:#fff; padding:28px 36px; }
    header h1 { margin:0; font-size:28px; }
    header p { margin-top:8px; font-weight:600; font-size:14px; opacity:0.85; }
    .container { max-width:1400px; margin:0 auto; padding:28px; }
    .toggle { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .toggle button { border:1px solid #ccc; border-radius:22px; padding:8px 18px; cursor:pointer; background:#fff; font-family:inherit; font-size:14px; }
    .toggle button.active { background:#003a8f; color:#fff; }
    .panel { background:#fff; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:28px; }
    .panel h2 { margin-top:0; font-size:20px; margin-bottom:16px; }
    .diagram-box { background:#f9fafb; border:1px solid #d1d5db; border-radius:8px; padding:18px; text-align:center; }
    .legend { display:flex; gap:24px; flex-wrap:wrap; margin-top:16px; font-size:13px; color:#64748b; }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .legend-dot { width:14px; height:14px; border-radius:3px; }
    .notes { margin-top:16px; font-size:14px; color:#64748b; line-height:1.7; }
    .notes strong { color:#1f2937; }
  </style>
</head>
<body>

<header>
  <h1>LRA Procedure Map</h1>
  <p>Land Revenue - AOS, TARB Referrals, Build to Rent Overview</p>
</header>

<div class="container">
  <div class="toggle">
    <button class="active" onclick="show('combined')">Combined Overview</button>
    <button onclick="show('aos')">AOS Flow</button>
    <button onclick="show('tarb')">TARB Flow</button>
    <button onclick="show('btr')">BTR Flow</button>
    <button onclick="show('crossover')">Crossover Points</button>
  </div>
  <div id="display" class="panel">
    <h2 id="title">Combined Procedure Overview</h2>
    <div id="diagram" class="diagram-box"></div>
    <div id="legendArea"></div>
    <div id="notesArea"></div>
  </div>
</div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'default' });

var diagrams = {
  combined: {
    title: 'Combined Procedure Overview',
    code: [
      'graph TD',
      '  INTAKE[Portal / Phone / Correspondence / Internal]',
      '  CLASSIFY{Classify Matter}',
      '  INTAKE --> CLASSIFY',
      '  CLASSIFY -->|AOS Amendment| A1[AOS Q1 Trigger]',
      '  CLASSIFY -->|Objection or Ruling| T1[TARB Q1 Consultation]',
      '  CLASSIFY -->|Hardship| HARD[LTX Capture]',
      '  CLASSIFY -->|BTR Application| B1[BTR Q1 Eligibility]',
      '  A1 --> A2[Q2 Eligibility]',
      '  A2 --> A3[Q3 Owner Type]',
      '  A3 --> A4[Q4 Registration]',
      '  A4 --> A5[Q5 Absentee Test]',
      '  A5 --> A6[Q6 Partial AOS]',
      '  A6 --> A7[Q7 Exemption]',
      '  A7 --> A8[Q8 Apply or Remove]',
      '  A8 --> A9[Q9 Close Case]',
      '  T1 --> T2[Q2 Classification]',
      '  T2 --> T4[Q4 Refer to TARB]',
      '  T4 --> T5[Q5 Determination]',
      '  T5 --> T6[Q6 Close]',
      '  B1 --> B2[Q2 Parcel]',
      '  B2 --> B3[Q3 Concession]',
      '  B3 --> B4[Q4 Admin Close]',
      '  A7 -.-> T1',
      '  T5 -.-> A8',
      '  B3 -.-> A8',
      '  HARD --> T4',
      '  A9 --> DONE[Case Closed]',
      '  T6 --> DONE',
      '  B4 --> DONE'
    ].join('\n'),
    legend: '<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div> Intake</div><div class="legend-item"><div class="legend-dot" style="background:#003a8f"></div> AOS 9 steps</div><div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> TARB 6 steps</div><div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> BTR 4 steps</div><div class="legend-item">Dashed = crossover</div></div>',
    notes: ''
  },
  aos: {
    title: 'AOS Procedure - Q1 to Q9',
    code: [
      'graph TD',
      '  Q1[Q1 Trigger] --> Q2{Q2 Eligibility}',
      '  Q2 -->|Proceed| Q3[Q3 Owner Type]',
      '  Q2 -->|Halt| BLOCK[Reassign to Investigator]',
      '  Q3 --> Q4[Q4 Registration]',
      '  Q4 --> Q5{Q5 Absentee Test}',
      '  Q5 -->|Absentee Yes| Q6[Q6 Partial AOS]',
      '  Q5 -->|Absentee No| Q8[Q8 Apply or Remove]',
      '  Q6 --> Q7{Q7 Exemption}',
      '  Q7 -->|No exemption| Q8',
      '  Q7 -->|Exemption requested| TARB[Refer to TARB]',
      '  TARB -->|Determination returned| Q8',
      '  BTR[BTR concession] -.->|AOS exemption| Q8',
      '  Q8 --> Q9[Q9 Close Case]',
      '  Q9 --> DONE[Case Closed]'
    ].join('\n'),
    legend: '<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#b91c1c"></div> Decision</div><div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> TARB handoff</div><div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> BTR dependency</div></div>',
    notes: ''
  },
  tarb: {
    title: 'TARB Referrals - Q1 to Q6',
    code: [
      'graph TD',
      '  Q1{Q1 Consultation} -->|Approved| Q2{Q2 Classification}',
      '  Q1 -->|Not approved| RETAIN[Retained by LRA]',
      '  Q2 -->|Amendment| LRS[LRS processes]',
      '  Q2 -->|Objection| Q4[Q4 Refer to TARB]',
      '  Q2 -->|Private Ruling| Q4',
      '  Q2 -->|Valuation| LGA[LGA Team]',
      '  Q3{Q3 Hardship} -->|Confirmed| CAP[LTX Capture]',
      '  Q3 -->|Not hardship| Q2',
      '  CAP --> Q4',
      '  Q4 --> WAIT[TARB determines]',
      '  WAIT --> Q5[Q5 Process Determination]',
      '  Q5 --> Q6[Q6 Close]',
      '  Q5 -.->|AOS adjustment| AOSQ8[AOS Q8 Apply or Remove]',
      '  Q6 --> DONE[Case Closed]',
      '  Q6 -->|Too complex| FLIP[Flip back to TARB]'
    ].join('\n'),
    legend: '<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#b91c1c"></div> Decision</div><div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> TARB processing</div><div class="legend-item"><div class="legend-dot" style="background:#003a8f"></div> AOS dependency</div></div>',
    notes: ''
  },
  btr: {
    title: 'Build to Rent - Q1 to Q4',
    code: [
      'graph TD',
      '  Q1{Q1 Eligibility} -->|Eligible| Q2{Q2 Multiple properties}',
      '  Q1 -->|Not eligible| REJ[Application not progressed]',
      '  Q2 -->|Single| Q3[Q3 Apply Concession MC580]',
      '  Q2 -->|Multiple| PAR[Create BTR parcel]',
      '  PAR --> Q3',
      '  Q3 -->|Full| Q4[Q4 Admin and Close]',
      '  Q3 -->|Partial| MC570[Set proportion MC570]',
      '  MC570 --> Q4',
      '  Q3 -.->|AOS exemption| AOSEX[AOS exemption applied]',
      '  Q4 --> PIA[Prevent PIA Auto Gen]',
      '  Q4 --> SHEET[Update BTR spreadsheet]',
      '  Q4 --> DONE[Case Closed]'
    ].join('\n'),
    legend: '<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#b91c1c"></div> Decision</div><div class="legend-item"><div class="legend-dot" style="background:#003a8f"></div> AOS dependency</div><div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Interim</div></div>',
    notes: ''
  },
  crossover: {
    title: 'Crossover Points Between All Three Procedures',
    code: [
      'graph LR',
      '  A7[AOS Q7 Exemption] -->|1 Refers to TARB| T1[TARB Q1 Consultation]',
      '  T5[TARB Q5 Determination] -->|2 Adjusts AOS| A8[AOS Q8 Apply or Remove]',
      '  T2[TARB Q2 Classification] -->|3 Reclassified| A8',
      '  B3[BTR Q3 Concession] -->|4 Triggers AOS exemption| A8',
      '  B1[BTR Q1 Eligibility] -.->|5 May need ruling| T1'
    ].join('\n'),
    legend: '',
    notes: '<div class="notes"><strong>1.</strong> AOS exemption requests refer into TARB for determination.<br><strong>2.</strong> TARB determinations affecting AOS flow back to Q8 for system updates.<br><strong>3.</strong> TARB matters may be reclassified as AOS amendments for LRS.<br><strong>4.</strong> BTR concession automatically triggers AOS exemption - system dependency.<br><strong>5.</strong> BTR eligibility edge cases may need a TARB private ruling - implied, not proceduralised.</div>'
  }
};

var rendered = {};

function show(id) {
  document.querySelectorAll('.toggle button').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');

  var d = diagrams[id];
  document.getElementById('title').textContent = d.title;
  document.getElementById('legendArea').innerHTML = d.legend;
  document.getElementById('notesArea').innerHTML = d.notes;

  var box = document.getElementById('diagram');

  if (rendered[id]) {
    box.innerHTML = rendered[id];
  } else {
    box.innerHTML = '';
    mermaid.render('mermaid-' + id, d.code).then(function(result) {
      rendered[id] = result.svg;
      box.innerHTML = result.svg;
    }).catch(function(err) {
      box.innerHTML = '<p style="color:red">Diagram error: ' + err + '</p>';
    });
  }
}

show('combined');
</script>

</body>
</html>
