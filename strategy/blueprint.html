}, {"id": "PP-106", "text": "Staff §H82§ Understated certificates occur because the system does not distinguish between who made prior payments in the pro-rata calculation Incorrect payments are difficult to unwind especially where money has already been refunded to a different party Post-2024 legislation means purchasers should not pay land tax at settlement but this still happens frequently"}, {"id": "PP-107", "text": "Staff §H82§ Understated certificates occur because the system does not distinguish between who made prior payments in the pro-rata calculation Incorrect payments are difficult to unwind especially where money has already been refunded to a different party Post-2024 legislation means purchasers should not pay land tax at settlement but this still happens frequently"}, {"id": "PP-108", "text": "Staff §H82§ Understated certificates occur because the system does not distinguish between who made prior payments in the pro-rata calculation Incorrect payments are difficult to unwind especially where money has already been refunded to a different party Post-2024 legislation means purchasers should not pay land tax at settlement but this still happens frequently"}, {"id": "PP-109", "text": "Applicant data-entry errors (vendor/purchaser swapped …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-110", "text": "Staff may cold call a customer to verify details before assessment is issued §Q4§ §Q5§ §Q6§ Applicants sometimes enter wrong vendor details, put purchaser instead of vendor, or include parties not on title Volume and folio references are sometimes incorrect or relate to parent properties no longer active Applications cannot be submitted over the phone requiring all applicants to use the website §Q7§ §Q8§"}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "AOS is not clearly surfaced in eSys making it easy for staff to miss."}, {"text": "Property clearance certificate payment reference creates confusion and can lead to overpayments or underpayments."}, {"text": "Customers frequently do not understand why the figure on their certificate differs from what they expected to pay."}, {"text": "Issues surface after settlement such as understated certificates, incorrect payments, or legacy liabilities."}, {"text": "Staff have limited ability to recover money once it has been incorrectly refunded."}]}]}, "opp": {"synopsis": "Certificate automation and assurance HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-094", "text": "How Might We build safeguards into the refund process that prevent incorrect payments from being finalised, so that recovery is never the only option left?"}, {"id": "HMW-108", "text": "How might we better guide applicants through certificate applications so that vendor details are entered correctly and only parties on title are included?"}, {"id": "HMW-109", "text": "How Might We validate property references against current title data at the point of application, so that outdated or incorrect references are flagged before processing begins?"}, {"id": "HMW-110", "text": "How Might We support applicants who cannot use the website, so that the channel requirement never becomes a barrier to obtaining a certificate?"}, {"id": "HMW-111", "text": "How Might We give staff a clear explanation when a certificate fails to automate, so that investigation time is not wasted on a problem the system already knows?"}, {"id": "HMW-112", "text": "How Might We enable eSys to calculate pro-rata liabilities for subdivided properties automatically, so that staff intervention is never the bottleneck before a certificate is issued?"}, {"id": "HMW-113", "text": "How Might We ensure the pro-rata calculation accounts for payment source, so that certificates never understate a liability due to how prior payments were allocated?"}, {"id": "HMW-114", "text": "How Might We ensure the post-2024 legislative change is reflected consistently at the point of settlement, so that purchasers are never paying a liability that is not theirs?"}, {"id": "HMW-115", "text": "How Might We ensure payment obligations are clearly assigned before settlement, so that incorrect payments never reach the point where recovery is no longer possible?"}, {"id": "HMW-116", "text": "How Might We ensure automation reliably identifies cases requiring manual review, so that certificates are never issued when an unresolved matter should have prevented it?"}, {"id": "HMW-117", "text": "How might we better distinguish sensitive domestic violence cases from large taxpayer flags so that valid certificates are not unnecessarily stopped for manual review?"}, {"id": "HMW-118", "text": "How Might We reduce the dependency on a manual handoff between eSys and Salesforce, so that a data error in one system never prevents a valid certificate from being issued?"}, {"id": "HMW-119", "text": "How Might We automate the production of complex multi-property certificates, so that staff time is never the bottleneck between a completed check and an issued certificate?"}, {"id": "HMW-120", "text": "How Might We make certificate updates possible without starting from scratch, so that a change request never consumes the same effort as the original?"}, {"id": "HMW-121", "text": "How Might We design the certificate so that it scales cleanly as new revenue lines are added, so that complexity never translates into manual editing work for staff?"}, {"id": "HMW-122", "text": "How Might We ensure CIPT data renders correctly within the certificate system, so that manual PDF editing is never required to produce an accurate document?"}, {"id": "HMW-123", "text": "How Might We produce a certificate that is stable and consistent across all pages, so that staff are never required to manually check formatting before issuing?"}, {"id": "HMW-124", "text": "How Might We ensure all title references appear on a certificate automatically, so that staff never need to compensate for a system limitation?"}]}]}, "quotes": {"synopsis": "Four-hour PDF edits; system breaks", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "“Sometimes a certificate won't link to the current owner because the vendor on the application is incorrect or spelt wrong, or they put the purchaser instead of the vendor.” P4 Staff"}, {"text": "“The property references might be the parent properties from long, long ago. So the volume and folio for the property might be incorrect.” P4 Staff"}, {"text": "“People asking, 'can I do this over the phone?' We don’t offer that, but we direct them to the website. We need them to input relevant data, vendor, purchaser, references, title references, address.” P4 Staff"}, {"text": "“If it is linked to WGT, the property, it will create a case, and someone has to go into our Salesforce application and complete the case for the certificate to keep going.” P6 Staff"}, {"text": "“If they ask for an updated certificate, you have to do that all over again. It’s not automatic.” P6 Staff"}, {"text": "“I did one the other day with 50 something properties. Took me almost four hours just to edit the PDF.” P6 Staff"}, {"text": "“The certificate itself will only show the first two rows of title references. If there's 8, 10, or something like that, we have to put that manually in the comments field, so it will show up on the certificate.” P6 Staff"}, {"text": "\"Even when you save it, it may fip over again, even though in the edit mode, it looks alright. Soon as you save it clicks again. So you have to go back through all the pages and make sure everything’s okay.” P6 Staff"}, {"text": "“CIPT is painful because sometimes the information doesn't actually come out correctly on certificate, and you have to manually edit the PDF…” P6 Staff"}, {"text": "\"In certificates where property is subdivided, people buy at different times with subdivisions. The next person comes along - the pro-rata takes into account the previous payment by the other person. It's to do with the calculation. Understated certificates. The customer picks it up that it's wrong.\" P6 Staff"}, {"text": "“We’ll do our data matching, and it’ll kick it out as an error because it doesn’t match. Sometimes you are not sure why it got kicked out.” P6 Staff"}, {"text": "“There’s other times it’s matched and processed automatically. You shouldn’t have done that … there was an action item or non issue.\" P6 Staff"}, {"text": "\"Some accounts are flagged in the system as large taxpayers. That same flag is also used for domestic violence cases, which stops certificates from being issued automatically and requires staff to check them manually.\" P6 Staff"}, {"text": "“Where a property's been subdivided… eSys can't do those calculations. We have to do those manually. We have to input the relevant data for it to calculate the land tax.” P6 Staff"}, {"text": "\"Consistently, you'll get errors in Salesforce, because it's a break between eSys and Salesforce. The data doesn't flow back and forth. And sometimes that can cause the certificates to get stuck because they're halfway through the processing, but the link breaks, and then just sitting there, and that they start holding up the certificates.\" P6 Staff"}, {"text": "\"kicked out\" \"FTLs have been completed a lot quicker, and we’re recognising when someone is living in a property, but it’s still happening where we don’t have them as having that as a PPR in our system. So they call to get that updated.” P7 Staff"}, {"text": "“The certificate comes in and we'll do our data matching, and it'll kick it out as an error because it doesn't match, and then that'll prompt us to do our own internal investigation and send out assessments.” P6 Staff"}, {"text": "“So a customer will sometimes pay their property clearance certificate, they’ll also pay the full assessment notice, so they get an overpayment that we need to refund.” P2 Staff"}]}]}, "capability": {"synopsis": "6 capabilities · heaviest: Manual Certificate Production & Exception Handling", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-09", "text": "Manual Certificate Production & Exception Handling", "note": "Proposed · 5 PP / 6 HMW · P15.2, T1"}, {"id": "LTX-VS-09", "text": "Automated Certificate Processing", "note": "Proposed · 5 PP / 5 HMW · P15.1"}, {"id": "LTX-VS-09", "text": "Certificate Application & Validation", "note": "Proposed · 2 PP / 3 HMW · P15.1"}, {"id": "LTX-VS-09", "text": "Settlement Obligation Management", "note": "Proposed · 1 PP / 2 HMW · P15.3"}, {"id": "LTX-EN", "text": "Systems Integration & Data Synchronisation", "note": "Proposed · 1 PP / 1 HMW · T8"}, {"id": "LTX-VS-06", "text": "Refund Management", "note": "Existing · 1 PP / 1 HMW · P8.1"}]}]}, "process": {"synopsis": "6 processes · P15.1, P15.2 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P15.1", "text": "Clearance Certificate Processing", "note": "7 PP / 8 HMW · via 2 capabilities"}, {"id": "P15.2", "text": "Certificate Exception & Manual", "note": "5 PP / 6 HMW · via 1 capability"}, {"id": "T1", "text": "Certificate Exception & Manual", "note": "5 PP / 6 HMW · via 1 capability"}, {"id": "P15.3", "text": "Post-Settlement Discrepancy", "note": "1 PP / 2 HMW · via 1 capability"}, {"id": "T8", "text": "Cross-System Change", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P8.1", "text": "Payment Suspense & Refund", "note": "1 PP / 1 HMW · via 1 capability"}]}]}}, "s9": {"customer": {"synopsis": "Progress checks and record requests", "groups": [{"title": "Canvas cards", "cards": [{"text": "Customer contacts SRO to check progress of a submitted request or amendment"}, {"text": "Customer contacts SRO to clarify an outcome where no written confirmation was sent"}, {"text": "Customer calls to check whether an address or contact detail change has taken effect"}, {"text": "Customer calls to request historical assessment records older than five years"}, {"text": "Customer contacts SRO after receiving an unexpected notice or reminder they do not understand"}, {"text": "Customer contacts SRO to understand proposed changes to land tax thresholds or rates"}, {"text": "Customer reads SRO website or attends a webinar to understand proposed changes and how they might be affected"}, {"text": "Customer calls to follow up request; See Operations Blueprint \"follow up a request\""}]}]}, "front": {"synopsis": "Reconstructing status across systems", "groups": [{"title": "Canvas cards", "cards": [{"text": "Staff go to both eSys and My Land Tax - working with customer number or address to find the customer"}]}]}, "back": null, "systems": null, "support": null, "pain": {"synopsis": "No-reply mail; five-year record ceiling", "groups": [{"title": "Canvas pain point cards (PP IDs from merged model register)", "cards": [{"id": "PP-089", "text": "SRO between billing cycles - customers who want to understand thresholds, projections, or upcoming changes must find this themselves Monthly forum with"}, {"id": "PP-091", "text": "Staff Staff check status across multiple systems with no single centralised view of a customer's history There are no clear rules for when to create a follow-up work item versus recording general correspondence"}, {"id": "PP-092", "text": "Automated correspondence feels jarring after personal …", "note": "Register wording (merged model) — canvas narrative match pending validation."}, {"id": "PP-095", "text": "Clicking Track Requests three times auto-escalates the …", "note": "Register wording (merged model) — canvas narrative match pending validation."}]}, {"title": "Further canvas pain cards — PP reference pending validation", "cards": [{"text": "Customers who have been through complex correspondence find automated no-reply emails jarring and do not respond. Customer receives automated correspondence and does not respond because it feels disconnected from their prior experience."}, {"text": "No incentive or acknowledgement provided for customers who have consistently paid on time over many years."}, {"text": "Customers managing properties across multiple entities (owenrship structures) must manually reconcile the total land tax bill against individual properties and entities for their own records."}, {"text": "Customers can only access five years of records in My Land Tax and must contact SRO for older records."}]}]}, "opp": {"synopsis": "Single view and record-access HMWs", "groups": [{"title": "How Might We statements (verbatim, HMW IDs from merged model register)", "cards": [{"id": "HMW-062", "text": "How Might We give staff a single view of a customer’s history, so that they can quickly understand status and respond without checking multiple systems"}, {"id": "HMW-096", "text": "How might we keep customers informed between billing cycles, so that they can anticipate their land tax obligations and plan ahead with confidence?"}, {"id": "HMW-105", "text": "How Might We make automated follow-up emails feel more personal and clearly explain how to respond, so that customers stay engaged after complex correspondence?"}, {"id": "HMW-106", "text": "How Might We provide clearer acknowledgement and progress updates, so that customers do not need to follow up for reassurance?"}, {"id": "HMW-107", "text": "How Might We ensure that outbound correspondence contains everything staff and customers need to act on it immediately, so that no additional steps are required before a conversation or action can begin?"}]}]}, "quotes": {"synopsis": "Record limits drive calls", "groups": [{"title": "Canvas quote cards", "cards": [{"text": "“We can go back five years, including the current year. If they want assessments before 2021, they have to call or email us.” P5 Staff"}]}]}, "capability": {"synopsis": "4 capabilities · heaviest: Correspondence & Document Exchange", "groups": [{"title": "Capabilities linked via PP/HMW evidence (ordered by evidence weight)", "cards": [{"id": "LTX-VS-10", "text": "Correspondence & Document Exchange", "note": "Proposed · 1 PP / 2 HMW · P12.4"}, {"id": "LTX-VS-00", "text": "Proactive Customer Engagement", "note": "Proposed · 1 PP / 1 HMW · P10.1, P10.2"}, {"id": "LTX-EN", "text": "Systems Integration & Data Synchronisation", "note": "Proposed · 1 PP / 1 HMW · T8"}, {"id": "LTX-VS-10", "text": "Request Status & Progress Transparency", "note": "Proposed · 1 PP / 1 HMW · T7"}]}]}, "process": {"synopsis": "5 processes · P12.4, P10.1 heaviest", "groups": [{"title": "Processes reached via stage-linked capabilities (ordered by evidence weight)", "cards": [{"id": "P12.4", "text": "Correspondence & Document", "note": "1 PP / 2 HMW · via 1 capability"}, {"id": "P10.1", "text": "New-Liability Customer Onboarding", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "P10.2", "text": "New-Liability Customer Onboarding", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "T8", "text": "Cross-System Change", "note": "1 PP / 1 HMW · via 1 capability"}, {"id": "T7", "text": "Request Progress Notification", "note": "1 PP / 1 HMW · via 1 capability"}]}]}}};
const FINDINGS=[{"h": "About the research", "paras": [{"h": null, "t": "Nomat, with the SRO's HCD team, built a current-state service blueprint for the Land Tax service from 10 staff interviews, 10 customer interviews and 2 validation sessions, following a human-centred design process. Scope: the end-to-end journey from pre-liability through ongoing ownership, staff and customer perspectives combined, with gaps mapped against the Land Revenue Business Process Maps produced in parallel. Out of scope: debt recovery and enforcement, investigations, standalone VRLT/AOS, and refunds — each referenced only where it intersects the Land Tax journey; dedicated blueprints exist or are planned."}, {"h": "Structural note", "t": "The report describes an 8-stage journey and ten swim lanes including a Thoughts and Emotions lane. The canvas export used to build this interactive blueprint contains nine stage headers and an eight-lane legend with no Thoughts and Emotions lane. This discrepancy is unresolved — confirm with the research team whether a stage was split after reporting and whether an emotions lane exists on the canvas."}]}, {"h": "What is working well", "paras": [{"h": "Staff capability and culture", "t": "Every interviewed customer who had contacted the SRO described the interaction positively — friendly, prompt, genuinely helpful. Frustration was consistently directed at systems and processes, not people. Internally, peer support and BTO accessibility are valued, with most training delivered by SMEs."}, {"h": "Automation through Assisted Digital", "t": "Around 60% of amendment requests that previously required manual processing now handle automatically. The PPR questionnaire, structured by sections of the Land Tax Act, gives staff exactly what they need. Staff describe the automation layer as a genuine improvement."}, {"h": "Contact centre self-sufficiency", "t": "The contact centre resolves the majority of inbound contact without back-office support, with first-call resolution a genuine priority across a complex revenue line."}, {"h": "Pre-issue review and certificates", "t": "The FTL pre-issue process actively reduces incorrect first assessments, informed by prior-year error analysis. Around 75% of clearance certificates process end-to-end automatically, typically within an hour, with a 10-business-day KPI for manual cases that the team generally meets."}]}, {"h": "Key findings", "paras": [{"h": "Customers arrive without context", "t": "The most consistent finding across all customer interviews: land tax is almost never raised before purchase — conveyancers, brokers and agents rarely mention it. The first bill arrives as a shock, and some customers accumulate years of liability before the SRO makes contact, sometimes learning of it through debt services rather than an assessment."}, {"h": "The assessment experience creates friction", "t": "Copy-of-assessment requests are the most common inbound call type, including from My Land Tax users. Assessments show the land value but not the methodology. Digital delivery sends a login prompt rather than the document, and access requires an assessment number customers rarely have at hand for an annual tax — a designed-in circularity."}, {"h": "Customers and staff lack visibility", "t": "No confirmation or progress tracking exists after a request is submitted; the only indicator is an unchanging in-progress status. Channels are disjointed: no inbound messaging or attachments in My Land Tax, no-reply correspondence customers reply to anyway, and address changes that don't reliably sync to eSys. Deadlines and interest keep running during processing."}, {"h": "Systems are functional but fragmented", "t": "Staff move across eSys, CM10, Outlook, Excel, LASSI, PEXA, Salesforce and more to complete single tasks — the integration burden sits with staff. eSys itself is accepted as functional and fast; the friction lives in the seams between systems and at the boundaries where automation fails and staff 'try it and see'. eSys crashes roughly weekly, and live note-taking requires the Notepad workaround."}]}, {"h": "Cross-cutting themes", "paras": [{"h": "Financial decisions without information", "t": "Customers weigh holding versus selling investment property with land tax as a major factor, describe feeling trapped between rising land tax and capital gains tax, and receive no proactive SRO input — cross-state owners navigate multiple regimes with no consolidated guidance."}, {"h": "Life events create distress", "t": "Separation and divorce intersect with land tax obligations customers don't understand; one customer described land tax forcing a formal financial separation. No guidance exists for changed circumstances, and correspondence risks reaching an ex-partner if details are stale."}, {"h": "Scenario-based guidance gap", "t": "Customers aren't missing general information — they can't find answers that map to their specific situation (shared apartment land value, construction alongside a home, green wedge, separation). They resort to Google, ChatGPT, family and advisors, then still need to verify against the SRO."}, {"h": "Customers build their own systems", "t": "Spreadsheets to allocate tax across properties, printed receipts as proof of payment, calendar reminders, envelope savings, physical folders — invisible, recurring administrative burden that falls hardest on customers with the fewest resources."}, {"h": "Digital for routine, human for complex", "t": "Phone preference isn't digital aversion: routine tasks work digitally, but complex, unusual or emotionally loaded circumstances send customers to a human who can interpret and adapt. Staff confirm the pattern and describe a consistent volume of elderly customers needing walked-through support."}, {"h": "A consultant cottage industry", "t": "The valuation objection process is complex enough to sustain specialists working on 20% commission, and evidentiary costs can exceed the potential saving — an access-and-equity issue where resourced customers engage consultants and others pay or give up."}, {"h": "Transformation history shapes confidence", "t": "Staff accept eSys as functional; the frustration is fragmentation around it and automation boundary failures. Staff also carry scepticism from prior research cycles — 'why aren't these things being utilised as intended?' — which raises the bar on this work leading to action."}]}, {"h": "Recommended next steps", "paras": [{"h": null, "t": "Prioritise pain points and HMW statements by frequency, severity and strategic alignment, identifying quick wins within current constraints. Confirm Business Process Map gaps with the Land Revenue team. Use the current-state blueprint as the foundation for future-state design, run co-design workshops with staff and customers, and align recommendations to the SRO transformation roadmap and system investment decisions."}]}];
const SUMMARIES=[{"code": "STAGE 1", "label": "Liability is Determined", "paras": [{"h": null, "t": "This stage covers the point at which a Victorian property owner becomes liable for land tax — through purchase, inheritance, survivorship, trust acquisition, or a revaluation pushing their holdings over the threshold — and the SRO's annual machinery for identifying who owes what. Its defining characteristic is that the customer is almost entirely absent from it: liability is created by events in the customer's life, but determined by data flows the customer never sees, and in most cases the customer does not yet know the SRO exists in their world."}, {"h": "Customer touchpoints", "t": "There are effectively none by design. The SRO has no relationship with a customer before their first assessment; awareness, where it exists, comes from accountants, family or the customer's own research. The only direct contact in this stage is an outbound verification call to First Time Liable customers — made from a private number, which in the current scam environment customers routinely distrust or ignore. The stage's central customer insight is an absence: no pre-purchase touchpoint, no projected figure, no warning that a bill is coming."}, {"h": "How the stage operates", "t": "Liability determination is a data-matching operation at state scale. The Valuer-General supplies annual revaluation data as text files per municipality; PEXA delivers Notices of Acquisition each weekday; the Titles Office feeds plans nightly (with its Serv survivorship feed currently halted). These load into eSys, which matches properties by MPN, address and title references and runs the batch liability calculation on 31 December. Matching succeeds automatically for around 99% of the annual Reval — but at full-state volume the remaining 1%, and a roughly 40% mismatch rate on mid-year supplementary loads, generates a substantial standing workload of manual investigation across LASSI, COI and LandData, resolved on staff experience rather than documented procedure. In architecture terms this stage exercises the Valuation Data Management and Inter-Agency Data Exchange capabilities and lands its evidence on the Annual Valuation Batch Load, Inter-Agency Feed Monitoring and New-Liability Customer Onboarding processes (P4.x, P2.2, P10.x)."}, {"h": "Where it hurts", "t": "The stage carries 12 documented pain points in two clusters. Operationally: mismatch resolution has no formal procedure, the window between valuation load and issue cycle is tight enough that backlog flows directly into incorrect assessments, inter-agency identifiers don't align, and ownership changes outside PEXA arrive with no reliable trigger. Experientially: customers first learn of land tax when the bill arrives, and cross-state investors make relocation decisions without SRO input."}, {"h": "Consequence and opportunity", "t": "Failures here don't surface here — they surface downstream as wrong-party assessments, arrears shock and objections. The 14 HMW statements for this stage accordingly split between industrialising the data supply chain (matching, feed enforcement, shared identifiers) and creating the pre-liability relationship the service currently lacks."}]}, {"code": "STAGE 2", "label": "Assessment is Issued", "paras": [{"h": null, "t": "This is the moment the service becomes visible to the customer — and for First Time Liable customers, the moment the SRO introduces itself with an invoice. The stage spans the annual issue cycle: eSys generates assessments in bulk, serves them digitally through My Land Tax or by post, and formally establishes the obligation. For an established customer with a financial background it is routine; for a first-time or multi-year-arrears customer it is frequently a shock event that sets the emotional tone for every interaction that follows."}, {"h": "Customer touchpoints", "t": "The assessment notice itself — digital notification constituting official service, or a posted document — plus the My Land Tax login journey, and inbound calls when either fails. The touchpoints are brittle at exactly the wrong moments: a digital customer prompted to log in at the point they've forgotten their password; a customer who cannot register without an assessment number they've misplaced; a customer whose assessment went to an old address and who learns of their liability only when a reminder or arrears notice arrives. Staff-assisted delivery relies on a documented workaround — flagging a registered customer as \"unregistered\" to attach a PDF."}, {"h": "How the stage operates", "t": "The issue cycle executes in batch (P11.1) with delivery channel determined by registration status and address currency. Address integrity is maintained defensively: returned-to-sender assessments raise RTU action items, staff trace correct addresses through driver's licence, ATO, ASIC and municipal data, and a batch job refreshes addresses from COI when licence data allows. The capability load sits on Assessment Communication, Address Validation, Customer Account Linking and First-Time Liability Management."}, {"h": "Where it hurts", "t": "Thirteen pain points concentrate on delivery integrity and comprehension: wrong-address cycles that can hide liability for years, multi-year retrospective bills landing simultaneously with a single due date and no explanation, assessments that don't explain how the land value was derived, separate assessments for joint and trust holdings that customers cannot reconcile, and the login circularity that converts digital-first delivery into call volume."}, {"h": "Consequence and opportunity", "t": "Stage 2 manufactures most of Stage 3's enquiry demand and a share of Stage 6's payment failures. The 13 HMW statements target self-explanatory assessments, resilient digital access, verified addresses before issue, and staged support for customers facing accumulated liability."}]}, {"code": "STAGE 3", "label": "Customer Queries the Assessment", "paras": [{"h": null, "t": "This stage is the service's front door — the point where a customer who doesn't understand or doesn't accept their assessment makes contact. It is a translation exercise: customers arrive with plain-language descriptions of their situation (\"my farm exemption disappeared\", \"why do I have two bills\"), and the organisation must convert them into legislative categories before anything can happen. First-call resolution is genuinely strong where the contact centre has the information it needs; the failures cluster around routing and translation."}, {"h": "Customer touchpoints", "t": "Phone and email into the contact centre, correspondence through My Land Tax, and — a recurring detour — the local council, which many customers contact first because nothing on the assessment tells them the SRO is the responsible body. A previously available \"Contact Us\" web channel has been removed, narrowing the digital route."}, {"h": "How the stage operates", "t": "Staff verify identity, open Assisted Digital, and attempt first-contact resolution — correcting ownership errors, explaining joint-ownership calculation, or processing straightforward exemption requests live. Anything unresolved becomes an eSys action item routed to assessing teams; complex eligibility goes to Branch Technical Officers. Inbound correspondence is auto-classified by keyword matching rather than intent, which is the stage's structural weakness. The evidence load sits on Enquiry & Service Request Management, Customer Education, Channel Management and Correspondence & Document Exchange — concentrated on the Enquiry Handling & First-Contact Resolution process (P12.1)."}, {"h": "Where it hurts", "t": "Ten pain points: keyword misclassification sending work to the wrong tray, the manual translation burden on every request, the council/SRO confusion, unexplained valuation variances between similar neighbouring properties, and duplicate customer records surfacing as inexplicable split assessments."}, {"h": "Consequence and opportunity", "t": "Every misrouted or unresolved query here becomes a Stage 4 work item plus repeat contact. The nine HMW statements aim at intent-based routing, structured digital channels as the natural first choice, and assessments that answer the questions customers actually ask."}]}, {"code": "STAGE 4", "label": "Amendment or Exemption is Processed", "paras": [{"h": null, "t": "This is the operational heart of the service and its heaviest concentration of documented dysfunction — 22 pain points and 23 HMW statements, roughly a fifth of the entire evidence corpus. The stage covers everything from a simple PPR exemption to retrospective multi-year amendments: requests arrive by phone, email, post and My Land Tax, become eSys work items, and move through trays, Branch Technical Officers and — for legal complexity — TARB. It is where the customer's experience of the SRO is decided, because it is where they wait."}, {"h": "Customer touchpoints", "t": "Request lodgement across every channel; a My Land Tax status that reads \"in progress\" from submission to completion with no timeline; requests for additional information; extension requests while interest accrues; and the follow-up call — repeated, because nothing else provides information. Customers have learned the system's reflexes: clicking \"track requests\" three times triggers automatic escalation, and persistent callers get urgent flags. Demand is actively gaming the queue because the queue offers nothing else."}, {"h": "How the stage operates", "t": "eSys automates straightforward amendments end-to-end; everything outside its business rules becomes a manual item classified against a work-item taxonomy too large for reliable day-to-day use. Staff assemble the customer picture across eSys, CM10, My Land Tax and Outlook — with no integrated view, no live note-taking (the Notepad workaround), and weekly system instability. Verification is genuinely sophisticated: RTBA tenancy data, satellite imagery, licence records and title data corroborate PPR and ownership claims. The evidence lands on Amendment Request Processing (P12.2), Correspondence & Document Exchange (P12.4), work allocation, and Platform Reliability — the last carrying pains with no process home at all."}, {"h": "Where it hurts", "t": "Silent intake (no acknowledgement), unmonitored trays where misallocated items sit for months, misclassification rework, fragmented correspondence when attachments force channel-switching, the DV cohort managed on a standalone spreadsheet, and the whole burden of progress-chasing transferred to the customer."}, {"h": "Consequence and opportunity", "t": "The stage is self-amplifying: opacity manufactures calls, calls manufacture work items, work items manufacture delay. The HMW set targets exactly that loop — status transparency, work management discipline, stable tooling, and vulnerable-customer cohort management."}]}, {"code": "STAGE 5", "label": "Valuation Objection", "paras": [{"h": null, "t": "This stage handles the customer who believes their land has been mis-valued — a process the SRO administers but does not decide, since valuation authority sits with the Valuer-General. Structurally it is a three-party process (customer, SRO, VGV) run on a two-party communication model, and most of its pain lives in the seams: outcomes the SRO doesn't receive, decisions customers aren't told about, and a distinction between \"objecting to a valuation\" and \"disputing an assessment\" that the assessment itself never explains."}, {"h": "Customer touchpoints", "t": "The online objection portal (Gen Form 4) within a two-month window many customers discover only after missing it; direct phone contact from the VGV valuer, whom customers routinely mistake for the SRO; written outcomes; and, for the escalation-minded, TARB, VCAT and the Supreme Court. A significant cohort's most important touchpoint is the one they never use — customers who conclude objection is futile, fear an upward correction, or find that evidence costs exceed any plausible saving."}, {"h": "How the stage operates", "t": "The objections team validates lodgements and forwards them to VGV. Approved outcomes return individually and load into eSys, triggering recalculation, amended assessments and refunds. Disallowed outcomes return only in a consolidated end-of-cycle file, which staff reconcile manually against internal records to find decisions never communicated to anyone. A non-issue flag holds new assessments during review; notional tax rules mean the original assessment remains payable. Evidence sits on Valuation Objection Coordination and Assessment Objection Management, on processes P4.2 and P7.1."}, {"h": "Where it hurts", "t": "Eleven pain points: the uncommunicated-disallowance gap, the two-month window, DIY comparable-sales evidence structurally outmatched by professional valuers, a consultant market sustained by the process's complexity, and perceived futility suppressing legitimate objections."}, {"h": "Consequence and opportunity", "t": "The 12 HMW statements centre on transparency — of evidence standards, of decision pathways, of outcomes — and on closing the VGV communication seam that currently leaks decisions."}]}, {"code": "STAGE 6", "label": "Payment", "paras": [{"h": null, "t": "Payment is where the service's obligation is discharged, across the widest channel spread in the blueprint: BPAY, EFT, automated phone card payment, Australia Post, cheque (being phased out) and AutoPay instalments. The stage's paradox is that the happy path works — most customers pay without incident — while the exception paths are brittle enough to generate 17 pain points and the second-largest HMW cluster in the corpus. It is also the stage where the SRO says nothing back: no acknowledgement, no receipt, no confirmation that the obligation is met."}, {"h": "Customer touchpoints", "t": "Channel selection and execution; AutoPay setup and its reminder emails (which identify the amount but not the property); failed-instalment recovery calls; and confirmation-seeking calls that exist only because the system provides no confirmation. Customers managing multiple entities pay separate bills from separate accounts and build their own spreadsheets to reconcile what the SRO does not break down."}, {"h": "How the stage operates", "t": "Payments apply and allocate in eSys, with suspense handling for the misdirected. Staff cannot take card details — customers transfer to the Quick Voice Westpac automated system — and cannot take EFT details by phone, so refunds default to a cheque channel that is being retired without a replacement. Refund approval routes by value through team leader and branch manager trays. Evidence concentrates on Instalment Management (the single most HMW-loaded capability in the model), Payment Management and Matchmaking & Allocation, on processes P14.1 and P8.1."}, {"h": "Where it hurts", "t": "AutoPay plans cancel outright on a single failure or expired card rather than adjusting; changing payment method means cancelling and re-establishing, which can trigger interest; Australia Post limits force bill-splitting; phone banking's amount format causes hundred-fold underpayments; and misallocated payments strand in suspense."}, {"h": "Consequence and opportunity", "t": "Payment failures flow directly into debt management and interest — punishing customers who were trying to pay. The 20 HMW statements target resilient instalments, closed-loop confirmation, genuine channel choice and self-explanatory references."}]}, {"code": "STAGE 7", "label": "Post-Payment and Ongoing Ownership", "paras": [{"h": null, "t": "This stage covers the long quiet stretch between bills — the life events that change liability (sale, separation, death, trust transfer, relocation) and the customer's obligation to tell the SRO about them, which most customers do not know they have. It is the mirror image of Stage 1: there, data feeds determine liability without the customer; here, liability accuracy depends on the customer volunteering information without a trigger."}, {"h": "Customer touchpoints", "t": "Change-of-detail Smart Forms and My Land Tax updates; Trust Form 13 and 14 processes for deceased estates; calls following separation or sale; and the SRO's seminar and webinar program — the one genuinely proactive touchpoint in the service, which engaged customers forward to their accountants. Customers weighing a sale confront a policy trap the SRO doesn't help them navigate: rising land tax makes holding expensive while capital gains tax makes selling expensive."}, {"h": "How the stage operates", "t": "Weekday PEXA NOA feeds run through the LOAN system into eSys, with automated matching handling the bulk and manual processing for survivorship, deceased estates and anything the conveyancer's lodgement coding got wrong — coding accuracy at lodgement directly determines assessment accuracy. Address updates through My Land Tax nearly always automate; contact-detail updates inconsistently flow through, raising manual items. Evidence sits on Ownership Transfer & Change Processing, Inter-Agency Data Exchange and Vulnerable Customer & Life Event Management."}, {"h": "Where it hurts", "t": "Six pain points, low in count but structural: the notification-obligation awareness gap, trusts mis-recorded at conveyancing requiring physical re-transfer, and separation scenarios where the departing party's PPR application *increases* the remaining party's bill — a shock no one explains upfront."}, {"h": "Consequence and opportunity", "t": "Unreported changes resurface as Stage 1 matching failures and Stage 2 wrong-party assessments a cycle later. The nine HMW statements target life-event support — separation, deceased estates, mid-year sale clarity — and seamless data flow so notification stops depending on customer knowledge."}]}, {"code": "STAGE 8", "label": "Property Clearance Certificates", "paras": [{"h": null, "t": "This stage serves the property transaction itself: certificates confirming a property's tax position so a purchaser can settle protected. It is the service's automation showcase and its cautionary tale in one — roughly 75% of applications process end-to-end automatically with certificates issued inside an hour, while the remaining quarter fall into manual investigation intense enough to generate 15 pain points, including staff hand-editing PDFs in Adobe Acrobat for hours."}, {"h": "Customer touchpoints", "t": "Online application (owner or, more commonly, conveyancer/agent) capturing vendor, purchaser and title details; the wait; email delivery of the certificate PDF; and post-issue queries when the figure doesn't match expectations or discrepancies surface at settlement. Applicants who call to apply by phone are redirected to the website; unanswered information requests dead-case after ten days. Bulk portfolio requests from large conveyancing firms run through their own managed pathway."}, {"h": "How the stage operates", "t": "Applications create eSys work items; the system auto-matches property, ownership and taxpayer records and checks every applicable tax type — Land Tax, VRLT, WGT, CIPT, SIP. Windfall Gains Tax cases must complete in Salesforce before a certificate can release, a hard cross-system dependency. Automation failures route to staff who diagnose across eSys, COI, LASSI, LandData and Supreme Court probate records; subdivisions require manual pro-rata calculation the system cannot perform; an updated certificate restarts the entire process. Evidence sits squarely on the four proposed certificate capabilities (CAP-058–061) and processes P15.1, P15.2 and T1."}, {"h": "Where it hurts", "t": "Data mismatches and aged ownership records kick certificates out of automation; CIPT formatting forces manual PDF surgery; payment-reference confusion causes over- and underpayments; and settlement-day discoveries — understated certificates, legacy liabilities — surface when they are most expensive to fix."}, {"h": "Consequence and opportunity", "t": "The 75% straight-through rate proves the organisation can industrialise a lifecycle when the workflow is designed for it. The 18 HMW statements are essentially a plan to finish the job: extend automation coverage, fix the exception tail, and make the certificate self-explanatory."}]}, {"code": "STAGE 9", "label": "Between Cycles — Follow-up, Progress Checks and Unresolved Matters", "paras": [{"h": null, "t": "The thinnest stage in the blueprint by evidence volume, and deliberately so: it captures what happens in the gaps — customers checking whether anything happened, reconstructing their own history, and trying to anticipate the next cycle. Its thinness is itself a finding: the service has almost no designed capability for the between-cycle relationship, so what exists here is improvised by customers and staff alike."}, {"h": "Customer touchpoints", "t": "Progress-check calls on submitted requests; calls to confirm an address change actually took effect; requests for historical records beyond the five-year My Land Tax limit; confusion calls triggered by automated no-reply correspondence that feels disconnected from a prior human interaction; and self-directed research into proposed threshold changes via the website and webinars."}, {"h": "How the stage operates", "t": "Barely, as a designed process. Staff answering between-cycle contact work across both eSys and My Land Tax by customer number or address to reconstruct status — there is no single customer view. The stage's evidence load points at Systems Integration & Data Synchronisation and Request Status & Progress Transparency: the same enabling capabilities underpinning Stage 4, exercised here in their absence."}, {"h": "Where it hurts", "t": "Four pain points: jarring automated correspondence that customers ignore, no recognition for years of on-time payment, manual multi-entity reconciliation left entirely to the customer, and the five-year record ceiling that converts record-keeping into call volume."}, {"h": "Consequence and opportunity", "t": "Stage 9 is where the service's transactional design becomes visible as a relationship gap. The five HMW statements — single customer view, informed between-cycle communication, record access — are small in number but foundational: several are preconditions for the Stage 4 transparency fixes, which is why this stage punches above its evidence weight in any sequencing decision."}]}];

const grid=document.getElementById('grid');
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!==undefined)e.innerHTML=h;return e;}
const visibleStages=new Set(STAGES.map(s=>s.id));
const visibleLanes=new Set(LANES.map(l=>l.id));
(function(){let T=0;for(const st of STAGES){const d=DATA[st.id]||{};for(const l of LANES){const c=d[l.id];if(c)for(const g of c.groups)T+=g.cards.length;}}document.getElementById('totalcards').textContent=T;})();

const cKey=(sid,lid)=>sid+'::'+lid;
function setComment(sid,lid,v){
  const k=cKey(sid,lid);
  if(v&&v.trim()){COMMENTS[k]={value:v,updatedAt:new Date().toISOString()};}
  else delete COMMENTS[k];
  localStorage.setItem('sro-bp-comments',JSON.stringify(COMMENTS));
}
function exportComments(){
  const rows=[['stage_id','stage_label','lane_id','lane_label','comment','updated_at'].join(',')];
  Object.keys(COMMENTS).forEach(k=>{
    const parts=k.split('::');
    const st=STAGES.find(x=>x.id===parts[0])||{label:parts[0]};
    const ln=LANES.find(x=>x.id===parts[1])||{label:parts[1]};
    rows.push([parts[0],st.label,parts[1],ln.label,COMMENTS[k].value,COMMENTS[k].updatedAt].map(csvEsc).join(','));
  });

function buildFilters(){
  const fb=document.getElementById('filterbar'); fb.innerHTML='';
  function makeFilter(name,items,set,labelOf,dotOf){
    const wrap=el('div','flt-wrap');
    const allOn=set.size===items.length, noneOn=set.size===0;
    let lbl;
    if(allOn)lbl='All';
    else if(noneOn)lbl='None';
    else if(set.size<=2)lbl=items.filter(i=>set.has(i.id)).map(labelOf).join(', ');
    else lbl=set.size+' of '+items.length;
    const btn=el('button','flt-btn'+(allOn?'':' active'),name+': '+lbl+' <span class="caret">\u25bc</span>');
    const pop=el('div','flt-pop');
    const head=el('div','flt-pop-head');
    head.appendChild(el('span','flt-pop-title',name));
    const acts=el('span');
    const a=el('button','flt-mini','All');a.addEventListener('click',()=>{items.forEach(i=>set.add(i.id));refresh();});
    const n=el('button','flt-mini','None');n.addEventListener('click',()=>{set.clear();refresh();});
    acts.appendChild(a);acts.appendChild(n);head.appendChild(acts);
    pop.appendChild(head);
    items.forEach(i=>{
      const on=set.has(i.id);
      const it=el('button','flt-item'+(on?' on':''));
      const ck=el('span','flt-check',on?'\u2713':'');
      it.appendChild(ck);
      if(dotOf){const d=el('span','flt-dot');d.style.background=dotOf(i);it.appendChild(d);}
      it.appendChild(document.createTextNode(labelOf(i)));
      it.addEventListener('click',()=>{on?set.delete(i.id):set.add(i.id);refresh(true);});
      pop.appendChild(it);
    });
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const was=pop.classList.contains('open');
      document.querySelectorAll('.flt-pop.open').forEach(p=>p.classList.remove('open'));
      if(!was)pop.classList.add('open');
    });
    wrap.appendChild(btn);wrap.appendChild(pop);
    wrap._pop=pop;
    return wrap;
  }
  let openState=null;
  function refresh(keepOpen){
    const opened=document.querySelector('.flt-pop.open');
    openState=keepOpen&&opened?Array.from(document.querySelectorAll('.flt-wrap')).indexOf(opened.parentElement):null;
    buildFilters();renderGrid();
    if(openState!==null){
      const wraps=document.querySelectorAll('.flt-wrap');
      if(wraps[openState])wraps[openState]._pop.classList.add('open');
    }
  }
  fb.appendChild(makeFilter('Stages',STAGES,visibleStages,i=>i.code.replace('STAGE ','S'),null));
  fb.appendChild(makeFilter('Lanes',LANES,visibleLanes,i=>i.short||i.label,i=>i.color));
  if(visibleStages.size<STAGES.length||visibleLanes.size<LANES.length){
    const r=el('button','flt-reset','\u21ba Reset filters');
    r.addEventListener('click',()=>{STAGES.forEach(x=>visibleStages.add(x.id));LANES.forEach(x=>visibleLanes.add(x.id));buildFilters();renderGrid();});
    fb.appendChild(r);
  }
  const nWrap=el('div','flt-notes');
  const nBtn=el('button','flt-btn'+(filterNotes?' active':''),'\ud83d\udcac Has notes'+(Object.keys(COMMENTS).length?' ('+Object.keys(COMMENTS).length+')':''));
  nBtn.addEventListener('click',()=>{filterNotes=!filterNotes;buildFilters();renderGrid();});
  nWrap.appendChild(nBtn);
  fb.appendChild(nWrap);
}

function hexRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function renderGrid(){
  grid.innerHTML='';
  const laneMax={};
  LANES.forEach(l=>{let mx=0;STAGES.forEach(st=>{const c=DATA[st.id]&&DATA[st.id][l.id];if(c){const n=c.groups.reduce((a,g)=>a+g.cards.length,0);if(n>mx)mx=n;}});laneMax[l.id]=mx||1;});
  const stages=STAGES.filter(s=>visibleStages.has(s.id));
  const lanes=LANES.filter(l=>visibleLanes.has(l.id));
  if(!stages.length||!lanes.length){grid.appendChild(el('div','grid-msg','No stages or lanes selected \u2014 use the filter chips above.'));return;}
  const hr=el('div','header-row');
  hr.appendChild(el('div','grid-corner','Lanes \\ Stages'));
  stages.forEach(s=>{
    const idx=STAGES.findIndex(x=>x.id===s.id);
    const c=el('div','col-header-cell');
    const h=el('div','col-header',`<span class="col-icon">${stageIcon(s.id,18)}</span><span class="col-code">${s.code}</span>${s.shortLabel||s.label}`);
    h.title=s.label+' \u2014 click for stage summary';
    h.style.cursor='pointer';
    h.addEventListener('click',()=>openSummaries(idx));

  grid.appendChild(hr);
  lanes.forEach(lane=>{

    lbl.style.borderLeft=`5px solid ${lane.color}`;
    lbl.title=lane.desc+' \u2014 '+(lane.derived?'derived via register linkage':(lane.keyed?'stage-keyed placement':'placement inferred, unvalidated'));
    const ic=el('div','lane-icon',laneIcon(lane.id,22)); ic.style.color=lane.color;
    lbl.appendChild(ic);
    lbl.appendChild(el('div','lane-name',lane.short||lane.label)).style.color=lane.color;
    const hide=el('button','lane-hide','\u2715');
    hide.style.marginTop='2px';
    hide.title='Hide this row (restore via the Lanes filter chips above)';
    hide.addEventListener('click',e=>{e.stopPropagation();visibleLanes.delete(lane.id);buildFilters();renderGrid();});
    lbl.appendChild(hide);
    row.appendChild(lbl);
    stages.forEach(stage=>{
      const wrap=el('div','cell-wrap');
      const d=DATA[stage.id]?DATA[stage.id][lane.id]:null;
      if(!d){
        const ec=el('div','cell cell-empty','<span>\u2014</span>');ec.title='No cards identified in this section of the export \u2014 verify against canvas';wrap.appendChild(ec);
      }else{
        const n=d.groups.reduce((a,g)=>a+g.cards.length,0);
        const c=el('div','cell'); c.tabIndex=0; c.setAttribute('role','button');
        c.style.background=lane.bg||'#fff';
        c.style.borderLeft='4px solid '+lane.color;
        const hasNote=!!COMMENTS[cKey(stage.id,lane.id)];
        if(hasNote)c.appendChild(el('div','cell-note-badge','\ud83d\udcac'));
        if(filterNotes&&!hasNote){c.style.opacity='0.18';c.style.pointerEvents='none';}
        c.appendChild(el('div','cell-synopsis',d.synopsis));
        const f=el('div','cell-footer');
        const heat=n/laneMax[lane.id];
        const [hr,hg,hb]=hexRgb(lane.color);
        const alpha=(0.22+0.78*heat).toFixed(2);
        const badge=el('span','card-count',`${n} card${n!==1?'s':''}`);
        badge.style.background=`rgba(${hr},${hg},${hb},${alpha})`;
        badge.style.color=heat>0.45?'#fff':'#26314a';
        f.appendChild(badge);
        c.appendChild(f);
        c.style.borderTopColor=lane.color; c.style.borderTopWidth='4px';
        const open=()=>openModal(stage,lane,d);
        c.addEventListener('click',open);
        c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
        wrap.appendChild(c);
      }
      row.appendChild(wrap);
    });
    grid.appendChild(row);
  });
}

const CSV_HEADERS=['stage_id','stage_code','stage_label','lane_id','lane_label','group_title','card_order','card_id','card_text','card_note','cell_synopsis'];
function csvEsc(v){v=(v==null?'':String(v));return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(){
  const rows=[CSV_HEADERS.join(',')];
  STAGES.forEach(st=>{
    LANES.forEach(l=>{
      const cell=DATA[st.id]?DATA[st.id][l.id]:null;
      if(!cell)return;
      let order=0;
      cell.groups.forEach(g=>{
        g.cards.forEach(card=>{
          order++;
          rows.push([st.id,st.code,st.label,l.id,l.label,g.title,order,card.id||'',card.text||'',card.note||'',cell.synopsis||''].map(csvEsc).join(','));
        });
      });
    });
  });
  const blob=new Blob(['\uFEFF'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SRO_Land_Tax_Blueprint_cards.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}
function parseCSV(text){
  const rows=[];let row=[];let field='';let q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===','){row.push(field);field='';}
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r'&&text[i+1]==='\n')i++;
        row.push(field);field='';
        if(row.length>1||row[0]!=='')rows.push(row);
        row=[];
      }
      else field+=ch;
    }
  }
  if(field!==''||row.length){row.push(field);if(row.length>1||row[0]!=='')rows.push(row);}
  return rows;
}
function importCSV(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let text=reader.result;
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const rows=parseCSV(text);
    if(!rows.length){alert('Import failed: empty file.');return;}
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const idx={};CSV_HEADERS.forEach(h=>idx[h]=hdr.indexOf(h));
    if(idx.stage_id<0||idx.lane_id<0||idx.card_text<0){alert('Import failed: required columns missing (need at least stage_id, lane_id, card_text). Export a CSV first to get the expected format.');return;}
    const stageIds=new Set(STAGES.map(x=>x.id));
    const laneIds=new Set(LANES.map(x=>x.id));
    const nd={};let ok=0,skipped=0;
    for(let r=1;r<rows.length;r++){
      const row=rows[r];
      const sid=(row[idx.stage_id]||'').trim(), lid=(row[idx.lane_id]||'').trim();
      const txt=(row[idx.card_text]||'').trim();
      if(!stageIds.has(sid)||!laneIds.has(lid)||!txt){skipped++;continue;}
      nd[sid]=nd[sid]||{};
      nd[sid][lid]=nd[sid][lid]||{synopsis:'',groups:[],_gmap:{}};
      const cell=nd[sid][lid];
      const syn=idx.cell_synopsis>=0?(row[idx.cell_synopsis]||'').trim():'';
      if(syn&&!cell.synopsis)cell.synopsis=syn;
      const gt=idx.group_title>=0?((row[idx.group_title]||'').trim()||'Cards'):'Cards';
      if(!(gt in cell._gmap)){cell._gmap[gt]=cell.groups.length;cell.groups.push({title:gt,cards:[]});}
      const card={text:txt};
      const cid=idx.card_id>=0?(row[idx.card_id]||'').trim():'';
      const note=idx.card_note>=0?(row[idx.card_note]||'').trim():'';
      if(cid)card.id=cid;
      if(note)card.note=note;
      cell.groups[cell._gmap[gt]].cards.push(card);
      ok++;
    }
    STAGES.forEach(st=>{
      const src=nd[st.id]||{};
      const tgt={};
      LANES.forEach(l=>{
        if(src[l.id]){delete src[l.id]._gmap;tgt[l.id]=src[l.id];}
        else tgt[l.id]=null;
      });
      DATA[st.id]=tgt;
    });
    let T=0;for(const st of STAGES){const d=DATA[st.id]||{};for(const l of LANES){const c=d[l.id];if(c)for(const g of c.groups)T+=g.cards.length;}}
    document.getElementById('totalcards').textContent=T;
    renderGrid();
    alert('Import complete: '+ok+' cards loaded'+(skipped?', '+skipped+' rows skipped (unknown stage/lane or empty text)':'')+'.\n\nNote: the import applies to this browser session only. The underlying HTML file is unchanged \u2014 export CSV to capture the current state, or have the file regenerated to make changes permanent.');
  };
  reader.readAsText(file);
}

/* ---------- Save HTML: serialise current DATA back into a copy of this file ---------- */
function spliceData(src){
  const payload='const DATA='+JSON.stringify(DATA)+';\n'+'const FINDINGS=';
  const re=/const DATA=\{[\s\S]*?\};\s*\nconst FINDINGS=/;
  if(!re.test(src))return null;
  let out=src.replace(re,payload);
  out=out.replace('modal-overlay open','modal-overlay');
  return out;
}
function downloadHTML(text){
  const blob=new Blob([text],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date().toISOString().slice(0,10);
  a.download='SRO_Land_Tax_Blueprint_TV_10_Lanes_'+d+'.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
function saveHTML(){
  fetch(window.location.href,{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error('http '+r.status);return r.text();})
    .then(src=>{
      const out=spliceData(src);
      if(!out)throw new Error('splice marker not found');
      downloadHTML(out);
    })
    .catch(()=>{
      // file:// fallback: rebuild from live document
      let src='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
      const out=spliceData(src);
      if(out){downloadHTML(out);
        alert('Saved via fallback method (the page could not re-read its own source, which happens when opened directly from disk). The saved file is functional, but verify it opens correctly before uploading. When served from Azure over HTTP, saving uses the exact original source.');
      } else {
        alert('Save failed: could not locate the data block. Export CSV instead and have the file regenerated.');
      }
    });
}
document.getElementById('save-html-btn').addEventListener('click',saveHTML);

const overlay=document.getElementById('overlay');
function openModal(stage,lane,d){
  const b=document.getElementById('m-badge');
  b.textContent=lane.label; b.style.background=lane.color; b.style.color='#fff';
  document.getElementById('m-title').textContent=`${stage.code} — ${stage.label}`;
  const n=d.groups.reduce((a,g)=>a+g.cards.length,0);
  document.getElementById('m-sub').innerHTML=`<span>${n} canvas card${n!==1?'s':''}</span><span class="cell-flag ${lane.keyed?'flag-keyed':'flag-inferred'}">${lane.keyed?'STAGE-KEYED PLACEMENT':'PLACEMENT INFERRED — UNVALIDATED'}</span>`;
  const body=document.getElementById('m-body'); body.innerHTML='';
  const prov=el('div','provenance '+(lane.derived?'keyed':(lane.keyed?'keyed':'')),
    lane.derived
      ?'DERIVED LANE: the merged model maps capabilities to value streams and processes, not to blueprint stages. This lane is derived: stage \u2192 PPs/HMWs keyed to the stage \u2192 capability \u2192 process. Only capabilities/processes with pain or HMW evidence in this stage appear; absence here does not mean a capability is not exercised in the stage. Retired HMWs (025/039/042) excluded.'
      :lane.keyed
      ?'Card text is verbatim from the June 2026 canvas (OCR ligature artefacts corrected; [\u2026] marks a fragment boundary in the export). Stage placement is keyed via the SRO Master Merged Model v2 register. ID-to-card matching for pain narratives is analytically derived; cards labelled "register wording" have no isolated canvas narrative yet and require validation.'
      :'Card text is verbatim from the June 2026 canvas (OCR ligature artefacts corrected; fragments split by the export have been rejoined). Stage and lane placement is inferred from card content and export position and has NOT been validated against the canvas layout.');
  body.appendChild(prov);
  (function(){
    const wrap=el('div');
    wrap.appendChild(el('div','group-title','\ud83d\udcac Comment'));
    const ta=document.createElement('textarea');
    ta.className='comment-box'; ta.placeholder='Add a validation note for this cell\u2026';
    ta.value=(COMMENTS[cKey(stage.id,lane.id)]||{}).value||'';
    const row=el('div','comment-row');
    const saved=el('span','comment-saved','\u2713 Saved');
    const clr=el('button','comment-clear','Clear');
    let t=null;
    ta.addEventListener('input',()=>{
      setComment(stage.id,lane.id,ta.value);
      saved.classList.add('show');clearTimeout(t);t=setTimeout(()=>saved.classList.remove('show'),1500);
    });
    clr.addEventListener('click',()=>{ta.value='';setComment(stage.id,lane.id,'');renderGrid();buildFilters();});
    ta.addEventListener('change',()=>{renderGrid();buildFilters();});
    row.appendChild(saved);row.appendChild(clr);
    wrap.appendChild(ta);wrap.appendChild(row);
    body.appendChild(wrap);
  })();
  const totalCards=d.groups.reduce((a,g)=>a+g.cards.length,0);
  if(totalCards>12&&d.groups.length>1){
    const nav=el('div','sum-nav');
    d.groups.forEach((g,gi)=>{
      const chip=el('button','sum-chip',g.title.length>40?g.title.slice(0,38)+'\u2026':g.title);
      chip.addEventListener('click',()=>{const t=document.getElementById('mgrp-'+gi);if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});
      nav.appendChild(chip);
    });
    body.appendChild(nav);
  }
  d.groups.forEach((g,gi)=>{
    const gt=el('div','group-title',g.title);gt.id='mgrp-'+gi;
    body.appendChild(gt);
    const gw=el('div','card-group');
    g.cards.forEach(card=>{
      const it=el('div','card-item'); it.style.setProperty('--accent',lane.color);
      let inner='';
      if(card.id)inner+=`<span class="card-id">${card.id}</span><br>`;
      inner+=card.text;
      if(card.note)inner+=`<span class="card-note">${card.note}</span>`;
      it.innerHTML=inner; gw.appendChild(it);
    });
    body.appendChild(gw);
  });
  overlay.classList.add('open');
  document.getElementById('m-close').focus();
}
function openSummaries(focusIdx){
  const b=document.getElementById('m-badge');
  b.textContent='Stage Summaries'; b.style.background='#163172'; b.style.color='#fff';
  document.getElementById('m-title').textContent='Business View \u2014 Stage Summaries';
  document.getElementById('m-sub').innerHTML='<span>Analytical synthesis over verbatim canvas evidence \u00b7 counts trace to merged model v2 register \u00b7 capability/process anchors carry derived-lane validation status</span>';
  const body=document.getElementById('m-body'); body.innerHTML='';
  const nav=el('div','sum-nav');
  SUMMARIES.forEach((s,i)=>{
    const c=el('button','sum-chip',s.code);
    c.addEventListener('click',()=>{document.getElementById('sum-'+i).scrollIntoView({behavior:'smooth',block:'start'});});
    nav.appendChild(c);
  });
  body.appendChild(nav);
  SUMMARIES.forEach((s,i)=>{
    const sec=el('div','sum-section'); sec.id='sum-'+i;
    sec.appendChild(el('div','sum-stage-title',`<span class="sum-code">${s.code}</span>${s.label}`));
    s.paras.forEach(p=>{
      sec.appendChild(el('div','sum-para',(p.h?`<b>${p.h}.</b> `:'')+p.t));
    });
    body.appendChild(sec);
  });
  overlay.classList.add('open');
  if(focusIdx!==undefined){setTimeout(()=>{const t=document.getElementById('sum-'+focusIdx);if(t)t.scrollIntoView({block:'start'});},50);}
  document.getElementById('m-close').focus();
}
document.getElementById('summaries-btn').addEventListener('click',()=>openSummaries());
