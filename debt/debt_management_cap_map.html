<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Management Capability Model</title>

<style>
body {font-family: Inter, sans-serif; background:#f4f6f9; padding:20px; margin:0;}
h2 {margin:0 0 14px 0; font-size:22px; color:#111827;}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
button{padding:8px 12px;border:1px solid #ccc;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;}
button:hover{background:#f9fafb;}

.container{display:flex;gap:10px;overflow-x:auto;align-items:flex-start;padding-bottom:6px;}
.column{min-width:240px;flex:0 0 auto;}

.header{color:#fff;padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;border-radius:6px 6px 0 0;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;line-height:1.35;}

.track{background:#fff;border:1px solid #ddd;border-top:none;padding:10px;display:flex;flex-direction:column;gap:8px;border-radius:0 0 6px 6px;min-height:560px;}

.card{
  background:#fafafa;
  border:1px solid #e5e7eb;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  transition:all .15s ease;
}

.card:hover{background:#fff;border-color:#cbd5e1;box-shadow:0 1px 4px rgba(0,0,0,.05);}

.card.common {border-left:4px solid #16a34a;}
.card.debt {border-left:4px solid #eab308;}

.card small {display:block;color:#777;margin-top:4px;}

.s1  { background:#0f7a4e; }
.s2  { background:#2563eb; }
.s3  { background:#6d28d9; }
.s4  { background:#b91c1c; }
.s5  { background:#92400e; }
.s6  { background:#0ea5e9; }
.s7  { background:#9333ea; }
.s8  { background:#15803d; }
.s9  { background:#1d4ed8; }
.s10 { background:#b45309; }
.s11 { background:#374151; }
.s12 { background:#111827; }
.s13 { background:#065f46; }

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;z-index:998;}
.overlay.open{display:block;}

.panel{
  position:fixed;
  right:-520px;
  top:0;
  width:500px;
  height:100%;
  background:#fff;
  padding:20px;
  overflow:auto;
  transition:.3s;
  box-shadow:-4px 0 16px rgba(0,0,0,.16);
  z-index:999;
}
.panel.open{right:0;}

.close{
  position:absolute;
  top:12px;
  right:12px;
  cursor:pointer;
  width:28px;
  height:28px;
  border:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

.section {margin-top:16px;font-size:11px;font-weight:bold;color:#777;text-transform:uppercase;}

.panel h3{margin:0;font-size:20px;margin-bottom:6px;}

.panel p{font-size:13px;line-height:1.5;}

.label {font-weight:bold;color:#333;margin-top:10px;}

</style>
</head>

<body>

<div class="toolbar">
  <button onclick="expandAll()">Expand First Card</button>
  <button onclick="scrollToStart()">Back to Start</button>
</div>

<div class="container" id="map"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">
<div class="close" onclick="closePanel()">✖</div>

<h3 id="title"></h3>
<div id="stageLabel"></div>

<div class="section">Investigation</div>
<p id="inv"></p>

<div class="section">Debt</div>

<div class="section">Type</div>
<p id="type"></p>

</div>

const map=document.getElementById("map");
const panel=document.getElementById("panel");
const overlay=document.getElementById("overlay");

data.forEach(stage=>{
  const col=document.createElement("div");
  col.className="column";

  const h=document.createElement("div");
  h.className="header "+stage.stageClass;
  h.innerText=stage.stage;

  const track=document.createElement("div");
  track.className="track";

  stage.capabilities.forEach(cap=>{
    const card=document.createElement("div");
    card.className="card "+(cap.type==="COMMON"?"common":"debt");
    card.innerHTML=`<strong>${cap.title}</strong><small>${cap.type}</small>`;
    card.onclick=()=>openPanel(stage.stage,cap);
    track.appendChild(card);
  });

  col.appendChild(h);
  col.appendChild(track);
  map.appendChild(col);
});

function openPanel(stage,cap){
  document.getElementById("title").innerText=cap.title;
  document.getElementById("stageLabel").innerText=stage;
  document.getElementById("inv").innerText=cap.inv;
  document.getElementById("debt").innerText=cap.debt;
  document.getElementById("type").innerText=cap.type;

  overlay.classList.add("open");
  panel.classList.add("open");
}

function closePanel(){
  overlay.classList.remove("open");
  panel.classList.remove("open");
}

function scrollToStart(){
  document.querySelector(".container").scrollTo({left:0,behavior:"smooth"});
}

function expandAll(){
  openPanel(data[0].stage,data[0].capabilities[0]);
}

</html>
