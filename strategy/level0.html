<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Land Tax – L1 Business Capability View</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
* { box-sizing:border-box; margin:0; padding:0 }

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#f7f4ea;
  padding:20px;
  color:#333;
}

.page{
  max-width:980px;
  margin:auto;
  background:#fff;
  padding:30px 24px;
}

h1{
  text-align:center;
  font-size:1.6em;
  margin-bottom:30px;
  font-weight:600;
}

/* ===== HEADERS ===== */
.section-header{
  font-size:1.1em;
  font-weight:600;
  margin:28px 0 16px;
}

/* ===== VALUE STREAM CHEVRONS ===== */
.value-streams{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:40px;
}

.chevron{
  position:relative;
  background:#9fb8e0;
  padding:22px 30px 22px 34px;
  font-weight:600;
  text-align:center;
  line-height:1.4;
  min-height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.chevron::after{
  content:'';
  position:absolute;
  right:-26px;
  top:0;
  width:0;height:0;
  border-top:45px solid transparent;
  border-bottom:45px solid transparent;
  border-left:26px solid #9fb8e0;
}

/* ===== CAPABILITY BOXES ===== */
.capability-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:20px;
}

.capability-box{
  padding:16px 12px;
  background:#bcd0ee;
  border-radius:4px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.capability-box:hover{
  background:#a8c3e8;
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.common{background:#d6e2f3}
.support{background:#d0d6d0}
.governance{background:#f4d8d8}
.platform{background:#e8dff3}

/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  align-items:center;
  justify-content:center;
}

.modal.active{display:flex}

.modal-content{
  background:#fff;
  padding:28px;
  max-width:600px;
  width:94%;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:16px;
  border-bottom:2px solid #e5e7eb;
}

.modal-title{font-size:1.3em;font-weight:700}

.modal-close{
  border:none;
  background:none;
  font-size:1.6em;
  cursor:pointer;
}

.modal-section{margin-bottom:18px}
.modal-section-title{
  text-transform:uppercase;
  font-size:.85em;
  color:#6b7280;
  margin-bottom:8px;
  font-weight:700;
}

.pill{
  display:inline-block;
  padding:4px 10px;
  background:#eef2ff;
  border-radius:999px;
  margin:4px 6px 0 0;
  font-size:.8em;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .value-streams{grid-template-columns:1fr}
  .capability-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="page">

<h1>Land Tax – L1 Business Capability View</h1>

<div class="section-header">Value Streams</div>
<div id="valueStreams" class="value-streams"></div>

<div class="section-header">Core Capabilities</div>
<div id="coreCaps"></div>

<div class="section-header">Common Capabilities</div>
<div id="commonCaps"></div>

<div class="section-header">Supporting Capabilities</div>
<div id="supportCaps"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div id="modalTitle" class="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ========= UTIL ========= */
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-')

const uniq = arr => [...new Set(arr.filter(Boolean))]

const pill = arr => arr.length ? arr.map(v=>`<span class="pill">${v}</span>`).join('') : '—'

/* ========= CSV PARSE ========= */
function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);

  // detect delimiter safely (CSV or TSV)
  const delimiter =
    lines[0].includes('\t') && !lines[0].includes(',')
      ? '\t'
      : ',';

  const headers = lines[0].split(delimiter).map(h => h.trim());

  return lines.slice(1).map(line => {
    const values = line.split(delimiter);
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (values[i] || '').trim();
    });
    return obj;
  });
}


/* ========= LOAD ========= */
fetch('../data.csv')
.then(r=>r.text())
.then(text=>{
  const records=parseCSV(text)

  /* ---- VALUE STREAMS ---- */
  
const vs = uniq(
  records
    .map(r => r["Value Stream"])
    .filter(v => v && v.trim() !== "")
    .map(v =>
      v
        .replace(/^Value Stream:\s*/i, '')
        .replace(/\s*\(\d+\)\s*$/, '')
        .trim()
    )
);


  /* ---- CAPABILITIES ---- */
  const caps={}
  records.forEach(r=>{
    const name=r["Executing Capabilities (L2 Execution)"]
    if(!name) return
    caps[name]=caps[name]||{
      name,
      streams:[],l1:[],l2:[],actors:[],systems:[],procedures:[]
    }
    caps[name].streams.push(r["Value Stream"])
    caps[name].l1.push(r["Core Process (Level 1)"])
    caps[name].l2.push(r["Sub-Process (Level 2)"])
    caps[name].actors.push(r["Internal Actors"],r["External Actors"])
    caps[name].systems.push(r["Internal Systems"],r["External Systems"])
    caps[name].procedures.push(r["Related Procedure"])
  })

  const core=[],common=[],support=[]

  Object.values(caps).forEach(c=>{
    const id=slug(c.name)
    window.capMap=window.capMap||{}
    window.capMap[id]={
      title:c.name,
      streams:uniq(c.streams),
      l1:uniq(c.l1),
      l2:uniq(c.l2),
      actors:uniq(c.actors),
      systems:uniq(c.systems),
      procedures:uniq(c.procedures)
    }
    core.push(id) // default core (can be refined later)
  })

  render('coreCaps',core)
})

function render(target,ids){
  const h=document.getElementById(target)
  for(let i=0;i<ids.length;i+=3){
    const row=document.createElement('div')
    row.className='capability-grid'
    ids.slice(i,i+3).forEach(id=>{
      const b=document.createElement('div')
      b.className='capability-box'
      b.textContent=capMap[id].title
      b.onclick=()=>openModal(id)
      row.appendChild(b)
    })
    h.appendChild(row)
  }
}

/* ========= MODAL ========= */
function openModal(id){
  const c=capMap[id]
  modalTitle.textContent=c.title
  modalBody.innerHTML=`
    <div class="modal-section">
      <div class="modal-section-title">Value Streams</div>${pill(c.streams)}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">L1 Processes</div>${pill(c.l1)}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">L2 Sub‑Processes</div>${pill(c.l2)}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Actors</div>${pill(c.actors)}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Systems</div>${pill(c.systems)}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Procedures</div>${pill(c.procedures)}
    </div>`
  modal.classList.add('active')
}

function closeModal(){ modal.classList.remove('active') }
</script>
</body>
</html>
``
