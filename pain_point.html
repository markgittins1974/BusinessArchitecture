<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRO Capability Pain Heat Map v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f4f8;color:#1e2d3d;font-family:Inter,Helvetica,Arial,sans-serif;min-height:100vh}

.page-header{background:#fff;border-bottom:1px solid #dce6ef;padding:24px 32px 20px}
.page-header__eyebrow{font-family:‘Roboto Mono’,monospace;font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#7a8ea0;margin-bottom:6px}
.page-header__title{font-size:26px;font-weight:700;color:#1e2d3d;line-height:1.2}
.page-header__sub{font-size:13px;color:#4a5f72;margin-top:4px}

.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 32px;background:#fff;border-bottom:1px solid #dce6ef}
.controls__label{font-family:‘Roboto Mono’,monospace;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a8ea0;margin-right:4px}
.fbtn{padding:5px 12px;border-radius:6px;font-family:Inter,sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .2s;border:1px solid}
.fbtn.dim{opacity:0.25}
.fbtn-all{background:#fff;border-color:#dce6ef;color:#4a5f72}
.fbtn-red{background:#fde8e8;border-color:#f5c2c2;color:#b53030}
.fbtn-orange{background:#fff5d6;border-color:#e8d87a;color:#8a6500}
.fbtn-yellow{background:#eae6f4;border-color:#cdc4e6;color:#5a3fa0}
.fbtn-green{background:#dff0e0;border-color:#b5ddb9;color:#2a7a3b}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;padding:20px 32px 40px;max-width:1280px}

.card{border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,opacity .2s;border-width:1px;border-style:solid}
.card:hover{box-shadow:0 4px 16px rgba(26,58,92,.12)}
.card.hide{display:none}
.card-red{background:#fde8e8;border-color:#f5c2c2}
.card-orange{background:#fff5d6;border-color:#e8d87a}
.card-yellow{background:#eae6f4;border-color:#cdc4e6}
.card-green{background:#dff0e0;border-color:#b5ddb9}

.card__bar{height:5px}
.card-red .card__bar{background:#b53030}
.card-orange .card__bar{background:#8a6500}
.card-yellow .card__bar{background:#5a3fa0}
.card-green .card__bar{background:#2a7a3b}

.card__body{padding:14px 16px 16px}
.card__top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card__title{font-size:13px;font-weight:700;color:#1e2d3d;line-height:1.3}
.badge{font-family:‘Roboto Mono’,monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.badge-red{background:#b53030;color:#fff}
.badge-orange{background:#8a6500;color:#fff}
.badge-yellow{background:#5a3fa0;color:#fff}
.badge-green{background:#2a7a3b;color:#fff}

.card__desc{font-size:11px;color:#4a5f72;line-height:1.4;margin-bottom:8px}
.card__insight{font-size:10px;font-weight:600;color:#1e2d3d;font-style:italic;margin-bottom:8px}
.card__tags{display:flex;flex-wrap:wrap;gap:4px}
.card__tag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.7);border:1px solid #dce6ef;color:#4a5f72}
.card__more{font-family:‘Roboto Mono’,monospace;font-size:9px;color:#7a8ea0;margin-top:10px;letter-spacing:0.04em}

.overlay{position:fixed;inset:0;background:rgba(26,58,92,.35);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.detail{position:fixed;right:0;top:0;bottom:0;width:min(500px,92vw);background:#fff;z-index:101;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;border-left:1px solid #dce6ef}
.detail.open{transform:translateX(0)}
.detail__header{background:#1a3a5c;padding:20px 24px;position:relative}
.detail__close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.detail__title{font-size:17px;font-weight:700;color:#fff;line-height:1.3}
.detail__badge-row{margin-top:8px}
.detail__content{padding:20px 24px 32px}
.detail__section{margin-bottom:16px}
.detail__section-title{font-family:‘Roboto Mono’,monospace;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a8ea0;margin-bottom:8px}
.detail__section-body{background:#f0f4f8;border:1px solid #dce6ef;border-radius:6px;padding:12px 14px}
.detail__section-body ul{padding-left:16px}
.detail__section-body li{font-size:12px;color:#4a5f72;line-height:1.5;margin-bottom:3px}
.detail__quote{font-size:11px;font-style:italic;color:#4a5f72;padding:5px 10px;border-left:3px solid #dce6ef;margin:5px 0;line-height:1.45}
.detail__insight-box{font-size:12px;font-weight:600;color:#2d5a8e;margin-top:12px;padding:10px 14px;background:rgba(45,90,142,.06);border-radius:6px;border:1px solid rgba(45,90,142,.15)}

@media(max-width:640px){.page-header,.controls,.grid{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr}}
</style>

</head>
<body>

<div class="page-header">
  <div class="page-header__eyebrow">SRO Transformation Architecture</div>
  <div class="page-header__title">Land Tax — Pain Heat Map</div>
  <div class="page-header__sub">SRO capability pain drivers across the Land Tax operating model</div>
</div>

<div class="controls" id="controls">
  <span class="controls__label">Pain Level</span>
  <button class="fbtn fbtn-all" onclick="setFilter('all')">All</button>
  <button class="fbtn fbtn-red" onclick="setFilter('red')">Very High</button>
  <button class="fbtn fbtn-orange" onclick="setFilter('orange')">High</button>
  <button class="fbtn fbtn-yellow" onclick="setFilter('yellow')">Moderate</button>
  <button class="fbtn fbtn-green" onclick="setFilter('green')">Low</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail">
  <div class="detail__header">
    <button class="detail__close" onclick="closeDetail()">✕</button>
    <div id="dh"></div>
  </div>
  <div class="detail__content" id="dc"></div>
</div>

<script>
var DATA = [
  {title:"Customer Data Management",lv:"red",label:"Very High",subtitle:"Siloed systems, duplicates, inconsistent addresses, manual cleansing",why:["Siloed systems","Duplicate customers","Inconsistent addresses","Manual data cleansing","Poor verification during calls","Data not synchronising across systems"],evidence:["Hard to identify customers","Data inconsistent across systems","Manual validation errors","Customer data duplicated","Address accuracy issues"],l3:["Identification of Customer","Customer Data Verification & Validation","Customer Address / Format Management","Duplicate handling"],insight:"This is the single biggest root cause of pain."},
  {title:"Customer Service Request & Support",lv:"red",label:"Very High",subtitle:"No reference numbers, poor case visibility, unclear ownership",why:["No reference numbers","Poor case visibility","Queries repeated","Unclear ownership","Long handling times"],evidence:["No case tracking","Customers unsure if requests received","CSOs can't see what other teams are doing","Status confusion leads to repeat calls"],l3:["Enquiry Handling","SLA Management","Case creation / tracking gaps"],insight:"Where operational pain turns into customer pain."},
  {title:"Customer Communication & Engagement",lv:"red",label:"Very High",subtitle:"Inconsistent letters, missing references, untimely notifications",why:["Inconsistent letters","No reference numbers in emails","Untimely notifications","Generic messaging","Channel fragmentation"],evidence:["Emails don't include reference numbers","Customers don't know if something was received","Messaging inconsistent across systems","Notification overload / irrelevance"],l3:["Customer Notifications","Inbound / Outbound Notifications","Communication Channel Management"],insight:"Directly fuels distrust and complaints."},
  {title:"Entity Association Management",lv:"orange",label:"High",subtitle:"No property-centric view, grouping errors, trust/joint-owner complexity",why:["No property-centric view","Grouping errors","Trustees / joint owners hard to resolve","Aggregation logic buried in rules"],evidence:["Lack of property centricity","Managing multiple accounts is hard","Grouping accuracy risks"],l3:["Entity Association","Customer Relationship links"],insight:"Amplifies pain when combined with red-zone issues."},
  {title:"Property Data Management",lv:"orange",label:"High",subtitle:"Ownership quality issues, delayed feeds, incorrect valuations",why:["Ownership data quality issues","Delayed external feeds","Manual corrections","Incorrect valuations flowing downstream"],evidence:["Poor property data quality","Ownership not up to date","VicRoads feeds infrequent","Manual interventions required"],l3:["Identification of Property","Property Address Management","Ownership / Transfer Management"],insight:"Bad property data ripples through assessments and correspondence."},
  {title:"Workflow & SLA Management",lv:"orange",label:"High",subtitle:"Unclear prioritisation, invisible SLA breaches, routing delays",why:["Task prioritisation unclear","No visualisation of workload","SLA breaches invisible","Routing delays"],evidence:["CSOs can't prioritise","Tracking progress is difficult","Escalation delays","Case status unclear"],l3:["SLA Management","Workflow Escalation"],insight:"Without visibility, everything feels urgent."},
  {title:"Document & Lodgement Management",lv:"yellow",label:"Moderate",subtitle:"Manual document creation, slow generators, storage fragmentation",why:["Manual document creation","Slow generators","Storage fragmentation"],evidence:["Manual document handling","Slow document generation","CM9/CM10 risks"],l3:["Document Generation","Document Storage"],insight:"Secondary but compounds when upstream data is wrong."},
  {title:"Assessment & Reassessment",lv:"yellow",label:"Moderate",subtitle:"Customers don't understand changes, poor explainability",why:["Customers don't understand changes","Explainability lacking","Amendments cause confusion"],evidence:["Why did my amount change?","Decision accuracy questioned","Reassessment confusion"],l3:["Assessment Calculation","Reassessment Triggers"],insight:"Opacity in assessments drives complaints."},
  {title:"Refunds Management",lv:"yellow",label:"Moderate",subtitle:"Manual tracking, poor transparency, approval delays",why:["Manual tracking","Poor status transparency","Delays in approvals"],evidence:["Refund tracking manual","No visibility of approval","Refund status verification delays"],l3:["Refund Processing","Refund Status Tracking"],insight:"Low volume but high frustration when it goes wrong."},
  {title:"Revenue Line Alert Management",lv:"green",label:"Low",subtitle:"Causes pain mainly when upstream data or workflow is weak",why:[],evidence:[],l3:[],insight:"Contained when upstream capabilities work."},
  {title:"Rate Table / Penalty Maintenance",lv:"green",label:"Low",subtitle:"Localised impact, manageable independently",why:[],evidence:[],l3:[],insight:"Contained when upstream capabilities work."},
  {title:"Print & Mail",lv:"green",label:"Low",subtitle:"Downstream dependency, low standalone pain",why:[],evidence:[],l3:[],insight:"Contained when upstream capabilities work."},
  {title:"Payment Channel Management",lv:"green",label:"Low",subtitle:"Localised, manageable",why:[],evidence:[],l3:[],insight:"Contained when upstream capabilities work."}
];

var activeLv = 'all';

function setFilter(lv) {
  activeLv = lv;
  var btns = document.querySelectorAll('.fbtn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('dim');
    if (lv !== 'all' && btns[i].className.indexOf('fbtn-' + lv) === -1 && btns[i].className.indexOf('fbtn-all') === -1) {
      btns[i].classList.add('dim');
    }
  }
  var cards = document.querySelectorAll('.card');
  for (var j = 0; j < cards.length; j++) {
    if (lv === 'all' || cards[j].getAttribute('data-lv') === lv) {
      cards[j].classList.remove('hide');
    } else {
      cards[j].classList.add('hide');
    }
  }
}

function buildCards() {
  var grid = document.getElementById('grid');
  for (var i = 0; i < DATA.length; i++) {
    var d = DATA[i];
    var div = document.createElement('div');
    div.className = 'card card-' + d.lv;
    div.setAttribute('data-lv', d.lv);
    div.setAttribute('data-idx', i);
    var tags = '';
    if (d.l3.length) {
      tags = '<div class="card__tags">';
      for (var t = 0; t < d.l3.length; t++) tags += '<span class="card__tag">' + d.l3[t] + '</span>';
      tags += '</div>';
    }
    div.innerHTML = '<div class="card__bar"></div>' +
      '<div class="card__body">' +
      '<div class="card__top"><span class="card__title">' + d.title + '</span><span class="badge badge-' + d.lv + '">' + d.label + '</span></div>' +
      '<div class="card__desc">' + d.subtitle + '</div>' +
      '<div class="card__insight">' + d.insight + '</div>' +
      tags +
      '<div class="card__more">Tap to explore →</div>' +
      '</div>';
    div.onclick = (function(idx) { return function() { openDetail(idx); }; })(i);
    grid.appendChild(div);
  }
}

function openDetail(i) {
  var d = DATA[i];
  document.getElementById('dh').innerHTML =
    '<div class="detail__title">' + d.title + '</div>' +
    '<div class="detail__badge-row"><span class="badge badge-' + d.lv + '">' + d.label + ' Pain</span></div>';
  var html = '';
  if (d.why.length) {
    html += '<div class="detail__section"><div class="detail__section-title">Why it\'s hot</div><div class="detail__section-body"><ul>';
    for (var w = 0; w < d.why.length; w++) html += '<li>' + d.why[w] + '</li>';
    html += '</ul></div></div>';
  }
  if (d.evidence.length) {
    html += '<div class="detail__section"><div class="detail__section-title">Pain Evidence</div><div class="detail__section-body">';
    for (var e = 0; e < d.evidence.length; e++) html += '<div class="detail__quote">"' + d.evidence[e] + '"</div>';
    html += '</div></div>';
  }
  if (d.l3.length) {
    html += '<div class="detail__section"><div class="detail__section-title">Key L3 Stress Points</div><div class="detail__section-body"><ul>';
    for (var l = 0; l < d.l3.length; l++) html += '<li>' + d.l3[l] + '</li>';
    html += '</ul></div></div>';
  }
  html += '<div class="detail__insight-box">' + d.insight + '</div>';
  document.getElementById('dc').innerHTML = html;
  document.getElementById('detail').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

buildCards();
</script>

</body>
</html>
