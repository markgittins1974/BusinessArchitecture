const map=document.getElementById("map");
const overlay=document.getElementById("overlay");
const panel=document.getElementById("panel");
const title=document.getElementById("title");
const desc=document.getElementById("desc");
const pain=document.getElementById("pain");
const evidence=document.getElementById("evidence");

data.forEach(stage=>{
  const col=document.createElement("div");
  col.className="column";
  const h=document.createElement("div");
  h.className="header "+stage.stageClass;
  h.innerText=stage.stage;
  const track=document.createElement("div");
  track.className="track";
  stage.capabilities.forEach(i=>{
    const card=document.createElement("div");
    card.className="card";
    card.tabIndex=0;
    card.innerHTML=`<strong>${i.title}</strong><div class="hint">Click for full detail</div>`;
    card.onclick=()=>openPanel(i);
    card.onkeypress=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openPanel(i);}};
    track.appendChild(card);
  });
  col.appendChild(h);
  col.appendChild(track);
  map.appendChild(col);
});
function openPanel(i){
  overlay.classList.add("open");
  panel.classList.add("open");
  title.innerText=i.title;
  desc.innerText=i.desc;
  pain.innerHTML="";
  i.pain.forEach(x=>{let li=document.createElement("li");li.innerText=x;pain.appendChild(li);});
  evidence.innerHTML="";
  i.evidence.forEach(x=>{let li=document.createElement("li");li.innerText=x;evidence.appendChild(li);});
}
  function closePanel(){
  overlay.classList.remove("open");
  panel.classList.remove("open");
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closePanel();
});


/* ✅ ADD STEP 2 HERE */
function exportCSV(){
  let rows = [];

  rows.push([
    "Stage",
    "Capability",
    "Description",
    "Pain Points",
    "Evidence"
  ]);

  data.forEach(stage => {
    stage.capabilities.forEach(cap => {

      const pain = cap.pain.join(" | ");
      const evidence = cap.evidence.join(" | ");

      rows.push([
        stage.stage,
        cap.title,
        cap.desc,
        pain,
        evidence
      ]);
    });
  });

  const csvContent = rows.map(row => 
    row.map(field => `"${field.replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "investigation_capability_model.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
