// ── Lane colours ─────────────────────────────────────────────
const LANE_COLS = [
  '#2563eb','#7c3aed','#0ea5e9','#059669','#d97706',
  '#dc2626','#0d9488','#8b5cf6','#db2777','#374151'
];

// ── Phase class map ───────────────────────────────────────────
function phaseClass(idx) {
  if (idx < 3) return 'ph-strategy';
  if (idx < 5) return 'ph-gate';
  if (idx < 7) return 'ph-delivery';
  return 'ph-value';
}

// ── Validation ────────────────────────────────────────────────
function validateModel(data) {
  const errors = [];
  const ids = new Set();
  const laneNames = new Set(data.lanes.map(l => l.name));
  const phaseNames = new Set(data.phases.map(p => p.name));
  const reqStr = ['id','lane','phase','level','state','meta','title','lead','support','deliverable','traceability','governance'];
  const forbidden = ['TBD','Placeholder','Lorem ipsum','To be confirmed'];

  data.cards.forEach((c, i) => {
    reqStr.forEach(f => { if (!c[f]) errors.push(`Card[${i}] missing field: ${f}`); });
    if (!c.description || c.description.trim().split(/\s+/).length < 10)
      errors.push(`Card ${c.id}: description < 10 words`);
    if (!c.body || c.body.trim().split(/\s+/).length < 15)
      errors.push(`Card ${c.id}: body < 15 words`);
    if (!c.chips || !c.chips.length) errors.push(`Card ${c.id}: no chips`);
    if (ids.has(c.id)) errors.push(`Duplicate id: ${c.id}`);
    ids.add(c.id);
    if (!laneNames.has(c.lane)) errors.push(`Card ${c.id}: unknown lane "${c.lane}"`);
    if (!phaseNames.has(c.phase)) errors.push(`Card ${c.id}: unknown phase "${c.phase}"`);
    forbidden.forEach(f => {
      if ((c.title||'').includes(f) || (c.description||'').includes(f))
        errors.push(`Card ${c.id}: contains forbidden text "${f}"`);
    });
  });
  return errors;
}

// ── State CSS class ───────────────────────────────────────────
function stateClass(state) {
  return {Active:'s-active',Planned:'s-planned',Review:'s-review',Complete:'s-complete'}[state] || 's-planned';
}

// ── Render board ──────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const lanes = modelData.lanes;
  const phases = modelData.phases;
  const cards = modelData.cards;

  // Build lookup: lane → phase → card
  const lookup = {};
  cards.forEach(c => {
    if (!lookup[c.lane]) lookup[c.lane] = {};
    lookup[c.lane][c.phase] = c;
  });

  const el = (tag, cls, extra) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (extra) Object.assign(e, extra);
    return e;
  };

  // ── Row 1: Zone band ─────────────────────────────────────
  const zCorner = el('div', 'zone-corner lane-lbl');
  zCorner.style.gridRow = '1'; zCorner.style.gridColumn = '1';
  board.appendChild(zCorner);

  [
    {cls:'zone zone-strategy', col:'2/5', label:'Strategic Cadence'},
    {cls:'zone zone-gate',     col:'5/7', label:'✓ READY FOR BUILD'},
    {cls:'zone zone-delivery', col:'7/10', label:'Delivery Cadence'},
  ].forEach(z => {
    const d = el('div', z.cls);
    d.style.gridRow='1'; d.style.gridColumn=z.col;
    d.textContent = z.label;
    board.appendChild(d);
  });

  // ── Row 2: Phase headers ──────────────────────────────────
  const phCorner = el('div', 'phase-corner lane-lbl');
  phCorner.style.gridRow = '2'; phCorner.style.gridColumn = '1';
  board.appendChild(phCorner);

  phases.forEach((p, pi) => {
    const d = el('div', 'phase-hdr ' + phaseClass(pi));
    d.style.gridRow = '2'; d.style.gridColumn = String(pi + 2);
    d.innerHTML = `<span class="ph-num">${p.num}</span><span class="ph-name">${p.name.replace(/^P\d+\s*/,'')}</span><span class="ph-desc">${p.desc}</span>`;
    board.appendChild(d);
  });

  // ── Row 3: Overlay band ───────────────────────────────────
  const ovCorner = el('div', 'overlay-corner lane-lbl');
  ovCorner.style.gridRow = '3'; ovCorner.style.gridColumn = '1';
  board.appendChild(ovCorner);

  [
    {cls:'overlay ov-strategy', col:'2/5', label:'Strategic Cadence'},
    {cls:'overlay ov-gate',     col:'5/7', label:'✓ READY FOR BUILD'},
    {cls:'overlay ov-delivery', col:'7/10', label:'Delivery Cadence'},
  ].forEach(ov => {
    const d = el('div', ov.cls);
    d.style.gridRow = '3'; d.style.gridColumn = ov.col;
    d.textContent = ov.label;
    board.appendChild(d);
  });

  // ── Rows 4-13: Lane labels + cells ────────────────────────
  lanes.forEach((lane, li) => {
    const rowIdx = li + 4;
    const color = LANE_COLS[li % LANE_COLS.length];

    // Lane label
    const ll = el('div', 'lane-lbl');
    ll.style.gridRow = String(rowIdx); ll.style.gridColumn = '1';
    ll.style.borderTop = `3px solid ${color}`;
    ll.innerHTML = `<span class="ll-num">${lane.num}</span><span class="ll-name">${lane.name}</span><span class="ll-role">${lane.role}</span>`;
    board.appendChild(ll);

    // Cells
    phases.forEach((phase, pi) => {
      const card = (lookup[lane.name] || {})[phase.name];
      const cell = el('div', '');
      cell.style.gridRow = String(rowIdx);
      cell.style.gridColumn = String(pi + 2);
      cell.dataset.lane = lane.name;
      cell.dataset.phase = phase.name;
      cell.dataset.phaseIdx = pi;

      if (!card) {
        cell.className = 'cell cell-placeholder';
      } else {
        cell.className = 'cell';
        cell.dataset.id = card.id;
        cell.dataset.level = card.level;
        cell.dataset.state = card.state;
        cell.tabIndex = 0;
        cell.setAttribute('role', 'button');
        cell.setAttribute('aria-label', card.title);

        const chipsHtml = card.chips.map(ch => `<span class="chip">${ch}</span>`).join('');
        const tmplLink = card.template_url
          ? '<a class="c-template" href="' + card.template_url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="c-template-icon">📄</span>Template</a>'
          : '';
        const inner = el('div', 'card-inner');
        inner.style.setProperty('--lane-color', color);
        inner.innerHTML = `
          <div class="card-top">
            <span class="c-meta">${card.meta}</span>
            <span class="c-state ${stateClass(card.state)}">${card.state}</span>
          </div>
          <div class="c-title">${card.title}</div>
          <div class="c-desc">${card.description}</div>
          <div class="c-body">${card.body}</div>
          <div class="c-chips">${chipsHtml}</div>
          ${tmplLink}`;
        cell.appendChild(inner);

        cell.addEventListener('click', () => handleCardClick(card, cell, li));
        cell.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCardClick(card, cell, li); }
        });
      }
      board.appendChild(cell);
    });
  });
}

// ── Card click / drawer ───────────────────────────────────────
let activeCell = null;

function handleCardClick(card, cell, laneIdx) {
  if (activeCell === cell) {
    clearFlow(); closeDrawer();
    return;
  }
  clearFlow();
  activeCell = cell;
  cell.classList.add('cell-selected');
  highlightFlow(card, laneIdx);
  openDrawer(card);
}

function openDrawer(card) {
  document.getElementById('drwPhase').textContent = card.phase;
  document.getElementById('drwTitle').textContent = card.title;
  document.getElementById('drwMeta').innerHTML =
    `<span class="c-meta">${card.meta}</span> · <span class="c-state ${stateClass(card.state)}" style="padding:2px 6px;border-radius:99px">${card.state}</span>`;

  const chipsHtml = card.chips.map(ch => `<span class="drw-chip">${ch}</span>`).join('');
  const tmplSection = card.template_url
    ? '<a class="drw-template-btn" href="' + card.template_url + '" target="_blank" rel="noopener">📄 Open Template in Confluence</a><div style="font-size:10px;color:#9ca3af;margin-top:6px;word-break:break-all">' + card.template_url + '</div>'
    : '<div class="drw-template-none">No template linked — add a Confluence URL via the Excel template_url column and re-import.</div>';
  document.getElementById('drwBody').innerHTML = `
    <div class="drw-field"><span class="drw-label">Description</span><p>${card.description}</p></div>
    <div class="drw-field"><span class="drw-label">Detail</span><p>${card.body}</p></div>
    <div class="drw-section-head">Accountability</div>
    <div class="drw-field"><span class="drw-label">Lead</span><p>${card.lead}</p></div>
    <div class="drw-field"><span class="drw-label">Support</span><p>${card.support}</p></div>
    <div class="drw-section-head">Artefact &amp; Traceability</div>
    <div class="drw-field"><span class="drw-label">Deliverable</span><p>${card.deliverable}</p></div>
    <div class="drw-field"><span class="drw-label">Traceability</span><p>${card.traceability}</p></div>
    <div class="drw-section-head">Governance</div>
    <div class="drw-field"><span class="drw-label">Governance</span><p>${card.governance}</p></div>
    <div class="drw-field"><span class="drw-label">Level</span><p>${card.level}</p></div>
    <div class="drw-field"><span class="drw-label">Tags</span><div class="drw-chips">${chipsHtml}</div></div>

    <div class="drw-section-head">Template</div>
    ${tmplSection}`;

  document.getElementById('drwBackdrop').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drwBackdrop').classList.remove('open');
}

// ── Flow highlight ────────────────────────────────────────────
function highlightFlow(card, laneIdx) {
  const phaseNames = modelData.phases.map(p => p.name);
  const selIdx = phaseNames.indexOf(card.phase);

  document.querySelectorAll('.cell').forEach(c => {
    if (c.dataset.id === card.id) return;
    if (c.dataset.lane !== card.lane) {
      c.classList.add('cell-dimmed');
      return;
    }
    const pi = parseInt(c.dataset.phaseIdx, 10);
    if (pi < selIdx) c.classList.add('cell-up');
    else if (pi > selIdx) c.classList.add('cell-down');
  });
}

function clearFlow() {
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('cell-selected','cell-up','cell-down','cell-dimmed');
  });
  activeCell = null;
}

// ── Filters ───────────────────────────────────────────────────
function applyFilters() {
  const phase = document.getElementById('filterPhase').value;
  const lane  = document.getElementById('filterLane').value;
  const level = document.getElementById('filterLevel').value;
  const state = document.getElementById('filterState').value;
  const search = document.getElementById('filterSearch').value.trim().toLowerCase();

  document.querySelectorAll('.cell').forEach(cell => {
    if (cell.classList.contains('cell-placeholder')) return;
    if (!cell.dataset.id) return;
    let vis = true;
    if (phase && cell.dataset.phase !== phase) vis = false;
    if (lane  && cell.dataset.lane  !== lane)  vis = false;
    if (level && cell.dataset.level !== level) vis = false;
    if (state && cell.dataset.state !== state) vis = false;
    if (search && !cell.textContent.toLowerCase().includes(search)) vis = false;
    cell.style.opacity = vis ? '' : '0.15';
    cell.style.pointerEvents = vis ? '' : 'none';
  });
}

// ── View mode ─────────────────────────────────────────────────
function applyViewMode(mode) {
  const board = document.getElementById('board');
  board.classList.remove('view-detail','view-exec','view-dense');
  board.classList.add('view-' + mode);
  setTimeout(syncToolbarHeight, 50);
}

// ── Toolbar height sync ───────────────────────────────────────
function syncToolbarHeight() {
  const tb = document.getElementById('toolbar');
  if (!tb) return;
  const h = tb.offsetHeight;
  document.documentElement.style.setProperty('--tb-h', h + 'px');
  document.getElementById('canvas').style.height = `calc(100vh - ${h}px)`;
}

// ── CSV export ────────────────────────────────────────────────
function exportCSV() {
  const fields = ['id','lane','phase','level','state','meta','title','description','body','lead','support','deliverable','traceability','governance','chips','template_url'];
  const header = fields.join(',');
  const rows = modelData.cards.map(c =>
    fields.map(f => {
      const v = f === 'chips' ? (c[f]||[]).join('; ') : (c[f]||'');
      return '"' + String(v).replace(/"/g,'""') + '"';
    }).join(',')
  );
  const blob = new Blob([[header,...rows].join('\n')], {type:'text/csv'});
  const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:'TOM_Design_to_Value.csv'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Populate selects ──────────────────────────────────────────
function populateFilters() {
  const add = (id, val, label) => {
    const o = document.createElement('option');
    o.value = val; o.textContent = label;
    document.getElementById(id).appendChild(o);
  };
  modelData.phases.forEach(p => add('filterPhase', p.name, p.num + ' ' + p.name.replace(/^P\d+\s*/,'')));
  modelData.lanes.forEach(l => add('filterLane', l.name, l.name));
  [...new Set(modelData.cards.map(c=>c.level))].sort().forEach(v => add('filterLevel', v, v));
  [...new Set(modelData.cards.map(c=>c.state))].sort().forEach(v => add('filterState', v, v));
}

// ── Validation banner ─────────────────────────────────────────
function showValidation(errors) {
  const b = document.getElementById('valBanner');
  if (!errors.length) { b.style.display='none'; return; }
  b.style.display='block';
  b.innerHTML = `<strong>⚠ Validation (${errors.length})</strong><ul>${errors.map(e=>`<li>${e}</li>`).join('')}</ul>`;
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  showValidation(validateModel(modelData));
  populateFilters();
  renderBoard();
  syncToolbarHeight();
  applyViewMode('detail');

  // Drawer close
  document.getElementById('drwClose').addEventListener('click', () => { clearFlow(); closeDrawer(); });
  document.getElementById('drwBackdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('drwBackdrop')) { clearFlow(); closeDrawer(); }
  });
  document.addEventListener('keydown', e => { if (e.key==='Escape') { clearFlow(); closeDrawer(); } });

  // Filters
  ['filterPhase','filterLane','filterLevel','filterState'].forEach(id =>
    document.getElementById(id).addEventListener('change', applyFilters)
  );
  document.getElementById('filterSearch').addEventListener('input', applyFilters);

  // View mode
  document.getElementById('viewMode').addEventListener('change', e => applyViewMode(e.target.value));

  // Buttons
  document.getElementById('clearFlow').addEventListener('click', () => { clearFlow(); closeDrawer(); });
  document.getElementById('exportCSV').addEventListener('click', exportCSV);
  document.getElementById('printPDF').addEventListener('click', () => window.print());

  // Import JSON
  document.getElementById('importJSON').addEventListener('click', openImportModal);
  document.getElementById('imCancel').addEventListener('click', closeImportModal);
  document.getElementById('imApply').addEventListener('click', applyImport);
  document.getElementById('importModalBackdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('importModalBackdrop')) closeImportModal();
  });
  document.getElementById('imDropzone').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', e => {
    if (e.target.files[0]) handleImportFile(e.target.files[0]);
  });
  document.getElementById('imDropzone').addEventListener('dragover', e => {
    e.preventDefault(); e.currentTarget.classList.add('drag-over');
  });
  document.getElementById('imDropzone').addEventListener('dragleave', e => {
    e.currentTarget.classList.remove('drag-over');
  });
  document.getElementById('imDropzone').addEventListener('drop', e => {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]);
  });

  // Resize
  window.addEventListener('resize', syncToolbarHeight);
}


// ── Import JSON ───────────────────────────────────────────────
let pendingImport = null;

function openImportModal() {
  pendingImport = null;
  document.getElementById('imApply').disabled = true;
  document.getElementById('imError').style.display = 'none';
  document.getElementById('imDropzone').querySelector('.im-dropzone-text').textContent = 'Click to select a JSON file';
  document.getElementById('importModalBackdrop').classList.add('open');
}

function closeImportModal() {
  document.getElementById('importModalBackdrop').classList.remove('open');
  pendingImport = null;
}

function handleImportFile(file) {
  if (!file || !file.name.endsWith('.json')) {
    showImportError('Please select a .json file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const errors = validateImport(data);
      if (errors.length) {
        showImportError('Validation errors: ' + errors.join('; '));
        return;
      }
      pendingImport = data;
      document.getElementById('imApply').disabled = false;
      document.getElementById('imDropzone').querySelector('.im-dropzone-text').textContent = '✓ ' + file.name + ' — ready to apply';
      document.getElementById('imError').style.display = 'none';
    } catch(err) {
      showImportError('Invalid JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function validateImport(data) {
  const errors = [];
  if (!data.lanes || !Array.isArray(data.lanes) || !data.lanes.length) errors.push('lanes array missing or empty');
  if (!data.phases || !Array.isArray(data.phases) || !data.phases.length) errors.push('phases array missing or empty');
  if (!data.cards || !Array.isArray(data.cards) || !data.cards.length) errors.push('cards array missing or empty');
  return errors;
}

function showImportError(msg) {
  const el = document.getElementById('imError');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('imApply').disabled = true;
  pendingImport = null;
}

function applyImport() {
  if (!pendingImport) return;
  // Patch modelData in place
  modelData.lanes = pendingImport.lanes;
  modelData.phases = pendingImport.phases;
  modelData.cards = pendingImport.cards;
  closeImportModal();
  clearFlow();
  closeDrawer();
  // Re-populate filters and re-render
  document.getElementById('filterPhase').innerHTML = '<option value="">All Phases</option>';
  document.getElementById('filterLane').innerHTML = '<option value="">All Lanes</option>';
  document.getElementById('filterLevel').innerHTML = '<option value="">All Levels</option>';
  document.getElementById('filterState').innerHTML = '<option value="">All States</option>';
  populateFilters();
  renderBoard();
  syncToolbarHeight();
  applyViewMode(document.getElementById('viewMode').value);
  showValidation(validateModel(modelData));
}

document.addEventListener('DOMContentLoaded', init);
